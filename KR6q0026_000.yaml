  text: 教外別傳序老胡四十九年昵昵喁喁與有心衆生情投意接說到說不得處突然向龍尾尖上一聲雷震使大地有情一時絶倒翻身轉來便個個能御風騎氣興雨為雲龍雷迅捷現大人相不屬文字意情領略而得入正法故謂之教外別傳大略此宗之旨不出一箇別字便能攪長河為酥酪變大地為黃金千丈舌頭談不到遮裡自然粒粒拋出金剛王屑破人腸胃銷人骨肉化成一道葭管最先之陽氣不特有根者為花為果至若頑空怪石莫不孕暖生潤為之唱和矣海昌黎眉居士既從河洛一派接續子輿氏傳性命之宗為長者折枝處頓證拈花一脉乃集釋迦而下金色慶喜已至大鑑振起五宗迢迢千古格外之英彚其語而付之梨各各現千百億身處處說法俾人人證而了之方見黎眉通身手眼根根毛孔放光說法為先覺宗乘諸大老中傑出之英照映末世不肖矢心此道力荷有年嚶鳴天表未有和者忽頒來書於神交之外得我心同始知祖佛猶有真子在法門殷憂為之頓釋因序其教外別傳而復贅五宗之象語云吳門鄧蔚山天壽聖恩禪寺於密法藏和南撰教外別傳序世尊付法傳衣叮囑迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝當護持并敕阿難副二傳化無令斷絶世尊末後殷勤將千二百斤擔子一肩卸却以此觀之四十九年所說修多羅教皆利生接物邊事總非究竟若依衲僧論正是狼尾掃跡愈掃愈深習氣未盡過在斯也這個事不在多言多語亦非良久默然只要你中心樹子無根透發靈苗有日世尊老婆心忒殺露布衆生癡愚以為香甜果子逐日研窮噉嚼滋味不知被葛藤縛殺至今若個肯求解脫世尊涅槃千百餘載猶若今日春風忽忽香飄萬古之嘉運雙林翠靄事跡昭昭果還千劫之糢糊象頭麻麥雖示寂不滅不生之金軀而金軀未嘗不盈於眉目性靈之妙豈屬衆生修而後得耶癡頑眷屬多生甘受辛苦住生死宅造無遮殃不識自己一段光明從昔已來徹天徹地原是靈山一會釋迦非前衆生非後絶賓主之家常無生佛之異號大圓鏡智塵剎洞然劫量有盡光明獨存無一星道理落意地若擬一星即瑕生安名清淨法眼如僧伽難提童子持圓鑑直造羅睺羅尊者前尊者問汝幾歲耶曰百歲尊者曰汝年尚幼何言百歲童子曰我不會理正百歲耳尊者曰汝善機耶童子曰佛言若人生百歲不會諸佛機未若生一日而得決了之尊者曰汝手中者當何所表童子曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似果然果然西天祖師舌根生利神通奇特豈離衆生心別有至二十八祖菩提達磨即東土初祖知震旦國衆生有大乘根器飄然獨往別出手眼拈提微笑之旨唱言不立文字教外別傳直指人心見性成佛果教外有別傳乎因末法衆生多泥文字所說聖教以為實法不信向上一著無修無證之天真絶死絶生之佛性擲身心於草莾誅六根為棄物故來掃除枝蔓坐斷葛藤要你覿體承當頓明心地九載之下得四人焉慧可大師一枝傳至六祖六祖已後衣鉢不傳以心印心祖祖相繼盡乃言句活人瞬目揚眉皆成剩法逮德山鑒黃檗運便作怪變色作用至大慧杲即不然一棹千江狂波頓息棒喝置之高閣矣大慧杲後自元迄明所出明眼知識益盛雖語録流通無入龍藏可嗟近今邪師說法塗玷宗門西來見性一宗已成七家村婆子傳口令相似祖佛無如奈何今教外別傳一部鹽官黎眉居士新集居士久探禪宗深窮旨趣祖佛機緣分清理路古今拈頌貫串源頭末法緇素當薦取自己本來面孔勿向外尋討此心晝夜不昏歷劫不壞心外無佛修竹蒼松佛外無心山河大地直下了然莫耽文字精一工夫頓開正眼𦦨續祖燈斬新條令抑古佛家風揚祖師心印拈一瓣香以報居士始知上來清淨法眼元在皇明崇禎癸酉中秋日徑山語風圓信撰教外別傳序老僧嚮讀大慧語見拈水潦和尚因緣謂潦才舉揚便賣弄者一踏云自從一喫馬師踏直至如今笑不休渠又何曾有峰巒叠翠㵎水潺湲岸柳含烟庭花笑日鶯啼喬木蝶舞芳叢底說話來古今洪詞便利無過此老看他恁麼舉示則不專在言句尖新唯貴提其至要而已云何至要不見他室中問僧德山見僧入門便棒臨濟見僧入門便喝雪峰見僧便道是甚麼睦州見僧便道現成公案放汝三十棒者四個老漢還有為人處也無僧云有大慧云劄僧擬議大慧便喝出遵璞聞之忽然脫去從前惡知惡解遂成個灑灑地衲僧又鼎需入室大慧問云內不放出外不放入正當恁麼時如何需擬對大慧以竹篦打三下需忽大悟又大悲間長老入室大慧問不與萬法為侶者是什麼人間云扶不起大慧云扶不起是什麼人速道速道間擬對大慧便打忽然大悟可見棒喝急切要密開人正眼脫人情解無過此也所以老僧生平不解打之繞唯以條棒一味從頭棒將去直要人向棒頭拂著處豁開正眼徹見自家境界不從他得逈出教內教外名言則方知黎眉居士所集從上佛祖機語決定不是文字方能撩起便行羅籠不住呼喚不回直饒如是只堪自了若論戰也各各力在轉處不滯玄妙理致一味活捉生擒向上全提本分一著超佛越祖獨脫單行縱奪自繇殺活自在能治一切名言不坐死地不瞎人眼方堪利己利人其或未然且向者冊子上東覷西覷忽然覷著却來老僧手裡請棒喫既是覷著因甚却要喫棒還有緇素得底麼若緇素不出且莫輕擬棒喝著崇禎辛未阿育王寺方丈老僧圓悟題教外別傳目録卷一釋迦牟尼佛賢劫第四尊卷二西天祖師一祖摩訶迦葉尊者二祖阿難尊者三祖商那和修尊者四祖優波毱多尊者五祖提多迦尊者六祖彌遮迦尊者七祖婆須密尊者八祖佛陀難提尊者九祖伏䭾密多尊者十祖脅尊者十一祖富那夜奢尊者十二祖馬鳴尊者十三祖迦毗摩羅尊者