body:
  text: 釋迦牟尼佛釋迦牟尼佛賢劫第四尊周昭王二十四年甲寅歲四月八日生至四十二年二月八日年十九欲求出家而自念言當復何遇即於四門遊觀見四等事心有悲喜而作思惟此老病死終可厭離於是夜子時有一天人名曰淨居於牖中叉手白言出家時至可去矣太子聞已心生歡喜即逾城而去於檀特山中修道始於阿藍迦藍處三年學不用處定知非便捨復至鬱頭藍弗處三年學非非想定知非亦捨又至象頭山同諸外道日食麻麥經于六年故經云以無心意無受行而悉摧伏諸外道先歷試邪法示諸方便發諸異見令至菩提故普集經云菩薩於二月八日明星出時成道號天人師時年三十矣即穆王三年癸未歲也既而於鹿野苑中為憍陳如等五人轉四諦法輪而證道果說法住世四十九年後告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝當護持并勑阿難副二傳化無令斷絶而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽梨衣傳付於汝轉授補處至慈氏佛出世勿令朽壞爾時世尊至拘尸那城告諸大衆吾今背痛欲入涅槃即往熙連河側娑羅雙樹下右脅纍足泊然宴寂自世尊滅後一千一十七年教至中夏即後漢永平十年戊辰歲也世尊才生下乃一手指天一手指地周行七步目顧四方曰天上天下唯吾獨尊雲門偃云我當時若見一棒打殺與狗子喫貴圖天下太平雪竇顯云便與掀倒禪牀法昌遇云好一棒太遲生未離兜率腳跟下好與一錐豈到今日雖然如是也是賊過後張弓雲峰悅云雲門雖有定亂之謀且無出身之路保寧勇頌云混沌未分人未曉乾坤才剖事潛彰天生伎倆能奇怪末上輸他弄一場天童華云雲門此話雖行未免落他陷穽黃面老子末上賣峭正是依草附木二俱不了以左手拍禪牀云過這邊著汝諸人還知明果落處麼珊瑚枕上兩行淚半是思君半恨君高峯妙云世尊大似靈龜曳尾自取喪身之兆雲門雖則全提正令也是為他間事長無明當時但於地上劃一圓相就圓相中書箇丁字復展兩手示之管取冰消瓦解楚石琦頌云九龍吐水自空來襯足金蓮遍地開天上人間藏不得這回不免出胞胎獨稱尊向誰說錯承當第二月且如何是第一月咄金粟悟云我不似雲門大驚小怪我當時若見但向前以手加額云猫看他面皮向甚處著他若更擬議便與驀面一睡徑山信云世尊奇特忒殺奇特未免傍觀者哂頌云七步周行也不妨指天指地便郎當大風吹倒梧桐樹自有傍人說短長世尊一日升座大衆集定文殊白椎曰諦觀法王法法王法如是世尊便下座芭蕉徹云忙忙者匝地普天雪竇顯頌云列聖叢中作者知法王法令不如斯會中若有仙陀客何必文殊下一槌天童覺頌云一段真風見也麼元元化母理機梭織成古錦含春象無奈東君漏泄何萬峯蔚云世尊也是起模畫樣文殊亦乃見境生情出來道箇諦觀法王法法王法如是且道此語落在文殊處落在世尊處金粟悟云文殊大似認影迷頭世尊也是腳跟不著地徑山信云雙髻當時若在奪却文殊槌子喝一喝看那黃面老人作何去就頌云張郎沉醉一杯酒扶醉李郎醉更深不顧腳跟三尺水只貪縱步上高岑世尊一日升座默然而坐阿難白椎曰請世尊說法世尊曰會中有二比丘犯律行我故不說法阿難以他心通觀是比丘遂乃遣出世尊還復默然阿難又白適來為二比丘犯律是二比丘已遣出世尊何不說法世尊曰吾誓不為二乘聲聞人說法便下座南堂靜云前箭猶輕後箭深高峰妙云世尊能挽千鈞之弩銀山鐵壁箭箭相通阿難雖有隱身之術殊不覺髑髏後中箭還有軃得過底麼世尊一日升座大衆集定迦葉白椎曰世尊說法竟世尊便下座芭蕉徹云兩箇漢大似無孔笛遇著氊拍板世尊九十日在忉利天為母說法及辭天界而下時四衆八部俱往空界奉迎有蓮花色比丘尼作念云我是尼身必居大僧後見佛不如用神力變作轉輪聖王千子圍繞初見佛果滿其願世尊才見乃訶曰蓮花色比丘尼汝何得越大僧見吾汝雖見吾色身且不見吾法身須菩提巖中宴坐却見吾法身薦福懷云蓮華色比丘尼被熱謾且置還知瞿曇老人性命在別人手裏麼世尊昔因文殊至諸佛集處值諸佛各還本處唯有一女人近彼佛坐入於三昧文殊乃白佛云何此人得近佛坐而我不得佛告文殊汝但覺此女令從三昧起汝自問之文殊繞女人三匝鳴指一下乃托至梵天盡其神力而不能出世尊曰假使百千文殊亦出此女人定不得下方過四十二恆河沙國土有罔明菩薩能出此女人定須臾罔明大士從地涌出作禮世尊世尊勑罔明出罔明却至女子前鳴指一下女子於是從定而出翠巖芝問僧文殊是七佛師為甚出女子定不得罔明菩薩下方而至但彈指一聲便能出定莫有對者乃自代云僧投寺裏宿賊打不防家五雲逢云不惟文殊不能出此定但恐如來也出此定不得祇如教意怎生體解天衣懷頌云文殊托上梵天罔明輕輕彈指女子黃面瞿曇看它一倒一起石門易頌云坐擁羣峯覆白雲鶯啼深谷不知春巖前花雨紛紛落夢覺初回識故人昭覺勤頌云大定等虗空廓然誰辨的女子與瞿曇據令何調直師子奮迅兮搖蕩乾坤象王回旋兮不費餘力孰勝孰負誰出誰入雨散雲收青天白日君不見馬駒踏殺天下人臨濟未是白拈賊徑山杲頌云出得出不得是定非正定罔明與文殊喪却窮性命高峯頌云兩兩成羣罪莫窮謾將鼠伎逞英雄當時若作今時世縱使瞿曇也不中楚石琦頌云一切處是定出入有何拘瞿曇推倒女子罔明扶起文殊咄咄咄噓嚧噓覿面相逢不識渠金粟悟頌云出得出不得無在無不在女子與瞿曇靈山元一隊君不見臺山路上驀直婆明州市裏憨布袋徑山信云也奇怪文殊乃七佛之師因甚出女人定不得且道利害在甚麼所在頌云子丑寅卯辰巳午甲乙丙丁莫莾鹵瞥然撞著李將軍石頭何用千鈞弩世尊因波斯匿王問勝義識中有世俗諦否若言無智不應二若言有智不應一一二之義其義云何佛言大王汝於過去龍光佛法中曾問此義我今無說汝今無聽無說無聽是名為一義二義翠巖真云波斯匿王善問不善答世尊善答不善問一人理上偏枯一人事上偏枯翠巖當時若見點一把火照看黃面老面皮厚多少薦福懷云諸仁者大王分明問世尊分明答賓主歷然作麼生說箇無說無聞底道理世尊一日見文殊在門外立乃曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門報慈遂徵云為復是門外語門內語溈山哲代云吾不如汝黃龍新云文殊恁麼道入得門入不得門若入得門冰消瓦解世尊一日坐次見二人舁豬過乃問這箇是甚麼曰佛具一切智豬子也不識世尊曰也須問過大陽玄云不因世尊問洎乎忘却地藏恩云瞿曇老漢也是無端大似節目上更生節目忽被二人呵呵大笑舁豬便行一場懡㦬世尊因有異學問諸法是常邪世尊不對又問諸法是無常邪亦不對異學曰世尊具一切智何不對我世尊曰汝之所問皆為戲論高峰妙云異學有言若啞世尊無語如雷遮裏見得分明正是增益戲論何故諦聽諦聽世尊一日示隨色摩尼珠問五方天王此珠而作何色時五方天王互說異色世尊復藏珠入袖却擡手曰此珠作何色天王曰佛手中無珠何處有色世尊嘆曰汝何迷倒之甚吾將世珠示之便各彊說有青黃赤白色吾將真珠示之便總不知時五方天王悉皆悟道世尊因乾闥婆王獻樂其時山河大地盡作琴聲迦葉起作舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習佛曰實無餘習莫謗法也王又撫琴三遍迦葉亦三度作舞王曰迦葉作舞豈不是佛曰實不曾作舞王曰世尊何得妄語佛曰不妄語汝撫琴山河大地木石盡作琴聲豈不是王曰是佛曰迦葉亦復如是所以實不曾作舞王乃信受修山主問澄源禪師乾闥婆王奏樂直得須彌岌峇海水騰波迦葉作舞作麼生會源云迦葉過去世曾作樂人來習氣未除修云須彌岌峇海水騰波又作麼生澄源休去法眼代云正是習氣虗堂愚頌云有三尺劍可以謁趙國無千里眼難以見懸絲巍巍堂堂三界大師徑山信云乾闥婆王被世尊東扯西拽說得却好王雖懡㦬而退且信一半頌云風不來樹不動田雞不跳草不動乾闥婆王眼失睛埋冤迦葉偷糟甕世尊因外道問昨日說何法曰說定法外道曰今日說何法曰不定法外道曰昨日說定法今日何說不定法世尊曰昨日定今日不定五祖戒云何得將別人物作自己用溈山云世尊大似看樓打樓大溈即不然待問昨日說定今日何說不定但云非汝境界薦福懷云黃面老子被外道拶著出自偶然雖然如此邪正未分若人辨得許你頂門具眼世尊因五通仙人問世尊有六通我有五通如何是那一通佛召五通仙人五通應諾佛曰那一通你問我雪竇顯云老胡元不知有那一通却因邪打正琅琊覺云世尊不知可謂因正而打邪五通因邪而打正翠巖芝云五通如是問世尊如是答要且不會那一通雲峯悅云大小瞿曇被外道勘破了有傍不肯底麼出來我要問你作麼生是那一通雲蓋本云世尊如是召五通如是應作麼生是那一通良久云姹女已歸霄漢去呆郎猶向火邊棲徑山杲云今時有一種弄泥團漢往往在那一通處錯認定盤星斷橋倫頌云那一通你問我玄關倒插無鬚鎖等閒一掣掣得開三箇老婆相對坐咄世尊因普眼菩薩欲見普賢不可得見乃至三度入定遍觀三千大千世界覔普賢不可得見而來白佛佛曰汝但於靜三昧中起一念便見普賢普眼於是才起一念便見普賢向空中乘六牙白象雲居舜云諸仁者且作麼生會雲居道普眼推倒世尊世尊推倒普眼你道普賢在甚處金粟悟云雲居恁麼道未免傍觀者哂乃召衆云誰是傍觀者世尊因自恣日文殊三處過夏迦葉欲白椎擯出才拈椎乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉汝擬擯那箇文殊迦葉無對昭覺勤云可惜放過一著待釋迦老子道你欲擯那箇文殊便與一椎看他作麼合殺頌云大象不遊兔徑燕安知鴻鵠據令宛若成風破的渾如齧鏃遍界是文殊遍界是迦葉相對各儼然舉槌何處罰好一札金色頭陀曾落節雲居元云一家有事百家忙晦室明云文殊遍越聖制固是罪不容誅大小世尊前言不副後語楞嚴會上道如是文殊若有二相即非文殊這裏又道欲擯出那箇文殊惑亂不少育王當時作迦葉且放過文殊但擯出世尊一箇何故殺一有罪而天下咸服高峰妙云文殊知底迦葉不知迦葉知底文殊不知彼彼不知且置百千萬億文殊那箇是真底世尊因長爪梵志索論義預約曰我義若墮我自斬首世尊曰汝義以何為宗梵志曰我以一切不受為宗世尊曰是見受否梵志拂袖而去行至中路乃省謂弟子曰我當回去斬首以謝世尊弟子曰人天衆前幸當得勝何以斬首梵志曰我寧於有智人前斬首不於無智人前得勝乃歎曰我義兩處負墮是見若受負門處麁是見不受負門處細一切人天二乘皆不知我義墮處唯有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是同五百徒衆一時投佛出家證阿羅漢天衣懷頌云是見若受破家門是見不受共誰論匾擔驀折兩頭脫一毛頭上現乾坤世尊昔欲將諸聖衆往第六天說大集經勑他方此土人間天上一切獰惡鬼神悉皆輯會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛勑者各發弘誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切衆生成佛盡衆生界空無有衆生名字我乃發菩提心薦福懷云臨危不變真大丈夫諸仁者作麼生著得一轉語與黃面老子出氣尋常神通妙用智慧辨才到此總用不著盡閻浮大地人無不愛佛到這裏何者是佛何者是魔還有人辨得麼良久云欲得識魔麼開眼見明欲得識佛麼合眼見暗魔之與佛以拄杖一時穿却鼻孔徑山杲云天衣老漢恁麼批判直是奇特雖然如是未免話作兩橛若向何者是佛何者是魔處便休去不妨令人疑著却云欲識魔麼開眼見明欲識佛麼合眼見暗郎當不少又云魔之與佛以拄杖一時穿却鼻孔雪上加霜妙喜却與黃面老子代一轉語待這魔王道衆生界空無有衆生名字我乃發菩提心只向伊道幾乎錯喚你作魔王此語有兩負門若人檢點得出許伊具衲僧眼楚石琦云澤廣藏山貍能伏豹二大老何用多言只消對魔王道魔王魔王你認那箇作菩提心還識得也未設使一切衆生成佛盡衆生界空無有衆生名字你要發心也未許你在管取拱手歸降荊溪傳徵云且道這箇魔王是歸依佛語是不歸依佛語世尊嘗與阿難行次見一古佛塔世尊便作禮阿難曰此是甚麼人塔世尊曰此是過去諸佛塔阿難曰過去諸佛是甚麼人弟子世尊曰是吾弟子阿難曰應當如是德山密云過去是現在弟子實有此理笑巖寶云世尊古佛亦不須論祇如阿難云應當如是且別有甚麼長處若人分析得出當可禮三拜金粟悟別云廣慧若作阿難待世尊道是吾弟子但問佛是甚麼人弟子待世尊擬開口時便乃作禮即休却謂應當如是隨風倒柁豈是丈夫世尊因有外道問不問有言不問無言世尊良久外道讚歎曰世尊大慈大悲開我迷雲令我得入乃作禮而去阿難白佛外道得何道理稱讚而去世尊曰如世良馬見鞭影而行雪竇顯云邪正不分過猶鞭影又云諸禪德迷雲既開決定見佛還許他同參也無若共相委知則天下宗師並為外道伴侶如各非印證則東土衲僧不如西天外道頌云機輪曾未轉轉必兩頭走明鏡忽臨臺當下知妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回昭覺勤云外道因邪打正世尊看樓打樓阿難不善傍觀引得世尊拖泥帶水若據山僧見處待他問不問有言不問無言和聲便打及至阿難問外道有何所證亦和聲便打何故殺人須是殺人刀活人須是活人劍徑山杲云邪正兩分正由鞭影頌云兩處牢關擊不通纖塵不動自乖宗忽然業鏡百雜碎黃面瞿曇失却蹤楚石琦云欲識邪正不分麼誰是外道誰是世尊欲識邪正兩分麼世尊自世尊外道自外道此是天寧見處一任諸方貶剝笑巖寶云外道大似迷頭演若以己方人奈世尊不犯手勢劈臉一摑直得伊翳火星飛始覺面門著痛世尊一日勑阿難食時將至汝當入城持鉢阿難應諾世尊曰汝既持鉢須依過去七佛儀式阿難便問如何是過去七佛儀式世尊召阿難阿難應諾世尊曰持鉢去密庵傑云大小世尊被阿難輕輕靠著未免喚鐘作甕遁庵演頌云從前七佛儀式慶喜何曾缺少堪笑黃面瞿曇無端打箇之繞世尊因有比丘問我於世尊法中見處即有證處未是世尊當何所示世尊曰比丘某甲當何所示是汝此問世尊因耆婆善別音響至一塜間見五髑髏乃敲一髑髏問耆婆此生何處耆婆曰生人道世尊又敲一曰此生何處耆婆曰生天道世尊又別敲一曰此生何處耆婆罔知生處金粟悟代耆婆但云生佛處世尊若更擬議時便與震威一喝呵呵大笑而行世尊因黑氏梵志運神力以左右手擎合歡梧桐花兩株來供養佛佛召仙人梵志應諾佛曰放下著梵志遂放下左手一株華佛又召仙人放下著梵志又放下右手一株華佛又召仙人放下著梵志曰世尊我今兩手皆空更教放下箇甚麼佛曰吾非教汝放捨其華汝當放捨外六塵內六根中六識一時捨却無可捨處是汝免生死處梵志於言下悟無生忍世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見過去殺父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊承佛神力遂手握利劒持逼如來世尊乃謂文殊曰住住不應作逆勿得害吾吾必被害為善被害文殊師利爾從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻於夢幻中無有我人乃至能生所生父母於是五百比丘同讚嘆曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺密庵傑云為人須為切殺人須見血文殊費盡腕頭氣力要且不知此劍來處帶纍釋迦老子通身是口也分疏不下五百比丘恁麼悟去入地獄如箭射忽若踏翻大海躍倒須彌雲門扇子𨁝跳上天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生商量良久云自從舞得三臺後拍拍元來總是歌徑山信云文殊殺佛則且從若無黃面老人打許多葛藤五百比丘疑至今日尚未住手頌云莫笑他家忤逆兒戲房鑼鼓振天嘶住住住透牛皮雨爛春風花滿池內心不起如何也瓦解冰消萬劫疑世尊因地布髮掩泥獻華於然燈然燈見布髮處遂約退衆乃指地曰此一方地宜建一梵剎時衆中有一賢于長者持標於指處插曰建梵剎竟時諸天散華讚曰庶子有大智矣天童覺頌云百草頭上無邊春信手拈來用得親丈六金身功德聚等閒擺手入紅塵塵中能作主化外自來賓觸處生涯隨分足未嫌伎倆不如人張無盡頌云一枝修竹建精藍風捲蟭螟入海南惡水潑來成第二鈍根蹉過問前三世尊因七賢女遊尸陀林一女指尸曰尸在這裏人向甚處去一女曰作麼作麼諸姊諦觀各各契悟感帝釋散華曰惟願聖姊有何所須我當終身供給女曰我家四事七珍悉皆具足唯要三般物一要無根樹子一株二要無陰陽地一片三要呌不響山谷一所帝釋曰一切所須我悉有之若三般物我實無得女曰汝若無此爭解濟人帝釋罔措遂同往白佛佛言憍尸迦我諸弟子大阿羅漢不解此義唯有諸大菩薩乃解此義黃龍心云樹子若無寧善給濟既要給濟心不虗發如今有求無根樹子將何祇對寶峯文云大衆且道帝釋是會不會又道善說般若感我天宮又道無無根樹子大衆且作麼生明得不孤負聖女若也不會不得孤負帝釋歸宗亦有箇無位真人憨憨癡癡跛跛挈挈且恁麼過時喝一喝昭覺勤頌云無陰陽地無根樹谷呼不應當頭露羅列七珍森太虗動地雨花無量數天帝釋七賢女明明指出真金處無生無法本如如只箇如今離言語世尊因調達謗佛生身入地獄遂令阿難問你在地獄中安否調達曰我雖在地獄如三禪天樂佛又令問你還求出否調達曰我待世尊來便出阿難曰佛是三界大師豈有入地獄分調達曰佛既無入地獄分我豈有出地獄分翠巖真云親言出親口湛堂準頌云好笑提婆達多入捺落十小劫波雖然得三禪妙樂吹布毛須還鳥窠徑山杲云既無出分又無人分喚什麼作釋迦老子喚什麼作提婆達多喚什麼作地獄還委悉麼自携瓶去沽村酒却著衫來作主人楚石琦云妙喜與麼批判刁刀相似魚魯差殊不知釋迦老子自是釋迦老子提婆達多自是提婆達多地獄自是地獄料掉沒交涉一夜落花雨滿城流水香金粟悟云調達如世刁惡誣謗無罪之人平白陷人反自取陷不能取勝務須打箇平交然則翠巖道親言出親口是點罰語是證明語世尊因文殊忽起佛見法見被世尊威神攝向二鐵圍山五雲逢云什麼處是二鐵圍山還會麼如今若有人起佛見法見五雲與烹茶兩甌且道是賞伊是罰伊同教意不同教意白雲端云大衆世尊當時無大人相如今若有向承天這裏起佛見法見承天終不敢教動著他何謂如此但得雪消去自然春到來五祖演云白雲則具大慈悲遂拍手云曼殊室利普賢大士不審今後更敢也無自云一度被蛇傷怕見斷井索千巖長云大衆不起佛見法見還免得貶向鐵圍山麼世尊也是憐兒不覺醜城東有一老母與佛同生而不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛雪竇顯云諸七座他雖是箇老婆宛有丈夫之作既知回避稍難不免吞聲飲氣如今不欲見佛即許你切忌以手掩面何以明眼底覷著將謂雪竇門下教你學老婆禪天奇瑞云境本無境強生其境心本無心強生其心所以展轉不得自在心境雙亡愛憎俱殞再說什麼見與不見既然十指皆佛何須分別只為妄立所以難除倘達其源一道清孤笑巖寶頌云克乎己復乎禮出乎爾必返乎爾四維上下避無方平地𠑘交平地起十指掌中悉見佛錯認山僧拄杖子召云諸大德看看釋迦老子同十方微塵佛把臂越山門入來也汝等又作麼生回避復云切忌撞破髑髏徑山信頌云老母城東亦丈夫眼睛清冷絶誵訛三千里外相逢著不是當年這老胡莫謂似月中無影休辜負若向空王殿上行腳跟斬斷誰回互殃崛摩羅因持鉢至一長者門其家婦人正值産難子母未分長者曰瞿曇弟子汝為至聖當有何法能免産難殃崛語長者曰我乍入道未知此法待我回問世尊却來相報及返具事白佛佛告殃崛汝速去報言我自從賢聖法來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分免徑山杲頌云華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領覺海元頌云聖法從來不殺生本無生殺亘精明是諸人我皆空相一切冤親盡假名甘露才霑除熱惱玉蓮金子兩敷榮徑山信云殃崛傳言送語好與三十拄杖其婦當時分娩且許一半何故貪觀天上月失却手中橈頌云墻角花容欲綻眉曉霜清冷蘊香池橫開不在春枝上別有家風一段奇世尊在靈山會上拈華示衆是時衆皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉雲峯悅因僧問靈山拈華意旨如何答云一言既出駟馬難追問迦葉微笑意旨如何答云口是禍門白雲端云迦葉善觀風雲別氣色雖然如是還覺頂門重麼頌云盡說拈花微笑是不知將底辨宗風若言心眼同時證未免朦朧在夢中黃龍心云直下穿過髑髏已是換却眼睛臨危不在悚人向甚處見釋迦老子高峯妙云世尊扶頭迦葉扶尾直至如今擡舉不起莫有共著力者麼以兩手作扶勢云也只兀底徑山信云世尊說法四十九年不知賺殺多少人到這裏猶是放不下咄莫作是說樹高千丈葉落歸根三乘十二分教乃拈華之注腳世尊還記得麼頌云末後拈來花一枝露濃香冷報君知人天百萬同長短何故偏消迦葉疑可惜許春風遙送殘更雨世尊至多子塔前命摩訶迦葉分座令坐以僧伽梨圍之遂告曰吾以正法眼藏密付於汝汝當護持傳付將來興化獎因僧問多子塔前共談何事興化云一人傳虗萬人傳實海印信頌云密傳分半座正好驀面唾不與麼且放過子孫未免遭殃禍世尊臨入涅槃文殊大士請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾說一字汝請吾再轉法輪是吾曾轉法輪邪雪峯空云且道世尊從文殊請不從文殊請北澗簡頌云末上何曾轉法輪只今再轉謾勞神路行人不知天曉猶把靈符執夜明世尊於涅槃會上以手摩胸告衆曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟雲峯悅云然則膏肓之門不足以發藥雲峯今日且作死馬醫爾等諸人皮下有血麼東禪觀云其時衆中有箇作者才見以手摩胸便出約住云瞿曇你這醜舉止休拈出也他若知非決定緘口免見百萬億衆墮邪倒見皖山凝頌云老倒瞿曇不識羞臨行猶自逞風流摩胸示衆歸何處啼鳥一聲山更幽高峯妙云黃面瞿曇四十九年顛之倒之橫說竪說貴圖末後殷勤殊不知賺他百萬億衆至今墮在鐵圍山下無由解脫諸師拈頌諸經語句經題字僧問地藏琛以字不成八字不是未審是甚麼字地藏云看取下注腳徑山杲頌云以字不成八字非爍迦羅眼不能窺一毛頭上重拈出憤怒那吒失却威華嚴論未離兜率已降王宮未出母胎度人已畢徑山杲頌云利刃有蜜不須䑛蠱毒之家水莫嘗不舐不嘗俱不犯端然衣錦自還鄉天奇瑞云能買能賣輸他作者能做能為獨尊巧士山僧無能且乃尋常賞玩羊棧裏是羊猪羣裏是猪牛欄裏是牛馬棬裏是馬無不分明豈可向門庭外別覓去在且道山僧如是說話還合得世尊用處否若然會得茶來張口飯來舉手一一縱橫無不了畢佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座天奇瑞云且道佛身與法界相去多少莫是佛身外別有法界莫是法界就是佛身蓋為從前𫎇昧兩岐所以山僧故故拈出與汝論量要討箇真實譬如一草是春若山若川無草不春豈草外別有其春豈春外別有其草若然如是會得風力持帆行不棹笛聲喚月下滄洲我今普見一切衆生具有如來智慧德相但以妄想執著而不證得天童覺頌云天蓋地載成團成塊周法界而無邊㭊鄰虗而無內及盡玄微誰分向背佛祖來償口業債問取南泉王老師人人只喫一莖菜文殊所說般若經清淨行者不入涅槃破戒比丘不入地獄此山應頌云飲官酒臥官街當處死當處埋寒山逢拾得撫掌笑咍咍徑山杲頌云壁上安燈盞臺前置酒臺悶來打三盞何處得愁來高峯妙頌云涅槃地獄本無差只為從前被眼遮三腳驢兒才𨁝跳鑊湯爐炭是吾家圓覺經居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實徑山杲頌云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛師答林少瞻云但將此頌放在上面却將經文移來下面頌却是經經却是頌如此做工夫看莫管悟不悟心頭休要忙亦不可放緩如調弦之法緊緩得其所則曲調自成矣琅琊覺禪師嘗問講僧云如何是居一切時不起妄念對云起即是病又問如何是於諸妄心亦不息滅對云息即是病又問如何是住妄想境不加了知對云知即是病又問如何是於無了知不辨真實對云辨即是病覺公笑云汝識藥矣未識藥中之忌也寶覺禪師則為之偈云黃花熳熳翠竹珊珊江南地暖塞北春寒遊人去後無消息留得雲山到老看一切障礙即究竟覺雲堂行頌云枯樹雲充葉凋梅雪作花擊桐成木響蘸雪喫冬瓜長天秋水孤鶩落霞以大圓覺為我伽藍圓悟勤頌云毫𩬊不留縱橫自由閫外乾坤廓落大方無外優游明明祖師意明明百草頭褫破狐疑網截斷愛河流縱有回天力爭如直下休四衢道中淨倮倮放出溈山水牯牛楞嚴經佛謂阿難見見之時見非是見見猶離見見不能及竹庵圭云落花有意隨流水流水無情戀落花徑山杲頌云春至白花開秋來還落葉黃面老瞿曇休搖三寸舌海印信頌云見不及處江山滿目不覩纖毫花紅柳緑白雲出沒本無心流水滔滔豈盈縮汝等一人發真歸元此十方空皆悉銷隕尼無著頌云一人發真歸元十方虗空銷隕試問楊岐栗蓬何似雲門胡餅諸可還者自然非汝不汝還者非汝誰竹庵圭云常恨春歸無覔處不知轉入此中來喝一喝云三十年後莫道能仁教壞人家男女天目禮頌云不汝還兮復是誰殘紅落滿釣魚磯日斜風動無人掃燕子銜將水際飛咄咄是無等等呪佛告阿難吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝雪竇顯頌云全象全牛意不殊從來作者共名模如今要見瞿曇老剎剎塵塵在半塗湛堂準頌云老胡徹底老婆心為阿難陀意轉深韓幹馬嘶芳草渡戴嵩牛臥緑楊陰若能轉物即同如來白雲端頌云若能轉物即如來春至山花處處開自有一雙窮相手不曾容易舞三臺法華經是法住法位世間相常住雲門偃云釋迦老子甚處去也朴翁銛頌云世間相常住黃鶯啼緑樹真箇可憐生動著便飛去楊岐會頌云犬子便吠賊牛子便牽犂衲僧若恁麼未曾摸著皮佛放眉間白毫相光照東方萬八千世界圓極岑頌云蠻奴赤腳上皇州賣盡珍奇跨白牛貪著市朝人作巿又隨歌舞上官樓多意氣好風流月冷珠簾挂玉鈎分明忘却來時路百尺竿頭輥繡毬諸法從本來常自寂滅相昔有僧誦此忽起疑日夕不置忽聞鶯啼頓然開悟遂續前語為偈云諸法從本來常自寂滅相春至百花開黃鶯啼柳上假使滿世間皆如舍利弗盡思共度量不能測佛智五祖演云尋常衲僧家高揖釋迦不拜彌勒是會佛智不會佛智衆中有則有只是藏牙伏爪太平有箇見處不惜眉毛舉向諸人待有人問隨口便答破庵先云且畢竟如何是佛智頌云雪子落紛紛烏盆變白盆忽然日頭出依舊是烏盆如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界現於三界如斯之事如來明見無有錯謬圓極岑頌云岣嶁峯頭神禹字青石赤形模奇無目仙人才一見便應撫掌笑嘻嘻雲暗蒼龍化葛陂就中一句是正頌有人檢點得出許你具一隻眼大通智勝佛十劫坐道場佛法不現前不得成佛道徑山杲頌云燕坐道場經十劫一一從頭俱漏泄世間多少守株人棹棒擬打天邊月金剛般若經凡所有相皆是虗妄若見諸相非相即見如來法眼益云若見諸相非相即不見如來心聞頌云映林映日一般紅吹落吹開總是風可惜擷芳人不見一時分付與遊蜂一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出首山念因僧問如何是此經首山云低聲僧云如何是受持首山云莫染污冶父川云且道此經從甚處出須彌頂上大海波心頌云佛祖垂慈實有權言言不離此經宣此經出處還相委便向雲中駕鐵船切忌錯會應無所住而生其心冶父川頌云山堂靜坐夜無言寂寂寥寥本自然何事西風動林野一聲寒鴈唳長天般若心經是大神呪是大明呪是無上呪是無等等呪能除一切苦無準範頌云黯淡灘黯淡灘十度船來九度翻唯有三山陳上舍擔一柄傘岸上行奈我何天奇瑞云天雲雷雨日月斗星江山水石路井墻城是什麼境界會得底蠱得魘魅一時消滅不會更聽重宣悉怛多般怛囉
