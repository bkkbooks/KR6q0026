body:
  text: 四祖大醫禪師旁出法嗣牛頭山法融禪師四祖下一世牛頭山法融禪師者潤州延陵人也姓韋氏年十九閲大部般若曉達真空忽歎曰儒道世典非究竟法般若正觀出世舟航遂隱茅山投師落髮後入牛頭山幽棲寺北巖之石室有百鳥銜華之異唐貞觀中四祖遙觀氣象知彼山有奇異之人乃躬自尋訪問寺僧此間有道人否曰出家兒那箇不是道人祖曰阿那箇是道人僧無對別僧曰此去山中十里許有一懶融見人不起亦不合掌莫是道人麼祖遂入山見師端坐自若曾無所顧祖問曰在此作甚麼師曰觀心祖曰觀是何人心是何物師無對便起作禮曰大德高棲何所祖曰貧道不決所止或東或西師曰還識道信禪師否祖曰何以問他師曰嚮德滋久冀一禮謁祖曰道信禪師貧道是也師曰因何降此祖曰特來相訪莫更有宴息之處否師指後面曰別有小庵遂引祖至庵所繞庵唯見虎狼之類祖乃舉兩手作怖勢師曰猶有這箇在祖曰這箇是甚麼師無語雪竇顯代云但亦作怕勢又代云洎合放過少選祖却於師宴坐石上書一佛字師覩之竦然祖曰猶有這箇在師未曉乃稽首請説真要祖曰夫百千法門同歸方寸河沙妙德總在心源一切戒門定門慧門神通變化悉自具足不離汝心一切煩惱業障本來空寂一切因果皆如夢幻無三界可出無菩提可求人與非人性相平等大道虗曠絶思絶慮如是之法汝今已得更無別法汝但任心自在莫作觀行亦莫澄心莫起貪嗔莫懷愁慮蕩蕩無礙任意縱橫不作諸善不作諸惡行住坐臥觸目遇緣總是佛之妙用師曰心既具足何者是佛何者是心祖曰非心不問佛問佛非不心師曰既不許作觀行於境起時心如何對治祖曰境緣無好醜好醜起於心心若不強名妄情從何起妄情既不起真心任遍知汝但隨心自在無復對治即名常住法身無有變異吾受璨大師頓教法門今付於汝汝今諦受吾言只住此山向後當有五人達者紹汝玄化僧問南泉牛頭未見四祖時為甚百鳥銜花供養南泉云只為步步踏佛階梯僧云見後為甚麼不來南泉云直饒不來猶較王老師一線道雲門舉云南泉只解步步登高不解從空放下僧問如何是步步登高雲門云香積世界如何是從空放下雲門云填溝塞壑僧問趙州牛頭未見四祖時如何趙州云飽柴飽水僧云見後如何趙州云飽柴飽水祖付法訖遂返雙峯終老師自爾法席大盛唐永徽中邑宰蕭元善請於建初寺講大般若經聽者雲集至滅靜品地為之震動博陵王問師曰恰恰用心時若為安隱好師曰恰恰用心時恰恰無心用曲談名相勞直説無繁重無心恰恰用常用恰恰無今説無心處不與有心殊安國玄挺禪師四祖下六世牛頭威法嗣宣州安國寺玄挺禪師初參威禪師侍立次有講華嚴僧問真性緣起其義云何威良久師遽召曰大德正興一念問時是真性中緣起其僧言下大悟徑山杲云未興一念問時不可無緣起也時有僧云未興一念問時喚什麼作緣起妙喜云我也只要你與麼道楚石琦云崑崙奴著鐵袴打一棒行一步萬峯蔚云這僧即知開口問人不知真性緣起纍他挺禪師道大德正興一念問時是真性中緣起其僧打失鼻孔雖然得箇悟處畢竟費力不少且道未問已前緣在何處徑山道欽禪師四祖下七世鶴林素法嗣杭州徑山道欽禪師者蘇州崑山人也年二十八遇素禪師謂之曰觀子神氣溫粹真法寶也師感悟因求為弟子素躬與落髮乃戒之曰汝乘流而行逢徑即止師遂南邁抵臨安見東北一山因問樵者樵曰此徑山也乃駐錫焉問如何是道師曰山上有鯉魚海底有蓬塵徑山信云這則公案因國一答得新奇古今無人嗅著語風今日橫推日月倒轉山河吸盡源泉掀翻五岫管教井底無塵而百劫長清鯉魚插翅而高沖霄漢且道這僧會不會馬祖令人送書到書中作一圓相師發緘於圓相中著一點却封回忠國師聞乃云欽師猶被馬師惑保福展云甚處是惑處作麼生得不惑去雪竇顯云徑山被惑且置若將呈似國師別作箇什麼伎倆免被惑去有老宿云當時坐却便休亦有道但與畫破若與麼祇是不識羞敢謂天下老師各具金剛眼睛廣作神通變化還免得麼雪竇見處也要諸人共知祇這馬師當時畫出早自惑了也五祖戒云兩彩一賽又云三人指路擬何為溈山云諸人還識馬祖徑山麼一點水墨兩處成龍國師道欽師猶被馬師惑可謂千里同風不見道手執夜明符幾箇知天曉浮山遠云欽師被馬師惑且置國師惑却多少人雪竇云只這馬師當時畫出早自惑了也穿却天下人鼻孔徑山杲云馬師仲冬嚴寒國一孟夏漸熱雖然寒熱不同彼此不失時節忠國師因甚却道欽師猶被馬師惑還委悉麼無風荷葉動決定有魚行楚石琦云圓相中著點墨日月無光天地黯黑初未惑欽師馬師先自惑纍及老南陽也一場狼籍良久平生肝膽向人傾相識如同不相識馬祖令智藏來問十二時中以何為境師曰待汝回去時有信智藏曰如今便回去師曰傳語却須問取曹溪崔趙公問弟子今欲出家得否師曰出家乃大丈夫事非將相之所能為公於是有省唐大曆三年代宗詔至闕下親加瞻禮師一日同忠國師在內庭坐次見帝駕來師起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅謂國師曰欲錫欽師一名國師欣然奉詔乃賜號國一焉徑山杲云不向四威儀中又如何見國一鳥窠道林禪師四祖下八世徑山欽法嗣杭州鳥窠道林禪師本郡富陽人屬代宗詔國一禪師至闕師乃謁之遂得正法及南歸見秦望山有長松盤屈如蓋遂棲止其上故時人謂之鳥窠禪師有侍者會通忽一日欲辭去師問曰汝今何往對曰會通為法出家和尚不垂慈誨今往諸方學佛法去師曰若是佛法吾此間亦有少許會通曰如何是和尚佛法師於身上拈起布毛吹之會通遂領悟玄旨大溈秀云可惜這僧認他口頭聲色以當平生殊不知自己光明蓋天蓋地神鼎諲舉了遂於身上拈布毛示大衆隨後一吹云會麼久後不得孤負老僧真淨文頌云鳥窠吹布毛紅日午方高趙王因好劒合國人帶刀徑山杲云溈山與麼批判也未夢見鳥窠在楚石琦云會通於拈起布毛處便喝免致諸方檢點我恁麼道也是為他間事長無明元和中白居易侍郎出守茲郡因入山謁師問曰禪師住處甚危險師曰太守危險尤甚侍郎曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作衆善奉行侍郎曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十老人行不得侍郎作禮而退五祖大滿禪師旁出法嗣蒙山道明禪師五祖下一世袁州蒙山道明禪師者鄱陽人陳宣帝之裔也國亡落於民間以其王孫嘗受署因有將軍之號往依五祖法會極意研尋初無解悟及聞五祖密付衣法與盧行者即率同志數十人躡迹追逐至大庾嶺盧見師奔至即擲衣鉢於磐石曰此衣表信可力爭邪任君將去師遂舉之如山不動踟蹰悚栗乃曰我來求法非為衣也願行者開示於我盧曰不思善不思惡正恁麼時阿那箇是明上座本來面目師當下大悟遍體汗流泣禮數拜問曰上來密語密意外還更別有意旨否盧曰我今與汝説者即非密也汝若返照自己面目密却在汝邊師曰某甲雖在黃梅隨衆實未省自己面目今蒙指授入處如人飲水冷暖自知今行者即是某甲師也盧曰汝若如是則吾與汝同師黃梅善自護持師又問某甲向後宜往何所盧曰逢袁可止遇蒙即居師禮謝遽回至嶺下謂衆人曰向陟崔嵬遠望杳無蹤迹當別道尋之皆以為然師既回遂獨往廬山布水臺經三載後始往袁州蒙山大唱玄化初名慧明以避六祖上字故名道明弟子等盡遣過嶺南參禮六祖壽州道樹禪師五祖下二世北宗秀法嗣壽州道樹禪師唐州人也遇秀禪師言下知微乃卜壽州三峯山結茅而居常有野人服色素朴言談詭異於言笑外化作佛形及菩薩羅漢天仙等形或放神光或呈聲響師之學徒覩之皆不能測如此涉十年後寂無形影師告衆曰野人作多色伎倆眩惑於人只消老僧不見不聞伊伎倆有窮吾不見不聞無盡嵩嶽破竈墮和尚嵩嶽安法嗣嵩嶽破竈墮和尚不稱名氏言行叵測隱居嵩嶽山塢有廟甚靈殿中唯安一竈遠近祭祀不輟烹殺物命甚多師一日領侍僧入廟以杖敲竈三下曰咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有一人青衣峩冠設拜師前師曰是甚麼人曰我本此廟竈神久受業報今日蒙師説無生法得脫此處生在天中特來致謝師曰是汝本有之性非吾強言神再禮而沒少選侍僧問曰某等久侍和尚不蒙示誨竈神得甚麼徑旨便得生天師曰我只向伊道是泥瓦合成別也無道理為伊侍僧無言師曰會麼僧曰不會師曰本有之性為甚麼不會侍僧等乃禮拜師曰墮也墮也破也破也後義豐禪師舉似安國師國師嘆云此子會盡物我一如可謂如朗月處空無不見者難搆伊語脈義豐問云未審甚麼人搆得他語脈國師云不知者龍門遠頌云禍福威嚴不在靈殘杯冷炙笑何人一從去後無消息野老猶敲祭鼓聲有僧從牛頭處來師問曰來自何人法會僧近前叉手繞師一匝而出師曰牛頭會下不可有此人僧乃回師上肩叉手而立師曰果然果然僧問如何是大闡提人師曰尊重禮拜曰如何是大精進人師曰毀辱嗔恚其後莫知所終終南惟政禪師五祖下三世嵩山寂法嗣終南山惟政禪師平原人也得法於嵩山普寂禪師即入太一山中學者盈室唐文宗好嗜蛤蜊沿海官吏先時進人亦勞止一日御饌中有擘不張者帝以其異即焚香禱之乃開見菩薩形儀梵相具足帝遂貯以金粟檀香合覆以美錦賜興善寺令衆僧瞻禮因問羣臣斯何祥也或奏太一山惟政禪師深明佛法乞詔問之帝即頒詔師至帝問其事師曰臣聞物無虗應此乃啓陛下之信心耳故契經云應以此身得度者即現此身而為説法帝曰菩薩身已現且未聞説法師曰陛下覩此為常邪非常邪信邪非信邪帝曰希奇之事朕深信焉師曰陛下已聞説法竟皇情悅豫詔天下寺院各立觀音像嵩山峻極禪師破竈墮法嗣嵩山峻極禪師僧問如何是修善行人師曰擔枷帶鎖曰如何是作惡行人師曰修禪入定曰某甲淺機請師直指師曰汝問我惡惡不從善汝問我善善不從惡僧良久師曰會麼僧曰不會師曰惡人無善念善人無惡心所以道善惡如浮雲俱無起滅處僧於言下大悟後破竈墮聞舉乃曰此子會盡諸法無生薦福懷云前頭則官不容針後面則私通車馬若能辨得許你具擇法眼昭覺勤云窮善善自何來究惡惡從何起有問崇寧如何是大修行底人對他道修禪入定如何是大作業底人對他道擔枷負鎖且道是同是別徑山杲云爭奈在髑髏前作妄想何六祖大鑒禪師旁出法嗣吉州志誠禪師六祖下一世吉州志誠禪師者本州太和人也初參秀禪師後因兩宗盛化秀之徒衆往往譏南宗曰能大師不識一字有何所長秀曰他得無師之智深悟上乘吾不如也且吾師五祖親付衣法豈徒然哉吾所恨不能遠去親近虗受國恩汝等諸人無滯於此可往曹溪質疑他日回當為吾説師聞此語禮辭至韶陽隨衆參請不言來處時六祖告衆曰今有盜法之人潛在此會師出禮拜具陳其事祖曰汝師若為示衆師曰嘗指誨大衆令住心觀靜長坐不臥祖曰住心觀靜是病非禪長坐拘身於理何益聽吾偈曰生來坐不臥死去臥不坐一具臭骨頭何為立功過師曰未審和尚以何法誨人祖曰吾若言有法與人即為誑汝但且隨方解縛假名三昧聽吾偈曰心地無非自性戒心地無癡自性慧心地無亂自性定不增不減自金剛身去身來本三昧師聞偈悔謝即誓依歸乃呈偈曰五蘊幻身幻何究竟回趣真如法還不淨洪州法達禪師洪州法達禪師者洪州豐城人也七歲出家念法華經已及三千部祖問曰汝念此經以何為宗師曰學人愚鈍從來但依文誦念豈知宗趣祖曰汝試為吾念一遍吾當為汝解説師即高聲念經至方便品祖曰止此經元來以因緣出世為宗縱説多種譬喻亦無越於此何者因緣唯一大事一大事即佛知見也汝慎勿錯解經意見他道開示悟入自是佛之知見我輩無分若作此解乃是謗經毀佛也彼既是佛已具知見何用更開汝今當信佛知見者只汝自心更無別體師曰若然者但得解義不勞誦經邪祖曰經有何過豈障汝念只為迷悟在人損益由汝聽吾偈曰心迷法華轉心悟轉法華誦久不明己與義作讐家無念念即正有念念成邪有無俱不計長御白牛車師聞偈再啓曰經云諸大聲聞乃至菩薩皆盡思度量尚不能測於佛智今令凡夫但悟自心便名佛之知見自非上根未免疑謗又經説三車大牛之車與白牛車如何區別祖曰經意分明汝自迷背諸三乘人不能測佛智者患在度量也饒伊盡思共推轉加懸遠佛本為凡夫説不為佛説此理若不肯信者從他退席殊不知坐却白牛車更於門外覔三車况經文明向汝道無二亦無三汝何不省三車是假為昔時故一乘是實為今時故只教你去假歸實歸實之後實亦無名應知所有珍財盡屬於汝由汝受用更不作父想亦不作子想亦無用想是名持法華經從劫至劫手不釋卷從晝至夜無不念時也師既蒙啓發踊躍歡喜以偈贊曰經誦三千部曹溪一句亡未明出世旨寧歇纍生狂羊鹿牛權設初中後善揚誰知火宅內元是法中王祖曰汝今後方可為念經僧也師從此領旨亦不輟誦持壽州智通禪師壽州智通禪師者安豐人也初看楞伽經約千餘遍而不會三身四智禮拜六祖求解其義祖曰三身者清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性別説三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地吾今為汝説諦信永無迷莫學馳求者終日説菩提師曰四智之義可得聞乎祖曰既會三身便明四智何更問邪若離三身別談四智此名有智無身也即此有智還成無智復説偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無實性若於轉處不留情繁興永處那伽定轉識為智者教中云轉前五識為成所作智轉第六識為妙觀察智轉第七識為平等性智轉第八識為大圓鏡智雖六七因中轉五八果上轉但轉其名而不轉其體也師禮謝以偈贊曰三身元我體四智本心明身智融無礙應物任隨形起修皆妄動守住匪真精妙旨因師曉終亡汙染名江西志徹禪師江西志徹禪師姓張氏名行昌少任俠自南北分化二宗主雖亡彼我而徒侶競起愛憎時北宗門人自立秀禪師為第六祖而忌大鑑傳衣為天下所聞然祖預知其事即置金十兩於方丈時行昌受北宗門人之囑懷刃入祖室將欲加害祖舒頸而就行昌揮刃者三都無所損祖曰正劒不邪邪劒不正只負汝金不負汝命行昌驚仆久而方蘇求哀悔過即願出家祖遂與金曰汝且去恐徒衆翻害於汝汝可他日易形而來吾當攝受行昌稟旨宵遁投僧出家具戒精進一日憶祖之言遠來禮覲問曰弟子嘗覽涅槃經未曉常無常義乞和尚慈悲略為宣説祖曰無常者即佛性也有常者即善惡一切諸法分別心也行昌曰和尚所説大違經文祖曰吾傳佛心印安敢違於佛經行昌曰經説佛性是常和尚却言無常善惡諸法乃至菩提心皆是無常和尚却言是常此即相違令學人轉加疑惑祖曰涅槃經吾昔者聽尼無盡藏讀誦一遍便為講説無一字一義不合經文乃至為汝終無二説行昌曰學人識量淺昧願和尚委曲開示祖曰汝知否佛性若常更説甚麼善惡諸法乃至窮劫無有一人發菩提心者故吾説無常正是佛説真常之道也又一切諸法若無常者即物物皆有自性容受生死而真常性有不遍之處故吾説常者正是佛説真無常義也佛比為凡夫外道執於邪常諸二乘人於常計無常共成八倒故於涅槃了義教中破彼偏見而顯説真常真樂真我真淨汝今依言背義以斷滅無常及確定死常而錯解佛之圓妙最後微言縱覽千遍有何所益行昌忽如醉醒乃説偈曰因守無常心佛演有常性不知方便者猶春池拾礫我今不施功佛性而見前非師相授與我亦無所得祖曰汝今徹也宜名志徹師禮謝而去信州智常禪師信州智常禪師者本州貴溪人也髫年出家志求見性一日參六祖祖問汝從何來欲求何事師曰學人近禮大通和尚大通曰汝見虗空否對曰見曰汝見虗空有相貌否對曰虗空無形有何相貌曰汝之本性猶如虗空返觀自性了無一物可見是名正見無一物可知是名真知無有青黃長短但見本源清淨覺體圓明即名見性成佛亦名極樂世界亦名如來知見學人雖聞此説猶未決了乞和尚示誨令無凝滯祖曰彼師所説猶存見知故令汝未了吾今示汝一偈曰不見一法存無見大似浮雲遮日面不知一法守空知還如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念自知非自己靈光常顯見師聞偈已心意豁然乃述一偈曰無端起知解著相求菩提情存一念悟寧越昔時迷自性覺源體隨照枉遷流不入祖師室茫然趣兩頭廣州志道禪師廣州志道禪師者南海人也初參六祖問曰學人自出家覽涅槃經僅十餘載未明大意願和尚垂誨祖曰汝何處未了對曰諸行無常是生滅法生滅滅已寂滅為樂於此疑惑祖曰汝作麼生疑對曰一切衆生皆有二身謂色身法身也色身無常有生有滅法身有常無知無覺經云生滅滅已寂滅為樂者未審是何身寂滅何身受樂若色身者色身滅時四大分散全是苦苦不可言樂若法身寂滅即同草木瓦石誰當受樂又法性是生滅之體五蘊是生滅之用一體五用生滅是常生則從體起用滅則攝用歸體若聽更生即有情之類不斷不滅若不聽更生即永歸寂滅同於無情之物如是則一切諸法被涅槃之所禁伏尚不得生何樂之有祖曰汝是釋子何習外道斷常邪見而議最上乘法據汝所解即色身外別有法身離生滅求於寂滅又推涅槃常樂言有身受者斯乃執吝生死耽著世樂汝今當知佛為一切迷人認五蘊和合為自體相分別一切法為外塵相好生惡死念念遷流不知夢幻虗假枉受輪回以常樂涅槃翻為苦相終日馳求佛愍此故乃示涅槃真樂剎那無有生相剎那無有滅相更無生滅可滅是則寂滅見前當見前之時亦無見前之量乃謂常樂此樂無有受者亦無不受者豈有一體五用之名何況更言涅槃禁伏諸法令永不生斯乃謗佛毀法聽吾偈曰無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義唯有過量人通達無取捨以知五蘊法及以蘊中我外現衆色象一一音聲相平等如夢幻不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風鼓山相擊真常寂滅樂涅槃相如是吾今強言説令汝捨邪見汝勿隨言解許汝知少分師聞偈踊躍作禮而退永嘉真覺禪師永嘉真覺禪師諱玄覺本郡戴氏子丱歲出家遍探三藏精天台止觀圓妙法門於四威儀中常冥禪觀後與東陽䇿禪師同詣曹溪初到振錫繞祖三匝卓然而立祖曰夫沙門者具三千威儀八萬細行大德自何方而來生大我慢師曰生死事大無常迅速祖曰何不體取無生了無速乎師曰體即無生了本無速祖曰如是如是于時大衆無不愕然師方具威儀參禮須臾告辭祖曰返太速乎師曰本自非動豈有速邪祖曰誰知非動師曰仁者自生分別祖曰汝甚得無生之意師曰無生豈有意邪祖曰無意誰當分別師曰分別亦非意祖歎曰善哉善哉少留一宿時謂一宿覺雪竇顯舉至我慢處便喝云當時若下得這一喝免見龍頭蛇尾又向卓然而立處代祖云未到曹溪與你三十棒了也浮山遠云先行不到末後太過恕中慍云永嘉承虗接響祖師將錯就錯雪竇龜背刮毛浮山馬頭安角繞禪床三匝兮眼似銅鈴勉留一宿兮頭如木杓松風江月少人知南海波斯生白澤證道歌曰君不見絶學無為間道人不除妄想不求真無明實性即佛性幻化空身即法身法身覺了無一物本源自性天真佛五陰浮雲空去來三毒水泡虗出沒證實相無人法剎那滅却阿鼻業若將妄語誑衆生自招舌塵沙劫頓覺了如來禪六度萬行體中圓夢裏明明有六趣覺後空空無大千無罪福無損益寂滅性中莫問覓比來塵鏡未曾磨今日分明須剖析誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成放四大莫把捉寂滅性中隨飲諸行無常一切空即是如來大圓覺決定説表真乘有人不肯任情徵直截根源佛所印摘葉尋枝我不能摩尼珠人不識如來藏裏親收得六般神用空不空一顆圓光色非色淨五眼得五力唯證乃知難可測鏡裏看形見不難水中捉月爭拈得常獨行常獨步達者同遊涅槃路調古神清風自高貌悴骨剛人不顧窮釋子口稱貧實是身貧道不貧貧則身常披縷褐道則心藏無價珍無價珍用無盡利物應機終不吝三身四智體中圓八解六通心地印上士一決一切了中下多聞多不信但自懷中解垢衣誰能向外誇精進從他謗任他非把火燒天徒自疲我聞恰似飲甘露銷融頓入不思議觀惡言是功德此則成吾善知識不因訕謗起冤親何表無生慈忍力宗亦通説亦通定慧圓明不滯空非但我今獨達了河沙諸佛體皆同師子吼無畏説百獸聞之皆腦裂香象奔波失却威天龍寂聽生欣悅遊江海涉山川尋師訪道為參禪自從認得曹溪路了知生死不相干行亦禪坐亦禪語默動靜體安然縱遇鋒刀常坦坦假饒毒藥也間間我師得見然燈佛多劫曾為忍辱仙幾回生幾回死生死悠悠無定止自從頓悟了無生於諸榮辱何憂喜入深山住蘭若岑崟幽邃長松下優遊靜坐野僧家閴寂安居實瀟灑覺即了不施功一切有為法不同住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地但得本莫愁末如淨琉璃含寶月既能解此如意珠自利利他終不竭江月照松風吹永夜清宵何所為佛性戒珠心地印霧露雲霞體上衣降龍鉢解虎錫兩鈷金環鳴歷歷不是標形虗事持如來寶杖親蹤迹不求真不斷妄了知二法空無相無相無空無不空即是如來真實相心鏡明鑒無礙廓然瑩徹周沙界萬象森羅影現中一顆圓明非內外豁達空撥因果莽莽蕩蕩招殃禍棄有著空病亦然還如避溺而投火捨妄心取真理取捨之心成巧偽學人不了用修行真成認賊將為子損法財滅功德莫不由斯心意識是以禪門了却心頓入無生知見力大丈夫秉慧劒般若鋒兮金剛𦦨非但能摧外道心早曾落却天魔膽震法雷擊法鼓布慈雲兮灑甘露龍象蹴踏潤無邊三乘五性皆醒悟雪山肥膩更無雜純出醍醐我常納一性圓通一切性一法遍含一切法一月普現一切水一切水月一月攝諸佛法身入我性我性還共如來合一地具足一切地非色非心非行業彈指圓成八萬門剎那滅却三祇劫一切數句非數句與吾靈覺何交涉不可毀不可讚體若虗空勿涯岸不離當處常湛然覔即知君不可見取不得捨不得不可得中祇麼得默時説説時默大施門開無壅塞有人問我解何宗報道摩訶般若力或是或非人不識逆行順行天莫測吾早曾經多劫修不是等間相誑惑建法幢立宗旨明明佛勑曹溪是第一迦葉首傳燈二十八代西天記法東流入此土菩提達磨為初祖六代傳衣天下聞後人得道何窮數真不立妄本空有無俱遣不空空二十空門元不著一性如來體自同心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙亡性即真嗟末法惡時世衆生福薄難調制去聖遠兮邪教深魔強法弱多怨害聞説如來頓教門恨不滅除令瓦碎作在心殃在身不須怨訴更尤人欲得不招無間業莫謗如來正法輪栴檀林無雜樹鬱密森沉師子住境靜林間獨自遊走獸飛禽皆遠去師子兒衆隨後三歲即能大哮吼若是野干逐法王百年妖怪虗開口圓頓教勿人情有疑不決直須爭不是山僧逞人我修行恐落斷常坑非不非是不是差之毫𨤲失千里是即龍女頓成佛非即善星生陷墜吾早年來積學問亦曾討疏尋經論分別名相不知休入海算沙徒自困却被如來苦訶責數他珍寶有何益從來蹭蹬覺虗行多年枉作風塵客種性邪錯知解不達如來圓頓制二乘精進勿道心外道聰明無智慧亦愚癡亦小騃空拳指上生實解執指為月枉施功根境法中虗揑怪不見一法即如來方得名為觀自在了即業障本來空未了還須償宿債飢逢王膳不能餐病遇醫王爭得瘥在欲行禪知見力火中生蓮終不壞勇施犯重悟無生早時成佛於今在師子吼無畏説深嗟懞懂頑皮靼祇知犯重障菩提不見如來開祕訣有二比丘犯淫殺波離螢光增罪結維摩大士頓除疑還同赫日銷霜雪不思議解脫力妙用河沙也無極傳燈作此即成吾善知識四事供養敢辭勞萬兩黃金亦銷得粉骨碎身未足酬一句了然超百億法中王最高勝河沙如來同共證我今解此如意珠信受之者皆相應了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂假使鐵輪頂上旋定慧圓明終不失日可冷月可熱衆魔不能壞真説象駕崢嶸謾進塗誰見螳螂能拒轍大象不遊於兔徑大悟不拘於小節莫將管見謗蒼蒼未了吾今為君決河北智隍禪師河北智隍禪師者始參五祖雖嘗咨決而循乎漸行乃往河北結庵長坐積二十餘載不見惰容後遇䇿禪師激勵遂往參六祖祖愍其遠來便垂開決師於言下豁然契悟前二十年所得心都無影響南陽慧忠國師南陽慧忠國師者越州諸暨人也姓冉氏自受心印居南陽白崖山黨子谷四十餘祀不下山道行聞于帝里唐肅宗上元二年勑中使賫詔徵赴京待以師禮及代宗臨御復迎止光宅精藍十有六載隨機説法時有西天大耳三藏到京云得他心通肅宗命國師試驗三藏才見師便禮拜立于右邊師問曰汝得他心通那汝道老僧即今在甚麼處三藏曰和尚是一國之師何得却去西川看競渡良久再問汝道老僧即今在甚麼處三藏曰和尚是一國之師何得却在天津橋上看弄猢猻師良久復問汝道老僧只今在甚麼處三藏罔測師叱曰這野狐精他心通在甚麼處三藏無對僧問趙州大耳三藏第三度不見國師未審國師在甚麼處趙州云在三藏鼻孔上僧後問玄沙既在鼻孔上為甚麼不見玄沙云只為太近僧問仰山云大耳三藏第三度為甚麼不見國師仰山云前兩度是涉境心後人自受用三昧所以不見又有僧問玄沙玄沙云汝道前兩度還見麼白雲端云國師若在三藏鼻孔裏有什麼難見殊不知國師在三藏眼睛裏翠巖芝云只如三藏還見國師鼻孔麼高峯妙云大小國師平生伎倆總被這胡僧勘破雖然賴遇聖君證明金粟悟云即今若有道在三藏眼睛裏因甚不見廣慧向他道非汝境界一日喚侍者侍者應諾如是三召三應師曰將謂吾孤負汝却是汝孤負吾徑山杲云叢林中喚作國師三喚侍者話自此便有一絡索惟雪竇見透古人骨髓云國師三喚侍者點即不到妙喜云灼然侍者三應到即不點妙喜云却不恁麼將謂吾孤負汝誰知汝孤負吾謾雪竇不得妙喜云誰道復召大衆云好箇謾雪竇不得雖然如是雪竇亦謾妙喜不得妙喜亦謾諸人不得諸人亦謾露柱不得玄沙云侍者却會雪竇云停囚長智妙喜云兩彩一賽雲門道作麼生是國師孤負侍者處會得也是無端雪竇云元來不會妙喜云雪峯道底雲門又云作麼生是侍者孤負國師處粉骨碎身未報得雪竇云無端無端妙喜云𣐟生招箭法眼云旦去別時來雪竇云謾我不得妙喜云却是法眼會興化云一盲引衆盲雪竇云端的瞎妙喜云親言出親口玄覺徵問僧云甚處是侍者會處僧云若不會爭解恁麼應玄覺云汝少會在又云若於此見得去便識玄沙妙喜云漸惶殺人翠巖芝云國師侍者總欠會在妙喜云猶較些子投子云抑逼人作麼雪竇云垛根漢妙喜云理長即就復云唯有趙州多口阿師下得箇注腳令人疑著僧問國師三喚侍者意旨如何趙州云如人暗中書字字雖不成文彩已彰雪竇便喝妙喜云且道這一喝在國師侍者分上在趙州分上隨後喝一喝復云若不是命根五色索子斷如何透得這裏過雪竇云若有人問雪竇雪竇便打也要諸方檢點妙喜云作賊人心虗雪竇復有一頌云師資會遇意非輕妙喜云此語有兩負門無事相將草裏行妙喜云普州人送賊負汝負吾人莫問妙喜云放待冷來看任從天下競頭爭妙喜云只今休去便休去若覔了時無了時復云你若求玄妙解會只管理會國師三喚侍者話那裏是國師孤負侍者處那裏是國師孤負侍者處那裏是侍者孤負國師處有甚麼交涉鵝王擇乳素非鴨類這箇便是國師用劍刃上事又云國師還見侍者麼侍者還見國師麼南泉到參師問甚麼處來曰江西來師曰還將得馬師真來否曰只這是師曰背後底聻南泉便休長慶稜云大似不知保福展云幾不到和尚此間雲居錫云此二尊宿盡扶背後只如南泉休去為當扶面前扶背後麻谷到參繞禪床三匝振錫而立師曰汝既如是吾亦如是谷又振錫師叱曰這野狐精出去師問僧近離甚處曰南方師曰南方知識以何法示人曰南方知識祇道一朝風火散後如蛇退皮如龍換骨本爾真性宛然無壞師曰苦哉苦哉南方知識説法半生半滅曰南方知識即如是未審和尚此間説何法師曰我此間身心一如身外無餘曰和尚何得將泡幻之身同於法體師曰你為甚麼入於邪道曰甚麼處是某甲入於邪道處師曰不見教中道若以色見我以音聲求我是人行邪道不能見如來雲門偃舉云身心一如身外無餘山河大地何處有耶神鼎諲云若據這僧與麼道傳語也未解莫纍及知識據國師與麼道亦是龍頭蛇尾前來身心一如向什麼處去也試點檢看淨慈昌云這僧當時待國師道若以色見我以音聲求我是人行邪道不能見如來但云苦哉苦哉大小國師半生半滅東禪觀云國師與這僧即色聲相見離色聲相見若離色聲相見何異南方知識半生半滅若即色聲相見又道色見聲求是行邪道衆中莫有為國師作主者麼我要問你既是身心一如身外無餘泡幻之身為什麼不同法體南陽張濆行者問承和尚説無情説法某甲未體其事乞和尚垂示師曰汝若問無情説法解他無情方得聞我説法汝但聞取無情説法去肅宗問師在曹溪得何法師曰陛下還見空中一片雲麼帝曰見師曰釘釘著懸挂著帝又問如何是十身調御師乃起立曰會麼帝曰不會師曰與老僧過淨瓶來帝又曰如何是無諍三昧師曰檀越踏毗盧頂上行帝曰此意如何師曰莫認自己清淨法身徑山杲云諸人要見忠國師麼只在你眼睛裏開眼也蹉過合眼也蹉過既在眼睛裏為甚麼却蹉過妙喜恁麼道也蹉過不少帝又問師都不視之曰朕是大唐天子師何以殊不顧視師曰還見虗空麼帝曰見師曰他還眨目視陛下否一日肅宗到師指石師子曰陛下這石師子奇特下取一轉語帝曰朕下語不得請師下語師曰山僧罪過後耽源問皇帝還會麼師曰皇帝會且置你作麼生會玄沙備云大小國師被侍者勘破師與紫璘供奉論議師升座供奉曰請師立義某甲破師曰立義竟供奉曰是甚麼義師曰果然不見非公境界便下座一日師問紫璘供奉佛是甚麼義曰是覺義師曰佛曾迷否曰不曾迷師曰用覺作麼供奉無對徑山杲代云若不入水爭見長人供奉問如何是實相師曰把將虗底來曰虗底不可得師曰虗底尚不可得問實相什麼僧問如何是佛法大意師曰文殊堂裏萬菩薩曰學人不會師曰大悲千手眼師以化緣將畢涅槃時至乃辭代宗代宗曰師滅度後弟子將何所記師曰告檀越造取一所無縫塔帝曰就師請取塔樣師良久曰會麼帝曰不會師曰貧道去後有侍者應真却知此事乞詔問之代宗後詔應真問前語應真良久曰聖上會麼帝曰不會應真述偈曰湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識神鼎諲云前來國師作用不能明了次問耽源耽源恁麼頌且道盡善不盡善神鼎與你諸人下四轉語湘之南潭之北君臣有路中有黃金充一國淨妙體圓無影樹下合同船千聖同轍琉璃殿上無知識凡聖路絶若與麼會去必不相賺神鼎與麼注解只是孤負國師雪竇顯云肅宗不會且置耽源還會麼祇消箇請師塔樣盡西天此土諸位祖師遭這一拶不免將南作北有傍不肯底出來我要問你那箇是無縫塔頌云無縫塔見還難澄潭不許蒼龍蟠層落落影團團千古萬古與人看保寧勇云所謂非父不生其子雖然如是謾肅宗一人即得爭奈天下衲僧眼何且道那箇是衲僧眼便下座五祖演云衆中道國師良久殊不知懸鼓待槌當時肅宗若是作家君王待伊教詔耽源但向道國師何必後詔耽源耽源呈頌云云代云間言語圓悟勤頌云八面自玲瓏盤空勢岌崿表裏鎮巍然若為分六鑿執名匿相認影迷形臥龍長怖碧潭清合同船子開心碗日用如何不現成荷澤神會禪師西京荷澤神會禪師者襄陽人也年十四為沙彌謁六祖祖曰知識遠來大艱辛將本來否若有本則合識主試説看師曰以無住為本見即是主祖曰這沙彌爭合取次語便打師於杖下思惟曰大善知識歷劫難逢今既得遇豈惜身命自此給侍他日祖告衆曰吾有一物無頭無尾無名無字無背無面諸人還識否師乃出曰是諸法之本源乃神會之佛性祖曰向汝道無名無字汝便喚作本源佛性師禮拜而退祖曰此子向後設有把茆蓋頭也只成得箇知解宗徒法眼云古人授記人終不錯如今立知解為宗即荷澤也祖滅後二十年間曹溪頓旨沈廢於荊吳嵩嶽漸門盛行於秦洛師入京天寶四年方定兩宗南能頓宗北秀漸教乃著顯宗記行于世一日鄉信至報二親亡師入堂白槌曰父母俱喪請大衆念摩訶般若衆才集師便打槌曰勞煩大衆耽源應真禪師六祖下二世南陽忠法嗣吉州耽源山應真禪師為國師侍者時一日國師在法堂中師入來國師乃放下一足師見便出良久却回國師曰適來意作麼生師曰向阿誰説即得國師曰我問你師曰甚麼處見某甲師又問百年後有人問極則事如何國師曰幸自可憐生須要覔箇護身符子作麼五祖戒云和尚終是老婆心切保寧勇云粉骨碎身難報此恩大溈泰云大小耽源被國師一坐直至如今起不得若是古德即不然待國師道幸自可憐生須要箇護身符子作什麼只向他道暗中為照燭險處作津梁異日師擕籃子歸方丈國師問籃裏甚麼物師曰青梅國師曰將來何用師曰供養國師曰青在爭堪供養師曰以此表獻國師曰佛不受供養師曰某甲只恁麼和尚如何國師曰我不供養師曰為甚麼不供養國師曰我無果子百丈海和尚在泐潭山牽車次師曰車在這裏牛在甚麼處百丈斫額師乃拭目麻谷問十二面觀音豈不是聖師曰是麻谷與師一摑師曰想汝未到此境國師諱日設齋有僧問曰國師還來否師曰未具他心曰又用設齋作麼師曰不斷世諦
