body:
  text: 南嶽下三世黃檗希運禪師百丈海法嗣洪州黃檗希運禪師閩人也遊天台逢一僧與之言笑如舊相識熟視之目光射人乃偕行屬㵎水暴漲捐笠植杖而止其僧率師同渡師曰兄要渡自渡彼即褰衣躡波若履平地回顧曰渡來渡來師曰咄這自了漢吾早知當斫汝脛其僧歎曰真大乘法器我所不及言訖不見師後遊京師因人啟發乃往參百丈百丈問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來百丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示百丈良久師曰不可教後人斷絕去也百丈曰將謂汝是箇人乃起入方丈師隨後入曰某甲特來百丈曰若爾則他後不得孤負吾百丈一日問師甚麼處去來師曰大雄山下採菌子來百丈曰還見大蟲麼師便作虎聲百丈拈斧作斫勢師即打百丈一摑百丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口溈山祐舉問仰山仰山云和尚怎生溈山云百丈當時便合一斧斫殺因甚麼到如此仰山云不然溈山云子又作麼生仰山云百丈只解騎虎頭不解把虎尾溈山云子有嶮崖之句五祖戒云百丈大似作賊人心虗黃檗熟處難忘師在南泉普請擇菜次南泉問甚麼處去師曰擇菜去南泉曰將甚麼擇師竪起刀南泉曰祇解作賓不解作主師以刀點三下南泉曰大家擇菜去黃龍新云今時師僧往往將南泉黃檗作擇菜會却南泉一日曰老僧有牧牛歌請長老和師曰某甲自有師在師辭南泉南泉門送提起師笠曰長老身材沒量大笠子大小生師曰雖然如此大千世界總在裏許南泉曰王老師聻師戴笠便行師在鹽官殿上禮佛次時唐宣宗為沙彌問曰不著佛求不著法求不著僧求長老禮拜當何所求師曰不著佛求不著法求不著僧求常禮如是事沙彌曰用禮何為師便掌沙彌曰太麤生師曰這裏是甚麼所在說麤說細隨後又掌裴相國鎮宛陵建大禪苑請師說法以師酷愛舊山還以黃檗名之公一日拓一尊佛於師前跪曰請師安名師召曰裴休公應諾師曰與汝安名竟公禮拜雪竇顯代裴休當時便喝徑山杲云裴公黃檗可謂如水入水似金博金雖然如是檢點將來不無滲漏今日蔡中郎或捧一尊像請雲門安名即向道清淨法身毗盧遮那佛若云謝師安名即向道下坡不走快便難逢楚石琦云裴公捧像黃檗安名冷地看來如大家教新婦相似直是好笑笑須三十年妙喜既不能坐斷未免隨例顛倒喚作清淨法身毗盧遮那佛周人以栢殷人以栗師因有六人新到五人作禮中一人提起坐具作一圓相師曰我聞有一隻獵犬甚惡僧曰尋𦏰羊聲來師曰𦏰羊無聲到汝尋曰尋𦏰羊跡來師曰𦏰羊無跡到汝尋曰尋𦏰羊蹤來師曰𦏰羊無蹤到汝尋曰與麼則死𦏰羊也師便休去明日陞堂曰昨日尋𦏰羊僧出來僧便出師曰昨日公案未了老僧休去你作麼生僧無語師曰將謂是本色衲僧元來祇是義學沙門便打趂出雪竇顯云只如聲響蹤跡既無獵犬向甚處尋逐莫是絕聲響蹤跡處見黃檗麼諸禪德要明陷虎之機也須是本分衲子徑山信云黃檗幸是作家何不當時便打趂出須待明日且道黃檗意作麼生這僧既會尋𦏰羊蹤跡來又不會黃檗休去非惟義學沙門還是脫空奴子師一日揑拳曰天下老和尚總在這裏我若放一線道從汝七縱八橫若不放過不消一揑僧問放一線道時如何師曰七縱八橫曰不放過不消一揑時如何師曰普僧問雲門偃如何是七縱八橫雲門云念老僧年老云如何是普雲門云天光回照云如何是天光回照雲門云骼胔少人知裴相國一日請師至郡以所解一編示師是接置於座略不披閱良久曰會麼公曰未測師曰若便恁麼會得猶較些子若也形於紙墨何有吾宗一日上堂大眾雲集乃曰汝等諸人欲何所求以拄杖趂之大眾不散師却復坐曰汝等諸人盡是噇酒糟漢恁麼行脚取笑於人但見八百一千人處便去不可圖他熱閙也老漢行脚時或遇草根下有一箇漢便從頂門上一錐看他若知痛痒可以布袋盛米供養他可中總似汝如此容易何處更有今日事也汝等既稱行脚亦須著些精神好還知道大唐國內無禪師麼時有僧問諸方尊宿盡聚眾開化為甚麼却道無禪師師曰不道無禪祇是無師溈山祐問仰山作麼生仰山云鵞王擇乳素非鴨類溈山云此實難辨五祖戒出僧語謝和尚說得道理好石門聰云黃檗垂示不妨奇特纔被布衲拶着失却一隻眼雪竇顯頌云凜凜威風不自誇端居寰海定龍蛇大中天子曾輕觸三度親遭弄爪牙承天宗云五祖戒眼照四天下要見黃檗猶未可若要扶豎正法眼藏須是黃檗宗師法昌遇云我要無禪底做國師徑山杲云且道是醍醐句是毒藥句頌云身上着衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君注破了楚石琦云殺人刀活人劍具眼者辨取金粟悟云黃檗大似龍頭蛇尾當時待這僧云只如諸方匡徒領眾又作麼生和聲便打更若擬議劈脊打出却恁麼老婆可謂酒糟太多闍黎不見馬大師下有八十四人坐道場得馬師正法眼者止三兩人廬山歸宗和尚是其一夫出家人須知有從上來事分始得且如四祖下牛頭橫說竪說猶未知向上關捩子有此眼目方辨得邪正宗黨且當人事宜不能體會得但知學言語念向皮袋裏安著到處稱我會禪還替得汝生死麼輕忽老宿入地獄如箭珍重長慶大安禪師百丈海法嗣福州長慶大安禪師號懶安郡之陳氏子孤錫遊方逢一老父謂師曰師往南昌當有所得師即造百丈禮而問曰學人欲求識佛何者即是百丈曰大似騎牛覔牛師曰識得後如何百丈曰如人騎牛至家師曰未審始終如何保任百丈曰如牧牛人執杖視之不令犯人苗稼師自茲領旨更不馳求同參祐禪師創居溈山師躬耕助道及祐歸寂眾請接踵住持雪峯因入山採得一枝木其形似虵於背上題曰本自天然不假雕琢寄與師師曰本色住山人且無刀斧痕問黃巢軍來和尚向甚麼處回避師曰五蘊山中曰忽被他捉著時如何師曰惱亂將軍大慈寰中禪師百丈海法嗣杭州大慈山寰中禪師蒲坂盧氏子參百丈受心印辭往南嶽常樂寺結茅山頂一日南泉至問如何是庵中主師曰蒼天蒼天南泉曰蒼天且置如何是庵中主師曰會即便會莫忉忉南泉拂袖而出後住大慈上堂山僧不解答話祇能識病時有僧出師便歸方丈法眼益云眾中喚作病在目前不識報慈遂云且道大慈識病不識病此僧出來是病不是病若言是病每日行住不可總是病若言不是病出來又作麼生雪竇顯云大凡扶竪宗乘須辨箇得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便棒諸方識病不答話有僧出必然別有長處敢有一箇動着大唐天子只三人虗堂愚頌云輕如毫末重如山地角天涯去復還黃葉隕時風骨露水邊依舊石斕班趙州問般若以何為體師曰般若以何為體趙州大笑而出明日趙州掃地次師曰般若以何為體趙州置帚付掌大笑師便歸方丈雪竇顯云前來也笑後來也笑笑中有刀大慈還識麼直饒識得也未免喪身失命溈山云纔見呵呵大笑便與一掌明日又問待伊大笑又與一掌大慈若下得這兩掌趙州若不對他可謂生鐵鑄就風吹不入漢大凡宗師一等是搖撼乾坤直教如旱天霹靂萬里無雲轟一聲教他眼目定動豈不俊哉要識趙州大慈麼莫恠從前多意氣他家曾謁聖明君黃龍新云趙州金鍮不辨玉石不分直饒分去也未夢見大慈在黃龍震云般若非是無體二老不能知般若非是無用二老不能用若也能知能用一言可以截斷眾紛何必再三南華昺云兩箇漢只解掩耳偷鈴不解移風易俗或有問南華般若以何為體劈脊便打待伊眼目定動却問般若以何為體靈利漢忽然踏着必定自知落處僧辭師問甚麼處去曰江西去師曰我勞汝一段事得否曰和尚有甚麼事師曰將取老僧去得麼曰更有過於和尚者亦不能將去師便休僧後舉似洞山洞山曰闍黎爭合恁麼道曰和尚作麼生洞山曰得法眼益別云和尚若去某甲提笠子汾陽昭代云知汝力微淨因成云這僧可謂擔頭不泊蠅是則當如是要且只是孤生獨死底漢天童覺云大慈合伴不着這僧不如獨行也須是恁麼始得直饒大慈古佛也不奈這擔板漢何且道別有什麼長處洞山又問其僧大慈別有甚麼言句曰有時示眾曰說得一丈不如行取一尺說得一尺不如行取一寸洞山曰我不恁麼道曰和尚作麼生洞山曰說取行不得底行取說不得底洛浦安云行說俱到即本分事無行說俱不到即本分事在雲居錫云行時無說路說時無行路不說不行時合行甚麼路平田普岸禪師百丈海法嗣天台平田普岸禪師洪州人也於百丈門下得旨訪茂源和尚茂源纔起迎師近前把住曰開口即失閉口即喪去此二途請師別道茂源以手掩鼻師放開曰一步較易兩步較難茂源曰著甚死急師曰若非是師不免諸方點檢臨濟訪師到路口先逢一嫂在田使牛臨濟問嫂平田路向甚麼處去嫂打牛一棒曰這畜生到處走到此路也不識臨濟又曰我問你平田路向甚麼處去嫂曰這畜生五歲尚使不得臨濟心語曰欲觀前人先觀所使便有抽釘拔楔之意及見師師問你還曾見我嫂也未臨濟曰已收下了也師遂問近離甚處臨濟曰江西黃檗師曰情知你見作家來臨濟曰特來禮拜和尚師曰已相見了也臨濟曰賓主之禮合施三拜師曰既是賓主之禮禮拜著石霜性空禪師百丈海法嗣潭州石霜山性空禪師僧問如何是祖師西來意師曰如人在千尺井中不假寸繩出得此人即答汝西來意僧曰近日湖南暢和尚出世亦為人東語西話師喚沙彌拽出這死屍著沙彌即仰山仰山後問耽源如何出得井中人耽源曰咄癡漢誰在井中仰山復問溈山溈山召慧寂仰山應諾溈山曰出也仰山住後常舉前語謂眾曰我在耽源處得名溈山處得地古靈神贊禪師百丈海法嗣福州古靈神贊禪師本州大中寺受業後行脚遇百丈開悟却回受業本師問曰汝離吾在外得何事業曰並無事業遂遣執役一日因澡身命師去垢師乃拊背曰好所佛堂而佛不聖本師回首視之師曰佛雖不聖且能放光本師又一日在牕下看經蜂子投牕紙求出師覩之曰世界如許廣濶不肯出鑽他故紙驢年去遂有偈曰空門不肯出投窓也大癡百年鑽故紙何日出頭時本師置經問曰汝行脚遇何人吾前後見汝發言異常師曰某甲蒙百丈和尚指箇歇處今欲報慈德耳本師於是告眾致齋請師說法師乃登座舉唱百丈門風曰靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛本師於言下感悟曰何期垂老得聞極則事和安寺通禪師百丈海法嗣廣州和安寺通禪師婺州雙林寺受業自幼寡言時人謂之不語通參馬祖至江西祖已圓寂遂謁百丈頓釋疑情師一日召仰山將牀子來仰山將到師曰却送本處著仰山從之師召慧寂仰山應諾師曰牀子那邊是甚麼物仰山曰枕子師曰枕子這邊是甚麼物仰山曰無物師復召慧寂仰山應諾師曰是甚麼仰山無對師曰去衛國院道禪師百丈海法嗣京兆衛國院道禪師新到參師問何方來曰河南來師曰黃河清也未僧無對溈山佑代云小小狐兒要過但過用疑作甚麼東山慧禪師百丈海法嗣洪州東山慧禪師同大于南用到茶堂有僧近前不審南用曰我既不納汝汝亦不見我不審阿誰僧無語師曰不得平白地恁麼問伊南用曰大于亦無語那大于把定其僧曰是你恁麼累我亦然便打一摑南用大笑曰朗月與青天大于侍者到師問金剛正定一切皆然秋去冬來且作麼生侍者曰不妨和尚借問師曰即今即得去後作麼生侍者曰誰敢問著某甲師曰大于還得麼侍者曰猶要別人點檢在師曰輔弼宗師不廢光彩侍者禮拜清田和尚百丈海法嗣清田和尚與瑫上座煎茶次師敲繩牀三下瑫亦敲三下師曰老僧敲有箇善巧上座敲有何道理瑫曰某甲敲有箇方便和尚敲作麼生師舉起盞子瑫曰善知識眼應須恁麼茶罷瑫却問和尚適來舉起盞子意作麼生師曰不可更別有也百丈涅槃和尚百丈海法嗣百丈山涅槃和尚一日謂眾曰汝等與我開田我與汝說大義眾開田了歸請說大義師乃展兩手眾罔措洪覺範林間錄云百丈第二代法正禪師大智之高弟其先甞誦涅槃經不言姓名時呼為涅槃和尚住成法席師功最多使眾開田方說大義者乃師也黃檗古靈諸大士皆推尊之唐文人黃武翊撰其甚詳柳公權書妙絕今古而傳燈所載百丈惟政禪師又係於馬祖法嗣之列悞矣及觀正宗記則有惟政法正然百丈第代可數明教但皆見其名不能辨而俱存也今當以柳為正趙州從諗禪師南泉願法嗣趙州觀音院亦曰東院從諗禪師曹州郝鄉人姓郝氏抵池陽參南泉值南泉偃息而問曰近離甚處師曰瑞像南泉曰還見瑞像麼師曰不見瑞像祇見臥如來南泉便起坐問汝是有主沙彌無主沙彌師曰有主沙彌南泉曰那箇是你主師近前躬身曰仲冬嚴寒伏惟和尚尊候萬福南泉器之許其入室他日問南泉如何是道南泉曰平常心是道師曰還可趣向也無南泉曰擬向即乖師曰不擬爭知是道南泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非邪師於言下悟理圓悟勤頌云遇飯喫飯遇茶喫茶千重百帀四海一家解却粘去却縛言無言作無作廓然本體等虗空風從虎兮雲從龍徑山杲頌云勸君不用苦勞神喚作平常轉不親冷淡全然沒滋味一回舉著一回新溈山果云恁麼也不得不恁麼也不得恁麼不恁麼時如何竪起拂子云鯨吞海水盡露出珊瑚枝靈隱嶽云青天白日悟箇什麼咄咄驪珠擊碎蒼龍窟元叟端云南泉被趙州一問直得分踈不下趙州被南泉一坐至今擡身不起兩箇漢總有過處諸人檢點得出許你真達不疑之道乃往嵩嶽瑠璃壇納戒仍返南泉一日問南泉曰知有底人向甚麼處去南泉曰山前檀越家作一頭水牯牛去師曰謝師指示南泉曰昨夜三更月到牕雲峯悅云若不是南泉洎被打破蔡州南泉曰今時人須向異類中行始得師曰異即不問如何是類南泉以兩手拓地師近前一踏踏倒却向涅槃堂裏呌曰悔悔南泉令侍者問悔箇甚麼師曰悔不更與兩踏南泉上堂師出問明頭合暗頭合南泉便下座歸方丈師曰這老和尚被我一問直得無言可對首座曰莫道和尚無語好自是上座不會師便打一掌曰此掌合是堂頭老漢喫五祖戒云正賊走了邏蹤人喫棒又云南泉當斷不斷返招其亂雲居舜云諸人作麼生會有底便道首座落他綣繢與麼會又爭得山僧道趙州大似傍若無人天奇瑞云入就者不知而出出就者不知而入徐六擔板各見一邊自有明眼人證據在所以得時誇經紀時收好種田還知以己妨人遭他毒手者麼十箇埋伏真可羨隔江鬪智又何如師到黃檗黃檗見來便閉方丈門師乃把火於法堂內呌曰救火救火黃檗開門捉住曰道道師曰賊過後張弓保福展云黃檗有頭無尾趙州有尾無頭雪竇顯云直是好笑笑須三十年忽有箇衲僧問雪竇笑箇什麼笑賊過後張弓五祖戒云黃檗只會買賤不會賣貴趙州因禍致福到寶壽寶壽見來於禪牀上背坐師展坐具禮拜寶壽下禪牀師便出保福展云保壽忘頭失尾趙州平地上喫撲又到道吾纔入堂道吾曰南泉一隻箭來也師曰看箭道吾曰過也師曰中雪竇顯云二俱作家蓋是道吾趙州二俱不作家箭鋒不相拄直饒齊發齊中也只是箇射垛漢報慈遂云且道二大老相見還有優劣也無若檢點得出許你於中字上有箇入處又到茱萸執拄杖於法堂上從東過西茱萸曰作甚麼師曰探水茱萸曰我這裏一滴也無探箇甚麼師以杖倚壁便下瑯琊覺云勢敗奴欺主年衰鬼弄人保寧勇頌云逐步移笻探淺深果然滄海碧沉沉一雙足迹分明在將謂歸家不可尋溈山云趙州善能探水不犯波瀾茱萸一滴也無爭奈關防不得徑山杲云鉤在不疑之地頌云深淺聊將拄杖探忽然平地起波瀾傾湫倒岳驚天地到海方知徹底乾天童華云茱萸一滴也無滔天白浪趙州以拄杖靠壁不犯波瀾雖然二老同死同生爭奈山僧未肯放過師將遊五臺有大德作偈留曰無處青山不道場何須䇿杖禮清涼雲中縱有金毛現正眼觀時非吉祥師曰作麼生是正眼大德無對法眼益代云請上座領某甲情同安顯代云是上座眼師自此道化被於北地眾請住觀音院掃地次僧問和尚是大善知識為甚麼掃地師曰塵從外來曰既是清淨伽藍為甚麼有塵師曰又一點也師與官人遊園次兔見乃驚走遂問和尚是大善知識兔見為甚麼走師曰老僧好殺僧辭師曰甚處去曰諸方學佛法去師竪起拂子曰有佛處不得住無佛處急走過三千里外逢人不得錯舉曰與麼則不去也師曰摘楊花摘楊花徑山杲云有佛處不得住生鐵秤槌被蟲蛀無佛處急走過撞着嵩山破竈墮三千里外逢人不得錯舉兩箇石人相耳語恁麼則不去也此語已遍天下摘楊花摘楊花唵摩尼達哩吽𠷑吒靈隱嶽舉大慧語了云大慧老人盡力只道得到這裏還知香山落處麼鐵山崩倒壓銀山盤走珠兮珠走盤密密鴛鴦閑繡出金鍼終不與人看楚石琦云妙喜老祖唱之於前天寧遠孫和之於後門前種萵苣萵苣生火筯火筯開蓮花蓮花結木瓜木瓜忽然攧落地撒出無數無數脂麻何也且要入拍問承聞和尚親見南泉是否師曰鎮州出大蘿蔔頭徑山杲頌云參見南泉王老師鎮州蘿蔔更無私拈來塞斷是非口雪曲陽春非楚詞大眾晚參師曰今夜答話去也有解問者出來時有一僧便出禮拜師曰比來拋甎引玉却引得箇墼子保壽沼云射虎不真徒勞沒羽長慶稜問覺鐵觜那僧纔出禮拜為什麼便將為墼子覺云適來那邊亦有人恁麼問長慶云向伊道什麼覺云亦向伊恁麼道雪竇顯云靈利漢聞舉便知落處然雖如此放過覺鐵觜夫宗師語不虗發出來必是作家因什麼拋甎引墼諸禪德要識趙州麼從前汗馬無人識只要重論蓋代功昭覺勤云諸方盡道趙州得逸羣之用一期施設不妨自在這僧要擊節扣關閃電光中卒着手脚不辦覺鐵觜能近取譬不墜宗風法眼有通方鑑才便知落處敢問諸人既是宗師為甚麼拋甎只引得箇墼子上堂金佛不度爐木佛不度火泥佛不度水真佛內裏坐菩提涅槃真如佛性盡是貼體衣服亦名煩惱實際理地甚麼處著一心不生萬法無咎汝但究理坐看三二十年若不會截取老僧頭去夢幻空華徒勞把捉心若不異萬法一如既不從外得更拘執作麼如羊相似亂拾物安向口裏老僧見藥山和尚道有人問著但教合取狗口老僧亦教合取狗口取我是垢不取我是淨一似獵狗專欲得物喫佛法在甚麼處千人萬人盡是覔佛漢子於中覔一箇道人無若與空王為弟子莫教心病最難醫未有世界早有此性世界壞時此性不壞一從見老僧後更不是別人祇是箇主人公這箇更向外覔作麼正恁麼時莫轉頭換腦若轉頭換腦即失却也僧問承師有言世界壞時此性不壞如何是此性師曰四大五陰曰此猶是壞底如何是此性師曰四大五陰法眼益云是一箇兩箇是壞不壞且作麼生會試斷看雪竇顯頌云泥佛不度水神光照天地立雪如未休何人不雕偽金佛不度罏人來訪子湖牌中數箇字清風何處無木佛不度火常思破竈墮杖子忽擊着方知孤負我徑山杲云軍營裏大王頌云九十七種妙相顧陸丹青難狀趙州眼目精明覷見心肝五臟師因老宿問近離甚處曰滑州老宿曰幾程到這裏師曰一躂到老宿曰好箇捷疾鬼師曰萬福大王老宿曰參堂去師應喏喏尼問如何是密密意師以手掐之尼曰和尚猶有這箇在師曰却是你有這箇在高峯妙頌云猛虎深藏淺草窠幾回明月入烟蘿頂門縱有金剛眼未免當頭蹉過他問如何是賓中主師曰山僧不問婦曰如何是主中賓師曰山僧無丈人有僧遊五臺問一婆子曰臺山路向甚麼處去婆曰驀直去僧便去婆曰好箇師僧又恁麼去後有僧舉似師師曰待我去勘過明日師便去問臺山路向甚麼處去婆曰驀直去師便去婆曰好箇師僧又恁麼去師歸院謂僧曰臺山婆子為汝勘破了也報慈遂云前來僧也恁麼道趙州去也恁麼道甚麼處是勘破婆子處又云非唯被趙州勘破亦被這僧勘破瑯琊覺云大小趙州去這婆子手裏喪身失命然雖如此錯會者多溈山云天下衲僧只知問路老婆要且不知脚下泥深若非趙州老人爭顯汗馬功高高峯妙云這箇公案若據諸方判斷趙州勘破婆子若據高峯點檢將來正是婆子勘破趙州畢竟以何為驗以手指云驀直去天奇瑞云首身者知其首而不知其賣賣身者只知其賣而不知其首鳱鵲遭彈空通其喜渥馬受繮徒誇其俊豈不見古人云剛被時人知住處又移茅舍入深居徑山信云臺山路上少這婆子不得自從趙州勘破後直至如今草漫漫地東倒西擂頌云臺山婆臺山婆死去十分沒奈何開眼受人穿鼻孔惡人自有惡人魔問恁麼來底人師還接否師曰接曰不恁麼來底師還接否師曰接曰恁麼來者從師接不恁麼來者如何接師曰止止不須說我法妙難思師因出路逢一婆婆問和尚住甚麼處師曰趙州東院西婆無語師歸問眾僧合使那箇西字或言東西字或言棲泊字師曰汝等總作得鹽鐵判官曰和尚為甚恁麼道師曰為汝總識字清涼欽別眾僧云已知去處問如何是囊中寶師曰合取口清涼欽別云莫說似人有一婆子令人送錢請轉藏經師受施利了却下禪牀轉一匝乃曰傳語婆轉藏經已竟其人回舉似婆婆曰比來請轉全藏如何祇為轉半藏報慈遂云甚麼處是欠半藏處且道那婆子具甚麼眼便與麼道徑山杲云眾中商量道如何是那半藏或云再繞一匝或彈指一下或咳嗽一聲或喝一喝或拍一拍恁麼見解只是不識羞若是那半藏莫道趙州更繞一匝直饒百千萬億匝於婆子分上只得半藏設使更繞須彌山百千萬億匝於婆子分上亦只得半藏假饒天下老和尚共如是繞百千萬億匝於婆子分上也只得半藏設使山河大地森羅萬象若草若木各具廣長舌相異口同音從今日轉到盡未來際於婆子分上亦只得半藏諸人要識婆子麼良久云鴛鴦繡出從君看不把金鍼度與人因僧侍次遂指火問曰這箇是火你不得喚作火老僧道了也僧無對復筴起火曰會麼曰不會師曰此去舒州有投子和尚汝往禮拜問之必為汝說因緣相契不用更來不相契却來其僧到投子投子問近離甚處曰趙州投子曰趙州有何言句僧舉前話投子曰汝會麼曰不會乞師指示投子下禪牀行三步却坐問曰會麼曰不會投子曰你歸舉似趙州其僧却回舉似師師曰還會麼曰不會師曰投子與麼不較多也有新到謂師曰某甲從長安來橫擔一條拄杖不曾撥著一人師曰自是大德拄杖短同安顯別云老僧這裏不曾見恁麼人僧無對法眼益代云呵呵同安顯代云也不短僧寫師真呈師曰且道似我不似我若似我即打殺老僧不似我即燒却真僧無對報慈遂代云留取供養問如何是祖師西來意師曰庭前栢樹子曰和尚莫將境示人師曰我不將境示人曰如何是祖師西來意師曰庭前栢樹子徑山杲云庭前栢樹子今日重新舉打破趙州關特地尋言語既是打破關為什麼却尋言語當初將謂茅長短燒了元來地不乎楚石琦云庭前栢樹子天下杜禪和只管尋枝葉還曾夢見麼四海幸然清似鏡莫來平地起風波問僧發足甚處曰雪峯師曰雪峯有何言句示人曰尋常道盡十方世界是沙門一隻眼你等諸人向甚處屙師曰闍黎若回寄箇鍬子去保福展云南有雪峯北有趙州雪竇顯云這僧既不從雪峯來可惜趙州鍬子瑯瑘覺云眾中有云寄鍬去埋却雪峯若道寄鉢盂去便道盛粥飯用狂解夢見作麼商量不是僧繇手謾說學丹青師謂眾曰我向行脚到南方火爐頭有箇無賓主話直至如今無人舉著上堂至道無難唯嫌揀擇纔有語言是揀擇是明白老僧不在明白裏是汝還護惜也無時有僧問既不在明白裏護惜箇甚麼師曰我亦不知僧曰和尚既不知為甚道不在明白裏師曰問事即得禮拜了退雪竇顯云趙州倒退三千頌云至道無難言端語端一有多種二無兩般天際日上月下檻前山深水寒髑髏識盡喜何立枯木龍吟消未乾難難揀擇明白君自看別僧問至道無難唯嫌揀擇是時人窠窟否師曰曾有人問我老僧直得五年分踈不下雲竇顯云識語不能轉死却了也好與二十棒這棒須有分付處若辨不出且放此話大行天童覺頌云五年分踈不下一句元無縫罅只知推過商量誰信分明酬價玲瓏底相知鹵莾底相訝寧可與曉事人相罵不可共不曉事人說話又問至道無難唯嫌揀擇如何是不揀擇師曰天上天下唯我獨尊曰此猶是揀擇師曰田厙奴甚處是揀擇僧無語無庵全頌云當門一脉透長安遊子空嗟行路難不是人前誇俏措金槌擊碎萬重關問至道無難唯嫌揀擇纔有語言是揀擇和尚如何為人師曰何不引盡此語僧曰某甲祇念得到這裏師曰至道無難唯嫌揀擇白雲端頌云驅山塞海也尋常所至文明始是王但見皇風成一片不知何處有封疆問如何是道師曰墻外底曰不問這箇師曰你問那箇曰大道師曰大道透長安天奇瑞云這僧只解問路不知當面蹉過趙州貪渡行人那妨失却船錢大眾會麼宜乎靜坐仔細評論上堂兄弟若從南方來者即與下載若從北方來者即與上載所以道近上人問道即失道近下人問道即得道師因與文遠行乃指一片地曰這裏好造箇巡舖文遠便去路傍立曰把將公驗來師遂與一摑文遠曰公驗分明過師與文遠論義曰闘劣不闘勝勝者輸果子文遠曰請和尚立義師曰我是一頭驢文遠曰我是驢胃師曰我是驢糞文遠曰我是糞中蟲師曰你在彼中作甚麼文遠曰我在彼中過夏師曰把將果子來五祖戒云禍不單行瑯琊覺云趙州文遠也是蕭何置律徑山杲云文遠在驢糞中過夏面赤不如語直趙州貪他少利嬴得箇胡餅檢點將來也是普州人送賊畢竟如何鵞王擇乳素非鴨類楚石琦云當時文遠待趙州老漢道我是一頭驢便道輸却胡餅了也老漢取胡餅就手奪却便行新到參師問甚麼處來曰南方來師曰佛法盡在南方汝來這裏作甚麼曰佛法豈有南北邪師曰饒汝從雪峯雲居來祇是箇擔板漢崇壽稠云和尚是據客置主人問如何是佛師曰殿裏底曰殿裏者豈不是泥龕塑像師曰是曰如何是佛師曰殿裏底問學人乍入叢林乞師指示師曰喫粥了也未曰喫粥了也師曰洗鉢盂去其僧忽然省悟雲門偃云且道有指示無指示若言有趙州向伊道箇什麼若言無有僧為甚悟去雪竇顯云我不似雲門為蛇畵足直言向你道問者如蟲禦木答者偶爾成文然雖與麼瞎却衲僧眼作麼生免得此過諸仁者要會麼還你趙州喫粥也未拈却這僧喫粥了雪竇與你拄杖子歸堂雲峯悅云雲門與麼道大似為黃門栽鬚與蛇畵足雲峯則不然這僧於此悟去入地獄如箭射黃龍心云雲門雪竇雖則善能鋤強輔弱捨富從貧要且不能安家立國乃問僧只如上座朝來亦喫粥亦洗鉢而今是迷是悟其僧禮拜起師喚近前我有一柄拂與汝歸堂龍門遠云山僧今日喫粥了也洗鉢盂了也只是不悟既是為善知識為甚麼不悟還會麼豈可喚鐘作甕終不指鹿為馬善人難犯水銀無假冷地忽然覷破管取一時放下徑山杲云雲門大似阿修羅王托動三有大城諸煩惱海隨後喝云𥧌語作麼楚石琦云諸仁者要見雲門則易要見玅喜則難誵訛在什麼處劍去久矣爾方刻舟上堂纔有是非紛然失心還有答話分也無僧舉似洛浦洛浦扣齒又舉似雲居雲居曰何必僧回舉似師師曰南方大有人喪身失命曰請和尚舉師纔舉前語僧指傍僧曰這箇師僧喫却飯了作恁麼語話師休去問久嚮趙州石橋到來祇見略彴師曰汝祇見略彴且不見石橋曰如何是石橋師曰度驢度馬天奇瑞云言不涉玄旨無不玅蕩蕩然胡越皆親表表地江山一致雖然如是易分雪裏粉難辨墨中煤曰如何是略彴師曰箇箇度人後有如前問師如前答又僧問如何是石橋師曰過來過來雲居錫云趙州為當扶石橋扶略彴師聞沙彌喝參向侍者曰教伊去侍者乃教去沙彌便珍重師曰沙彌得入門侍者在門外雲居錫云甚麼處是沙彌入門侍者在門外這裏若會得便見趙州問僧甚麼處來曰從南來師曰還知有趙州關否曰須知有不涉關者師曰這販私鹽漢問如何是西來意師下禪牀立曰莫祇這箇便是否師曰老僧未有語在問菜頭今日喫生菜喫熟菜菜頭拈起菜呈之師曰知恩者少負恩者多問狗子還有佛性也無師曰無曰上至諸佛下至螻蟻皆有佛性狗子為甚麼却無師曰為伊有業識在翠巖芝云說有說無兩彩一賽如今作麼生五祖演頌云趙州露刃劍寒霜光㷔㷔擬欲問如何分身作兩段高峯妙云大小趙州拈出一粒巴豆子攪惱衲僧腸肚設有吞吐得者亦不免喪身失命何故急急如律令師問一婆子甚麼處去曰偷趙州筍去師曰忽遇趙州又作麼生婆便與一掌師休去雪竇顯云好掌更下兩掌也無勘處五祖演云趙州休去作麼商量白雲露箇消息貴要諸人共知婆子雖行正令一生不了趙州被打兩掌咬定牙關婆子可謂去路一身輕似葉趙州高名千古重如山徑山信云夜眠侵曉起更有不眠人婆子一掌趙州猶如啞子喫黃瓜雖然這婆子也是看孔着楔未是好手師一日於雪中臥曰相救相救有僧便去身邊臥師便起去翠巖芝云此僧在趙州綣裏還有人出得麼天童華云這僧如蟲禦木要見趙州天地懸殊有般瞎漢便道報恩扶強不扶弱殊不知我王庫內無如是刀喝一喝問如何是趙州一句師曰老僧半句也無曰豈無和尚在師曰老僧不是一句師問新到曾到此間麼曰曾到師曰喫茶去又問僧僧曰不曾到師曰喫茶去後院主問曰為甚麼曾到也云喫茶去不曾到也云喫茶去師召院主主應喏師曰喫茶去保福展云趙州慣得其便鏡清怤舉問僧作麼生會僧便去鏡清云邯鄲學唐步雪竇顯云這僧不是邯鄲人為甚學唐步若辨得出與汝茶喫黃龍新云趙州喫茶宗門奇特到與不到是白拈賊問二龍爭珠誰是得者師曰老僧祇管看雪竇顯云看即不無爭即不得且道扶這僧扶趙州問空劫中還有人修行也無師曰汝喚甚麼作空劫曰無一物是師曰這箇始稱得修行喚甚麼作空劫僧無語問如何是玄中玄師曰汝玄來多少時邪曰玄之久矣師曰闍黎若不遇老僧幾被玄殺問萬法歸一一歸何所師曰老僧在青州作得一領布衫重七斤昭覺勤云摩醯三眼一句洞明似海朝宗千途共轍雖然如是更有一着在忽有問蔣山萬法歸一一歸何處只對他道饑來喫飯困來眠高峯妙云趙州一段綿密工夫風吹不入雨打不濕惜乎不解相體裁衣翻成鈍置高峯則不然忽有問萬法歸一一歸何處只向他道我二十年前曾向這裏打失一隻眼睛至今指鹿為馬大眾且道與古人相去多少元叟端云趙州好語要且不赴來機中峯則不然萬法歸一一歸何處至大四年西山洪水汎漲一夜衝倒三座石橋山門頭石師子作大哮吼山河大地悉皆震動你輩貪眠漢子知甚東西南北金粟悟云我不似趙州委曲如有問萬法歸一一歸何處劈脊便棒不惟直截抑且免置伊向萬法歸一一歸何處躲根師在東司上見遠侍者過驀召文遠文遠應諾師曰東司上不可與汝說佛法僧辭師問甚麼處去曰雪峯去師曰雪峯忽若問和尚有何言句汝作麼生祇對曰某甲道不得請和尚道師曰冬即言寒夏即道熱又曰雪峯更問汝畢竟事作麼生僧又曰道不得師曰但道親從趙州來不是傳語人其僧到雪峯一依前語祇對雪峯曰也須是趙州始得玄沙備聞云大小趙州敗闕也不知雲居錫云甚麼處是趙州敗闕若檢得出是上座眼問如何是祖師意師敲牀脚僧曰祇這莫便是否師曰是即脫取去問如何是毗盧圓相師曰老僧自幼出家不曾眼花曰豈不為人師曰願汝常見毗盧圓相官人問和尚還入地獄否師曰老僧末上入曰大善知識為甚麼入地獄師曰我若不入阿誰教化汝真定帥王公𢹂諸子入院師坐而問曰大王會麼王曰不會師曰自小持齋身已老見人無力下禪牀王尤加禮重翌日令客將傳語師下禪牀受之侍者曰和尚見大王來不下禪牀今日軍將來為甚麼却下禪牀師曰非汝所知第一等人來禪牀上接中等人來下禪牀接末等人來三門外接因侍者報大王來也師曰萬福大王侍者曰未到在師曰又道來也黃龍南云頭頭漏泄罕遇仙陀侍者只解報客不知身在帝鄉趙州入草求人不覺渾身泥水白雲端云其僧雖然罔措爭奈王令已行王令既行則海晏河清一句作麼生道野老不知堯舜力鼕鼕打鼓祭江神師到一庵主處問有麼有麼庵主竪起拳頭師曰水淺不是泊船處便行又到一庵主處問有麼有麼庵主亦竪起拳頭師曰能縱能奪能殺能活便作禮雲居舜云趙州當時甚生意氣雖然如是要且鼻孔在二庵主手裏昭覺勤云佛祖命脉列聖鉗鎚換斗移星經天緯地有般漢未出窠窟只管道舌頭在趙州口裏殊不知自己性命已屬他人若能握向上綱宗與二庵主相見便可以定龍蛇別緇素正好着力還知趙州落處麼切忌顢頂龍門遠云庵主一等竪拳趙州因甚肯一箇不肯一箇且道得失在什麼處趙州勘破幾多阿師庵主過了幾多寒暑要識趙州麼拍禪牀左邊一下要識二庵主麼拍禪牀右邊一下還有檢點得出麼良久云易開終始口難保歲寒心溈山果云泣露千般草吟風一樣松為什麼肯一箇不肯一箇若向這裏見得釋迦不先彌勒不後坐斷要津天長地久苟或未然月庵為諸人下箇註脚良久云若不如是爭知如是元叟端云這箇公案諸方錯判者甚多山僧論實不論虗上庵主截鐵斬釘下庵主和泥合水大小趙州識甚好惡問僧一日看多少經曰或七八或十卷師曰闍黎不會看經曰和尚一日看多少師曰老僧一日祇看一字文遠侍者在佛殿禮拜次師見以拄杖打一下曰作甚麼侍者曰禮佛師曰用禮作甚麼侍者曰禮佛也是好事師曰好事不如無中峯本云文遠云拜佛也是好事不妨軟頑趙州云好事不如無話墮了也要知趙州老人話墮處麼待伊磕破腦門即向你道上堂正人說邪法邪法悉皆正邪人說正法正法悉皆邪諸方難見易識我這裏易見難識問如何是趙州師曰東門西門南門北門徑山杲云這僧問趙州趙州答趙州得人一馬還人一牛人平不語水平不流會麼受恩深處宜先退得意濃時便好休楚石琦云儘這僧神通跳趙州關不過大丈夫漢當眾决擇未到弓折箭盡即便拱手歸降何不着一轉語教他納欵去且道得着箇什麼語問初生孩子還具六識也無師曰急水上打毬子僧却問投子急水上打毬子意旨如何投子曰念念不停留問和尚姓甚麼師曰常州有曰甲子多少師曰蘇州有問十二時中如何用心師曰汝被十二時辰使老僧使得十二時乃曰兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時粥飯是雜用心處除外更無別用心處若不如是大遠在僧問如何是古佛心師曰三箇婆子排班拜問如何是不遷義師曰一箇野兒從東飛過西問學人有疑時如何師曰大宜小宜曰大疑師曰大宜東北角小宜僧堂後問栢樹子還有佛性也無師曰有曰幾時成佛師曰待虗空落地時曰虗空幾時落地師曰待栢樹子成佛時問如何是毗盧師師便起立僧曰如何是法身主師便坐僧禮拜師曰且道坐者是立者是師謂眾曰你若一生不離叢林不語五年十載無人喚你作瘂漢已後佛也不柰你何你若不信截取老僧頭去師因趙王問師尊年有幾箇齒在師曰祇有一箇王曰爭喫得物師曰雖然一箇下下齩著師寄拂子與王曰若問何處得來但說老僧平生用不盡者長沙景岑禪師南泉願法嗣湖南長沙景岑招賢禪師上堂我若一向舉揚宗教法堂裏須草深一丈事不獲已向汝諸人道盡十方世界是沙門眼盡十方世界是沙門全身盡十方世界是自己光明盡十方世界在自己光明裏盡十方世界無一人不是自己我常向汝諸人道三世諸佛法界眾生是摩訶般若光光未發時汝等諸人向甚麼處委悉光未發時尚無佛無眾生消息何處得山河國土來時有僧問如何是沙門眼師曰長長出不得又曰成佛成祖出不得六道輪回出不得僧曰未審出箇甚麼不得師曰晝見日夜見星曰學人不會師曰妙高山色青又青徑山杲云熟處難忘師遣僧問同參會和尚曰和尚見南泉後如何會默然僧曰和尚未見南泉已前作麼生會曰不可更別有也僧回舉似師師示偈曰百尺竿頭不動人雖然得入未為真百尺竿頭須進步十方世界是全身僧便問祇如百尺竿頭如何進步師曰朗州山澧州水曰不會師曰四海五湖皇化裏徑山杲云要見長沙更進一步若有人問如何進這一步我待欵欵地與你葛藤有客來謁師召尚書其人應諾師曰不是尚書本命曰不可離却即今祇對別有第二主人師曰喚尚書作至尊得麼曰恁麼總不祇對時莫是弟子主人否師曰非但祇對與不祇對時無始劫來是箇生死根本有偈曰學道之人不識真祇為從來認識神無始劫來生死本癡人喚作本來人徑山杲云即今祇對者既不是本來人却喚甚麼作本來人良久云我恁麼道且作死馬醫有秀才看千佛名經問曰百千諸佛但見其名未審居何國土還化物也無師曰黃鶴樓崔顥題後秀才還曾題也未曰未曾師曰得閑題取一篇好昭覺勤云驀刀劈面解辨者何人劈箭當胷承當者有幾若能向奔流度刃疾燄過風處見長沙橫身為物去不消一捏其或隨言詮入露布便謂問東答西裂轉話頭且作麼生是長沙端的處還委悉麼殺人刀活人劍溈山果云若有箇漢纔見長沙恁麼道但云黃鶴樓要題也不難未審百千諸佛居何國土若下得此語非唯坐斷長沙舌頭亦乃名標青史徑山信云可惜一座黃鶴樓被長沙和尚埋沒殺千佛名經裏許喚作註解得麼癡人面前勿得說夢問南泉遷化向甚麼處去師曰東家作驢西家作馬曰學人不會此意如何師曰要騎即騎要下即下徑山杲云今日或有人問雲門圓悟老人遷化向甚麼處去即向他道入阿鼻大地獄去也未審意旨如何飲洋銅汁吞熱鐵圓或問還救得也無云救不得為甚麼救不得是這老漢家常茶飯楚石琦云若欲報德酬恩須是長沙妙喜忤逆兒孫始得雖然珊瑚枕上兩行淚半是思君半恨君問蚯蚓斷為兩段兩頭俱動未審佛性在阿那頭師曰動與不動是何境界師與仰山翫月次仰山曰人人盡有這箇祇是用不得師曰恰是倩汝用仰山曰你作麼生用師劈𮌎與一踏仰山曰㘞直下似箇大蟲長慶稜云前彼此作家後彼此不作家乃別云邪法難扶保福展云好一箇月只是用力太多被他踏破却成兩箇人人盡道岑大蟲奇特須知仰山有陷虎之機德山密代云更與一踏徑山杲云皎潔一輪寒光萬里靈利者葉落知秋闒茸者忠言逆耳休不休已不已小釋迦有陷虎之機老大蟲却無牙齒當時一踏豈造次驀然倒地非偶爾眾中還有緇素得二老出者麼良久云設有也是掉棒打月楚石琦云小釋迦云你作麼生用岑大蟲便與一踏盡謂高超物外獨步寰中天寧忍俊不禁也擬冷處着把火二大老如斯吐露於建化門頭足可觀光若是這箇事料掉無交涉自此諸方稱為岑大蟲問本來人還成佛也無師曰汝見大唐天子還自種田割稻麼曰未審是何人成佛師曰是汝成佛僧無語師曰會麼曰不會師曰如人因地而倒依地而起地道甚麼三聖令秀上座問曰南泉遷化向甚麼處去師曰石頭作沙彌時參見六祖秀曰不問石頭見六祖南泉遷化向甚麼處去師曰教伊尋思去秀曰和尚雖有千尺寒松且無抽條石筍師默然秀曰謝和尚答話師亦默然秀回舉似三聖三聖曰若恁麼猶勝臨濟七步然雖如此待我更驗看至明日三聖上問承聞和尚昨日答南泉遷化一則語可謂光前絕後今古罕聞師亦默然蔣山懃云也大奇也大奇長沙畵虎却成狸南泉一去無消息空使行人說是非鄂州茱萸和尚南泉願法嗣鄂州茱萸山和尚初住隨州護國上堂擎起一橛竹曰還有人虗空裏釘得橛麼時有靈虗上座出眾曰虗空是橛師擲下竹便下座雲門偃云矢上加尖有僧云和尚適來與麼道那雲門云搥鐘謝響得箇蝦䗫出來雪竇顯云若要此話大行直須打了趂出法雲秀云茱萸只知瞻前這僧不能顧後仔細檢點將來兩箇總須喫棒且道過在甚處具眼者看棲賢諟云且道這僧出來與麼道是具眼不具眼茱萸當時便打且道打伊甚麼處大眾驗取趙州到雲居雲居曰老老大大何不覔箇住處曰甚麼處住得雲居曰山前有箇古寺基趙州曰和尚自住取後到師處師曰老老大大何不覔箇住處趙州曰向甚處住師曰老老大大住處也不知趙州曰三十年弄馬騎今日却被驢撲雲居錫云甚麼處是趙州被驢撲處溈山云雲居茱萸為人猶如為己爭奈趙州不入這綣繢然雖如是不得雪霜力焉知松栢操大溈泰云雲居茱萸只解把住不解放行趙州只解放行不解把住檢點將來未為全美且雙放雙收一句作麼生道畢竟水須朝海去到頭雲定覔山歸子湖利蹤禪師南泉願法嗣衢州子湖巖利蹤禪師澶州人也入南泉之室乃抵于衢州之馬蹄山結茅宴居開元二年邑人施山下子湖創院師於門下立牌曰子湖有一隻狗上取人頭中取人心下取人足擬議即喪身失命臨濟會下二僧參方揭簾師喝曰看狗僧回顧師便歸方丈雪竇顯云眾中總道這僧着一口着即着了也爭奈這僧在敢問諸人子湖狗着者便死因什麼這僧在若無知方眼救得這僧設使子湖出世咬殺百千萬箇有甚益我當時若見先斫下牌然後入院待這老漢喝云看狗與伊放出箇焦尾大蟲如今諸人要見麼日勢稍晚歸堂神鼎諲云古人提唱一段因緣你道恁麼時下得甚麼語神鼎當時若在他會裏即出云這畜生又云死又作退勢天童華云這老漢雖慣得其便爭奈咬這僧不殺且道利害在什麼處萬峯蔚云入門一喝頭正尾正擬議思量喪却性命且作麼生入得他家門戶喝一喝阿耶阿耶與勝光和尚鉏園次驀按钁回視勝光曰事即不無擬心即差勝光便問如何是事被師攔胷踏倒從此有省尼到參師曰汝莫是劉鐵磨否曰不敢師曰左轉右轉曰和尚莫顛倒師便打蔣山懃云子湖棒頭有眼只為權柄在手鐵磨皮下有血饒他干木隨身雖然柔弱勝剛強且要話在師一夜於僧堂前呌曰有賊眾皆驚動有一僧在堂內出師把住曰維那捉得也捉得也曰不是某甲師曰是即是祇是汝不肯承當翠巖芝云子湖也是相頭買㡌溈山果云子湖恁麼大似按牛頭喫草雲際師祖禪師南泉願法嗣終南山雲際師祖禪師初參南泉問摩尼珠人不識如來藏裏親收得如何是藏南泉曰與汝往來者是師曰不往來者如何南泉曰亦是曰如何是珠南泉召師祖師應諾南泉曰去汝不會我語師從此信入雪竇顯向徃來者是處拈云草裏漢向不徃來者亦是處云雪上加霜向如何是珠處別云險又云百尺竿頭作伎倆不是好手這裏着得箇眼賓主互換便能深入虎穴或不漝麼縱饒師祖悟去也是龍頭蛇尾白雲端云大眾這僧一顆摩尼珠可謂希世之寶大可憐生幾乎落在萬丈深坑猶賴南泉老手親為托起且道此珠見今在什麼處乃云海神知貴不知價留與人間光照夜昭覺勤云南泉一期垂手收放擒縱則不無要且未見向上事在只如盡大地是如來藏向什麼處着珠盡大地是摩尼珠向什麼處着藏若明得有轉身處許你具一隻眼淨因成云南泉應機酬對縱奪可觀檢點將來終未能指出他珠在直饒喚師祖師祖應喏云汝不會我語正是藏畢竟珠在甚麼處莫是海神知貴不知價麼此是近來新婦禪不勞拈出拍禪牀云珠之與藏盡被老僧一拍粉碎諸人更來這裏討什麼又拍一下靈鷲閑禪師南泉願法嗣池州靈鷲閑禪師明水和尚問如何是頓獲法身師曰一透龍門雲外望莫作黃河點額魚仰山問寂寂無言如何視聽師曰無縫塔前多雨水日子和尚南泉願法嗣日子和尚因亞谿來參師作起勢亞谿曰這老山鬼猶見某甲在師曰罪過罪過適來失祗對亞谿欲進語師便喝亞谿曰大陣當前不妨難禦師曰是是亞谿曰不是不是趙州諗云可憐兩箇漢不識轉身句蘇州西禪和尚南泉願法嗣蘇州西禪和尚僧問三乘十二分教則不問如何是祖師西來的的意師舉拂子示之其僧不禮拜竟參雪峯雪峯問甚麼處來曰浙中來雪峯曰今夏甚麼處曰西禪雪峯曰和尚安否曰來時萬福雪峯曰何不且在彼從容曰佛法不明雪峯曰有甚麼事僧舉前話雪峯曰汝作麼生不肯伊曰是境雪峯曰汝見蘇州城裏人家男女否曰見雪峯曰汝見路上林木池沼否曰見雪峯曰凡覩人家男女大地林沼總是境汝還肯否曰肯雪峯曰祇如舉起拂子汝作麼生不肯僧乃禮拜曰學人取次發言乞師慈悲雪峯曰盡乾坤是箇眼汝向甚麼處蹲坐僧無語陸亘大夫南泉願法嗣宣州刺史陸亘大夫問南泉古人瓶中養一鵝鵝漸長大出瓶不得如今不得毀瓶不得損鵝和尚作麼生出得南泉召大夫亘應諾南泉曰出也亘從此開解即禮謝高峯妙云南泉潦倒手眼不親縱饒出得也是死貨高峯只向他道大夫還曾示人麼纔擬祗對便與亂棒打出非特為這漢脫却鶻臭布衫要使天下衲僧箇箇解粘去縛慶快平生暨南泉圓寂院主問曰大夫何不哭先師大夫曰院主道得即哭院主無對長慶稜代云合哭不合哭甘贄行者南泉願法嗣池州甘贄行者一日入南泉設齋黃檗為首座贄請施財黃檗曰財法二施等無差別贄曰恁麼道爭消得某甲䞋便將出去須臾復入曰請施財黃檗曰財法二施等無差別贄乃行䞋翠巖真云甘贄行者𭶑兒落節黃檗施財何曾夢見雲居元云大小黃檗被甘贄換却一隻眼徑山杲云一等是隨邪逐惡雲居羅漢却較些子靈隱嶽云總是掩耳偷鈴殊不知甘贄有收有放首座徹底惺惺雲收雨霽長天濶一對鴛鴦畵不成楚石琦云師子咬人韓獹逐塊又一日入寺設粥仍請南泉念誦南泉乃白椎曰請大眾為貍奴白牯念摩訶般若波羅蜜贄拂袖便出南泉粥後問典座行者在甚處典座曰當時便去也南泉便打破鍋子徑山杲云心不負人面無慙色雙嶺玄真禪師鹽官安法嗣洪州雙嶺玄真禪師初問道吾無神通菩薩為甚麼足迹難尋道吾曰同道者方知師曰和尚還知否道吾曰不知師曰何故不知道吾曰去你不識我語師後於鹽官處悟旨焉芙蓉靈訓禪師歸宗常法嗣禪州芙蓉山靈訓禪師初參歸宗問如何是佛歸宗曰我向汝道汝還信否曰和尚誠言安敢不信歸宗曰即汝便是師曰如何保任歸宗曰一翳在眼空華亂墜法眼益云若無後語有甚麼歸宗也師辭歸宗問甚麼處去曰歸嶺中去歸宗曰子在此多年裝束了却來為子說一上佛法師結束了上去歸宗曰近前來師乃近前歸宗曰時寒途中善為師聆此言頓忘前解高亭和尚歸宗常法嗣漢南高亭和尚有僧自夾山來禮拜師便打僧曰特來禮拜何得打某甲僧再禮拜師又打趂僧回舉似夾山夾山曰汝會也無曰不會夾山曰賴汝不會若會即夾山口瘂五臺智通禪師歸宗常法嗣五臺山智通禪師自稱大禪佛初在歸宗會下忽一夜連呌曰我大悟也眾駭之明日上堂眾集歸宗曰昨夜大悟底僧出來師出曰某甲歸宗曰汝見甚麼道理便言大悟試說看師曰師姑元是女人作歸宗異之師便辭去歸宗門送與提笠子師接得笠子戴頭上便行更不回顧普化和尚盤山積法嗣鎮州普化和尚者不知何許人也師事盤山密受真訣而徉狂出言無度暨盤山順世乃於北地行化或城市或塚間振一鐸曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打一日臨濟令僧捉住曰總不恁麼來時如何師拓開曰來日大悲院裏有齋僧回舉似臨濟臨濟曰我從來疑看這漢五祖演云若是五祖則不然有人問總不恁麼來時如何和聲便打是他須道五祖盲枷瞎棒我只要你恁麼道何故一任舉似諸方凡見人無高下皆振鐸一聲時號普化和尚或將鐸就人耳邊振之或附其背有回顧者即展手曰乞我一錢師嘗暮入臨濟院喫生菜臨濟曰這漢大似一頭驢師便作驢鳴臨濟謂直歲曰細抹草料著師曰少室人不識金陵又再來臨濟一隻眼到處為人開趙州諗云何不與他本分草料師見馬步使出喝道師亦喝道作相樸勢馬步使令人打五棒師曰似即似是即不是師甞於闤闠間搖鐸唱曰覔箇去處不可得時道吾遇之把住問曰汝擬去甚麼處師曰汝從甚麼處來道吾無語師掣手便去臨濟一日與河陽木塔長老同在僧堂內坐正說師每日在街市掣風掣顛知他是凡是聖師忽入來臨濟便問汝是凡是聖師曰汝且道我是凡是聖臨濟便喝師以手指曰河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼臨濟曰這賊師曰賊賊便出去唐咸通初將示滅乃入市謂人曰乞我一箇直裰人或與披襖或與布裘皆不受振鐸而去臨濟令人送與一棺師笑曰臨濟廝兒饒舌便受之乃辭眾曰普化明日去東門死也郡人相率送出城師厲聲曰今日葬不合青烏乃曰明日南門遷化人亦隨之又曰明日出西門方吉人出漸稀出已還返人意稍怠第四日自擎棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見唯聞空中鐸聲漸遠莫測其由壽州良遂禪師麻谷徹法嗣壽州良遂禪師參麻谷麻谷見來便將鉏頭去鉏草師到鉏草處麻谷殊不顧便歸方丈閉却門師次日復去麻谷又閉門師乃敲門麻谷問阿誰師曰良遂纔稱名忽然契悟曰和尚莫謾良遂良遂若不來禮拜和尚洎被經論賺過一生麻谷便開門相見及歸講肆謂眾曰諸人知處良遂總知良遂知處諸人不知雲門偃云便有逆水之波如今得入是順水之意亦喚作雙放時節又云麻谷問阿誰他道莫瞞某甲不是識破麻谷相見時節若不禮拜和尚洎被經論賺過一生亦知有賺人處又云作麼生是良遂知處東林顏云諸人知處良遂總知良遂知處諸人不知作麼生是良遂知處乃云鸕語鶴靈隱嶽云為人為徹咬着生鐵逆水之波虗空釘橛薯山慧超禪師東寺會法嗣吉州薯山慧超禪師洞山來禮拜次師曰汝已住一方又來這裏作麼曰良价無柰疑何特來見和尚師召良价良价應諾師曰是甚麼良价無語師曰好箇佛祇是無光𦦨虔州處微禪師西堂藏法嗣虔州處微禪師問仰山汝名甚麼仰山曰慧寂師曰那箇是慧那箇是寂仰山曰祇在目前師曰猶有前後在仰山曰前後且置和尚見箇甚麼師曰喫茶去龜山智具禪師章敬腪法嗣福州龜山智具禪師揚州柳氏子初謁章敬章敬問何所而至師曰至無所至來無所來章敬雖默然師亦自悟金州操禪師章敬腪法嗣金州操禪師請米和尚齋不非坐位米到展坐具禮拜師下禪牀米乃坐師位師却席地而坐齋訖米便去侍者曰和尚受一切人欽仰今日坐位被人奪却師曰三日後若來即受救在米三日後果來曰前日遭賊僧問鏡清怤古人道前日遭賊意旨如何鏡清云祇見錐頭利不見鑿頭方朗州古顧和尚章敬腪法嗣朗州古堤和尚尋常見僧來但曰去汝無佛性僧無對或有對者莫契其旨仰山到參師曰去汝無佛性仰山叉手近前三步應喏師笑曰子甚麼處得此三昧來仰山曰我從耽源處得名溈山處得地師曰莫是溈山的子麼仰山曰世諦即不無佛法即不敢仰山却問和尚從甚處得此三昧師曰我從章敬處得此三昧仰山嘆曰不可思議來者難為湊泊上林戒靈禪師永泰湍法嗣湖南上林戒靈禪師初參溈山溈山曰大德作甚麼來師曰介冑全具溈山曰盡卸了來與大德相見師曰卸了也溈山咄曰賊尚未打卸作甚麼師無對仰山代曰請和尚屏却左右溈山以手揖曰喏喏師後參永泰方諭其旨五臺祕魔巖和尚永泰湍法嗣五臺山祕魔巖和尚常持一木叉每見僧來禮拜即叉却頸曰那箇魔魅教汝出家那箇魔魅教汝行脚道得也叉下死道不得也叉下死速道速道學徒鮮有對者明招謙云我當時若見伊欲道未道先與一叉法眼益代云乞命乞命報慈遂代云老兒家放却叉子得也瑯琊覺云雷聲甚大雨點全無五祖戒云山僧當時若見奪取叉來驀項叉倒點把火照看伊面皮厚多少霍山通和尚訪師纔見不禮拜便攛入懷裏師拊霍山背三下霍山起拍手曰師兄三千里外賺我來三千里外賺我來便回保福展云當斷不斷返遭其亂首山念云千聞不如一見湖南祇林和尚永泰湍法嗣湖南祇林和尚每叱文殊普賢皆為精魅手持木劒自謂降魔纔見僧來參便曰魔來也魔來也以劒亂揮歸方丈如是十二年後置劒無言僧問十二年前為甚麼降魔師曰賊不打貧兒家曰十二年後為甚麼不降魔師曰賊不打貧兒家南嶽下四世睦州陳尊宿黃檗運法嗣睦州陳尊宿諱道明江南陳氏之後也目有重瞳列七星遊方契旨於黃檗後為四眾請住觀音院常百餘眾經數十載學者叩激隨問遽荅詞語峻險既非循轍故淺機之流往往𠷣之唯玄學性敏者欽伏由是諸方歸慕咸以尊宿稱後歸開元今改兜率居房織蒲鞋以養母故有陳蒲鞋之號巢宼入境師標大草屨於城門巢欲棄之竭力不能舉歎曰睦州有大聖人舍城而去一日晚參謂眾曰汝等諸人還得箇入頭處也未若未得箇入頭處須覔箇入頭處若得箇入頭處已後不得孤負老僧時有僧出禮拜曰某甲終不敢孤負和尚師曰早是孤負我了也徑山杲云咄葛藤得也未師尋常見衲僧來即閉門或見講僧乃召曰座主座主應諾師曰擔板漢雪竇顯云睦州只具一隻眼何故這僧喚既回頭因甚却成擔板一日在廊階上立僧問陳尊宿房在何處師脫草屨驀頭打僧便走師召大德僧回首師指曰却從那邊去天使問三門俱開從那門入師喚尚書天使應諾師曰從信門入天使又見畵壁問曰二尊者對譚何事師摑露柱曰三身中那箇不說法問座主講甚麼經曰講涅槃經師曰問一段義得麼曰得師以脚踢空吹一吹曰是甚麼義曰經中無此義師曰脫空謾語漢五百力士揭石義却道無師見僧乃曰見成公案放汝三十棒雲峯悅云作賊人心虗徑山杲云又添得一箇道了問冲密你道我恁麼道還有過也無冲密云作賊人心虗妙喜云三箇也有曰某甲如是師曰三門頭金剛為甚麼舉拳曰金剛尚乃如是師便打徑山杲云雖然無孔笛撞着氊拍板直是五音調暢六律和諧仔細檢點將來未免傍觀者哂且道誰是傍觀者良久云不得動着動着打折驢腰楚石琦云睦州與這僧二俱作家二俱不作家還有人辨得出麼問如何是向上一路師曰要道有甚麼難曰請師道師曰初三十一中九下七問以一重去一重即不問不以一重去一重時如何師曰昨朝栽茄子今日種冬瓜問如何是曹谿的的意師曰老僧愛嗔不愛喜曰為甚麼如是師曰路逢劒客須呈劒不是詩人莫說詩問高揖釋迦不拜彌勒時如何師曰昨日有人問趂出了也曰和尚恐某甲不實邪師曰拄杖不在苕帚柄聊與三十雪竇顯云睦州只有受璧之心且無割城之意南堂靜云衲僧家高揖釋迦不拜彌勒不為分外也須是本分鉗鎚方能知其真偽何故出羣須是英靈漢敵勝還他師子兒選佛若無如是眼直饒千載亦奚為西禪需云若要扶持大法舉唱宗乘這老漢却較些子諸人要見睦州麼劍為不平離寶匣藥因救病出金瓶靈隱嶽云以毒攻毒以楔出楔還他睦州老漢始得今日有人恁麼問虎丘也只恁麼答何故盡法無民上堂我見百丈不識好惡大眾纔集以拄杖一時打下復召大眾眾回首乃曰是甚麼有甚共語處又黃檗和尚亦然復召大眾眾回首乃曰月似彎弓少雨多風猶較些子雪竇顯云說甚猶較些子直是未在據雪竇眾集一時打下便休或有箇無孔鐵鎚為眾竭力善能擔荷可以籠罩古今乾坤把斷乃驀拈拄杖云放過一着石門聰舉黃檗語了云前來甚是奇特後來龍頭蛇尾瑯瑘覺云若入洪波裏須是弄潮人昭覺勤云古人各出一隻手提振綱宗誘掖後進功不浪施仔細點檢將來百丈將棒喚狗未免相顧睚𥈐黃檗香餌綴鈎吞着喪身失命睦州當眾舉覺與賊過梯雪竇要人擔荷無風起浪今日總不恁麼各請歸堂靈隱嶽云轉見誵訛這幾箇老漢出來張羅布網却向平地上撈鰕摝蜆用盡自己心笑破他人口笑巖寶云百丈黃檗與麼示眾語雖徑巧爭奈眾心不死睦州拈轉話頭却反弄巧成拙雪竇兩次為眾竭力禍出私門天童以拄杖擊香臺不奈船何打破戽㪷若是山僧總不與麼但以拄杖趂下復喚云大眾眾回首向道恁麼也恠山僧不得秀才訪師稱會二十四家書師以拄杖空中點一點曰會麼秀才罔措師曰又道會二十四家書永字八法也不識黃龍南云睦州一點直在威音王已前及乎八法論書却被箇俗人勘破若是黃龍即不然孔門弟子無人識碧眼胡僧笑點頭溈山云睦州不妨用得這一點妙又似以勢欺人大溈即不然乃畵一圓相云會麼字義炳然文不加點徑山印舉大溈語了云睦州大似如風吹水自然成紋惜乎逞俊太過烏焉成馬山僧今日客來雖有拂子拄杖盡以束之高閣何故文不在茲上堂裂開也在我揑聚也在我時有僧問如何是裂開師曰三九二十七菩提涅槃真如解脫即心即佛我且與麼道你又作麼生曰某甲不與麼道師曰盞子撲落地碟子成七片曰如何是揑聚師乃斂手而坐天童覺云睦州用處直是長三短五七縱八橫撒在面前拋向背後不妨奇特然則門庭施設自是一家入理深談不啻百步天童華云我且問你諸人雲峯與麼道為復是會睦州意明睦州語歸宗因行不妨掉臂不是禪不是道不是玄不是妙久立珍重靈隱嶽云也好笑睦州被這僧拶得恰似落湯螃蟹七手八脚一時露師看經次陳操尚書問和尚看甚麼經師曰金剛經尚書曰六朝翻譯此當第幾師舉起經曰一切有為法如夢幻泡影師聞一老宿難親近躬往相訪纔入方丈老宿便喝師側掌曰兩重公案老宿曰過在甚麼處師曰這野狐精便退紫衣大德到禮拜師拈帽子帶問曰這箇喚作甚麼曰朝天帽師曰恁麼則老僧不卸也復問所習何業曰唯識師曰作麼生說曰三界唯心萬法唯識師指門扇曰這箇是甚麼曰是色法師曰簾前賜紫對御譚經何得不持五戒大德無對問如何是展演之言師曰量才補職曰如何是不展演之言師曰伏惟尚饗焦山借斧頭次師呼童子取斧來童取斧至曰未有繩墨且斫麤師便喝又問童曰作麼生是你斧頭童遂作斫勢師曰斫你老爺頭不得師問秀才先輩治甚經秀才曰治易師曰易中道百姓日用而不知且道不知箇甚麼秀才曰不知其道師曰作麼生是道秀才無對僧問一氣還轉得一大藏教也無師曰有甚饆羅鎚子快下將來徑山杲云五更侵早起更有夜行人問如何是一代時教師曰上大人丘乙己問如何是禪師曰猛火著油煎僧參師曰汝是新到否曰是師曰且放下葛藤會麼曰不會師曰擔枷陳狀自領出去僧便出師曰來來我實問你甚處來曰江西師曰泐潭和尚在汝背後怕你亂道見麼僧無對看華嚴經次僧問看甚麼經師曰大光明雲青色光明雲紫色光明雲却指面前曰那邊是甚麼雲曰南邊是黑雲師曰今日須有雨問以字不成八字不是是何章句師彈指一聲曰會麼曰不會師曰上來講讚無限勝因蝦蟇𨁝跳上天蚯蚓驀過東海徑山杲云這僧只問經頭一字睦州盡將善知眾藝差別字輪以龍龕手鑑唐韻玉篇從頭注解撒在這僧懷裏這僧也不妨奇特直下便肯承當且道什麼處是他承當處聽取箇註脚以字不成八字不是彈指未終普天匝地擊開四十二般若波羅蜜門參透華嚴會中善知眾藝教內教外一時收世出世間皆周備無邊罪咎如火消冰無量勝義如恒沙聚更有箇末後句堅牢庫藏永收藏總屬山前熊伯莊楚石琦云經頭一字是什麼字睦州彈指一下將黃面老人四十九年說不盡底一時吐露了也妙喜矢上加尖道更有末後一句諸人還委悉麼良久山斷疑休去峯高又起來天奇瑞云這僧善答不善問陸州善問不善答善問者手把夜明符幾箇知天曉善答者只知鐵脊撑天不知腦門着地若是山僧臂脊便打待他擬議趕出門去問僧近離甚處曰河北師曰彼中有趙州和尚你曾到否曰某甲近離彼中師曰趙州有何言句示徒僧舉喫茶話師乃呵呵大笑曰慚愧却問趙州意作麼生曰祇是一期方便師曰苦哉趙州被你將一杓屎潑了也便打師却問沙彌你作麼生會沙彌便設拜師亦打其僧往沙彌處問適來和尚打你作甚麼沙彌曰若不是我和尚不打某甲雪竇顯云這僧克由尀耐將一杓屎潑他二員古佛諸上座若能辨得非唯與趙睦二州雪屈亦乃雪竇與天下老宿無過若道不得到處潑人卒未了在徑山杲云雪竇只知一杓屎潑他趙睦二州殊不知這僧當時被趙州將一杓屎潑了却到睦州又遭一杓只是不知氣息若知氣息什麼處有二員古佛楚石琦云這僧不會喫茶意旨不知潑屎氣息帶累好人墮屎坑中合喫多少拄杖雪竇妙喜一時放過也須替他入涅槃堂始得新到參方禮拜師叱曰闍黎因何偷常住果子喫曰學人纔到和尚為甚麼道偷果子師曰贓物見在千頃楚南禪師黃檗運法嗣杭州千頃山楚南禪師福州張氏子初參芙蓉芙蓉見曰吾非汝師汝師江外黃檗是也師禮辭遂參黃檗黃檗問子未現三界影像時如何師曰即今豈是有邪黃檗曰有無且置即今如何師曰非今古黃檗曰吾之法眼已在汝躬烏石靈觀禪師黃檗運法嗣福州烏石山靈觀禪師時稱老觀尋常扄戶人罕見之唯一信士每至食時送供方開一日雪峯伺便扣門師開門雪峯驀胷搊住曰是凡是聖師唾曰這野狐精便推出閉却門雪峯曰也祇要識老兄師因雪峯來敲門師曰誰雪峯曰鳳凰兒師曰作什麼雪峯曰來啗老觀師便開門搊住曰道道雪峯擬議師便托開閉却門雪峯住後示眾曰我當時若入得老觀門你這一隊噇酒糟漢向甚處摸索老宿云雪峯徒有此語當時入不得今也入不得明招謙代雪峯纔見開門便云動即喪又代老觀云俊哉俊哉雪竇顯云這孤恩負德漢有甚麼交涉當時入不得豈是教你入今既摸索不着累他雪峯俱在老觀門下剗草次問僧汝何處去曰西院禮拜安和尚去時竹上有一青蛇師指蛇曰欲識西院老野狐精祇這便是問西院此一片地堪著甚麼物西院曰好著箇無相佛師曰好片地被兄放不淨污了也引麵次僧參師引麵示之僧便去師至暮問小師適來僧在何處小師曰當時便去也師曰是即是祇得一橛雪竇顯云老觀大似失錢遭罪報慈遂云甚麼處是少一橛翠巖芝云老觀道他只得一橛大似壓良為賤彼此出家兒東禪觀云總似這箇師僧靈山付囑有在老觀為什麼道只得一橛要會麼若不酬價爭辨真偽曹山行脚時問如何是毗盧師法身主師曰我若向你道即別有也曹山舉似洞山洞山曰好箇話頭祇欠進語何不問為甚麼不道曹山却來進前語師曰若言我不道即瘂却我口若言我道即謇却我舌曹山歸舉似洞山洞山深肯之羅漢宗徹禪師黃檗運法嗣杭州羅漢院宗徹禪師湖州吳氏子上堂僧問如何是祖師西來意師曰骨剉也師對機多用此語時號骨剉和尚相國裴休居士黃檗運法嗣相國裴休居士字公美河東聞喜人也守新安日屬運禪師初於嶺南黃檗山捨眾入大安精舍混迹勞侶掃灑殿堂公入寺燒香主事祇接因觀壁畫乃問是何圖相主事對曰高僧真儀公曰真儀可觀高僧何在主事無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者公曰可請來詢問得否於是遽尋黃檗至公覩之欣然曰休適有一問諸德吝辭今請上人代醻一語黃檗曰請相公垂問公舉前話黃檗朗聲曰裴休公應諾黃檗曰在甚麼處公當下知旨如獲髻珠曰吾師真善知識也示人剋的若是自此延入府署執弟子禮屢辭不已復堅請住黃檗山有暇即躬入山頂謁或請入州中公既通徹祖意復博綜教相諸方禪學咸謂裴相不浪出黃檗之門也大隨法真禪師長慶安法嗣益州大隨法真禪師梓州王氏子南遊初見藥山道吾雲巖洞山次至嶺外大溈會下數載食不至充臥不求暖清苦鍊行操履不羣溈山深器之一日問曰闍黎在老僧此間不曾問一轉話師曰教某甲向甚麼處下口溈山曰何不道如何是佛師便作手勢掩溈山口溈山歎曰子真得其髓從此名傳四海僧問劫火洞然大千俱壞未審這箇壞不壞師曰壞曰恁麼則隨他去也師曰隨他去僧不肯後到投子舉前話投子遂裝香遙禮曰西川古佛出世謂其僧曰汝速回去懺悔僧回大隨師已歿僧再至投子投子亦遷化庵側有一龜僧問一切眾生皮褁骨這箇眾生為甚骨褁皮師拈草履覆龜背上僧無語徑山信云還知麼大隨和尚拈草鞋蓋覆烏龜不是好心這僧無語口似磉盤頌云皮褁骨骨褁皮草鞋拈得覆烏龜風吹日炙渾無事不怕人來問着渠問僧甚處去曰峨嵋禮普賢去師舉拂子曰文殊普賢總在這裏僧作圓相拋向後乃禮拜師喚侍者取一貼茶與這僧保福展云若無後語笑他衲僧雲門偃別云西天斬頭截臂這裏自領出去五祖戒云大隨不因一事不長一智雪竇顯云殺人刀活人劍具眼底辨取溈山秀云大隨茶非類趙州茶既不類趙州茶得之者少矣這僧得之且有甚長處然不義之財於我如浮雲天童覺云識法者懼欺敵者亡水中辨乳須是鵞王眾僧參次師以口作患風勢曰還有人醫得吾口麼眾僧競送藥以至俗士聞之亦多送藥師並不受七日後師自摑口令正乃曰如許多時鼓這兩片皮至今無人醫得即端坐而逝靈樹如敏禪師長慶安法嗣韶州靈樹如敏禪師閩人也有尼送瓷鉢與師師拓起問曰這箇出在甚麼曰出在定州清涼欽別云不違此間師乃撲破尼無對保福展代云欺敵者亡廣主將興兵躬入院請師決臧𠘶師已先知怡然坐化廣主怒知事曰和尚何時得疾對曰不曾有疾適封一函子令呈大王廣主開函得一帖子云人天眼目堂中上座廣主悟師旨遂寢兵乃召第一座開堂說法即雲門偃靈雲志勤禪師長慶安法嗣福州靈雲志勤禪師本州長谿人也初在溈山因見桃華悟道有偈曰三十年來尋劒客幾回落葉又抽枝自從一見桃華後直至如今更不疑溈山覧偈詰其所悟與之符契溈山曰從緣悟達永無退失善自護持有僧舉似玄沙備玄沙云諦當甚諦當敢保老兄未徹在眾疑此語玄沙問地藏我恁麼道汝作麼生會地藏云不是桂琛即走殺天下人長慶稜因僧問玄沙意旨如何長慶云將謂胡鬚赤更有赤鬚胡翠巖芝云有一人如今問玄沙意作麼生且道此人還徹也未黃龍心云諸人且道靈雲當初見底是桃華不是桃華若是桃華天下人見總須悟道若不是桃華爭奈見有桃華擬向甚處看作麼生說箇見底道理五祖演云說什麼諦當更參三十年昭覺勤云千鈞之弩不為鼷鼠而發機靈雲既撥轉天關玄沙乃掀翻地軸且道那箇是未徹處徑山杲云一家有事百家忙楚石琦云人無遠慮必有近憂直饒百鍊精金不免入爐再煆金粟悟云說甚一家有事百家忙直是一盲引眾盲徑山信云靈雲行脚三十年不知踏破幾許草鞋若無桃花刺破眼睛更走三十年未是苦在雪峯有偈送雙峯末句曰雷罷不停聲師別曰雷震不聞聲雪峯聞乃曰靈雲山頭古月現雪峯後問曰古人道前三三後三三意旨如何師曰水中魚天上鳥雪峯曰意作麼生師曰高可射兮深可釣長生問混沌未分時含生何來師曰如露柱懷胎曰分後如何師曰如片雲點太清曰未審太清還受點也無師不答曰恁麼則含生不來也師亦不荅曰直得純清絕點時如何師曰猶是真常流注曰如何是真常流注師曰似鏡長明曰向上更有事也無師曰有曰如何是向上事師曰打破鏡來與汝相見芭蕉徹云相見便休又打破鏡作什麼白兆圓云若不打破鏡爭得相見大陽延云即今破也又作麼生相見乃云照盡體無依通身難辨的開福寧云好諸禪德盡十方界是一面鏡作麼生說箇打破底道理直饒眼親手辦光境俱忘如鷄抱卵啐啄同時正好喫報慈拄杖何故弄影禪和如麻似粟黃龍忠云二尊宿發明本分大事可謂如切如磋如琢如磨不妨端的檢點將來大似貼肉汗衫未能脫體致使有般漢隨語生解便向未分時計較打破鏡處說道理驢年解悟去若據牧庵見處說甚混沌分與未分打破鏡與不打破鏡直饒向露柱懷胎處會得正是片雲點太清諸仁者還委悉麼待虗空落地即向你道天童覺云分與未分玉機夜動點與不點金梭暗拋直是一色純清未得十成穩坐且道打破鏡來向甚處相見還會麼清秋老兔吞光後湛水蒼龍蛻骨時問僧甚處去曰雪峯去師曰我有一信寄雪峯得麼曰便請師脫隻履拋向面前僧便去至雪峯雪峯問甚處來曰靈雲來雪峯曰靈雲安否曰有一信相寄雪峯曰在那裏僧脫隻履拋向雪峯面前雪峯休去溈山秀云雪峯既不能辨他來信端的這僧又祇知依模畵樣鈍置他靈雲忽若當時道我有一信寄他僧云便請靈雲只據坐這僧又若為通露不可大丈夫漢為人馳達教他一言不措壽山師解禪師長慶安法嗣福州壽山師解禪師甞參洞山洞山問闍黎生緣何處師曰和尚若實問某甲即是閩中人也曰汝父名甚麼師曰今日蒙和尚致此一問直得忘前失後閩帥問壽山年多少師曰與虗空齊年曰虗空年多少師曰與壽山齊年饒州嶤山和尚長慶安法嗣饒州嶤山和尚長慶問從上宗乘此間如何言論師曰有願不負先聖長慶曰不負先聖作麼生師曰不露長慶曰恁麼則請師領話師曰甚麼處去來長慶曰祇守甚麼處去來國歡文矩禪師長慶安法嗣泉州國歡崇福院文矩慧日禪師福州黃氏子生而有異及長為縣獄卒每每棄役往神光觀和尚及西院安禪師所吏不能禁後謁萬歲塔譚空禪師落髮不披袈裟不受具戒唯以雜綵為挂子復至神光神光曰我非汝師汝禮西院去師擕一小青竹杖入西院法堂西院遙見笑曰入涅槃堂去師應諾輪竹杖而入時有五百許僧染時疾師以杖次第點之各隨點而起台州浮江和尚長慶安法嗣台州浮江和尚雪峯領眾到問即今有二百人寄此過夏得麼師將拄杖畫一畫著不得即道雪峯休去文殊圓明禪師長慶安法嗣廣州文殊院圓明禪師福州陳氏子參大溈得旨後造雪峯請益法無異味嘗遊五臺山覩文殊化現乃隨方建院以文殊為額開寶中樞密使李崇矩巡護南方因入院覩地藏菩薩像問僧地藏何以展手僧曰手中珠被賊偷却也崇矩却問師既是地藏為甚麼遭賊師曰今日捉下也崇矩禮謝之嚴陽善信尊者趙州諗法嗣洪州新興嚴陽尊者諱善信初參趙州問一物不將來時如何趙州曰放下着師曰既是一物不將來放下箇甚麼趙州曰放不下擔取去師於言下大悟師常有一蛇一虎隨從手中與食黃龍南頌云一物不將來兩肩擔不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己光陰幾百年清風猶未已住後僧問如何是佛師曰土塊曰如何是法師曰地動也曰如何是僧師曰喫粥喫飯問如何是新興水師曰面前江裏徑山杲云似這般法門却似兒戲相似入得這般法門方安樂得人如真淨和尚拈提古今不在雪竇之下而末流傳習却成惡口小家只管問古人作麼生真如又如何下語楊岐又如何下語你管得許多閒事瘥病不假驢䭾藥若是對病與藥籬根拾得一莖草便可療病說甚麼朱砂附子人參白朮光孝慧覺禪師趙州諗法嗣揚州光孝院慧覺禪師問相國宋齊丘曰還會道麼齊丘曰若是道也著不得師曰是有著不得是無著不得齊丘曰總不恁麼師曰著不得底聻齊丘無對師到崇壽法眼問近離甚處師曰趙州法眼曰承聞趙州有庭前栢樹子話是否師曰無法眼曰往來皆謂僧問如何是祖師西來意趙州曰庭前栢樹子上座何得言無師曰先師實無此語和尚莫謗先師好徑山杲云若道有此語蹉過覺鐵觜若道無此語又蹉過法眼若兩邊俱不涉又蹉過趙州直饒總不恁麼別有透脫一路入地獄如箭射鼓山珪云覺鐵觜名不虗得只是不曾夢見趙州楚石琦云祖師西來意庭前栢樹子此話已徧行天下了也因甚麼覺鐵觜却道先師無此語眾中往往商量趙州只是一期方便不可作實解所以道無與麼亂統謗他古佛不少妙喜云若道有此語蹉過覺鐵觜若道無此語又蹉過法眼若道兩邊俱不涉又蹉過趙州今日烟波無可釣不須新月更為鈎俗士問某甲平生殺牛還有罪否師曰無罪曰為甚麼無罪師曰殺一箇還一箇木陳從朗禪師趙州諗法嗣婺州木陳從朗禪師因金剛倒僧問既是金剛不壞身為甚麼却倒地師敲禪牀曰行住坐臥杭州多福和尚趙州諗法嗣杭州多福和尚僧問如何是多福一叢竹師曰一莖兩莖斜曰學人不會師曰三莖四莖曲徑山杲云饒汝一莖兩莖斜三莖四莖曲還我多福一叢竹又如何話會益州西睦和尚趙州諗法嗣益州西睦和尚上堂有俗士舉手曰和尚便是一頭驢師曰老僧被汝騎俗士無語去後三日再來白言某甲三日前著賊師拈杖趂出雪竇常通禪師長沙岑法嗣明州雪竇常通禪師邢州李氏子參長沙長沙問何處人師曰邢州人長沙曰我道汝不從彼來師曰和尚還曾住此否長沙然之乃容入室台州勝光和尚子湖蹤法嗣台州勝光和尚龍華照和尚來師把住曰作麼生龍華曰莫錯師乃放手龍華曰久嚮勝光師默然龍華乃辭師門送曰自此一別甚麼處相見龍華呵呵而去日容遠和尚子湖蹤法嗣日容遠和尚因奯上座參師拊掌三下曰猛虎當軒誰是敵者奯曰俊沖天阿誰捉得師曰彼此難當奯曰且休未要斷這公案師將拄杖舞歸方丈奯無語師曰死却這漢也昭覺勤云力敵勢均不妨好頭對眼親手辨彼此沒便宜下梢可惜放過待他將拄杖作舞歸方丈便好與撫掌三下拂袖便行非唯頭尾完全亦免遭人指註雖然如是奯公無語還可轉側也無為言侵早起更有夜行人大溈智云強中更有強中手天下元無第一人還知麼伎倆全無波旬失途到這裏無你解會處自檢點看襄州道吾和尚關南常法嗣襄州關南道吾和尚始經村墅聞巫者樂神云識神無忽然省悟後參常禪師印其所解復遊德山之門法味彌著師凡上堂戴蓮華笠披襴執簡擊鼓吹笛口稱魯三郎神識神不識神神從空裏來却往空裏去便下座有時曰打動關南鼓唱起德山歌僧問如何是祖師西來意師以簡揖曰喏有時執木劒橫肩上作舞僧問手中劒甚處得來師擲於地僧却置師手中師曰甚處得來僧無對師曰容汝三日內下取一轉語其僧亦無對師自代拈劒橫肩上作舞曰須恁麼始得趙州訪師師乃著豹皮裩執吉獠棒在三門下翹一足等候纔見趙州便高聲唱喏而立趙州曰小心祇候著師又唱喏一聲而去問如何是和尚家風師下禪牀作女人拜曰謝子遠來無可祗待問灌溪作麼生灌溪曰無位師曰莫同虗空麼灌溪曰這屠兒師曰有生可殺即不倦漳州羅漢和尚關南常法嗣漳州羅漢和尚初參關南問如何是大道之源關南打師一拳師遂有省乃為歌曰咸通七載初參道到處逢言不識言心裏疑團若栲栳三春不樂止林泉忽遇法王氈上坐便陳疑懇向師前師從氈上那伽起袒膊當胸打一拳駭散疑團獦狚落舉頭看見日初圓從茲蹬蹬以碣碣直至如今常快活只聞肚裏飽膨脝更不東西去持鉢徑山杲云可惜這一拳分付不着人末山尼了然禪師高安愚法嗣瑞州末山尼了然禪師因灌谿閑和尚到曰若相當即住不然即推倒禪牀便入堂內師遣侍者問上座遊山來為佛法來灌谿曰為佛法來師乃升座灌谿上參師問上座今日離何處曰路口師曰何不葢却灌溪無對末山代云爭得到這裏始禮拜問如何是末山師曰不露頂曰如何是末山主師曰非男女相灌溪乃喝曰何不變去師曰不是神不是鬼變箇甚麼灌溪於是伏膺作園頭三載昭覺勤云或有人問山僧如何是末山一望不見如何是末山主可與佛祖為師何不變去上座自變擬議不來劈脊便棒且道末山是蔣山是當機無向背擬議隔千山天童覺云非男女之相出有無之量透萬機之前超三界之上窮而通簡而當松含風而夜寒溪帶雨而春漲僧到參師曰太縷生曰雖然如此且是師子兒師曰既是師子兒為甚麼被文殊騎僧無對金華俱胝和尚天龍法嗣婺州金華山俱胝和尚初住庵時有尼名實際來戴笠子執錫遶師三匝曰道得即下笠子如是三問師皆無對尼便去師曰日勢稍晚何不且住尼曰道得即住師又無對尼去後師歎曰我雖處丈夫之形而無丈夫之氣不如棄庵往諸方參尋知識去其夜山神告曰不須離此將有肉身菩薩來為和尚說法也逾旬果天龍和尚到庵師乃迎禮具陳前事天龍竪一指示之師當下大悟自此凡有學者參問師唯舉一指無別提唱有一供過童子每見人問事亦竪指祗對人謂師曰和尚童子亦會佛法凡有問皆如和尚竪指師一日潛袖刀子問童子曰聞你會佛法是否童子曰是師曰如何是佛童子竪起指頭師以刀斷其指童子呌喚走出師召童子童子回首師曰如何是佛童子舉手不見指頭豁然大悟師將順世謂眾曰吾得天龍一指頭禪一生用不盡言訖示滅長慶稜代眾云美食不中飽人喫玄沙備云我當時若見拗折指頭報慈遂云且道玄沙恁麼道意作麼生雲居錫云祇如玄沙恁麼道肯伊不肯伊若肯何言拗折指頭若不肯俱胝過在甚麼處曹山寂云俱胝承當處鹵莾祇認得一機一境一等是拍手拊掌是他西園奇恠報慈又云且道俱胝還悟也無若悟為甚麼道承當處鹵莾若不悟又道用一指頭禪不盡且道曹山意在甚麼處瑯琊覺頌云俱胝一指報君知朝生子搏天飛若無舉鼎山力千里烏騅不易騎徑山杲云俱胝和尚若不得瑯琊為伊出氣幾乎埋沒了這一指頭禪妙喜既恁麼舉不免隨後也有箇註脚俱胝一指頭喫飯飽方休腰纏十萬貫騎鶴上楊州靈隱嶽云且道如何是一指頭禪乃豎起拂子云見麼若也見得可以與俱胝把手共行脫或未然新薦福不免重說偈言一着高一着一步闊一步坐斷佛祖關迷却來時路南嶽下五世陳操尚書陳尊宿法嗣睦州刺史陳操尚書齋次拈起餬餅問僧江西湖南還有這箇麼曰尚書適來喫箇甚麼公曰敲鐘謝響又齋僧次躬自行餅一僧展手擬接公却縮手僧無語公曰果然果然問僧有箇事與上座商量得麼曰合取狗口公自摑口曰某甲罪過曰知過必改公曰恁麼則乞上座口喫飯得麼又齋僧自行食次乃曰上座施食僧曰三德六味公曰錯僧無對又與僚屬登樓次見數僧行來有一官人曰來者總是行脚僧公曰不是曰焉知不是公曰待來勘過須臾僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道
