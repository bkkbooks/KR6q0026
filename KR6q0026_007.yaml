承天大宗云布縵天網須是雪峯深入虎穴還他三聖衆中有般漢商量道雪峯在網內三聖在網外苦哉苦哉深屈古人若非此二員作家不能橫行天下徑山杲云一人粗似丘山一人細如米粖雖然粗細不同稱來輕重恰好徑山今日真實告報汝等諸人切忌鑽龜打瓦天童華云若謂二俱作家未具透關眼在且道歸宗恁麼說話還見二老落處也無諸人若辨得出歸宗性命在諸人手裏若辨不出諸人性命在歸宗手裏楚石琦云透網金鱗以何為食待汝出網來却向汝道衝開碧落松千丈截斷紅塵水一溪笑巖寶云這雪峯老漢龍頭蛇尾待三聖云一千五百人善知識話頭也不識但只向伊道與麼則不虛為臨濟兒孫待伊眼目定動劈脊便毆上堂盡大地是箇解脫門把手拽伊不肯入時一僧出曰和尚怪某甲不得又一僧曰用入作甚麼師便打雪竇顯云三箇中有一人受救在忽若總不辨明平地上有甚數玄沙謂師曰某甲如今大用去和尚作麼生師將三箇木毬一時拋出玄沙作斫牌勢師曰你親在靈山方得如此玄沙曰也是自家事徑山杲云祇許老胡知不許老胡會一日升座衆集定師輥出木毬玄沙遂捉來安舊處白雲端云此箇時節衆中皆言子父共作一大事如此見解還夢見也未海會今日布施諸人乃云濃研香翰深蘸紫毫師一日在僧堂內燒火閉却前後門乃呌曰救火救火玄沙將一片柴從窗櫺中拋入師便開門問古㵎寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧舉似趙州趙州曰不從口入不可從鼻孔裏入僧却問古㵎寒泉時如何趙州曰苦曰飲者如何趙州曰死師聞得乃曰趙州古佛遙望作禮自此不答話雪竇顯云衆中總云雪峯不出這僧問頭所以趙州不肯如斯話會深屈古人雪竇即不然斬釘截鐵本分宗師就下平高難為作者浮山遠云趙州不因這僧爭得與雪峯相見雪峯不得趙州爭能圓得此話大小雪竇刺腦入膠盆薦福懷云諸仁者作麼生會不答話底道理讚歎趙州即不無還知趙州一片玉瑕生麼若人檢點得出相如不誑於秦主五祖演舉了云若有人問五祖古㵎寒泉時如何老僧只向他道水飲者如何但云當下止渴或有箇漢出來問道與曹溪水是一是二只向他道分枝列派縱橫自在低處澆田高處潑菜長蘆夫云扶竪宗乘須還大匠雪峯有一千五百人善知識身心趙州用一百二十歲手段不妨奇怪如今衆中隨言定旨亂作褒貶深屈古人然則相席打令自有知音鏤骨銘心罕逢明鑒徑山杲云雪峯不答話疑殺天下人趙州道苦面赤不如語直若是妙喜則不然古㵎寒泉時如何到江扶櫓棹出嶽濟民田飲者如何清涼肺腑此語有兩負門若人辨得許你有參學眼楚石琦云妙喜老人可謂人平不語水平不流恕中慍云杲日升天宿雲解駁陽春回律枯枿萌芽直得長空皎皎萬彙若是覆盆之下朽腐之餘又爭怪得這僧當面蹉過纍他雪峯趙州輥入草窠裏雪竇浮山可謂入理深談互相擎展要且只能委曲不能直截今日有問古㵎寒泉時如何蟻子擎天柱飲者如何藕絲掛須彌且道與古人是同是別徑山信云雪峯老老大大未免隨人起倒趙州若無這僧何處得見雪峯雙髻今日將二老縛作一束拋在春風堆裏任他花開花落還有人與二老雪屈者麼頌云五里一箇亭十里一箇鋪方便有多岐出門不認貨雪峯老何處討烟波江上釣魚舟夾岸荻花秋正好殘更不必著精神伸腳莫愁天地杳師因閩王封柑橘各一顆遣使送至柬問既是一般顏色為甚名字不同師遂依舊封回王復馳問玄沙玄沙將一張紙蓋却問僧近離甚處曰覆船師曰生死海未渡為甚麼覆却船僧無語乃回舉似覆船覆船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事雪竇顯向為甚覆船處代云久嚮雪峯待老漢擬議拂袖便行又於末後著語云能區能別能殺能活若也辨得天下橫行昭覺勤云雪峯有驗人句覆船有透關眼雪竇有陷虎機且道崇寧成得箇什麼邊事徑山杲云作家宗師天然有在然雖如是也是作賊人心虗是則不干這僧事二十棒何須自喫當時但添打覆船便了且道渠過在什麼處老老大大不合與人代語楚石琦云覆船道渠無生死還契得雪峯意麼若契得雪峯意為什麼道我有二十棒寄打覆船二十棒老僧自喫會麼這裏若會便見妙喜道作賊人心虗勘破雪峯了也是則不干這僧事二十棒何須自喫但更添二十棒只打覆船便了你道妙喜還有過也無頭上著枷腳下著杻問拈槌竪拂不當宗乘未審和尚如何師竪起拂子僧乃抱頭出去師不顧法眼益代云大衆看此一員戰將師謂鏡清曰古來有老宿引官人巡堂曰此一衆盡是學佛法僧官人曰金屑雖貴又作麼生老宿無對鏡清代曰比來拋甎引玉法眼益別云官人何得貴耳賤目普請次路逢一獼猴師曰人人有一面古鏡這箇獼猴亦有一面古鏡三聖曰曠劫無名何以彰為古鏡師曰瑕生也三聖曰這老漢著甚麼死急話頭也不識師曰老僧住持事繁雪竇顯云好與二十棒這棒放過也好免見將錯就錯師於僧堂前坐衆集師拈拄杖曰這箇為中下根人時有僧問忽遇上上人來時如何師拈起拄杖雲門偃云我不似雪峯打破狼籍僧便問未審和尚如何師便打護國元云宗師家有擒有縱有殺有活若是蛇頭上揩癢南明又且不然驀拈拄杖云我這裏為中下機人忽有人問上上機人來時如何只向道我不似雲門打葛藤閩帥施銀交牀僧問和尚受大王如此供養將何報答師以手拓地曰輕打我輕打我僧問踈山仁云雪峯道輕打我意作麼生踈山云頭上插瓜虀埀尾腳跟齊上堂我若東道西道汝則尋言逐句我若羚羊挂角汝向甚麼處捫摸僧問保福展祇如雪峰有甚麼言教便似羚羊挂角時保福云我不可作雪峯弟子不得師曰飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死漢水裏沒頭浸渴死漢雲門云通身是飯通身是水感潭資國禪師德山鑒法嗣洪州感潭資國禪師白兆問家內停喪請師慰問師曰苦痛蒼天曰死却爺死却娘師打了趂出師凡接機皆如此瑞龍慧恭禪師德山鑒法嗣天台瑞龍慧恭禪師福州羅氏子謁德山德山問會麼曰作麼德山曰請相見曰識麼德山大笑遂許入室洎德山順世乃開法焉泉州瓦棺和尚德山鑒法嗣泉州瓦棺和尚在德山為侍者一日同入山斫木德山將一碗水與師師接得便喫却德山曰會麼師曰不會德山又將一碗水與師師又接喫却德山曰會麼師曰不會德山曰何不成褫取不會底師曰不會又成禠箇甚麼德山曰子大似箇鐵橛後雪峰訪師茶話次雪峰問當時在德山斫木因緣作麼生師曰先師當時肯我雪峰曰和尚離師太早時面前偶有一碗水雪峰曰將水來師便度與雪峰接得便潑却雲門偃云莫壓良為賤高亭簡禪師德山鑒法嗣襄州高亭簡禪師參德山隔江才見便曰不審德山乃搖扇招之師忽開悟乃橫趨而去更不回顧徑山杲云高亭橫趨而去許伊是箇伶俐師僧若要法嗣德山則未可何故猶與德山隔江在楚石琦云如今衆中商量道高亭見德山不與他說話便去所以妙喜道猶與德山隔江在還曾夢見高亭麼拈起拄杖云便好喚回與一頓且道是賞伊是罰伊南嶽下六世瑞巖師彥禪師巖頭奯法嗣台州瑞巖師彥禪師閩之許氏子初禮巖頭問曰如何是本常理巖頭曰動也曰動時如何巖頭曰不是本常理師良久巖頭曰肯即未脫根塵不肯即永沈生死師遂領悟便禮拜巖頭每與語徵酬無忒後謁夾山夾山問甚處來曰臥龍來夾山曰來時龍還起也未師乃顧視之夾山曰灸瘡瘢上更著艾燋曰和尚又苦如此作甚麼夾山休去溈山云瑞巖雖然威獰訴爭奈夾山水清不容徑山杲云若不藍田射石虎幾乎誤殺李將軍師又問夾山與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道夾山曰老僧謾闍黎去也師喝曰這老和尚而今是甚時節便出去後有僧舉似巖頭巖頭云苦哉將我一枝佛法與麼流將去師尋居丹丘瑞巖坐磐石終日如愚每自喚主人公復應諾乃曰惺惺著他後莫受人謾後有僧參玄沙備玄沙問近離甚處云瑞巖玄沙云有何言句示徒僧舉前話玄沙云一等是弄精魂也甚奇怪乃云何不且在彼住云已遷化也玄沙云而今還喚得應麼僧無對雪竇顯云蒼天蒼天保寧勇云和尚為什麼對面不聞雲居元云天下宗師總為這僧下語大似東家人死西家人助哀直饒瑞巖自出頭來也是棺木裏瞪眼昭覺勤云百丈寒潭徹底月在波心千尺巖松倚天風生幽谷直得凜凜孤標澄澄丰采及至月離碧潭影在雲衢遂乃當面蹉過當時若是箇漢待伊道即今還喚得應麼直下便喝非唯把斷玄沙要津亦乃與瑞巖老子出氣鏡清問天不能覆地不能載豈不是師曰若是即被覆載鏡清曰若不是瑞巖幾遭也師自稱曰師彥羅山道間禪師巖頭奯法嗣福州羅山道間禪師長溪陳氏子謁石霜問曰起滅不停時如何石霜曰直須寒灰枯木去一念萬年去函蓋相應去全清絶點去師不契却往巖頭處如前問巖頭喝曰是誰起滅師於此有省師在禾山送同行矩長老出門次把拄杖向面前一攛矩無對師曰石牛攔古路一馬生雙駒後僧舉似疏山仁疏山云石牛攔古路一馬生三寅僧辭保福保福問甚處去曰禮拜羅山保福曰汝向羅山道保福秋間上府朝覲大王置四十箇問頭問和尚忽若一句不相當莫言不道僧舉似師師呵呵大笑曰陳老師自入福建道洪塘橋下一寨未曾見有箇毛頭星現汝與我向從展道陳老師無許多問頭祇有一口劒一劒下須有分身之意亦有出身之路若不明便須成末僧回舉似保福保福曰我當時也祇是謔伊至秋朝覲師特為辦茶筵請保福保福不赴却向僧曰我中間曾有謔語恐和尚問著僧歸舉似師曰汝向他道猛虎終不食伏肉僧又去保福遂來無軫上座問祇如巖頭道洞山好佛祇是無光未審洞山有何虧闕便道無光師召無軫無軫應諾師曰灼然好箇佛祇是無光曰大師為甚麼撥無軫話師曰甚麼處是陳老師撥你話處快道快道無軫無語師打三十棒趂出無軫舉似招慶招慶一夏罵詈至夏末自來問師乃分明舉似招慶便作禮懺悔曰洎錯怪大師玄沙師備禪師雪峯存法嗣福州玄沙師備宗一禪師閩之謝氏子與雪峯本法門昆仲而親近若師資雪峯以其苦行呼為頭陀一日雪峰問那箇是備頭陀師曰終不敢誑於人異日雪峰召曰備頭陀何不遍參去師曰達磨不來東土二祖不往西天雪峰然之暨登象骨山乃與師同力締搆玄徒臻萃師入室咨決罔替晨昏又閲楞嚴發明心地由是應機敏捷至與雪峰徵詰亦當仁不讓雪峰曰備頭陀再來人也雪峰上堂要會此事猶如古鏡當臺胡來胡現漢來漢現師出衆曰忽遇明鏡來時如何雪峰曰胡漢俱隱師曰老和尚腳跟猶未點地在明招謙云當與麼時莫道胡漢俱隱別作麼生道師破明招云喪也琅琊覺云不見道驗人端的處下口便知音師因參次聞燕子聲乃曰深談實相善說法要便下座鼓山來師作一圓相示之鼓山曰人人出這箇不得師曰情知汝向驢胎馬腹裏作活計鼓山曰和尚又作麼生師曰人人出這箇不得鼓山曰和尚與麼道却得某甲為甚麼道不得師曰我得汝不得昭覺勤云灼然這一條路作者方知直得窮天地亘萬古而不移消劫石空芥城而無盡便是透關底也須著眼始得一等是恁麼時節為什麼我得汝不得切忌向驢胎馬腹裏作活計淨因成云叢林中往往作鼓山未到玄沙境界會却諸人要識玄沙鼓山麼不見道盡出這箇不得南華昺云捩轉鼻孔換却眼睛若無這箇手段如何扶豎宗乘雖然如是直是好笑笑須三十年且道笑箇什麼情知汝在驢胎馬腹裏作活計東禪觀云某甲當時若作鼓山待玄沙道人人出這箇不得即云和尚元來別有長處不圖成就前功且要與玄沙向驢胎馬腹裏相見師嘗訪三斗庵主才相見庵主曰莫怪住山年深無坐具師曰人人盡有庵主為甚麼無庵主曰且坐喫茶師曰庵主元來有在侍雪峰次有二僧從階下過雪峰曰此二人堪為種草師曰某甲不與麼雪峰曰汝作麼生師曰便好與三十棒因雪峰指火曰三世諸佛在火焰裏轉大法輪師曰近日王令稍嚴雪峰曰作麼生師曰不許攙奪行市南際到雪峰雪峰令訪師師問古人道此事唯我能知長老作麼生南際曰須知有不求知者歸宗柔別拊掌三下師曰山頭和尚喫許多辛苦作麼大溈真如舉此云玄沙恁麼道大溈恁麼舉不得動著何故如擊塗毒鼓遠近聞皆喪雪峰普請畬田次見一蛇以杖挑起召衆曰看看以刀芟為兩段師以杖拋於背後更不顧視衆愕然雪峰曰俊哉天奇瑞云當央捧出仁義之心拋向背後衲子之英事到其間不得不然舉拂子作釣魚勢云看看復噓云新月掛蘿沉玉釣幾回空泛小舟歸侍雪峰遊山次雪峰指面前地曰這一片地好造箇無縫塔師曰高多少雪峯乃顧視上下師曰人天福報即不無和尚若是靈山授記未夢見在雪峯曰你又作麼生師曰七尺八尺琅琊覺云國清才子貴家富小兒嬌雪峰曰世界闊一尺古鏡闊一尺世界闊一丈古鏡闊一丈師指火爐曰火爐闊多少雪峯曰如古鏡闊師曰老和尚腳跟未點地在鏡清怤問僧為復古鏡致火爐與麼闊火爐致古鏡與麼大西院明云與麼問人也未可在雲門偃云餿飯泥茶爐元叟端云古鏡即是火爐火爐即是古鏡不是雪峯老漢爭得頭正尾正鷲峯今日忽有人問火爐闊多少只向道隨家豐儉天奇瑞云大衆且道世界誰世界古鏡誰古鏡不可逐境打做兩截豎起拄杖云這是世界這是古鏡若然直下承當坐斷雪峯玄沙大丈夫切忌鬼窟裏虛淹歲月閩王送師上船師扣船召曰大王爭能出得這裏去王曰在裏許得多少時也歸宗柔別云不因和尚不得到這裏師問文桶頭下山幾時歸曰三五日師曰歸時有無底桶子將一擔歸文無對歸宗柔代云和尚用作甚麼師垂語曰諸方老宿盡道接物利生祇如三種病人汝作麼生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得若接不得佛法無靈驗時有僧出曰三種病人還許學人商量否師曰許汝作麼生商量其僧珍重出師曰不是不是羅漢曰桂琛現有眼耳口和尚作麼生接師曰慚愧便歸方丈中塔曰三種病人即今在甚麼處又一僧曰非唯謾他兼亦自謾雲門偃因僧請益雲門云汝禮拜著僧拜起雲門以拄杖挃之僧乃退後雲門云汝不是患盲復喚近前來僧才近前雲門云汝不是患聾雲門云還會麼僧云不會雲門云汝不是患啞其僧於是有省法眼益云我當時見羅漢上座舉此話我便會三種病人雲居元云地藏如龍無角似蛇有足玄沙只有先鋒且無殿後兩人病在膏肓針藥之所不到山僧為你諸人點破拈拄杖云棒頭有眼明如日要識真金火裏看雪竇顯舉了便喝云這盲聾瘖啞漢若不是雲門驢年去如今有底或拈椎豎拂他又不管教伊近前他又不來問還會麼他又不應諸方還奈何得麼雪竇若不奈何汝這一隊驢漢又堪作什麼以拄杖一時趂散本覺一云雲門雪竇也是因風吹火見兔放鷹爭如地藏逆水之波當時聞玄沙恁麼道便出衆云某甲有眼有耳有口請師接玄沙云慙愧便乃呵呵大笑非但玄沙盡西天此土諸佛諸祖被這一拶不免退身有分驀拈拄杖云放過則不可龍門遠云好兄弟還知真實相為麼今日不惜眉毛為諸人說破只如諸人有雙眼又何曾見來有雙耳又何曾聞來有片舌又何曾說來既無說無聞無見何處有色聲香味事雖然如是能有幾人到這般田地徑山杲云這僧雖然悟去只悟得雲門禪若是玄沙禪更買草鞋行腳天童華云雲門平展這僧實酬且道什麼處是這僧悟處不救之疾難為針艾楚石琦云玄沙雲門氣急殺人彼自無瘡勿傷之也長慶來師問除却藥忌作麼生道長慶曰放憨作麼師曰雪峰山橡子拾食來這裏兒放糞普請斫柴次見一虎天龍曰和尚虎師曰是汝虎歸院後天龍問適來見虎云是汝未審尊意如何師曰娑婆世界有四種極重事若人透得不妨出得陰界東禪齊云上座古人見了道我身心如大地虗空如今人還透得麼徑山杲代云也知和尚為人切笑巖寶云於今這裏虎也無面前端的是箇什麼若辨得出許你與人天為師師問長生維摩觀佛前際不來後際不去今則無住汝作麼生觀長生曰放皎然過有箇道處師曰放汝過作麼生道長生良久師曰教阿誰委悉長生曰徒勞側耳師曰情知汝向鬼窟裏作活計崇壽稠別長生云喚甚麼作如來問古人皆以瞬視接人未審和尚以何接人師曰我不以瞬視接人曰學人為甚道不得師曰畐塞汝口爭解道得法眼益云古人恁麼道甚奇特且問上座口是甚麼問承古有言舉足下足無非道場如何是道場師曰沒却你曰為甚麼得恁麼難見師曰祇為太近法眼益云也無可得近直下是上座師在雪峰時光侍者謂師曰師叔若學得禪某甲打鐵船下海去師住後問光曰打得鐵船也未光無對法眼益代云和尚終不與麼清涼欽代云請和尚下船支提愛云玄沙也是貧人思舊債汾陽昭云只見錐頭利不見鑿頭方雲居元云禪也未曾參得何用思量舊事忽然被他撐動鐵船玄沙堪作什麼師一日遣僧送書上雪峰雪峰開緘見白紙三幅問僧會麼曰不會雪峰曰不見道君子千里同風僧回舉似師曰山頭老漢蹉過也不知曰和尚如何師曰孟春猶寒也不解道明招謙云玄沙三幅白紙爭奈文彩已彰雪峯千里同風何故不知蹉過不見道養子莫教大大了作家賊五祖戒出語云將謂胡鬚赤黃龍南云雪峯不道無長處既被玄沙識破直至如今雪不出問鏡清教中道不見一法為大過患且道不見甚麼法鏡清指露柱曰莫是不見這箇法麼同安顯別云也知和尚不造次師曰浙中清水白米從汝喫佛法未會在雪竇顯云大小鏡清被玄沙熱謾我當時若見但向道靈山授記也未到如此溈山云若不是鏡清幾乎忘前失後何故不逢別者終不開拳天童華云鏡清放頑佛祖也不奈何若非玄沙深辨來風幾被露柱吞却有人辨得出妙嚴兩手分付問承和尚有言盡十方世界是一顆明珠學人如何得會師曰盡十方世界是一顆明珠用會作麼僧便休師來日却問其僧盡十方世界是一顆明珠汝作麼生會曰盡十方世界是一顆明珠用會作麼師曰知汝向鬼窟裏作活計報慈遂云一般恁麼道為甚麼却成鬼窟去韋監軍來謁乃曰曹山和尚甚奇怪師曰撫州取曹山幾里韋指傍僧曰上座曾到曹山否曰曾到韋曰撫州取曹山幾里曰百二十里韋曰恁麼則上座不到曹山韋却起禮拜師曰監軍却須禮此僧此僧却具慚愧雲居錫云甚麼處是此僧具慙愧若檢得出許上座有行腳眼承天宗云這僧可悲可痛直饒玄沙具金剛眼睛蹉過韋監軍了也問如何是清淨法身師曰膿滴滴地問如何是親切底事師曰我是謝三郎西天有聲明三藏至閩帥請師辨驗師以鐵火筯敲銅爐問是甚麼聲三藏曰銅鐵聲法眼益別云請大師為大王清涼欽云聽和尚問師曰大王莫受外國人謾三藏無對雪竇顯別云大王宜加信敬又別三藏云莫謾外國人法眼益代云大師久受大王供養清涼欽代云却是和尚謾大王淨因成云既不是銅鐵聲玄沙喚作什麼聲然則三藏只知度水不覺濕衣玄沙偏解誣人爭奈國有憲章且道三藏謾大王何似玄沙謾大王天童覺云理契則神貧子獲衣中之寶情封則物力士失額上之珠三藏只解瞻前不能顧後還知麼誣人之罪以罪加之高峯妙云大小玄沙能所未忘當時賴遇是劉大王若撞著箇本分衲僧管取一場漏逗師南遊莆田縣排百戲迎接來日師問小塘長老昨日許多喧閙向甚處去也小塘提起衲衣角師曰料掉沒交涉法眼益別云昨日有多少喧閙清涼欽別云今日更好笑溈山云大溈則不然忽有問遂鳴指一下如有箇衲子出來云料掉沒交涉却肯他何故大丈夫漢捋虎鬚也是本分且道利害在甚處黃龍新云奇怪諸禪德扶豎宗乘須是小塘長老始得玄沙為什麼道料掉沒交涉我即不然昨日許多喧閙向什麼處去天共白雲曉水和明月流昭覺勤云或有問山僧只向道又是從頭起他若道料掉沒交涉劈脊便棒何故曹溪波浪如相似無限平人被陸沉南華昺云玄沙恁麼道還有得失是非也無若謂有當人未具眼在若謂無因甚麼道料掉沒交涉還會麼是非已去了是非裏薦取師示衆曰世尊道吾有正法眼藏付囑摩訶大迦葉猶如畫月曹溪豎拂猶如指月時鼓山出衆曰月聻師曰這箇阿師就我覓月鼓山不肯却歸衆曰道我就他覓月雪竇顯云玄沙與鼓山如排百萬大陳祇拋瓦礫相擊或有衲僧辨得當知正法眼藏付囑有在護國元云玄沙鼓山各說道理要且未識月在諸人要識月麼幸無偏照處剛有未明人問僧乾闥婆城汝作麼生會曰如夢如幻法眼益別敲物示之師與地藏在方丈說話夜深侍者閉却門師曰門總閉了汝作麼生得出去地藏曰喚甚麼作門清涼欽別云和尚莫欲歇去師以杖拄地問長生曰僧見俗見男見女見汝作麼生見曰和尚還見皎然見處麼師曰相識滿天下師舉志公曰每日拈香擇火不知身是道場乃曰每日拈香擇火不知真箇道場報慈遂云祇如此二尊宿語還有親踈也無師與韋監軍喫果子韋問如何是日用而不知師拈起果子曰喫韋喫果子了再問師曰祇這是日用而不知師問明真大師善財參彌勒彌勒指歸文殊文殊指歸佛處汝道佛指歸甚麼處曰不知師曰情知汝不知法眼益別云喚甚麼作佛大普玄通到禮覲師曰你在彼住莫誑惑人家男女曰玄通祇是開箇供養門晚來朝去爭敢作恁麼事師曰事難曰真情是難師曰甚麼處是難處曰為伊不肯承當師便入方丈拄却門泉守王公請師登樓先語客司曰待我引大師到樓前便舁却梯客司稟旨公曰請大師登樓師視樓復視其人乃曰佛法不是此道理法眼益云未舁梯時日幾度登樓師與泉守在室中說話有一沙彌揭簾入見却退步而出師曰那沙彌好與二十拄杖泉守曰恁麼即某甲罪過同安顯別云祖師來也師曰佛法不是恁麼鏡清怤云不為打水有僧問不為打水意作麼生鏡清云青山碾為塵敢保沒間人長慶慧稜禪師雪峯存法嗣福州長慶慧稜禪師杭州鹽官人也姓孫氏歷參禪苑後參靈雲問如何是佛法大意靈雲曰驢事未去馬事到來師如是往來雪峰玄沙二十年間坐破七箇蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我解何宗拈起拂子劈口打雪峯舉謂玄沙曰此子徹去也玄沙曰未可此是意識著述更須勘過始得至晚衆僧上來問訊雪峰謂師曰備頭陀未肯汝在汝實有正悟對衆舉來師又有頌曰萬象之中獨露身唯人自肯乃方親昔時謬向途中覓今日看來火裏冰雪峯乃顧玄沙曰不可更是意識著述師問雪峰曰從上諸聖傳受一路請師垂示雪峯良久師設禮而退雪峯乃微笑師入方丈參雪峯曰是甚麼師曰今日天晴好普請師在西院問詵上座曰這裏有象骨山汝曾到麼曰不曾到師曰為甚麼不到曰自有本分事在師曰作麼生是上座本分事詵乃提起衲衣角師曰為當祇這箇別更有曰上座見箇甚麼師曰何得龍頭蛇尾保福辭歸雪峰謂師曰山頭和尚或問上座信作麼生祗對師曰不避腥羶亦有少許曰信道甚麼師曰教我分付阿誰曰從展雖有此語未必有恁麼事師曰若然者前程全自闍黎師與保福遊山保福問古人道妙峯山頂莫祇這箇便是也無師曰是即是可惜許僧問鼓山祇如長慶恁麼道意作麼生鼓山云孫公若無此語可謂髑髏遍野鏡清怤云若不是孫公便見髑髏遍野雪竇顯云今日共這漢遊山圖箇什麼復云百千年後不道全無祇是少鼓山晏云長慶若不與麼紅旗遍野白骨連山師來往雪峰二十九載天祐三年泉州刺史王延彬請住招慶開堂日公朝服趨隅曰請師說法師曰還聞麼公設拜師曰雖然如此恐有人不肯一日王太傅入院見方丈門閉問演侍者曰有人敢道太師在否演曰有人敢道太師不在否法眼益別云太傅識太師上堂總似今日老胡有望保福曰總似今日老胡絶望報慈遂云恁麼道是相見語不是相見語黃龍南云總似今日曹溪絶流天童覺云富嫌千口少貧恨一身多安國和尚得師號師去作賀出接師曰師號來邪曰來也師曰是甚麼號曰明真師乃展手曰甚麼處去來師曰幾不問過問古人有言相逢不拈出舉意便知有時如何師曰知有也未僧又問保福展保福云此是誰語云丹霞語保福云去莫妨我打睡師入僧堂舉起疏頭曰見即不見還見麼衆無對法眼益代云縱受得到別處亦不敢呈人師到羅山見製龕子以杖敲龕曰太煞預備羅山曰拙布置師曰還肯入也無羅山乃吽吽上堂淨潔打疊了也却近前問我覓我劈脊與你一棒有一棒到你你須生慚愧無一棒到你你又向甚麼處會雪竇顯云雪竇即不然淨潔打疊了也直須近前就我覓我劈脊與一棒有一棒到你你即受屈無一棒到你與你平出但與麼會黃龍清云長慶只知支離擁腫不知道之根源雪竇引蔓牽枝未免隨波逐浪寶峯則不然淨潔打疊了也近前來只向道會麼歸堂去雖然如是也須是仙陀婆始得師有時拈拄杖曰識得這箇一生參學事畢雲門偃云識得這箇為什麼不住靈巖安云恁麼住者喪我兒孫恁麼去者寒灰發焰然雖如是都未得勦絶在拈拄杖云識得這箇遂卓一下云敲出鳳凰五色髓擊碎驪龍明月珠問羚羊挂角時如何師曰草裏漢曰挂角後如何師曰亂呌喚曰畢竟如何師曰驢事未去馬事到來雪竇顯云寧可碎身如微塵終不瞎箇衆生眼長慶較些子復云一般漢設使𦏰羊未掛角也似萬里望鄉關天奇瑞云饑者易為食渴者易為飲尋逐機境枉分離坎空教覿面收放到底難憑信實不遇知音者徒勞話歲寒僧問如何是文彩未生時事師曰汝先舉我後舉其僧但立而已法眼益別云請和尚舉師曰汝作麼生舉曰某甲截舌有分保福遷化僧問保福拋却殼漏子向甚麼處去也師曰且道保福在那箇殼漏子裏法眼益別云那箇是保福殼漏子閩帥夫人崔氏奉道自稱練師遣使送衣物至曰練師令就大師請回信師曰傳語練師領取回信須臾使却來師前唱喏便回師明日入府練師曰昨日謝大師回信師曰却請昨日回信看練師展兩手帥問師曰練師適來呈信還愜大師意否師曰猶較些子法眼益別云這一轉語大王自道取曰未審大師意旨如何師良久帥曰不可思議大師佛法深遠保福從展禪師雪峯存法嗣漳州保福院從展禪師福州陳氏子年十五禮雪峰為受業師遊吳楚間後歸執侍雪峰一日忽召曰還會麼師欲近前雪峰以杖拄之師當下知歸嘗以古今方便詢于長慶一日長慶謂師曰寧說阿羅漢有三毒不可說如來有二種語不道如來無語祇是無二種語師曰作麼生是如來語長慶曰聾人爭得聞師曰情知和尚向第二頭道長慶曰汝又作麼生師曰喫茶去雲居錫云甚麼處是長慶向第二頭道處雪竇顯頌云頭兮第一第二臥龍不鑒止水無處有月波澄有處無風浪起稜禪客稜禪客三月禹門遭點額昭覺勤云如今人不去他古人轉處看只管去句下走便道長慶當時不便用所以落第二頭保福云喫茶去便是第一頭若只恁麼看到彌勒下生也不見古人意若是作家終不作這般見解跳出這窠窟向上自有一條路你若道聾人爭得聞有甚麼不是處保福云喫茶去有甚麼是處轉沒交涉是故道他參活句不參死句因舉盤山道光境俱亡復是何物洞山道光境未亡復是何物師曰據此二尊宿商量猶未得勦絶乃問長慶如今作麼生道得勦絶長慶良久師曰情知和尚向鬼窟裏作活計長慶却問作麼生師曰兩手扶犁水過膝雪竇顯云俱忘未忘總由我保福因什麼道未得勦絶灼然能有幾箇諸人又作麼生道免得長慶在鬼窟裏良久云柳絮隨風自西自東大溈秀云保福拈提頗有宗風及乎問著又却拖泥帶水光境何物且置俱忘未忘甚處得這消息長慶問見色便見心還見船子麼師曰見曰船子且置作麼生是心師却指船子歸宗柔別云和尚祇解問人雪峰上堂曰諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也師舉問鵝湖僧堂前相見即且置祇如望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈師低頭入僧堂雪竇顯云二老是即是只知雪峯放行不知雪峯把定忽有箇衲僧出問未審雪竇作麼生豈不是別機宜識休咎底漢還有烏石嶺望州亭底麼良久云擔板禪和如麻似粟上堂此事如擊石火似閃電光搆得搆不得未免喪身失命僧問未審搆得底人還免喪身失命也無師曰適來且置闍黎還搆得麼曰若搆不得未免大衆怪笑師曰作家作家曰是甚麼心行師曰一杓屎攔面潑也不知臭雪竇顯云諸上座保福有生擒虎兕底爪牙這僧也不易相敵雖然如此要且放過保福一著只如雪竇與大衆還許諸方檢責也無若免不得平地上死人無數其中有得活底麼乃拈起拄杖云來也來也護國元云能擒能縱能殺能活保福可謂作家手段本分鉗鎚這僧可惜許錯轉話