雪峰只因賣弄這一隻聖箭子勾賊破家若是咬定牙關誰敢無風起浪便是盡大地稻麻竹葦化作衲僧要勘鼓山也無啓口處天寧不是貶剝古人聖箭子是什麼廁草莖拋向垃圾堆頭著更問他折處且莫𡱰沸好保福簽瓜次師至保福曰道得與汝瓜喫師曰把將來保福度與一片師接得便去雪竇顯云雖是死蛇解弄也活誰是好手者試請辨看後歸維揚陳尚書留在宅供養一日謂尚書曰來日講一遍大涅槃經報答尚書尚書致齊茶畢師遂升座良久揮尺一下曰如是我聞乃召尚書尚書應諾師曰一時佛在便乃脫去南嶽惟徑禪師雪峯存法嗣南嶽般若惟徑寶聞禪師福州人也師雪峰而友玄沙深入玄奧一日問鑑上座聞汝注楞嚴是否鑑曰不敢師曰二文殊作麼生注曰請師鑑師乃揚袂而去南嶽下七世黃龍誨機禪師玄泉彥法嗣鄂州黃龍山誨機超慧禪師清河張氏子初參巖頭問如何是祖師西來意巖頭曰你還解救糍麼師曰解巖頭曰且救糍去後到玄泉問如何是祖師西來意玄泉拈起一莖皂角曰會麼師曰不會玄泉放下皂角作洗衣勢師便禮拜曰信知佛法無別玄泉曰你見甚麼道理師曰某甲曾問巖頭巖頭曰你還解救糍麼救糍也祇是解粘和尚提起皂角亦是解粘所以道無別玄泉呵呵大笑師遂有省明招德謙禪師羅山間法嗣明招德謙禪師受羅山印記激揚玄旨諸老宿皆畏其敏捷嘗到招慶指壁畫問僧那箇是甚麼神曰護法善神師曰會昌沙汰時向甚麼處去來僧無對師令僧問演侍者演曰汝甚麼劫中遭此難來僧回舉似師師曰直饒演上座他後聚一千衆有甚麼用處僧禮拜請別語師曰甚麼處去也到坦長老處坦曰夫參學一人所在亦須到半人所在亦須到師便問一人所在即不問作麼生是半人所在坦無對後令小師問師師曰汝欲識半人所在麼也祇是弄泥團漢清上座舉仰山插鍬話問師古人意在叉手處插鍬處師召清清應諾師曰還夢見仰山麼清曰不要上座下語祇要商量師曰若要商量堂頭自有一千五百人老師在又到雙巖雙巖請喫茶次曰某甲致一問若道得便捨院與闍黎住若道不得即不捨院遂舉金剛經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出且道此經是何人說師曰說與不說拈向這邊著祇如和尚決定喚甚麼作此經雙巖無對師又曰一切賢聖皆以無為法而有差別則以無為法為極則憑何而有差別祇如差別是過不是過若是過一切賢聖悉皆是過若不是過決定喚甚麼作差別雙巖亦無語師曰噫雪峰道底師訪保寧於中路相遇便問兄是道伴中人乃點鼻頭曰這箇礙塞我不徹與我拈却少時得麼保寧曰和尚有來多少時師曰噫洎賺我踏破一緉草鞋便回國泰代曰非但某甲諸佛亦不奈何師曰因甚麼以己方人師在婺州智者寺居第一座尋常不受淨水主事嗔曰上座不識觸淨為甚麼不受淨水師跳下牀提起淨瓶曰這箇是觸是淨主事無語師乃撲破西川定慧禪師羅山間法嗣西川定慧禪師初參羅山羅山問甚麼處來師曰遠離西蜀近發開元却近前問即今事作麼生羅山揖曰喫茶去師擬議羅山曰秋氣稍熱去師出至法堂歎曰我在西蜀峨嵋山腳下拾得一隻蓬蒿箭擬撥亂天下今日打羅山寨弓折箭盡也休休乃下參衆羅山來日上堂師出問豁開戶牖當軒者誰羅山便喝師無語羅山曰毛羽未備且去師因而摳衣久承印記後謁台州勝光勝光坐次師直入身邊叉手而立勝光問甚處來師曰猶待答話在便出勝光拈得拂子趂至僧堂前見師乃提起拂子曰闍黎喚這箇作甚麼師曰敢死喘氣勝光低頭歸方丈天竺義澄禪師羅山間法嗣䖍州天竺義澄常真禪師在羅山數載後因羅山示疾師問百年後忽有人問和尚以何指示羅山乃放身便倒師從此契悟即禮謝羅漢桂琛禪師玄沙備法嗣漳州羅漢院桂琛禪師常山李氏子登戒學毗尼一日為衆升臺宣戒本布薩已乃曰持戒但律身而已非真解脫也依文作解豈發聖智乎於是訪南宗初謁雲居雪峰參訊勤恪然猶未有所見後造玄沙一言啓發廓爾無惑玄沙問三界唯心汝作麼生會師指倚子曰和尚喚這箇作甚麼曰倚子師曰和尚不會三界唯心曰我喚這箇作竹木汝喚作甚麼師曰桂琛亦喚作竹木曰盡大地覓一箇會佛法底人不可得師自爾愈加激勵漳牧王公建精舍曰地藏請師開法後遷羅漢大闡玄要一日同中塔侍玄沙玄沙打中塔一棒曰就名就體中塔不對玄沙乃問師作麼生會師曰這僧著一棒不知來處僧報曰保福已遷化也師曰保福遷化地藏入塔僧問法眼益古人意旨如何法眼云蒼天蒼天保福僧到師問彼中佛法如何曰有時示衆道塞却你眼教你不見塞却你耳教你聽不聞坐却你意教你分別不得師曰吾問你不塞你眼見箇甚麼不塞你耳聞箇甚麼不坐你意作麼生分別東禪齊云那僧聞了忽然省去更不他遊上座如今還會麼若不會每日見箇甚麼徑山杲云富嫌千口少貧恨一身多請保福齊令人傳語曰請和尚慈悲降重保福曰慈悲為阿誰師曰和尚恁麼道渾是不慈悲問僧甚處來曰秦州師曰將得甚麼物來曰不將得物來師曰汝為甚麼對衆謾語其僧無對師却問秦州豈不是出鸚鵡曰鸚鵡出在隴西師曰也不較多溈山云這僧新從秦州來為什麼道對衆謾語要會麼作客殷勤帶纍主人拖泥涉水王太傅上雪峰施衆僧衣時從弇上座不在師弟代上名受衣從弇歸弟曰某甲為師兄上名了從弇曰汝道我名甚麼弟無對師代曰師兄得恁麼貪又曰甚麼處是貪處又代曰兩度上名雲居錫云甚麼處是弇上座兩度上名處師與長慶保福入州見牡丹障子保福曰好一朵牡丹花長慶曰莫眼花師曰可惜許一朵花報慈遂云三尊宿語還有親疏也無祇如羅漢恁麼道落在甚麼處黃龍心云據此三人