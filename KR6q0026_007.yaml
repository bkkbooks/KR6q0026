body:
  text: 南嶽下二世天王道悟禪師馬祖一法嗣天王道悟禪師渚宮崔氏漢子玉之胤十五出家二十三受戒三十謁石頭頻沐指示而不契次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬節使來訪師不為加禮節使怒擒師擲江中及歸見遍衙火發且聞空中天王神嗔責聲遂哀悔設拜烟焰頓息宛然如初乃躬往江邊迎師見師在水都不濕衣益自敬重于府西造天王寺供師龍潭信問從上相承底事如何師曰不是明汝來處不得龍潭曰這箇眼目幾人具得師曰淺草易為長廬僧問如何是玄妙之說師曰莫道我解佛法好曰爭奈學人疑滯何師曰何不問老僧曰即今問了也師曰去不是汝存泊處師常曰快活快活及臨終時呌苦苦又曰閻羅王來取我也院主問曰和尚當時被節使拋向水中神色不動如今何得恁麼地師舉枕子曰汝道當時是如今是院主無對便入滅按景德傳燈録稱青原下出石頭遷遷下出天皇悟悟下出龍潭信信下出德山鑒鑒下出雪峯存存下出雲門偃玄沙備備再傳為法眼益皆謂雲門法眼二宗來自青原石頭雖二家兒孫亦自謂青原石頭所自出不知其差誤所從來久矣道悟同時有二人一住荊南城西天王寺嗣馬祖一住荊南城東天皇寺嗣石頭其下出龍潭信者乃馬祖下天王道悟非石頭下天皇道悟也何以明之按唐正議大夫戶部侍郎平章事荊南節度使丘玄素所撰天王道悟禪師云道悟渚宮人姓崔氏子玉之後胤也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十參石頭頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師𫎇旨已便返荊門去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外烘焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜煙焰都息宛然如初遂往江邊見師在水都不濕衣節使重伸懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時呌苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年戊子十月十三日也年八十二坐六十三夏嗣法一人曰崇信即龍潭也城東天皇道悟禪師者協律郎符載撰乃與景德傳燈合其云道悟姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一留五年大曆十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇廢寺靈鑒請居之元和二年丁亥四月十三日以背痛入滅年六十坐三十五夏法嗣三人曰慧真曰文賁曰幽間今荊南城東有天皇巷存焉唐聞人歸登撰南嶽讓禪師列法孫數人於後有天王道悟名圭峯答裴相國宗趣狀列馬祖法嗣六人首曰江陵道悟權德與撰馬祖塔銘載弟子慧海智藏等十一人道悟其一也又呂夏卿張無盡著書皆稱道悟嗣馬祖宗門反以為誤然佛國白續燈録敘雪竇顯為大寂九世孫祖源通要録中收為馬祖之嗣達觀頴以丘玄素證之疑信相半蓋獨見丘玄素而未見符載耳今以二參合故於馬祖法嗣下增入天王道悟以龍潭崇信嗣之而以天皇道悟嗣石頭以慧真文賁幽間嗣之始不差誤竊考五燈會元天皇傳後紀載前說宋時干越雲壑瑞禪師所述心燈録亦同是見因集五家語録著有五宗源流圖說質諸耆宿謬相印可爰是不避狂瞽僭妄改正以俟後世明聖道流再加訂核焉南嶽下三世龍潭祟信禪師天王悟法嗣澧州龍潭崇信禪師渚宮人也初悟和尚居天王寺師家於寺巷其家賣餅師日以十餅饋之天王食畢常留一餅曰吾惠汝以蔭子孫師一日自念曰餅是我持去何返遺我其別有旨乎遂造問焉天王曰是汝持來復汝何咎師聞之頗曉玄旨因投出家服勤左右一日問曰某自到來不蒙指示心要天王曰自汝到來吾未嘗不指汝心要師曰何處指示天王曰汝擎茶來吾為汝接汝行食來吾為汝受汝和南時吾便低首何處不指示心要師低頭良久天王曰見則直下便見擬思即差師當下開解笑巖寶云龍潭這麼問天王這麼答若非悟去幾成世諦若實會得凡聖祇有虗名迷悟皆為剩法若實未會不可瞎驢趂大隊復問如何保任天王曰任性逍遙隨緣放曠但盡凡心別無聖解李翱刺史問如何是真如般若師曰我無真如般若李曰幸遇和尚師曰此猶是分外之言南嶽下四世德山宣鑒禪師龍潭信法嗣鼎州德山宣鑒禪師簡州周氏子常講金剛般若後聞南方禪席頗盛師氣不平乃曰出家兒千劫學佛威儀萬劫學佛細行不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔青龍疏鈔出蜀至澧陽路上見一婆子賣餅因息肩買餅點心婆指擔曰這箇是甚麼文字師曰青龍疏鈔婆曰講何經師曰金剛經婆曰我有一問你若答得施與點心若答不得且別處去金剛經道過去心不可得現在心不可得未來心不可得未審上座點那箇心師無語遂往龍潭至法堂曰久嚮龍潭及乎到來潭又不見龍又不現龍潭引身曰子親到龍潭師無語遂棲止焉雪竇顯云將錯就錯雲峯悅云大小德山向齏甕裏淹殺黃龍心云雪竇與麼道不知德山將錯就錯不知龍潭將錯就錯識休咎底衲僧必知去處未過關者亦宜辨取還相委悉麼縱饒栽種得不是棟梁材金粟悟云既云潭又不見龍又不現因甚道子親到龍潭恁麼大似方木逗圓竅且道什麼處是親到處試斷看師一夕侍立次龍潭曰更深何不下去師珍重便出却回曰外面黑龍潭點紙燭度與師師擬接龍潭復吹滅師於此大悟便禮拜龍潭曰子見箇甚麼師曰從今向去更不疑天下老和尚舌頭也至來日龍潭升座謂衆曰可中有箇漢牙如劒樹口似血盆一棒打不回頭他時向孤峰頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑遂焚之於是禮辭抵溈山挾復子上法堂從西過東從東過西顧視方丈曰有麼有麼溈山坐次殊不顧眄師曰無無雲竇顯著語云勘破了也便出至門首乃曰雖然如此也不得草草遂具威儀再入相見才跨門提起坐具曰和尚溈山擬取拂子師便喝拂袖而出雪竇著語云勘破了也溈山至晚問首座今日新到在否首座曰當時背却法堂著草鞋出去也溈山曰此子已後向孤峰頂上盤結草庵呵佛罵祖去在雪竇著語云雪上加霜頌云一勘破二勘破雪上加霜曾險墮飛騎將軍入虜庭再得完全能幾箇急走過不放過孤峯頂上草裏坐咄五祖戒云德山大似作賊人心虗溈山也是賊過後張弓昭覺勤云雪竇道勘破且道是勘破德山為復勘破溈山徑山杲云二尊宿恁麼相見每人失却一隻眼師住澧陽三十年屬唐武宗廢教避難於獨浮山之石室大中初武陵太守薛廷望再崇德山精舍號古德禪院堅請居之大闡宗風小參示衆曰今夜不答話問話者三十棒時有僧出禮拜師便打僧曰某甲話也未問和尚因甚麼打某甲師曰汝是甚麼處人曰新羅人師曰未跨船舷好與三十棒法眼益云大小德山話作兩橛報慈遂云叢林中喚作隔下語且從祇如德山道問話者三十棒意作麼生德山密云大小德山龍頭蛇尾雪竇顯云此二老宿雖然裁長補短舍重從輕要見德山老漢亦未可在何故殊不知德山握閫外之威權有當斷不斷不招其亂底劒諸人還識新羅僧麼只是撞著露柱底瞎漢溈山云德山大似清平世界鋥甲磨槍這僧不惜性命身挨白刃法眼道話作兩橛大似藥病相治圓明道龍頭蛇尾也是金鍮難辨雪竇道撞著露柱底瞎漢截斷衆流如今還有人為新羅僧作主麼出來與大溈相見乃豎拂云去去西天路迢迢十萬餘五祖演云衆中舉者甚多會者不少且道向甚處見德山有不顧性命底出來道看若無山僧為大衆與德山相見去也待德山道今夜不答話問話者三十棒但向道某甲話也不問棒也不喫你道還契他德山麼到這裏須是箇人始得黃龍清云雖則雪竇高提祖令坐斷寰區只解瞻前不能顧後這僧堂堂出來什麼處是撞著露柱處還有人辨得麼若也辨得不唯與新羅僧雪屈亦見當人眼目分明若辨不得非唯新羅僧撞著露柱盡大地衲僧箇箇出來撞著露柱昭覺勤云德山大似金輪聖主寰中獨據四方八表無不順從等間布一勑施一令直得草偃風行若不是這僧爭見殺活擒縱威權自在法眼圓明雪竇雖則直指單提各能扶豎德山要且只扶得末後句未扶得最初句且作麼生是德山最初句大鵬欲展摩霄翅誰顧崩騰六合雲護國元云忒煞倚勢欺人山僧見處也要諸人共知這僧當時若是箇漢待他道你是甚處人便與掀倒禪牀剔起便行直饒德山牙如劒樹口似血盆也須倒退三千里何故識法者懼金粟悟云古今拈提者極多錯會者不少殊不知德山出一計要尋知己這僧若是敵手他打時但接棒輕輕推一推不唯絶斷他後來葛藤管這老漢必也全身遠害龍牙問學人仗鏌鎁劒擬取師頭時如何師引頸近前曰㘞法眼益別云汝向甚麼處下手龍牙曰頭落也師呵呵大笑龍牙後到洞山舉前話洞山曰德山道甚麼龍牙曰德山無語洞山曰莫道無語且將德山落底頭呈似老僧看龍牙方省便懺謝有僧舉似師師曰洞山老人不識好惡這漢死來多少時救得有甚麼用處保福展云龍牙只知進前不知失步翠巖芝云龍牙當斷不斷如今作麼生斷法華舉云諸上座莫是德山無機鋒麼為當別有道理良久云德山引頸龍牙獻劒東禪觀云龍牙抱劒傷身自招過咎德山為頭作主幸好機籌忽被洞山指蹤不覺尾巴露出雪峯問從上宗乘學人還有分也無師打一棒曰道甚麼曰不會至明日請益師曰我宗無語句實無一法與人雪峯因此有省巖頭聞之曰德山老人一條脊梁骨硬似鐵拗不折然雖如此於唱教門中猶較些子保福展問招慶祇如巖頭出世有何言教過於德山便恁麼道招慶云汝不見巖頭道如人學射久久方中保福云中後如何招慶云展闍黎莫不識痛癢保福云和尚今日非唯舉話招慶云展闍黎是甚麼心行明招謙云大小招慶錯下名言示衆曰道得也三十棒道不得也三十棒臨濟聞得謂洛浦曰汝去問他道得為甚麼也三十棒待伊打汝接住棒送一送看伊作麼生洛浦如教而問師便打洛浦接住送一送師便歸方丈洛浦回舉似臨濟臨濟曰我從來疑著這漢雖然如是你還識德山麼洛浦擬議臨濟便打巖頭奯云德山老人尋常祇據一條白棒佛來亦打祖來亦打爭奈較些子東禪齊云祇如臨濟道我從前疑著這漢是肯底語不肯底語為當別有道理試斷看上堂問即有過不問猶乖有僧出禮拜師便打僧曰某甲始禮拜為甚麼便打師曰待汝開口堪作甚麼師令侍者喚義存即雪峯也存上來師曰我自喚義存汝又來作甚麼存無對上堂我先祖見處即不然這裏無祖無佛達磨是老臊胡釋迦老子是乾屎橛文殊普賢是擔屎漢等覺妙覺是破執凡夫菩提涅槃是繫驢橛十二分教是鬼神簿拭瘡疣紙四果三賢初心十地是守古冢鬼自救不了雲門偃云讚佛讚祖須是德山老人始得琅琊覺云諸方若與麼會入地獄如箭射只如雲門與麼道也是入地獄如箭射有僧相看乃近前作相撲勢師曰與麼無禮合喫山僧手裏棒僧拂袖便行師曰饒汝如是也祇得一半僧轉身便喝師打曰須是我打你始得曰諸方有明眼人在師曰天然有眼僧擘開眼曰猫便出師曰黃河三千年一度清天童華云這僧是透關底漢若非德山本分鉗鎚幾乎死在句下只如德山道黃河三千年一度清又作麼生嶺梅殘雪裏雲鬢未梳時師見僧來乃閉門其僧敲門師曰阿誰曰師子兒師乃開門僧禮拜師騎僧項曰這畜生甚處去來僧參師問維那今日幾人新到維那曰八人師曰喚來一時生按著問凡聖相去多少師便喝師因疾僧問還有不病者也無師曰有曰如何是不病者師曰阿㖿阿㖿師復告衆曰捫空追響勞汝心神夢覺覺非竟有何事言訖安坐而化南嶽下五世巖頭全奯禪師德山鑒法嗣鄂州巖頭全奯禪師泉州柯氏子優游禪苑與雪峰欽山為友自杭州大慈山邐迤造于臨濟屬臨濟歸寂乃謁仰山才入門提起坐具曰和尚仰山取拂子擬舉師曰不妨好手參德山執坐具上法堂瞻視德山曰作麼師便喝德山曰老僧過在甚麼處師曰兩重公案乃下參堂德山曰這箇阿師稍似箇行腳人至來日上問訊德山曰闍黎是昨日新到否曰是德山曰甚麼處學得這虗頭來師曰全奯終不自謾德山曰他後不得孤負老僧一日參德山方跨門便問是凡是聖德山便喝師禮拜有人舉似洞山洞山曰若不是奯公大難承當師曰洞山老人不識好惡錯下名言我當時一手擡一手搦雪竇顯云然則德山門下草偃風行要且不能塞斷天下人口當時才拜劈脊便打非唯𠞰絶洞山亦乃把定奯老還會麼李將軍有嘉聲在不得封侯也是間琅琊覺云巖頭無人問著不妨奇特才被洞山腦後一錐便乃冰消瓦解昭覺勤云德山據令而行只得一半洞山通方有眼千里同風巖頭既善據虎頭又能收虎尾大似作家戰將臨陳扣敵七事俱全不妨奇特敢問那箇是一手擡一手搦處謂言侵早起更有夜行人徑山杲云猛虎不識穽穽中身死蛟龍不怖劒劒下身亡巖頭雖於虎穽之中自有透脫一路向劒刃上有翻身之機若仔細檢點將來猶缺悟在即今莫有為巖頭作主底麼出來與大慧相見良久喝一喝拍一拍洎合停囚長智教忠光云還知三大老落處麼德山和身放倒洞山帶水拖泥若非巖頭具通方眼有格外機爭顯功高汗馬且作麼生是一手擡一手搦處殺人刀活人劒楚石琦云德山咬猪狗手腳巖頭鍛了底精金驀札相逢更無回互將他八兩換得半斤洞山雖是作家也只傍觀有分妙喜費許多氣力作什麼拈拄杖畫一畫云一雪峰在德山作飯頭一日飯遲德山擎鉢下法堂雪峰曬飯巾次見德山乃曰鐘未鳴鼓未響拓鉢向甚麼處去德山便歸方丈雪峰舉似師師曰大小德山未會末後句在德山聞令侍者喚師去問汝不肯老僧那師密啓其意德山乃休明日升堂果與尋常不同師至僧堂前拊掌大笑曰且喜堂頭老漢會末後句他後天下人不奈伊何雖然也祇得三年活德山果三年後示滅明招謙代德山云咄咄沒處去沒處去雪竇顯云曾聞說箇獨眼龍元來只有一隻眼殊不知德山是箇無齒大蟲若不是巖頭識破爭得明日與昨日不同諸人要會末後句麼只許老胡知不許老胡會翠巖真云德山巖頭一狀領過雪峯一千五百人善知識地在溈山云巖頭大似高崖石裂直得百里走獸潛蹤若非德山度量深明爭得昨日與今日不同溈山果云古今無異路達者共同途透出威音外須明肘後符且道那裏是巖頭識破德山處若檢點得出非但參學眼明亦乃領過雪峯其或緇素不辨邪正未分路遠夜長休把火大家吹滅暗中行高峯妙云佛祖機緣古今公案其中誵訛無出於此或謂巖頭智過於師故有密啓其意殊不知犯彌天之咎萬劫遭殃且道利害在甚麼處撫掌大笑云侍者分明記取三十年後有人證明千巖長云末後句子德山巖頭雪峯總跳不出乃喝一喝云大丈夫當為真王何以假為天奇瑞云岩頭明招雪竇三箇宗師出廣長舌遍覆三千大千世界要且歌揚德山末後句不出何故設使三世諸佛歷代祖師亦不能宣布演說山僧也不論他劫外今時向初托鉢處只道箇蒼天蒼天無事不畢大衆會麼更發一頌以為良鑑頌云蒼天蒼天密密綿綿坐斷象後壁立空前恆沙頭角到此盡捐蕩蕩然四方獨步落落然八表無牽針毛栗芥通成曲拍手隨緣唱囉嗹徑山信云密啓其意壁上貼門神低頭歸方丈慚惶殺人果與尋常不同毫𨤲有差天地懸隔也秖得三年活我為法王於法自在豈受人塗污咄咄一日與雪峰欽山聚話雪峰驀指一碗水欽山曰水清月現雪峰曰水清月不現師踢却水碗而去師與雪峰同辭德山德山問甚麼處去師曰暫辭和尚下山去曰子他後作麼生師曰不忘曰子憑何有此說師曰豈不聞智過於師方堪傳受智與師齊減師半德曰如是如是當善護持二士禮拜而退師住鄂州巖頭值沙汰於湖邊作渡子兩岸各挂一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來師便打婆曰婆生七子六箇不遇知音祇這一箇也不消得便拋向水中琅琊覺云欺敵者亡大溈智云巖頭業在其中只得通身泥水老婆雖有丈夫手段也是家醜外揚天奇瑞云綿裏有針泥裏有刺不妨這婆子具如此之見若不是巖頭大難祗對當時才見婆來便撑船別去直饒蕩盡世界手段到這裏也沒處施呈笑巖寶乃呵呵笑云此婆子圖箇什麼巖頭當時待他才拋便劈脊一棹俱打入水中始較些子何故不見道祗這一箇也不消得徑山信云這婆子雙髻若是巖頭和這婆子送向水中令他母子聚頭無離骨肉頌云不消這箇意如何賣弄家私臭老婆惡浪千層捲殘月萬山愁斷白雲多上堂吾嘗究涅槃經七八年覩三兩段義似衲僧說話又曰休休時有一僧出禮拜請師舉師曰吾教意如字三點第一向東方下一點點開諸菩薩眼第二向西方下一點點諸菩薩命根第三向上方下一點點諸菩薩頂此是第一段義又曰吾教意如摩醯首羅擘開面門竪亞一隻眼此是第二段義又曰吾教意猶如塗毒鼓擊一聲遠近聞者皆喪此是第三段義時小嚴上座問如何是塗毒鼓師以兩手按膝亞身曰韓信臨朝底小嚴無語徑山杲舉了喝云縮頭去夾山下一僧到石霜才跨門便道不審石霜曰不必闍黎僧曰恁麼則珍重又到師處如前道不審師噓一噓僧曰恁麼則珍重方回步師曰雖是後生亦能管帶其僧歸舉似夾山夾山上堂曰前日到巖頭石霜底阿師出來如法舉似前話其僧舉了夾山曰大衆還會麼衆無對夾山曰若無人道得山僧不惜兩莖眉毛道去也乃曰石霜雖有殺人刀且無活人劒巖頭亦有殺人刀亦有活人劒徑山杲云癡人面前不得說夢師與羅山卜塔基羅山中路忽曰和尚師回顧曰作麼羅山舉手指曰這裏好片地師咄曰瓜州賣瓜漢又行數里歇次羅山禮拜問曰和尚豈不是三十年前在洞山而不肯洞山師曰是又曰和尚豈不是嗣德山又不肯德山師曰是羅山曰不肯德山即不問祇如洞山有何虧闕師良久曰洞山好佛祇是無光羅山禮拜徑山杲云巖頭父子雖善暗去明來仔細點檢將來未免髑髏敲磕問僧甚處來曰西京來師曰黃巢過後還收得劒麼曰收得師引頸近前曰㘞曰師頭落也師呵呵大笑僧後到雪峰雪峰問甚處來曰巖頭來雪峰曰巖頭有何言句僧舉前話雪峰便打三十棒趂出溈山云這僧黃巢過後曾收得劒却向巖頭處施設及至雪峯前鋒𨦵不露何故為他巖頭大笑一聲直得天地陡暗四方絶唱若不得雪峯幾乎陸地平沉不見道殺人刀活人劒承天宗云可惜許這般漢只學得勝負之法殊不知是生滅之因我當時若見但向他道作家作家教他擔板過一生僧問雪峰聲聞人見性如夜見月菩薩人見性如晝見日未審和尚見性如何雪峰打拄杖三下僧後舉前語問師師與三摑雪竇顯云應病設藥且與三下若據令而行合打多少德山一日謂師曰我這裏有兩僧入山住庵多時汝去看他怎生師遂將一斧去見兩人在庵內坐師乃拈起斧曰道得也一下斧道不得也一下斧二人殊不顧師擲下斧曰作家作家歸舉似德山德山曰汝道他如何師曰洞山門下不道全無若是德山門下未夢見在僧問塵中如何辨主師曰銅䤬鑼裏滿盛油招慶問羅山云巖頭道銅䤬鑼裏滿盛油意旨如何羅山召大師招慶應諾羅山云獼猴入道場羅山却問明招有人問你作麼生明招云箭穿紅日影徑山杲頌云獼猴入道場箭穿紅日影兩箇老古錐擔雪共填井喝一喝瑞巖問如何是毗盧師師曰道甚麼瑞巖再問師曰汝年十七八未師嘗謂衆曰老漢去時大吼一聲了去唐光啓之後中原盜起衆皆避地師端居晏如也一日賊大至責以無供饋遂倳刃焉師神色自若大呌一聲而終聲聞數十里雪峰義存禪師德山鑒法嗣福州雪峰義存禪師泉州南安曾氏子久歷禪會緣契德山唐咸通中回閩中雪峰創院徒侶翕然懿宗錫號真覺禪師仍賜紫袈裟初與巖頭至澧州鼇山鎮阻雪巖頭每日祇是打睡師一向坐禪一日喚曰師兄師兄且起來巖頭曰作甚麼師曰今生不著便共文邃箇漢行腳到處被他帶纍今日到此又祇管打睡巖頭喝曰噇眠去每日牀上坐恰似七村裏土地他時後日魔魅人家男女去在師自點胸曰我這裏未穩在不敢自謾巖頭曰我將謂你他日向孤峰頂上盤結草庵播揚大教猶作這箇語話師曰我實未穩在巖頭曰你若實如此據你見處一一通來是處與你證明不是處與你剗却師曰我初到鹽官見上堂舉色空義得箇入處巖頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覓迢迢與我疏渠今正是我我今不是渠巖頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無德山打一棒曰道甚麼我當時如桶底脫相似巖頭喝曰你不聞道從門入者不是家珍師曰他後如何即是巖頭曰他後若欲播揚大教一一從自己胸襟流出將來與我蓋天蓋地去師於言下大悟便作禮起連聲呌曰師兄今日始是鼇山成道師在洞山作飯頭淘米次洞山問淘沙去米淘米去沙師曰沙米一時去洞山曰大衆喫箇甚麼師遂覆却米盆洞山曰據子因緣合在德山天童覺云雪峯步步登高不覺草鞋跟斷若也正偏宛轉敲唱雙行自然言氣相合父子相投且道洞山不肯雪峯意在什麼處萬里無雲天有過碧潭似鏡月難來雪竇宗云直木不棲鸞鳳金針已繡鴛鴦若不是新豐老人便見冰消瓦解洞山一日問師作甚麼來師曰斫槽來洞山曰幾斧斫成師曰一斧斫成洞山曰猶是這邊事那邊事作麼生師曰直得無下手處洞山曰猶是這邊事那邊事作麼生師休去汾陽昭代云某甲早困也師辭洞山洞山曰子甚處去曰歸嶺中去洞山曰當時從甚麼路出師曰從飛猿嶺出洞山曰今回向甚麼路去師曰從飛猿嶺去洞山曰有一人不從飛猿嶺去子還識麼師曰不識洞山曰為甚麼不識師曰他無面目洞山曰子既不識爭知無面目師無對琅琊覺云心粗者失栖典座問古人有言知有佛向上事方有語話分如何是語話師把住曰道道棲無對師遂踏倒栖當下汗流師謂衆曰此箇水牯牛年多少衆皆無對師自代曰七十九也僧曰和尚為甚麼作水牯牛去師曰有甚麼罪過問僧甚處去曰禮拜徑山和尚去師曰徑山若問汝此間佛法如何汝作麼生祗對曰待問即道師便打後舉問鏡清這僧過在甚麼處鏡清曰問得徑山徹困師曰徑山在浙中因甚麼問得徹困鏡清曰不見道遠問近對師曰如是如是一日謂長慶曰吾見溈山問仰山從上諸聖向甚麼處去他道或在天上或在人間汝道仰山意作麼