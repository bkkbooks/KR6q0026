立鼓山莞然奇之鼓山智嶽禪師鼓山晏法嗣福州鼓山智嶽了宗禪師本郡人也初遊方至鄂州黃龍問久嚮黃龍及乎到來祇見赤斑蛇黃龍曰汝祇見赤斑蛇且不識黃龍師曰如何是黃龍黃龍曰滔滔地師曰忽遇金翅鳥來又作麼生黃龍曰性命難存師曰恁麼則被他吞却去也黃龍曰謝闍黎供養師便禮拜報國照禪師龍華照法嗣福州報國院照禪師佛塔被雷霹有問祖佛塔廟為甚麼却被雷霹師曰通天作用曰既是通天作用為甚麼却霹佛師曰作用何處見有佛曰爭奈狼籍何師曰見甚麼徑山信云不霹佛祖更教伊霹阿那箇聻頌云驀地青天霹靂來葛藤粉碎塔門開家私未許庸人薦佛塔沉沉空劫灰資福智遠禪師鏡清怤法嗣福州資福院智遠禪師福州人也參鏡清問如何是諸佛出身處鏡清曰大家要知師曰如斯則衆眼難瞞去也鏡清曰理能縛豹師因此發悟玄旨烏巨儀晏禪師鏡清怤法嗣衢州烏巨山儀晏開明禪師吳興許氏子光啓中隨父鎮信安強為娶師不願遂遊歷諸方機契鏡清歸省父母乃於郭南創別舍以遂師志舍旁陳司徒廟有凜禪師像師往瞻禮失師所之後郡守展祀祠下見師入定于廟後叢竹間蟻蠧其衣敗葉沒䏶或者云是許鎮將之子也自此三昧或出或入子湖訥禪師未知師所造淺深問曰子所住定蓋小乘定耳時方啜茶師呈起橐曰是大是小訥駭然尋謁栝蒼唐山德嚴禪師嚴問汝何姓曰姓許嚴曰誰許汝曰不別嚴默識之遂與剃染嘗令摘桃浹旬不歸往尋見師攀桃倚石泊然在定嚴鳴指出之開運中遊江郎巖覩石龕謂弟子慧興曰豫入定此中汝當壘石塞門勿以吾為念慧興如所戒明年慧興意師長往啓龕視師素髮被肩胸臆尚暖徐自定起了無異容復回烏巨侍郎慎公鎮信安馥師之道命義學僧守榮詰其定相師不與之辨榮意輕之時信安人競圖師像而尊事皆獲舍利榮因愧服禮像謝𠎝亦獲舍利歎曰此後不敢以淺解測度矣錢忠懿王感師見夢遣使圖像至適王患目疾展像作禮如夢所見隨雨舍利目疾頓瘳因錫號開明端拱初太宗聞師定力詔本州加禮津發赴闕師力辭僧再至諭旨特令肩輿入對便殿命坐賜茗咨問禪定奏對簡盡深契上旨瑞峯志端禪師安國法嗣福州林陽瑞峰院志端禪師本州人也初參安國見僧問如何是萬象之中獨露身安國舉一指其僧不薦師於是冥契玄旨乃入室白曰適來見那僧問話志端有箇省處安國曰汝見甚麼道理師亦舉一指曰這箇是甚麼安國然之師禮謝保福清豁禪師睡龍溥法嗣漳州保福院清豁禪師福州人也謁大章山如庵主語具如庵主章後參睡龍睡龍問曰豁闍黎見何尊宿來還悟也未曰清豁嘗訪大章得箇信處睡龍於是上堂集衆召曰豁闍黎出來對衆燒香說悟處老僧與汝證明師出衆乃拈香曰香已拈了悟即不悟睡龍大悅而許之南嶽下八世嘉州黑水和尚黃龍機法嗣嘉州黑水和尚初參黃龍便問雪覆蘆花時如何黃龍曰猛烈師曰不猛烈黃龍又曰猛烈師又曰不猛烈黃龍便打師於此有省即便禮拜呂巖真人黃龍機法嗣呂巖真人字洞賓京川人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術自爾人莫之究嘗遊廬山歸宗書鐘樓壁曰一日清間自在身六神和合報平安丹田有寶休尋道對境無心莫問禪未幾道經黃龍山覩紫雲成蓋疑有異人乃入謁值黃龍擊鼓升堂黃龍見意必呂公也欲誘而進厲聲曰座傍有竊法者呂毅然出問一粒粟中藏世界半升鐺內煮山川且道此意如何黃龍指曰這守尸鬼呂曰爭奈囊有長生不死藥黃龍曰饒經八萬劫終是落空亡呂薄訝飛劒脅之劒不能入遂再拜求指歸黃龍詰曰半升鐺內煮山川即不問如何是一粒粟中藏世界呂於言下頓契作偈曰棄却瓢囊摵碎琴如今不戀汞中金自從一見黃龍後始覺從前錯用心黃龍囑令加護清溪洪進禪師羅漢琛法嗣襄州清溪山洪進禪師在地藏時居第一座一日地藏上堂二僧出禮拜地藏曰俱錯二僧無語下堂請益修山主修曰汝自巍巍堂堂却禮拜擬問他人豈不是錯師聞之不肯修乃問未審上座又作麼生師曰汝自迷暗焉可為人修憤然上方丈請益地藏指廊下曰典座入庫頭去也修乃省過又一日師問修山主曰明知生是不生之理為甚麼為生死之所流修曰筍畢竟成竹去如今作篾使還得麼師曰汝向後自悟去在修曰某所見祇如此上座意旨又如何師指曰這箇是監院房那箇是典座房修即禮謝清涼休復禪師羅漢琛法嗣升州清凉院休復悟空禪師北海王氏子參尋宗匠依地藏經年不契直得成病入涅槃堂一夜地藏去看乃問復上座安樂麼師曰某甲為和尚因緣背地藏指燈籠曰見麼師曰見地藏曰祇這箇也不背師於言下有省後修山主問訊地藏乃曰某甲百劫千生曾與和尚違背來此者又值和尚不安地藏遂竪起拄杖曰祇這箇也不背師忽然契悟問忠座主講甚麼經曰法華經師曰若有說法華經處我現寶塔當為證明大德講甚麼人證明忠無對清凉欽代云謝和尚證明龍濟紹修禪師羅漢琛法嗣撫州龍濟紹修禪師初與法眼同參地藏所得謂已臻極暨同辭至建陽途中談次法眼忽問古人道萬象之中獨露身是撥萬象不撥萬象師曰不撥法眼曰說甚麼撥不撥師懵然不知却回地藏地藏問子去未久何以却來師曰有事未決豈憚跋涉山川地藏曰汝跋涉許多山川也還不惡師未喻旨乃問古人道萬象之中獨露身意旨如何地藏曰汝道古人撥萬象不撥萬象師曰不撥地藏曰兩箇也師駭然沈思而却問未審古人撥萬象不撥萬象地藏曰汝喚甚麼作萬象師方省悟再辭地藏覲于法眼法眼語意與地藏開示前後如一師後居龍濟山上堂具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此兩語一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑好珍重黃龍清云修山主只知布網張羅不覺自遭籠罩要得出身麼此亦有一理二義若人辨得永墮阿鼻徑山杲云點鐵化為金玉易勸人除却是非難淨慈一云直饒有箇入路要作什麼凡夫則是凡夫聖人則是聖人且道凡聖兩亡一句作麼生道間持經卷倚松立笑問客從何處來楚石琦云修山主熟處難忘也是胡地冬抽笋天奇瑞云若然有箇入處莫道十方衲子管取山主未出聖凡更要利益諸人轉引諸人入生陷地獄更說什麼知與不知會與不會雖然為衆竭力爭奈禍出私門固乃錐破卦文免得鑽龜打瓦問僧甚處來曰翠巖師曰翠巖有何言句示徒曰尋常道出門逢彌勒入門見釋迦師曰與麼道又爭得曰和尚又如何師曰出門逢阿誰入門見甚麼僧於言下有省酒仙遇賢禪師龍華球法嗣酒仙遇賢禪師姑蘇長洲林氏子貌偉怪口容雙拳七歲嘗沈大淵而衣不潤往參龍華發明心印回居明覺院唯事飲酒醉則成歌頌警道俗因號酒仙偈曰緑水紅桃華前街後巷走百餘遭張三也識我李四也識我識我不識我兩箇拳頭那箇大兩箇之中一箇大曾把虗空一𭣟破摩挲令教却恁麼拈取須彌枕頭臥楊子江頭浪最深行人到此盡沈吟他時若到無波處還似有波時用心金斝又聞泛玉山還報頽莫教更漏促趂取月明回貴買朱砂畫月算來枉用工夫醉臥緑楊陰下起來強說真如泥人再三叮囑莫教失却衣珠一六二六其事已足一九二九我要喫酒長伸兩腳眠一窹起來天地還依舊門前緑樹無啼鳥庭下蒼苔有落花聊與東風論箇事十分春色屬誰家秋至山寒水冷春來柳緑花紅一點動隨萬變江村煙雨濛濛有不有空不空笊籬撈取西北風生在閻浮世界人情幾多愛惡祇要喫些酒子所以倒街臥路死後却産娑婆不願超生淨土何以故西方淨土且無酒酤南嶽下九世圓通緣德禪師清溪進法嗣廬山圓通緣德禪師臨安黃氏子遍遊諸方江南國主於廬山建院請師開法大將軍曹翰部曲渡江入寺禪者驚走師淡坐如平日翰至不起不揖翰怒訶曰長老不聞殺人不眨眼將軍乎師熟視曰汝安知有不懼生死和尚邪翰大奇增敬而已曰禪者何為而散師曰擊鼓自集翰遣校擊之禪無至者翰曰不至何也師曰公有殺心故爾師自起擊之禪者乃集
