法嗣成都府昭覺寺克勤佛果禪師彭州駱氏子世宗儒師兒時日記千言偶遊妙寂寺見佛書三復悵然如獲舊物曰予殆過去沙門也即去家依自省祝髮從文照通講說又從敏行授楞嚴俄得病瀕死歎曰諸佛涅槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至真覺勝禪師之席勝方創臂出血指示師曰此曹谿一滴也師矍然良久曰道固如是乎即徙步出蜀首謁玉泉皓次依金鑾信大溈黃龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用五祖皆不諾乃謂五祖強移換人出不遜語忿然而去五祖曰待你著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸五祖一見而喜令即參堂便入侍者寮方半月會部使者解印還蜀詣五祖問道五祖曰提刑少年曾讀小艶詩否有兩句頗相近頻呼小玉元無事祇要檀郎認得聲提刑應喏喏五祖曰且子細師適歸侍立次問曰聞和尚舉小艶詩提刑會否五祖曰他祇認得聲師曰祇要檀郎認得聲他既認得聲為甚麼却不是五祖曰如何是祖師西來意庭前栢樹子聻師忽有省遽出見鷄飛上欄干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事祇許佳人獨自知五祖曰佛祖大事非小根劣器所能造詣吾助汝喜五祖徧謂山中耆舊曰我侍者參得禪也由此所至推為上首崇寧中還里省親四眾迓拜政和間謝事復出峽南遊時張無盡寓荊南以道學自居少見推許師艤舟謁之劇談華嚴旨要曰華嚴現量境界理事全真初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛眾生三無差別卷舒自在無礙圓融此雖極則終是無風帀帀之波公於是不覺促榻師遂問曰到此與祖師西來意為同為別公曰同矣師曰且得沒交涉公色為之慍師曰不見雲門道山河大地無絲毫過患猶是轉句直得不見一色始是半提更須知有向上全提時節彼德山臨濟豈非全提乎公乃首肯翌日復舉事法界理法界至理事無礙法界師又問此可說禪乎公曰正好說禪也師笑曰不然正是法界量裏在蓋法界量未滅若到事事無礙法界法界量滅始好說禪如何是佛乾屎橛如何是佛麻三斤是故真淨偈曰事事無礙如意自在手把豬頭口誦淨戒趂出婬坊來還酒債十字街頭解開布袋公曰美哉之論豈易得聞乎於是以師禮留居碧巖太平慧懃禪師五祖演法嗣舒州太平慧懃佛鑑禪師本郡汪氏子每以唯此一事實餘二則非真味之有省乃徧參名宿往來五祖之門有年恚五祖不為印據與圓悟相繼而去及圓悟歸五祖方丈徹證而師忽至意欲他邁圓悟勉令挂搭且曰某與兄相別始月餘比舊相見時如何師曰我所疑者此也遂參堂一日聞五祖舉僧問趙州如何是和尚家風趙州曰老僧耳聾高聲問將來僧再問趙州曰你問我家風我却識你家風了也師即大豁所疑曰乞和尚指示極則五祖曰森羅及萬象一法之所印師展拜五祖令主翰墨後同圓悟語話次舉東寺問仰山鎮海明珠因緣至無理可伸處圓悟徵曰既曰收得逮索此珠又道無言可對無理可伸師不能加答明日謂圓悟曰東寺祇索一顆珠仰山當下傾出一栲栳圓悟深肯之乃告之曰老兄更宜親近老和尚去師一日造方丈未及語被五祖詬罵懡㦬而退歸寮閉門打睡恨五祖不已圓悟已密知即往扣門師曰誰圓悟曰我師即開門圓悟問你見老和尚如何師曰我本不去被你賺累我遭這老漢詬罵圓悟呵呵大笑曰你記得前日下底語麼師曰是甚麼語圓悟曰你又道東寺祇索一顆仰山傾出一栲栳師當下釋然圓悟遂領師同上方丈五祖纔見遽曰懃兄且喜大事了畢師室中以木骰子六隻面面皆書么字僧纔入師擲曰會麼僧擬不擬師即打出龍門清遠禪師五祖演法嗣舒州龍門清遠佛眼禪師臨卭李氏子因讀法華經至是法非思量分別之所能解持以問講師講師莫能答師嘆曰義學名相非所以了生死大事遂卷衣南遊造舒州太平演禪師法席因丐於廬州偶雨足跌仆地煩懣間聞二人交相惡罵諫者曰你猶自煩惱在師於言下有省及歸凡有所問演即曰我不如你你自會得好或曰我不會我不如你師愈疑遂咨決於元禮首座元禮乃以手引師之耳繞圍爐數帀且行且語曰你自會得好師曰有冀開發乃爾相戲耶元禮曰你他後悟去方知今日曲折耳太平將遷海會師慨然曰吾持鉢方歸復參隨往一荒院安能究決己事耶遂作偈告辤之蔣山坐夏邂逅靈源禪師從容言話間師曰比見都下一尊宿語句似有緣靈源曰演公天下第一等宗師何故捨而事遠遊所謂有緣者蓋知解之師與公初心相應耳師從所勉徑趨海會後命典謁適寒夜孤坐撥爐見火一豆許恍然自喜曰深深撥有些子平生事只如此遽起閱几上傳燈錄至破竈墮因緣忽大悟作偈曰刀刀林鳥啼披衣終夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少人過圓悟因詣其寮舉青林搬土話驗之且謂古今無人出得你如何會師曰也有甚難圓悟曰祇如他道鐵輪天子寰中旨意作麼生師曰我道帝釋宮中放赦書圓悟退語人曰且喜遠兄便有活人句也開福道寧禪師五祖演法嗣潭州開福道寧禪師歙溪汪氏子壯為道人於崇果寺執浴一日將濯足偶誦金剛經至於此章句能生信心以此為實遂忘所知忽垂足沸湯中發明己見後祝髮蔣山依雪竇老良禪師踰一年徧歷叢林參諸名宿晚至白蓮聞五祖小參舉忠國師古佛淨瓶趙州狗子無佛性話頓徹法源大隨元靜禪師五祖演法嗣彭州大隨南堂元靜禪師後名道興閬之玉山大儒趙公約仲之子也十歲病甚捨令出家首參永安恩禪師於臨濟三頓棒話發明次依諸名宿無有當意者聞五祖機峻欲抑之遂謁五祖五祖乃曰我此間不比諸方凡於室中不要汝進前退後竪指擎拳繞禪牀作女人拜提起坐具千般伎倆祇要你一言下諦當便是汝見處師茫然退參三載一日入室罷五祖謂曰子所下語已得十分試更與我說看師即剖而陳之五祖曰說亦說得十分更與我斷看師隨所問而判之五祖曰好即好祇是未曾得老僧說話在齋後可來祖師塔所與汝一一按過始得及至彼五祖便以即心即佛非心非佛睦州擔板漢南泉斬貓兒趙州狗子無佛性有佛性之語編辟之其所對了無凝滯至子胡狗話五祖遽轉面曰不是師曰不是却如何五祖曰此不是則和前面皆不是師曰望和尚慈悲指示五祖曰看他道子胡有一狗上取人頭中取人腰下取人脚入門者好看纔見僧入門便道看狗向子胡道看狗處下一轉語教子胡結舌老僧鈐口便是你了當處次日入室師默啟其說五祖笑曰不道你不是千了百當底人此語祇似先師下底語師曰某何人得似端和尚五祖曰不然老僧雖承嗣他謂他語拙蓋祇用遠錄公手段接人故也如老僧共遠錄公便與百丈黃檗南泉趙州輩把手共行纔見語拙即不堪師以為不然乃曳杖渡江適大水泛漲因留四祖儕輩挽其歸又二年五祖方許可嘗商略古今次執師手曰得汝說須是吾舉得汝舉須是吾說而今而後佛祖祕要諸方關鍵無逃子掌握矣有一老宿垂語曰十字街頭起一間茅廝祇是不許人屙僧舉以扣師師曰是你先屙了更教甚麼人屙老宿聞焚香遙望大隨再拜謝之無為宗泰禪師五祖演法嗣漢州無為宗泰禪師涪城人自出關偏遊叢社至五祖告香日五祖舉趙州洗鉢盂話俾參洎入室舉此話問師你道趙州向伊道甚麼這僧便悟去師曰洗鉢盂去聻五祖曰你祇知路上事不知路上滋味師曰既知路上事路上有甚滋味五祖曰你不知耶又問你曾遊淛否師曰未也五祖曰你未悟在師自此凡五年不能對五祖一日陞堂顧眾曰八十翁翁輥繡毬便下座師欣然出眾曰和尚試輥一輥看五祖以手作打仗皷勢操蜀音唱綿州巴歌曰豆子山打瓦皷楊平山撒白雨白雨下取龍女織得絹二丈五一半屬羅江一半屬玄武師聞大悟掩五祖口曰祇消唱到這裏五祖大笑而歸五祖表自禪師五祖演法嗣蘄州五祖表自禪師懷安人也初依五祖最久未有省時圓悟為座元師往請益圓悟曰兄有疑處試語我師遂舉德山小參不答話問話者三十棒圓悟曰禮拜著我作得你師舉話尚不會師作禮竟圓悟令再舉前話師曰德山小參不答話圓悟掩其口曰但恁麼看師出揚聲曰屈屈豈有公案祇教人看一句底道理有僧謂師曰兄不可如此說首座須有方便因靜坐體究及旬頓釋所疑詣圓悟禮謝圓悟曰兄始知吾不汝欺又詣方丈五祖迎笑自爾日深玄奧九頂清素禪師五祖演法嗣嘉州九頂清素禪師本郡郭氏子徧扣禪扄晚謁五祖聞舉首山答西來意語倐然契悟述偈曰顛倒顛顛倒顛新婦騎驢阿家牽便恁麼太無端回頭不覺布衫穿五祖見乃問百丈野狐話又作麼生師曰來說是非者便是是非人五祖大悅久之辭歸住清溪次遷九頂太守呂公來瞻大像問曰既是大像因甚麼肩負兩楹師曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來師曰家富小兒嬌太守乃禮敬勤老宿至師問舞劍當咽時如何曰伏惟尚饗師詬曰老賊死去你問我勤理前語問之師叉手揖曰拽破元禮首座五祖演法嗣元禮首座閩人也初參演和尚於白雲凡入室必謂曰衲僧家明取緇素好師疑之不已一日五祖陞堂舉首山新婦騎驢阿家牽語乃曰諸人要會麼莫問新婦阿家免煩路上波吒遇飯即飯遇茶即茶同門出入宿世冤家師於言下豁如且曰今日緇素明矣普融知藏五祖演法嗣普融知藏福州人也至五祖入室次五祖舉倩女離魂話問之有契呈偈曰二女合為一媳婦機輪截斷難回互從來往返絕蹤由行人莫問來時路凡有鄉僧來謁則發閩音誦俚語曰書頭教娘勤作息書尾教娘莫瞌睡且道中間說箇甚麼僧擬對師即推出法閦上座五祖演法嗣法閦上座久依五祖未有所入一日造室五祖問不與萬法為侶者是甚麼人曰法閦即不然五祖以手指曰住住法閦即不然作麼生師於是啟悟後至東林宣密度禪師席下見其得平實之旨一日拈華繞度禪牀一帀背手插香爐中曰和尚且道意作麼生度屢下語皆不契踰兩月遂問師令試說之師曰某祇將華插香爐中和尚自疑有甚麼事來金陵俞道婆瑯琊起法嗣俞道婆金陵人也市油餈為業常隨眾參問琅邪琅邪以臨濟無位真人話示之一日聞丐者唱蓮華樂云不因柳毅傳書信何緣得到洞庭湖忽大悟以餈盤投地夫傍睨曰你顛邪婆掌曰非汝境界往見琅邪琅邪望之知其造詣問那箇是無位真人婆應聲曰有一無位人六臂三頭努力瞋一擘華山分兩路萬年流水不知春由是聲名藹著凡有僧至則曰兒兒僧擬議即掩門佛燈珣禪師往勘之婆見如前所問佛燈曰爺在甚麼處婆轉身拜露柱佛燈即踏倒曰將謂有多少奇特便出婆蹶起曰兒兒來惜你則箇佛燈竟不顧安首座至婆問甚處來首座曰德山婆曰德山泰乃老婆兒子首座曰婆是甚人兒子婆曰被上座一問直得立地放尿婆甞頌馬祖不安因緣曰日面月面虗空閃電雖然截斷天下衲僧舌頭分明祇道得一半性空妙普庵主黃龍新法嗣嘉興府華亭性空妙普庵主漢州人久依死心獲證乃抵秀水追船子遺風結茅青龍之野吹鐵笛自娛多賦詠建炎初徐明叛道經烏鎮民多逃亡師獨荷䇿而往賊怒欲斬之師曰大丈夫要頭便斫取奚以怒為吾死必矣願得一飯以為送終賊奉肉食師如常齋出生畢乃曰孰當我文以祭賊笑而不答師索筆大書曰嗚呼惟靈勞我以生則大塊之過役我以壽則陰陽之失乏我以貧則五行不正困我以命則時日不吉吁哉至哉賴有出塵之道悟我之性與其妙心則其妙心孰與為隣上同諸佛之真化下合凡夫之無明纖塵不動本自圓成妙矣哉妙矣哉日月未足以為明乾坤未足以為大磊磊落落無𦊱無礙六十餘年和光混俗四十二臘逍遙自在逢人則喜見佛不拜笑矣乎笑矣乎可惜少年郎風流太光彩坦然歸去付春風體似虗空終不壞尚饗遂舉箸飫餐賊徒大笑食罷復曰劫數既遭離亂我是快活烈漢如今正好乘時便請一刀兩段乃大呼斬斬賊方駭異稽首謝過令衛而出烏鎮之廬舍免焚實師之惠也有僧睹師見佛不拜歌逆問曰既見佛為甚麼不拜師掌之曰會麼曰不會師又掌曰家無二主紹興庚申冬造大盆穴而塞之修書寄雪竇持禪師曰吾將水葬矣壬戌歲持至見其尚存作偈嘲之曰咄哉老性空剛要餧魚鼈去不索性去祇管向人說師閱偈笑曰待兄來證明耳令徧告四眾眾集師為說法要仍說偈曰坐脫立亡不若水葬一省柴燒二省開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中順潮而下眾皆隨至海濵望欲斷目師取塞戽水而回眾擁觀水無所入復乘流而往唱曰船子當年返故鄉沒蹤跡處妙難量真風徧寄知音者鐵苗橫吹作散場其笛聲嗚咽頃於蒼茫間見以笛擲空而沒後三日於沙上趺坐如生鍾山道隆首座黃龍新法嗣嚴州鍾山道隆首座桐廬董氏子晚抵黃龍死心延為座元死心順世遂歸隱鍾山慕陳尊宿高世之風日鬻擻籰自適人無識者手常穿一襪凡有禪者至提以示之曰老僧這襪著三十年了也空室智通道人黃龍新法嗣空室道人智通者龍圖范珣女也幼聰慧長歸丞相蘇頌之孫悌未幾厭世相還家求祝髮父難之遂清修因看法界觀頓有省連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊次曰物我元無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通後父母俱亡兄涓領分寧尉通偕行聞死心名重往謁之死心見知其所得便問常啼菩薩賣却心肝教誰學般若智通曰你若無心我也休又問一雨所滋根苗有異無陰陽地上生箇甚麼智通曰一華五葉復問十二時中向甚麼處安身立命智通曰和尚惜取眉毛好死心打曰這婦女亂作次第智通禮拜死心然之於是道聲籍甚政和間居金陵嘗設浴於保寧揭榜于門曰一物也無洗箇甚麼纖塵若有起自何來道取一句子玄乃可大家入浴古靈祇解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗却後為尼名惟久挂錫姑蘇之西竺緇白日夕師問得其道者頗眾俄示疾書偈趺坐而終上封本才禪師黃龍清法嗣潭州上封佛心才禪師福州姚氏子遊方至大中依海印隆禪師見老宿達道者看經至一毛頭師子百億毛頭一時現師指問曰一毛頭師子作麼生得百億毛頭一時現達曰汝乍入叢林豈可便理會許事師因疑之遂發心領淨頭職一夕汛掃次海印適夜參至則遇結座擲拄杖曰了即毛端吞巨海始知大地一微塵師豁然有省及出閩造豫章黃龍山與死心機不契乃參靈源凡入室出必揮淚自訟曰此事我見得甚分明祇是臨機吐不出若為柰何靈源知師勤篤告以須是大徹方得自在也未幾竊觀鄰案僧讀曹洞廣錄至藥山採薪歸有僧問甚麼處來藥山曰討柴來僧指腰下刀曰鳴剝剝是箇甚麼藥山拔刀作斫勢師忽欣然摑鄰案僧一掌揭簾趨出衝口說偈曰徹徹大海乾枯虗空迸裂四方八面絕遮攔萬象森羅齊漏泄法輪應端禪師黃龍清法嗣潭州法輪應端禪師南昌徐氏子謁真淨文禪師機不諧至雲居會靈源分座為眾激昂師扣其旨然以妙入諸經自負靈源嘗痛劄之師乃援馬祖百丈機語及華嚴宗旨為表靈源笑曰馬祖百丈固錯矣而華嚴宗旨與箇事喜沒交涉師憤然欲他往因請辭乃揭簾忽大悟汗流浹背靈源見乃曰是子識好惡矣馬祖百丈文殊普賢幾被汝帶累後開法百丈黃龍道震禪師泐潭清法嗣隆興府黃龍山堂道震禪師金陵趙氏子少依覺印英禪師為童子英移居泗之普照適淑妃擇度童行師得圓具久之辭謁丹霞淳禪師一日與論洞上宗旨師呈偈曰白雲深覆古寒巖異草靈華彩鳳銜夜半天明日當午騎牛背面著靴衫淳器之師自以為礙棄依草堂一見契合日取藏經讀之一夕聞晚參皷步出經堂舉頭見月遂大悟亟趨方丈草堂望見即為印可萬年法一禪師泐潭清法嗣台州萬年雪巢法一禪師太師襄陽郡王李公遵勉之玄孫也世居開封祥符縣母夢一老僧至而產年十七試上庠從祖仕淮南欲官之不就將棄家事長蘆慈覺賾禪師祖弗許母曰此必宿世沙門願勿奪其志未幾慈覺沒大觀改元禮靈巖通照愿禪師祝髮登具依愿十年迷悶不能入謁圓悟於蔣山圓悟曰此法器也圓悟奉詔徙京師天寧師侍行靖康末謁草堂於疎山一語之及大法頓明天童普交禪師泐潭乾法嗣慶元府天童普交禪師郡之萬齡畢氏子往南屏聽台教因為檀越修懺摩有問曰公之所懺罪為自懺耶為他懺耶若自懺罪罪性何來若懺他罪他罪非汝烏能懺之師不能對遂改服遊方造泐潭足纔踵門泐潭即呵之師擬問泐潭即曳杖逐之一日忽呼師至丈室曰我有古人公案要與你商量師擬進語泐潭遂喝師豁然領悟乃大笑泐潭下繩牀執師手曰汝會佛法耶師便喝復拓開泐潭大笑於是名聞四馳學者宗仰後歸桑梓留天童掩關却掃者八年師凡見僧來必叱曰楖栗未擔時為汝說了也且道說箇甚麼招手洗鉢拈扇張弓趙州柏樹子靈雲見桃華且擲放一邊山僧無恁麼閑脣吻與汝打葛藤何不休歇去拈拄杖逐之圓通道旻禪師泐潭乾法嗣江州圓通道旻圓機禪師世稱古佛興化蔡氏子生五歲足不履口不言母抱遊西明寺見佛像遽履地合爪稱南無佛仍作禮人大異之及宦學大梁依景德寺德祥出家試經得度徧往參激皆染指親溈山禪師最久晚慕泐潭往謁泐潭見默器之師陳歷參所得不蒙印可泐潭舉世尊拈華迦葉微笑語以問復不契後侍泐潭行次泐潭以拄杖架肩長噓曰會麼師擬對泐潭便打有頃復拈草示之曰是甚麼師亦擬對泐潭遂喝於是頓明大法作拈華勢乃曰這回瞞旻上座不得也泐潭挽曰更道更道師曰南北起雲北山下雨即禮拜泐潭首肯二靈知和庵主泐潭乾法嗣慶元府二靈知和庵主蘇臺玉峯張氏子兒時甞習坐垂堂堂傾父母意其必死師瞑目自若因使出家年滿得度趨謁泐潭泐潭見乃問作甚麼師擬對泐潭便打復喝曰你喚甚麼作禪師驀領旨即曰禪無後無先波澄大海月印青天又問如何是道師曰道紅塵浩浩不用安排本無欠少泐潭然之次謁衡嶽辯禪師辯尤器重師初偕天童交禪師問道盟曰他日吾二人宜踞孤峯絕頂目視霄漢為世外之人不可作今時籍名官府屈節下氣於人者後交爽盟至則師竟不接正言陳公以計誘師出山住二靈三十年間居無長物唯二虎侍其右一日威於人以偈遣之慈氏瑞仙禪師開先瑛法嗣紹興府慈氏瑞仙禪師本郡人年二十去家以試經披削習毗尼因覩戒性如虗空持者為迷倒師謂戒者束身之法也何自縛乎遂探台教又閱諸法不自生亦不從他生不共不無因是故說無生疑曰又不自他不共不無因生畢竟從何而生即省曰因緣所生空假三觀抑揚性海心佛眾生名異體同十境十乘轉識成智不思議境智照方明非言詮所及棄謁諸方後至投子廣鑑問鄉里甚處師曰兩淛東越鑑曰東越事作麼生師曰秦望峯高鑑湖水闊鑑曰秦望峯與你自己是同是別師曰西天梵語此土唐言鑑曰此猶是叢林祇對畢竟是同是別師便喝鑑便打師曰恩大難酬便禮拜丞相張商英居士兜率悅法嗣丞相張商英居士字天覺號無盡年十九應舉入京道由向氏家向預夢神人報曰明日接相公凌晨公至向異之勞問勤腆乃曰秀才未娶當以女奉灑掃公謙辭再三向曰此行若不了當吾亦不爽前約後果及第乃娶之初任主簿因入僧寺見藏經梵夾金字齊整乃怫然曰吾孔聖之書不如胡人之教人所仰重夜坐書院中研墨吮筆憑紙長吟中夜不眠向氏呼曰官人夜深何不睡去公以前意白之正此著無佛論向應聲曰既是無佛何論之有當須著有佛論始得公疑其言遂已之後訪一同列見佛龕前經卷乃問曰此何書也同列曰維摩詰所說經公信手開卷閱到此病非地大亦不離地大處歎曰胡人之語亦能爾耶問此經幾卷曰三卷乃借歸閱次向氏問看何書公曰維摩詰所說經向曰可熟讀此經然後著無佛論公悚然異其言由是深信佛乘留心祖道元祐六年為江西漕首謁東林照覺總禪師照覺詰其所見處與己符合乃印可照覺曰吾有得法弟子住玉谿乃慈古鏡也亦可與語公復因按部過分寧諸禪迓之公到先致敬玉谿慈次及諸山最後問兜率悅禪師悅為人短小公曾見龔德莊說其聰明可人乃曰聞公善文章悅大笑曰運使失却一隻眼了也從悅臨濟九世孫對運使論文章政如運使對從悅論禪也公不然其語乃強屈指曰是九世也問玉谿去此多少曰三十里曰兜率聻曰五里公是夜乃至兜率悅光一夜夢日輪昇天被悅以手搏取乃說與首座曰日輪運轉之義聞張運使非久過此吾當深錐痛劄若肯回頭則吾門幸事首座曰今之士大夫受人取奉慣恐其惡發別生事也悅曰正使煩惱祇退得我院也別無事公與悅語次稱賞東林悅未肯其說公乃題寺後擬瀑軒詩其略曰不向廬山尋落處象王鼻孔謾遼天意譏其不肯東林也公與使語至更深論及宗門事悅曰東林既印可運使運悅於佛祖言教有少疑否公曰有悅曰疑何等語公曰疑香嚴獨脚頌德山拓鉢話悅曰既於此有疑其餘安得無耶祇如巖頭言末後句是有耶是無耶公曰有悅大笑便歸方丈閉却門公一夜睡不穩至五更下牀觸飜溺器乃大徹猛省前話遂有頌曰皷寂鐘沉拓鉢回巖頭一拶語如雷果然祇得三年活莫是遭他授記來遂扣方丈門曰某已捉得賊了悅曰贓在甚處公無語悅曰都運且去來日相見翌日公遂舉前頌悅乃謂曰參禪祇為命根不斷依語生解如是之說公已深悟然至極微細處使人不覺不知墮在區宇乃作頌證之曰等閑行處步步皆如雖居聲色寧滯有無一心靡異萬法非殊休分體用莫擇精麤臨機不礙應物無拘是非情盡凡聖皆除誰得誰失何親何疎拈頭作尾指實為虗飜身魔界轉脚邪塗了無逆順不犯工夫公邀悅至建昌途中一一伺察有十頌敘其事悅亦有十頌酬之時元祐八年八月也公一日謂大慧曰余閱雪竇拈古至百丈再參馬祖因緣曰大冶精金應無變色投卷歎曰審如是豈得有臨濟今日耶遂作一頌曰馬師一喝大雄峯深入髑髏三日聾黃檗聞之驚吐舌江西從此立宗風後平禪師致書云去夏讀臨濟宗派乃知居士得大機大用且求頌本余作頌寄之曰吐舌耳聾師已曉搥胷祇得哭蒼天盤山會裏飜筋斗到此方知普化顛諸方往往以余聰明博記少知余者師自江西法窟來必辨優劣試為老夫言之大慧曰居士見處與真淨死心合公曰何謂也大慧舉真淨頌曰客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面死心拈曰雲巖要問雪竇既是大冶精金應無變色為甚麼却三日耳聾諸人要知麼從前汗馬無人識祇要重論蓋代功公拊几曰不因公語爭見真淨死心用處若非二大老難顯雪竇馬師爾西蜀鑾法師法雲杲法嗣西蜀鑾法師通大小乘佛照謝事居景德師問佛照曰禪家言多不根何也佛照曰汝習何經論曰諸經粗知頗通百法佛照曰祇如昨日雨今日晴是甚麼法中收師懵然佛照舉癢和子擊曰莫道禪家所言不根好師憤曰昨日雨今日晴畢竟是甚麼法中收佛照曰第二十四時分不相應法中收師恍悟即禮謝雲巖天遊禪師泐潭準法嗣隆興府雲巖典牛天遊禪師成都鄭氏子首參死心不契遂依湛堂於泐潭一日泐潭普說曰諸人苦苦就準上座覓佛法遂拊膝曰會麼雪上加霜又拊膝曰若也不會豈不見乾峯示眾曰舉一不得舉二放過一著落在第二師聞脫然穎悟出世雲蓋次遷雲巖嘗和忠道者牧牛頌曰兩角指天四足踏地拽斷鼻繩牧甚屎屁張無盡見之甚擊節後退雲巖過廬山棲賢主翁意不欲納乃曰老老大大正是質庫中典牛也師聞之述一偈而去曰質庫何曾解典牛祇緣價重實難酬想君本領無多子畢竟難禁這一頭因庵于武寧扁曰典牛終身不出塗毒見之已九十三矣九僊法清禪師慧日雅法嗣隆興府九僊法清祖鑑禪師嚴陵人也嘗於池之天寧以伽棃覆頂而坐侍郎曾公開問曰上座僊鄉甚處曰嚴州曰與此問是同是別師拽伽棃下地揖曰官人曾到嚴州否開罔措師曰待官人到嚴州時却向官人道覺海法因庵主慧日雅法嗣平江府覺海法因庵主郡之嵎山朱氏子遊方至東林謁慧日慧日舉靈雲悟道機語問之師擬對慧日曰不是不是師忽有所契中巖蘊能禪師大溈瑃法嗣眉州中巖慧目蘊能禪師本郡呂氏子首參寶勝澄甫禪師所趣頗異至荊湖謁永安喜真如德山繪造詣益高迨抵大溈大溈問上座桑梓何處師曰西川曰我聞西川有普賢菩薩示現是否師曰今日得瞻慈相曰白象何在師曰爪牙已具曰還會轉身麼師提坐具繞禪牀一帀大溈曰不是這箇道理師趨出一日大溈為眾入室問僧黃巢過後還有人收得劒麼僧竪起拳大溈曰菜刀子僧曰爭奈受用不盡大溈喝出次問師黃巢過後還有人收得劒麼師亦竪起拳大溈曰也祇是菜刀子師曰殺得人即休遂近前攔𮌎築之大溈曰三十年弄馬騎今日被驢子撲室中問崇真氈頭如何是你空劫已前父母真領悟曰和尚且低聲遂獻投機頌曰萬年倉裏曾饑饉大海中住儘長渴當初尋時尋不見如今避時避不得師為印可一日與黃提刑奕棊次黃問數局之中無一局同千著萬著則故是如何是那一著師提起棊子示之黃佇思師曰不見道從前十九路迷殺幾多人信相宗顯禪師昭覺白法嗣成都府信相宗顯正覺禪師潼川王氏子少為進士有聲嘗晝掬溪水為戲至夜思之遂見水泠然盈室欲汲之不可而塵境自空曰吾世網裂矣往依昭覺得度具滿分戒後隨眾咨參照覺一日問師高高峯頂立深深海底行汝作麼生會師於言下頓悟曰釘殺脚跟也照覺拈起拂子曰這箇又作麼生師一笑而出服勤七祀南遊至京師歷淮淛晚見五祖演和尚於海會出問未知關棙子難過趙州橋趙州橋即不問如何是關棙子五祖曰汝且在門外立師進步一踏而退五祖曰許多時茶飯元來也有人知滋味明日入室五祖曰你便是昨日問話底僧否我固知你見處祇是未過得白雲關在師珍重便出時圓悟為侍者師以白雲關意扣之圓悟曰你但直下會取師笑曰我不是不會祇是未諳待見這老漢共伊理會一上明日五祖往舒城師與圓悟繼往適會於興化五祖問師記得曾在郡裏相見來師曰全火祇候五祖顧圓悟曰這漢饒舌自是機緣相契遊廬阜回師以高高峯頂立深深海底行所得之語告五祖五祖曰吾嘗以此事詰先師先師曰我曾問遠和尚遠曰貓有歃血之功虎有起屍之德非素達本源不能到也師給侍之久五祖鍾愛之後辭西歸為小參復以頌送曰離鄉四十餘年一時忘却蜀語禪人回到成都切須記取魯語淨因繼成禪師智海平法嗣東京淨因蹣菴繼成禪師袁之宜春劉氏子師同圓悟法真慈受并十大法師禪講千僧赴太尉陳公良弼府齋時徽宗皇帝私幸觀之太師魯國公亦與焉有善華嚴者乃賢首宗之義虎也對眾問諸禪曰吾佛設教自小乘至于圓頓掃除空有獨證真常然後萬德莊嚴方名為佛常聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說諸禪視師師曰如法師所問不足三大禪師之酬淨因小長老可以使法師無惑也師召善善應諾師曰法師所謂愚法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空或作空而不有有而不空義也如我一喝非唯能入五教至於工巧技藝諸子百家悉皆能入師震聲喝一喝問善曰聞麼曰聞師曰汝既聞此一喝是有能入小乘教須臾又問善曰聞麼曰不聞師曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲銷汝復道無道無則元初實有道有則而今實無不有不無能入終教我有一喝之時有非是有因無故有無一喝之時無非是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫徧虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜師復謂曰非唯一喝為然乃至一語一默一動一靜從古至今十方虗空萬象森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界唯心萬法唯識四時八節陰陽一致謂之法性是故華嚴經云法性徧在一切處有相無相一聲一色全在一塵中含四義事理無邊周徧無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善又問曰如何是向上一路師曰汝且向下會取善曰如何是寶所師曰非汝境界善曰望禪師慈悲師曰任從滄海變終不為君通善膠口而退聞者靡不歎仰皇帝顧謂近臣曰禪宗玄妙深極如此淨因才辯亦罕有也近臣奏曰此宗師之緒餘也景淳知藏泐潭祥法嗣景淳知藏梅州人於化度寺得度往依泐潭入室次泐潭問陝府鐵牛重多少師叉手近前曰且道重多少泐潭曰尾在黃河北頭枕黃河南善財無鼻孔依舊向南參師擬議泐潭便打忽頓徹巾侍有年竟隱居林壑懷玉用宣首座泐潭祥法嗣信州懷玉用宣首座四明彭氏子幼為僧徑趨叢席侍泐潭於黃檗一日自臨川持鉢歸值泐潭晚參有云一葉飄空便見秋法身須透閙啾啾師聞領旨泐潭為證據後依大慧大慧亦謂其類已嘗有頌大愚答佛話曰鋸解秤鎚出老杜詩紅稻殘鸚鵡顆碧梧棲老鳳凰枝
