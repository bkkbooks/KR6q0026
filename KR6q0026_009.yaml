body:
  text: 南嶽下十一世臨濟下七世楊岐方會禪師石霜圓法嗣袁州楊岐方會禪師郡之宜春冷氏子少警敏及冠不事筆硯繫名征商課最坐不職乃宵遯入瑞州九峯恍若舊遊眷不忍去遂落髮每閱經心融神會能折節扣參老宿慈明自南源徙道吾石霜師皆佐之總院事依之雖久然未有省發每咨參慈明曰庫司事繁且去他日又問慈明曰監寺異時兒孫徧天下在何用忙為一日慈明適出雨忽作師偵之小徑既見遂搊住曰這老漢今日須與我說不說打你去慈明曰監寺知是般事便休語未卒師大悟即拜於泥途問曰狹路相逢時如何慈明曰你且軃避我要去那裏去師歸來日具威儀詣方丈禮謝慈明呵曰未在自是慈明每山行師輒瞰其出雖晚必擊皷集眾慈明遽還怒曰少叢林暮而陞座何從得此規繩師曰汾陽晚參也何謂非規繩乎一日慈明上堂師出問幽鳥語喃喃辭雲入亂峯時如何慈明曰我行荒草裏汝又入深村師曰官不容鍼更借一問慈明便喝師曰好喝慈明又喝師亦喝慈明連喝兩喝師禮拜慈明曰此事是箇人方能擔荷師拂袖便行慈明移興化師辭歸九峯後道俗迎居楊岐次遷雲蓋受請日拈法衣示眾曰會麼若也不會今日無端走入水牯牛隊裏去也還知麼筠陽九岫萍實楊岐遂陞座時有僧出師曰漁翁未擲釣躍鱗衝浪來僧便喝師曰不信道僧拊掌歸眾師曰消得龍王多少風問師唱誰家曲宗風嗣阿誰師曰有馬騎馬無馬步行曰少年長老足有機籌師曰念汝年老放汝三十棒問如何是佛師曰三脚驢子弄蹄行曰莫祇這便是麼師曰湖南長老乃曰更有問話者麼試出來相見楊岐今日性命在汝諸人手裏一任橫拖倒拽為甚麼如此大丈夫兒須是當眾決擇莫背地裏似水底按葫蘆相似當眾引驗莫便面赤有麼有麼出來決擇看如無楊岐今日失利師便下座九峯勤和尚把住曰今日喜得箇同參師曰作麼生是同參底事勤曰九峯牽犂楊岐拽耙師曰正恁麼時楊岐在前九峯在前勤擬議師拓開曰將謂同參元來不是慈明忌辰設齋眾纔集師於真前以兩手揑拳安頭上以坐具畫一畫打一圓相便燒香退身三步作女人拜首座曰休揑怪師曰首座作麼生首座曰和尚休揑怪師曰兔子喫牛嬭第二座近前打一圓相便燒香亦退身三步作女人拜師近前作聽勢首座擬議師打一掌曰這漆桶也亂做徑山杲云楊岐老漢大似溺却一船麻却來戽斗裏掃龍興孜和尚遷化僧至下遺書師問世尊入滅槨示雙趺和尚歸真有何相示僧無語師搥胷曰蒼天蒼天室中問僧栗棘蓬你作麼生吞金剛圈你作麼生透徑山杲頌云金剛圈栗棘蓬玄沙三種病石鞏一張弓直截為君說新羅在海東一日三人新到師問三人同行必有一智提起坐具曰參頭上座喚這箇作甚麼僧曰坐具師曰真箇那曰是師復曰喚作甚麼曰坐具師顧視左右曰參頭却具眼問第二人欲行千里一步為初如何是最初一句曰到和尚這裏爭敢出手師以手畫一畫僧曰了師展兩手僧擬議師曰了問第三人近離甚處曰南源師曰楊岐今日被上座勘破且坐喫茶黃龍慧南禪師石霜圓法嗣隆興府黃龍慧南禪師信州章氏子依泐潭澄禪師分座接物名振諸方偶同雲峯悅禪師遊西山夜話雲門法道雲峯曰澄公雖是雲門之後法道異矣師詰其所以異雲峯曰雲門如九轉丹砂點鐵成金澄公藥汞銀徒可翫入煆則流去師怒以枕投之明日雲峯謝過又曰雲門氣宇如王甘死語下乎澄公有法授人死語也死語其能活人乎即背去師挽之曰若如是則誰可汝意雲峯曰石霜圓手段出諸方子宜見之不可後也師默計之曰悅師翠巖使我見石霜於悅何有哉即造石霜中途聞慈明不事事忽叢林遂登衡嶽乃謁福嚴賢賢命掌書記俄賢卒郡守以慈明補之既至目其貶剝諸方件件數為邪解師為之氣索遂造其室慈明曰書記領徒遊方借使有疑可坐而商略師哀懇愈切慈明曰公學雲門禪必善其旨如云放洞山三頓棒是有喫棒分無喫棒分師曰有喫棒分慈明色莊曰從朝至暮鵲噪鴉鳴皆應喫棒慈明即端坐受師炷香作禮慈明復問趙州道臺山婆子我為汝勘破了也且那裏是他勘破婆子處師汗下不能加答次日又詣慈明詬罵不已師曰罵豈慈悲法施耶慈明曰你作罵會那師於言下大悟作頌曰傑出叢林是趙州老婆勘破沒來由而今四海清如鏡行人莫與路為讐呈慈明慈明頷之後開法同安初受請日泐潭遣僧來審師提唱之語有曰智海無性因覺妄而成凡覺妄元虗即凡心而見佛便爾休去將謂同安無折合隨汝顛倒所欲南斗七北斗八僧歸舉似澄澄不懌自是泐潭舊好絕矣因化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐喫者不易更有一種不易是甚麼人良久云聻便下座時翠巖真為首座藏主問云適來和尚道第五種不易是甚麼人翠巖云腦後見腮莫與往來師室中常問僧曰人人盡有生緣上座生緣在何處正當問答交鋒却復伸手曰我手何似佛手又問諸方參請宗師所得却復垂脚曰我脚何似驢脚三十餘年示此三問學者莫有契其旨脫有酬者師未甞可否叢林目之為黃龍三關師自頌曰生緣有語人皆識水母何曾離得鰕但見日頭東畔上誰能更喫趙州茶我手佛手兼舉禪人直下薦取不動干戈道出當處超佛越祖我脚驢脚竝行步步踏著無生會得雲收日卷方知此道縱橫總頌曰生緣斷處伸驢脚驢脚伸時佛手開為報五湖參學者三關一一透將來翠巖可真禪師石霜圓法嗣洪州翠巖可真禪師福州人也甞參慈明因之金鑾同善侍者坐夏善乃慈明高第道吾真楊岐會皆推伏之師自負親見慈明天下無可意者善與語知其未徹笑之一日山行舉論鋒發善拈一片瓦礫置磐石上曰若向這裏下得一轉語許你親見慈明師左右視擬對之善叱曰竚思停機情識未透何曾夢見師自愧悚即還石霜慈明見來叱曰本色行脚人必知時節有甚急事夏未了早已至此師泣曰被善兄毒心終礙塞人故來見和尚慈明遽問如何是佛法大意師曰無雲生嶺上有月落波心慈明嗔目喝曰頭白齒豁猶作這箇見解如何脫離生死師悚然求指示慈明曰汝問我師理前語問之慈明震聲曰無雲生嶺上有月落波心師於言下大悟師爽氣逸出機辯迅捷叢林憚之蔣山贊元禪師石霜圓法嗣蔣山贊元覺海禪師婺州義烏人姓傅氏乃大士之裔也夙修種智七歲為僧十五游方遠造石霜陞於丈室慈明一見曰好好著槽廠師遂作驢鳴慈明曰真法器耳俾為侍者二十年中運水搬柴不憚寒暑悉己躬親求道靈隱德章禪師石霜圓法嗣靈隱德章禪師初住大相國寺西經藏院慶曆八年九月一日仁宗詔師於延春閣下齋宣普照大師問如何是當機一句師曰一言逈出青霄外萬仞峰前嶮處行曰作麼生是嶮處行師便喝曰皇帝面前何得如此師曰也不得放過明年又宣入內齋復宣普照問如何是奪人不奪境師曰雷驚細草萌芽發高山進步莫遲遲曰如何是奪境不奪人師曰戴角披毛異來往任縱橫曰如何是人境兩俱奪師曰出門天外迥流光影不真曰如何是人境俱不奪師曰寒林無宿客大海聽龍吟後再宣入化成殿齋宣守賢問齋筵大啟如何報答聖君師曰空中求鳥跡曰意旨如何師曰水內覓魚踪真如方禪師瑯琊覺法嗣真州真如院方禪師參琅邪唯看栢樹子話每入室陳其所見不容措詞常被喝出忽一日大悟直入方丈曰我會也琅邪曰汝作麼生會師曰夜來牀薦暖一覺到天明琅邪可之興教坦禪師瑯琊覺法嗣宣州興教院坦禪師永嘉牛氏子業打銀因淬礪瓶器有省即出家參琅邪機語頓契後依天衣懷禪師時住興教擢為第一座天衣受他請欲聞州乞師繼之時刁景純學士守宛陵天衣恐景純涉外議乃於觀音前祝曰若坦首座道眼明白堪任住持願示夢於刁學士景純夜夢牛在興教法座上天衣凌晨辭州景純舉所夢天衣大笑景純問其故天衣曰坦首座姓牛又屬牛景純就座出帖請之師受請陞座有雪竇化主省宗出問諸佛未出世人人鼻孔遼天出世後為甚麼杳無消息師曰鷄足峰前風悄然省宗曰未在更道師曰大雪滿長安省宗曰誰人知此意令我憶南泉拂袖歸眾更不禮拜師曰新興教今日失利便歸方丈令人請省宗至師曰適來錯祇對一轉語人天眾前何不禮拜葢覆却省宗曰大丈夫膝下有黃金爭肯禮拜無眼長老師曰我別有語在省宗乃理前語至未在更道處師曰我有三十棒寄你打雪竇省宗乃禮拜歸宗可宣禪師瑯琊覺法嗣江州歸宗可宣禪師漢州人也壯為僧即出峽依琅邪一語忽投群疑頓息琅邪可之未幾令分座淨空居士郭功甫過門問道與厚及師領歸宗時功甫任南昌尉俄郡守恚師不為禮捃甚遂作書寄功甫曰某世緣尚有六年奈州主抑逼當棄餘喘託生公家願無見阻功甫閱書驚喜且頷之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之妻詳以告呼燈取書示之相笑不已遂孕及生乃名宣老期年記問如昔至三歲白雲端禪師抵其家始見之曰吾姪來也白雲曰與和尚相別幾年宣倒指曰四年矣葢與相別一年方死白雲曰甚處相別曰白蓮莊上白雲曰以何為驗曰爹爹媽媽明日請和尚齋忽聞推車聲白雲問門外是甚麼聲宣以手作推車勢白雲曰過後如何曰平地兩條溝果六周無疾而逝長水子璿講師瑯琊覺法嗣秀州長水子璿講師郡之嘉興人也自落髮誦楞嚴不輟從洪敏法師講至動靜二相了然不生有省謂敏曰敲空擊木木二作竹尚落筌蹄舉目揚眉已成擬議去此二途方契斯旨敏拊而證之然欲探禪源罔知攸往聞琅邪道重當世即趨其席值上堂次出問清淨本然云何忽生山河大地琅邪憑陵答曰清淨本然云何忽生山河大地師領悟雲峯文悅禪師大愚芝法嗣南嶽雲峯文悅禪師南昌徐氏子初造大愚聞示眾曰大家相聚喫莖若喚作一莖入地獄如箭射便下座師大駭夜造方丈大愚問來何所求師曰求心法大愚曰法輪未轉食輪先轉後生趂色力健何不為眾乞食我忍飢不暇何暇為汝說禪乎師不敢違未幾大愚移翠巖師納疏罷復過翠巖求指示翠巖曰佛法未到爛却雪寒宜為眾乞炭師亦奉命能事罷復造方丈翠巖曰堂司闕人今以煩汝師受之不樂恨翠巖不去心地坐後架桶箍忽散自架墮落師忽然開悟頓見翠巖用處走搭伽棃上寢堂翠巖迎笑曰維那且喜大事了畢師再拜不及吐一辭而去服勤八年後出世翠巖僧問巔山巖崖還有佛法也無師曰有僧曰如何是巔山巖崖佛法師曰猢猻倒上樹徑山杲云若人信受奉行一生參學事畢俗士問如何是佛師曰著衣喫飯量家道曰恁麼則退身三步叉手當𮌎去也師曰醉後添杯不如無淨住居說禪師金山頴法嗣杭州淨住院居說真淨禪師參達觀遂問曰某甲經論粗明禪直不信願師決疑達觀曰既不信禪豈可明經禪是經綱經是禪網提綱正網了禪見經師曰為某甲說禪看達觀曰向下文長師曰若恁麼經與禪乃一體達觀曰佛及祖非二心如手搦拳如拳搦手師因而有省乃成偈曰二十餘年用意猜幾番曾把此心灰而今潦倒逢知己李白元來是秀才節使李端愿居士金山頴法嗣節使李端愿居士兒時在館舍常閱禪書長雖婚宦然篤志祖道遂於後圃築室類蘭若邀達觀處之朝夕咨參至忘寢食達觀一日視公曰非示現力豈致爾哉奈無箇所入何公問曰天堂地獄畢竟是有是無請師明說達觀曰諸佛向無中說有眼見空花太尉就有裏尋無手𢳛水月堪笑眼前見牢獄不避心外聞天堂欲生殊不知忻怖在心善惡成境太尉但了自心自然無惑公曰心如何了達觀曰善惡都莫思量公曰不思量後心歸何所達觀曰且請太尉歸宅公曰祇如人死後心歸何所達觀曰未知生焉知死公曰生則某已知之達觀曰生從何來公罔措達觀起揕其胷曰祇在這裏更擬思量箇甚麼公曰會得也達觀曰作麼生會公曰祇知貪程不覺蹉路達觀拓開曰百年一夢今朝方省既而說偈曰三十八歲懵然無知及其有知何異無知滔滔汴水隱隱隋堤師其歸矣箭浪東馳西余淨端禪師龍華岳法嗣安吉州西余師子淨端禪師本郡人也姓丘氏始見弄師子發明心要往見龍華蒙印可遂旋里合綵為師子皮時被之因號端師子有狂僧回頭對丹陽守呂公肉食師徑至指曰正當與麼時如何是佛回頭不能對師捶其頭推倒乃行又有妖人號不托掘秀州城外地有佛像建塔其上傾城信敬師見揕住曰如何是佛不托擬議師趯之而去丞相章惇慕其道躬請開法吳山化風盛播開堂日僧宣疏至推倒回頭趯翻不托七軸之蓮經未誦一聲之漁父先聞師止之遂登座拈香祝聖罷引聲吟曰本是瀟湘一釣客自西自東自南北大眾雜然稱善師顧笑曰諦觀法王法法王法如是便下座一日章丞相留飯師瞋說偈曰章惇章惇請我看墳我却喫素汝却喫葷惇為大笑又因惇請供賺下餛飩師偈曰腥餛飩素餛飩滿碗盛來渾崙吞垃圾打從灘上過龍宮海藏自分明惇赴召別師師曰且為愛護佛法惇曰不興不廢愛護佛法也師令侍者取糖與相公送路喫糖次師問甜麼惇曰甜師曰甜便住惇一笑遂起師在京師王荊公請講禪就大相國寺設齋看經次荊公入院焚香畢問諸方曰佛未出世時看甚麼經眾無語師曰相公周孔未出世時讀甚麼書公曰伶俐衲僧又曰南無觀世音說出種種法古今沉沒者聲聲怨菩薩師到華亭眾請上堂靈山師子雲間哮吼佛法無可商量不如打箇筋斗便下座元祐初圓照禪師自京師慧林退歸姑蘇見師於甘露曰汝非端師子乎曰是圓照戲之曰村裏師子耳師應聲曰村裏師子村裏弄眉毛眼睛一齊動開却口肚裏直儱侗不管人取奉直饒弄到帝王宮也是一場乾打閧上堂二月二禪翁有何謂春風觸目百花開公子王孫日日醺醺醉唯有殿前陳朝檜不入時人意禪家流祇這是莫思慮坦然齋後一甌茶長連牀上伸脚睡咄問羚羊未挂角時如何師曰怕曰既是善知識因何却怕師曰山僧不曾見恁麼差異畜生師抵障南見上方超和尚有一尼來參師曰待來日五更三點入來師侵早紅粉搽面而坐尼入見驚而遂悟偶病牙謂眾僧曰明日遷化去眾以為戲語請說偈師索筆大書曰端師子太慵懶未死牙齒先壞爛二時伴眾赴堂粥飯都趕不辦如今得死是便宜長眠百事皆不管第一不著看官第二不著喫粥飯五更遂化南嶽下十二世臨濟下八世白雲守端禪師楊岐會法嗣舒州白雲守端禪師衡陽葛氏子往參楊岐楊岐一日忽問受業師為誰師曰茶陵郁和尚楊枝曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎻今朝塵盡光生照破山河萬朵楊岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮楊岐曰汝見昨日打敺儺者麼曰見楊岐曰汝一籌不及渠師復駭曰意旨如何楊岐曰渠愛人笑汝怕人笑師大悟巾侍久之保寧仁勇禪師楊岐會法嗣金陵保寧仁勇禪師四明竺氏子謁雪竇明覺禪師明覺意其可任大法誚之曰央庠座主師憤悱下山望雪竇拜曰我此生行脚參禪道不過雪竇誓不歸鄉即往泐潭踰紀疑情未泮聞楊岐移雲蓋能鈐鍵學者直造其室一語未及頓明心印楊岐歿從同參白雲端禪師遊研極玄奧黃龍祖心禪師黃龍南法嗣隆興府黃龍祖心寶覺禪師南雄鄔氏子參雲峯悅禪師三年無所得辭去雲峯曰必往依黃檗南禪師師至黃檗四年不大發明又辭再上雲峯會雲峯謝世就止石霜因閱傳燈至僧問多福如何是多福一叢竹多福曰一莖兩莖斜曰不會多福曰三莖四莖曲師於此開悟徹見二師用處徑回黃檗方展坐具黃檗曰子已入吾室矣師踊躍曰大事本來如是和尚何得教人看話百計搜尋黃檗曰若不教你如此究尋到無人處自見自肯即吾埋沒汝也師室中常舉拳問僧曰喚作拳頭則觸不喚作拳頭則背喚作甚麼寶峯克文禪師黃龍南法嗣隆興府寶峯克文雲庵真淨禪師陝府鄭氏子坐夏大溈聞僧舉僧問雲門佛法如水中月是否雲門曰清波無透路師乃領解往見黃龍不契却曰我有好處這老漢不識我遂往香城見順和尚順問甚處來師曰黃龍來曰黃龍近日有何言句師曰黃龍近日州府委請黃檗長老黃龍垂語曰鐘樓上念讚牀脚下種菜有人下得語契便往住持勝上座曰猛虎當路坐黃龍遂令去住黃檗順不覺曰勝首座祇下得一轉語便得黃檗住佛法未夢見在師於言下大悟方知黃龍用處遂回見黃龍黃龍問甚處來師曰特來禮拜和尚黃龍曰恰值老僧不在師曰向甚麼處去黃龍曰天台普請南嶽遊山師曰恁麼則學人得自在去也黃龍曰脚下鞋甚處得來師曰廬山七百五十文唱來黃龍曰何曾得自在師指鞋曰何甞不自在黃龍駭之開堂日拈香祝聖問答罷乃曰問話且止祇知問佛問法殊不知佛法來處且道從甚麼處來垂一足曰昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異則且置印在甚麼處還見麼若見非僧非俗無偏無黨一一分付若不見而我自收遂收足喝一喝曰兵隨印轉將逐符行佛手驢脚生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾你諸人去也黃檗惟勝禪師黃龍南法嗣瑞州黃檗惟勝真覺禪師潼川羅氏子居講聚時偶以扇勒櫺有聲忽憶教中道十方俱擊皷十處一時聞因大悟白本講本講令