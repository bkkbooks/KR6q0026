body:
  text: 南嶽下十五世臨濟下十一世徑山宗杲禪師昭覺勤法嗣臨安府徑山宗杲大慧普覺禪師宣城奚氏子年十二入鄉校一日因與同戲以硯投之誤中先生帽償金而歸曰大丈夫讀世間書曷若究出世法即詣東山慧雲院事慧齊年十七剃髮具毗尼偶閲古雲門録恍若舊習往依廣教珵禪師棄遊四方從曹洞諸老宿既得其說去登寶峯謁湛堂準禪師湛堂一見異之俾侍巾襪指以入道捷徑師橫機無所讓湛堂訶曰汝曾未悟病在意識領解則為所知障湛堂疾革囑師曰吾去後當見川勤必能盡子機用勤即圓悟湛堂卒師趨謁無盡居士求湛堂塔銘無盡門庭高少許可與師一言相契下榻延之名師庵曰妙喜洎後再謁且囑令見圓悟師至天寧一日聞圓悟升堂舉僧問雲門如何是諸佛出身處雲門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道熏風自南來殿閣生微涼師於言下忽然前後際斷雖然動相不生却坐在淨裸裸處圓悟謂曰也不易你得到這田地可惜死了不能得活不疑言句是為大病不見道懸崖撒手自肯承當絶後再蘇欺君不得須信有這箇道理遂令居擇木堂為不𨤲務侍者日同士大夫入室擇木乃朝士止息處圓悟每舉有句無句如藤倚樹問之師才開口圓悟便曰不是不是經半載遂問圓悟曰聞和尚當時在五祖曾問這話不知五祖道甚麼圓悟笑而不答師曰和尚當時須對衆問如今說亦何妨圓悟不得已謂曰我問有句無句如藤倚樹意旨如何五祖曰描也描不成畫也畫不就又問樹倒藤枯時如何五祖曰相隨來也師當下釋然曰我會也圓悟遂舉數因緣詰之師酬對無滯圓悟曰始知吾不汝欺遂著臨濟正宗記付之俾掌記室未幾令分座室中握竹篦以驗學者叢林浩然歸重名振京師右丞相呂公舜徒奏賜紫衣佛日之號會女真之變其酋欲取禪僧十數人師在選得免趨吳虎丘度夏因閲華嚴至菩薩登第七地證無生法忍洞曉向所請問湛堂殃崛摩羅持鉢至産婦家因緣圓悟詔住雲居師往省覲至山次日即請為第一座時會中多龍象以圜悟久虗座元俟師之來頗有不平之心及冬至秉拂昭覺元禪師出衆問曰眉間挂劒時如何師曰血濺梵天圜悟於座下以手約曰住住問得極好答得更奇元乃歸衆叢林由是改觀師每入室圓悟時來聽其語一日入室罷上方丈圓悟曰或有箇禪和子得似老僧汝又如何支遣師曰何幸如之正如東坡說作劊子手一生得遇一箇肥漢剮圓悟呵呵大笑曰你倒與我入室拶得我上壁也圓悟又問達磨西來將何傳授師曰不可總作野狐精見解又問據虎頭收虎尾第一句下明宗旨如何是第一句師曰此是第二句圓悟常言近來諸方盡成窠臼五祖下我與佛鑑佛眼三人結社參禪如今早見逗漏出來佛鑑下有一種作狗子呌鵓鳩鳴取笑人佛眼下有一種覷燈籠露柱指東畫西如眼見鬼一般我這裏且無這兩般病師曰擊石火閃電光引得無限人弄業識舉了便會了豈不是佛法大窠窟圓悟不覺吐舌乃曰休管他我只以契證為期若不契證斷不放過師曰契證即得第恐只恁麼傳將去舉了便悟了硬主張擊石火閃電光業識茫茫未有了日圓悟深肯之圜悟歸蜀師於雲居山後古雲門舊址創庵以居學者雲集久之入閩結茅於長樂洋嶼從之得法者十有三人又徙小溪雲門庵後應張丞相魏公浚徑山之命上堂水底泥牛嚼生鐵憍梵鉢提咬著舌海神怒把珊瑚鞭須彌燈王痛不徹室中問僧我前日有一問在你處你先前日答我了也即今因甚麼瞌睡僧曰如是如是師曰道甚麼僧曰不是不是師連打兩棒曰一棒打你如是一棒打你不是舉竹篦問僧曰喚作竹篦則觸不喚作竹篦則背不得下語不得無語速道速道僧曰請和尚放下竹篦即與和尚道師放下竹篦僧拂袖便出師曰侍者認取這僧著又舉問僧僧曰甕裏怕走却鱉那師下禪牀擒住曰此是誰語速道僧曰實不敢謾昧老師此是竹庵和尚教某恁麼道師連打數棒曰分明舉似諸方師年邁求解退居明月堂尋示微恙學徒問安師勉以弘道徐曰吾翌日始行至五鼓親書遺奏又貽書辭紫巖居士侍僧了賢請偈復大書曰生也祇恁麼死也祇恁麼有偈與無偈是甚麼熱大擲筆委然而逝虎丘紹隆禪師昭覺勤法嗣平江府虎丘紹隆禪師和之含山人也謁長蘆信禪師得其大略有傳圓悟語至者師讀之嘆曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆謦咳耳遂由寶峯依湛堂客黃龍叩死心禪師次謁圓悟一日入室圓悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見圓悟曰頭上安頭師聞脫然契證圓悟叱曰見箇甚麼師曰竹密不妨流水過圓悟肯之尋俾掌藏教有問圓悟曰隆藏主柔易若此何能為哉圓悟曰瞌睡虎耳育王端裕禪師昭覺勤法嗣慶元府育王山佛智端裕禪師吳越王之裔也十八得度受具往依淨慈一禪師未幾偶聞僧擊露柱曰你何不說禪師忽微省去謁龍門遠甘露卓泐潭祥皆以頴邁見推晚見圓悟於鍾阜一日圓悟問誰知正法眼藏向這瞎驢邊滅却即今是滅不滅曰請和尚合取口好圓悟曰此猶未出常情師擬對圓悟擊之師頓去所滯護國景元禪師昭覺勤法嗣台州護國此庵景元禪師永嘉楠溪張氏子習台教三棄謁圓悟於鍾阜因僧讀死心小參語云既迷須得箇悟既悟須識悟中迷迷中悟迷悟雙忘却從無迷悟處建立一切法師聞而疑即趨佛殿以手托開門扉豁然大徹繼而執侍機辨逸發圓悟目為聱頭元侍者南峯雲辨禪師昭覺勤法嗣平江府南峯雲辨禪師本郡人依閩之瑞峯章得度旋里謁穹窿圓忽有得遂通所見圓曰子雖得入未至當也切宜著鞭乃辭扣諸席後參圓悟值入室才踵門圓悟曰看腳下師打露柱一下圓悟曰何不著實道取一句師曰師若搖頭弟子擺尾圓悟曰你試擺尾看師翻筋斗而出圓悟大笑由是知名靈隱慧遠禪師昭覺勤法嗣臨安府靈隱慧遠佛海禪師眉山彭氏子年十三從藥師院宗辨為僧詣大慈聽習棄依靈巖徽禪師微有省會圓悟復領昭覺師即之聞圓悟普說舉龐居士問馬祖不與萬法為侶因緣師忽頓悟仆於衆衆掖之師乃曰吾夢覺矣至夜小參師出問曰淨裸裸空無一物赤骨力貧無一錢戶破家亡乞師賑濟圓悟曰七珍八寶一時拏師曰禍不入謹家之門圓悟曰機不離位墮在毒海師隨聲便喝圓悟以拄杖擊禪牀曰喫得棒也未師又喝圓悟連喝兩喝師便禮拜自此機鋒峻發無所抵捂一日鳴鼓升堂師潛坐帳中侍僧尋之師忽撥開帳曰祇在這裏因甚麼不見僧無對華藏安民禪師昭覺勤法嗣建康府華藏密印安民禪師嘉定府朱氏子初講楞嚴於成都為義學所歸時圓悟居昭覺師與勝禪師為友因造焉聞圓悟小參舉國師三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰那裏是文彩已彰處師心疑之告香入室圓悟問座主講何經師曰楞嚴圓悟曰楞嚴有七處徵心八還辨見畢竟心在甚麼處師多呈藝解圓悟皆不肯師復請益圓悟令一切處作文彩已彰會偶僧請益十玄談方舉問君心印作何顏圓悟厲聲曰文彩已彰師聞而有省遂求印證圓悟示以本色鉗鎚師則罔措一日白圓悟曰和尚休舉話待某說看圓悟諾師曰尋常拈槌竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心圓悟笑曰你元來在這裏作活計師又曰下喝敲牀時豈不是返聞聞自性性成無上道圓悟曰你豈不見經中道妙性圓明離諸名相師於言下釋然圓悟出蜀居夾山師罷講侍行圓悟為衆夜參舉古帆未挂因緣師聞未領遂求決圓悟曰你問我師舉前話圓悟曰庭前柏樹子師即洞明謂圓悟曰古人道如一滴投於巨壑殊不知大海投於一滴圓悟笑曰奈這漢何未幾令分座師後謁佛鑑於蔣山佛鑑問佛果有不曾亂為人說底句曾與你說麼師曰合取狗口佛鑑震聲曰不是這箇道理師曰無人奪你鹽茶袋叫作甚麼佛鑑曰佛果若不為你說我為你說師曰和尚疑時退院別參去佛鑑呵呵大笑昭覺道元禪師昭覺勤法嗣成都府昭覺徹庵道元禪師綿州鄧氏子幼於降寂寺圓具東遊謁大別道禪師因看廓然無聖之語忽爾失笑曰達磨元來在這裏道譽之往參佛鑑佛眼蒙賞識依圓悟於金山以所見告圓悟弗之許圓悟被詔住雲居師從之雖有信入終以鯁胸之物未去為疑會圓悟問參徒生死到來時如何僧曰香臺子笑和尚次問師汝作麼生師曰草賊大敗圓悟曰有人問你時如何師擬答圓悟憑陵曰草賊大敗師即徹證圓悟以拳擊之師拊掌大笑圓悟曰汝見甚麼便如此師曰毒拳未報永劫不忘中竺中仁禪師昭覺勤法嗣臨安府中天竺堂中仁禪師洛陽人也來三藏譯經所諦窮經論特於宗門未之信時圓悟居天寧凌晨謁之圓悟方為衆入室師見敬服奮然造前圓悟曰依經解義三世佛冤離經一字即同魔說速道速道師擬對圓悟劈口擊之因墜一齒即大悟上堂舉狗子無佛性話乃曰二八佳人刺繡遲紫荊華下囀黃鸝可憐無限傷春意盡在停針不語時淳熙甲午四月八日孝宗皇帝詔入賜座說法帝舉不與萬法為侶因緣俾拈提師拈罷頌曰稱鎚搦出油間言長語休腰纏十萬貫騎鶴上揚州象耳袁覺禪師昭覺勤法嗣眉州象耳山袁覺禪師郡之袁氏子試經得度本名圓覺郡守填祠牒誤作袁字疑師慊然戲謂之曰一字名可乎師笑曰一字已多郡守異之既受具出蜀遍謁有道尊宿後往大溈依佛性頃之入室陳所見佛性曰汝忒煞遠在然知其為法器俾充侍者掌賓客師每侍佛性佛性必舉法華開示悟入四字令下語又曰直待我竪點頭時汝方是也偶不職被斥制中無依寓俗士家一日誦法華至亦復不知何者是火何者為舍乃豁然制罷歸省佛性見首肯之圓悟再得旨住雲居師至彼以所得白圓悟圓悟呵曰本是淨地屙屎作麼師所疑頓釋華嚴祖覺禪師昭覺勤法嗣眉州中巖華嚴祖覺禪師嘉州楊氏子幼聰慧書史過目成誦著書排釋氏惡境忽現悔過出家依慧日能禪師未幾疽發膝上五年醫莫愈因書華嚴合論畢夜感異夢旦即捨杖步趨一日誦至現相品曰佛身無有生而能示出生法性如虗空諸佛於中住無住亦無去處處皆見佛遂悟華嚴宗旨洎登僧籍府帥請講于千部堂詞辨宏放衆所歎服適南堂靜禪師過門謂師曰觀公講說獨步西南惜未解離文字相耳儻問道方外即今之周金剛也師欣然罷講南遊依圓悟於鍾阜一日入室圓悟舉羅山道有言時踞虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂作麼生會師莫能對夙夜參究忽然有省作偈呈圓悟曰家住孤峯頂長年半掩門自嗟身已老活計付兒孫圓悟見許可次日入室圓悟又問昨日公案作麼生師擬對圓悟便喝曰佛法不是這箇道理師復留五年愈更迷悶後於廬山棲賢閲浮山遠禪師削執論云若道悟有親疏豈有旃檀林中却生臭草豁然契悟作偈寄圓悟曰出林依舊入蓬蒿天網恢恢不可逃誰信業緣無避處歸來不怕語聲高圓悟大喜持以示衆曰覺華嚴徹矣明因曇玩禪師昭覺勤法嗣平江府西山明因曇玩禪師溫州黃氏子遍參叢席宣和庚子回抵鍾阜適朝廷改僧為德士師與同志數人入頭陀巖食松自處久之圓悟被旨居是山親至巖所令去鬚髮及圓悟詔補京師天寧與師俱往命掌香水海未幾因舉枹擊鼓頓明大法凡有所問皆對曰莫理會故流輩咸以莫理會稱之道祖首座昭覺勤法嗣成都府昭覺道祖首座初見圓悟於即心是佛語下發明久之圓悟命分座一日為衆入室餘二十許人師忽問曰生死到來如何回避僧無對師擲下拂子奄然而逝衆皆愕眙亟以聞圓悟圓悟至召曰祖首座師張目視之圓悟曰抖擻精神透關去師點頭竟爾趨寂宗振首座昭覺勤法嗣南康軍雲居宗振首座丹丘人也依圜悟於雲居一日仰瞻鐘閣倐然契證有詰之者首座酬以三偈其後曰我有一機直下示伊青天霹靂電卷星馳德山臨濟棒喝徒施不傳之妙於汝何虧圓悟見大悅樞密徐俯居士昭覺勤法嗣樞密徐俯字師川號東湖居士每侍先龍圖謁法昌及靈源語論終日公聞之藐如也及法昌歸寂在笑談間公異之始篤信此道後丁父憂念無以報罔極命靈源歸孝址說法靈源登座問答已乃曰諸仁者祇如龍圖平日讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後這著萬卷書底又却向甚麼處著公聞灑然有得遂曰吾無憾矣靈源下座問曰學士適來見箇甚麼便恁麼道公曰若有所見則鈍置和尚去也靈源曰恁麼則老僧不如公曰和尚是何心行靈源大笑靖康初為尚書外郎與朝士同志者挂鉢於天寧寺之擇木堂力參圓悟圓悟亦喜其見地超邁一日至書記寮指圓悟頂相曰這老漢腳跟猶未點地在圓悟面曰甕裏何曾走却鱉公曰且喜老漢腳跟點地圓悟曰莫謗他好公休去郡王趙令襟居士昭覺勤法嗣郡王趙令襟字表之號超然居士任南康政成事簡多與禪衲遊公堂間為摩詰丈室適圓悟居甌阜公欣然就其爐錘圓悟不少假公固請圓悟曰此事要得相應直須是死一回始得公默契嘗自疏之其略曰家貧遭劫誰知盡底不存空屋無人幾度賊來亦打圓悟見囑令加護紹興庚申冬公與汪內翰藻李參政邴曾侍郎開詣徑山謁大慧大慧聞至乃令擊鼓入室公欣然袖香趨之大慧曰趙州洗鉢盂話居士作麼生會公曰討甚麼碗拂袖便出大慧起搊住曰古人向這裏悟去你因甚麼却不悟公擬對大慧𢮁之曰討甚麼碗公曰還這老漢始得侍郎李彌遜居士昭覺勤法嗣侍郎李彌遜號普現居士少時讀書五行俱下年十八中鄉舉登第京師旋歷華要至二十八歲為中書舍人常入圓悟室一日早朝回至天津橋馬躍忽有省通身汗流直造天寧適圓悟出門遙見便喚曰居士且喜大事了畢公厲聲曰和尚眼華作甚麼圓悟便喝公亦喝於是機鋒迅捷凡與圓悟問答當機不讓公後遷吏部乞祠祿歸閩連江築庵自娛忽一日示微恙遽索湯沐浴畢遂趺坐作偈曰謾說從來牧護今日分明呈露虗空拶倒須彌說甚向上一路擲筆而逝覺庵道人祖氏昭覺勤法嗣覺庵道人祖氏建寧游察院之姪女也幼志不出適留心祖道於圓悟示衆語下了然明白圓悟曰更須揚却所見始得自由祖答偈曰露柱抽橫骨虗空弄爪牙直饒玄會得猶是眼中沙成都范縣君昭覺勤法嗣成都府范縣君者𡠉居歲久常坐而不臥聞圓悟住昭覺往禮拜請示入道因緣圓悟令看不是心不是佛不是物是箇甚麼久無所契范泣告圓悟曰和尚有何方便令某易會圓悟曰却有箇方便遂令祇看是箇甚麼後有省曰元來恁麼地近那文殊心道禪師太平勤法嗣常德府文殊心道禪師眉州徐氏子年三十得度詣成都習唯識自以為至同舍詰之曰三界唯心萬法唯識今目前萬象摐然心識安在師茫然不知對遂出關周流江淮既抵舒之太平聞佛鑑禪師夜參舉趙州柏樹子話至覺鐵觜曰先師無此語莫謗先師好因大疑提撕既久一夕豁然即趨丈室擬敘所悟佛鑑見來便閉門師曰和尚莫謾某甲佛鑑曰十方無壁落何不入門來師以拳擉破紙佛鑑即開門搊住曰道道師以兩手捧佛鑑頭作口啐而出遂呈偈曰趙州有箇柏樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源會覺公說道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假佛鑑深然之每對客稱賞建炎三年春示衆舉臨濟入滅囑三聖因緣師曰正法眼藏瞎驢滅臨濟何曾有是說今古時人皆妄傳不信但看後三月至閏三月賊鍾相叛其徒欲舉師南奔者師曰學道所以了生死何避之有賊至師曰速見殺以快汝心賊即舉槊殘之血皆白乳賊駭引席覆之而去龍牙智才禪師太平勤法嗣潭州龍牙智才禪師舒州施氏子早服勤於佛鑑法席而局務不辭難名已聞於叢林及遊方迫暮至黃龍適死心在三門問其所從來既稱名則知為舒州太平才莊主矣翌日入室死心問曰會得最初句便會末後句會得末後句便會最初句最初末後拈放一邊百丈野狐話作麼生會師曰入戶已知來見解何須更舉轢中泥死心曰新長老死在上座手裏也師曰語言雖有異至理且無差死心曰如何是無差底事師曰不扣黃龍角焉知頷下珠死心便打初住嶽麓開堂日僧問德山棒臨濟喝今日請師為拈掇師曰蘇嚕蘇嚕曰蘇嚕蘇嚕還有西來意也無師曰蘇嚕蘇嚕由是叢林呼為才蘇嚕何山守珣禪師太平勤法嗣安吉州何山佛燈守珣禪師郡之施氏子參廣鑑瑛禪師不契遂造太平隨衆咨請邈無所入乃封其衾曰此生若不徹去誓不展此於是晝坐宵立如喪考妣逾七七日忽佛鑑上堂曰森羅及萬象一法之所印師聞頓悟往見佛鑑佛鑑曰可惜一顆明珠被這風顛漢拾得乃詰之曰靈雲道自從一見桃華後直至如今更不疑如何是他不疑處師曰莫道靈雲不疑只今覓箇疑處了不可得佛鑑曰玄沙道諦當甚諦當敢保老兄未徹在那裏是他未徹處師曰深知和尚老婆心切佛鑑然之師拜起呈偈曰終日看天不舉頭桃華爛熳始擡眸饒君更有遮天網透得牢關即便休佛鑑囑令護持是夕厲聲謂衆曰這回珣上座穩睡去也圓悟聞得疑其未然乃曰我須勘過始得遂令人召至因與遊山偶到一水潭圓悟推師入水遽問曰牛頭未見四祖時如何師曰潭深魚聚圓悟曰見後如何師曰樹高招風圓悟曰見與未見時如何師曰伸腳在縮腳裏圓悟大稱之祥符清海禪師太平勤法嗣吉州大中祥符清海禪師初見佛鑑佛鑑問三世諸佛一口吞盡何處更有衆生可教化此理如何師擬進語佛鑑喝之師忽領旨龍翔士圭禪師龍門遠法嗣溫州龍翔竹庵士圭禪師成都史氏子初依大慈宗雅心醉楞嚴逾五秋南遊謁諸尊宿始登龍門即以平時所得白佛眼佛眼曰汝解心已極但缺著力開眼耳遂俾職堂司一日侍立次問曰絶對待時如何佛眼曰如汝僧堂中白椎相似師罔措佛眼至晚抵堂司師理前話佛眼曰間言語師於言下大悟雲居善悟禪師龍門遠法嗣南康軍雲居高庵善悟禪師洋州李氏子年十一去家業經得度有夙慧聞冲禪師舉武帝問達磨因緣如獲舊物遽曰我既廓然何勝之有冲異其語勉之南詢蒙授記於龍門一日有僧被蛇傷足佛眼問曰既是龍門為甚麼却被蛇咬師即應曰果然現大人相佛眼益器之後傳此語到昭覺圓悟曰龍門有此僧耶東山法道未寂寥爾黃龍法忠禪師龍門遠法嗣隆興府黃龍牧庵法忠禪師四明姚氏子習台教悟一心三觀之旨未能泯跡遍參名宿至龍門觀水磨旋轉發明心要乃述偈曰轉大法輪目前包裹更問如何水推石磨呈佛眼佛眼曰其中事作麼生師曰㵎下水長流佛眼曰我有末後一句待分付汝師即掩耳而去烏巨道行禪師龍門遠法嗣衢州烏巨雪堂道行禪師處州葉氏子依泗州普照英禪師得度去參佛眼一日聞舉玄沙築著腳指話遂大悟白楊法順禪師龍門遠法嗣撫州白楊法順禪師綿州文氏子依止佛眼聞普說舉傅大士心王銘云水中鹽味色裏膠青決定是有不見其形師於言下有省後觀寶藏迅轉頓明大法趨丈室作禮呈偈曰頂有異峯雲冉冉源無別派水泠泠遊山未到山窮處終被青山礙眼睛佛眼笑而可之雲居法如禪師龍門遠法嗣南康軍雲居法如禪師丹丘胡氏子依護國瑞禪師祝髮登具遍參浙右諸宗匠晚至龍門以平日所證白佛眼佛眼曰此皆學解非究竟事欲了生死當求妙悟師駭然諦信一日命主香積以道業未辦固辭佛眼勉曰姑就職其中大有人為汝說法未幾晨興開廚門望見聖僧契所未證即白佛眼佛眼曰這裏還見聖僧麼師詣前問訊叉手而立佛眼曰向汝道大有人為汝說法歸宗正賢禪師龍門遠法嗣南康軍歸宗真牧正賢禪師潼川陳氏子遊成都依大慈秀公習經論凡典籍過目成誦秀稱為經藏子出蜀謁諸尊宿後扣佛眼一日入室佛眼舉殷勤抱得旃檀樹語聲未絶師頓悟佛眼曰經藏子漏逗了也自是與師商確淵奧亹亹無盡佛眼稱善因手書真牧二字授之道場明辨禪師龍門遠法嗣安吉州道場正堂明辨禪師本郡俞氏子謁諸名宿至西京少林聞僧舉佛眼以古詩發明罽賓王斬師子尊者話曰楊子江頭楊柳春楊華愁殺渡江人一聲羌笛離亭晚君向瀟湘我向秦師默有所契即趨龍門求入室佛眼問從上祖師方冊因緣許你會得忽舉拳曰這箇因何喚作拳師擬對佛眼築其口曰不得作道理於是頓去知見室中垂問曰猫兒為甚麼愛捉老鼠又曰板鳴因甚麼狗吠師家風嚴冷初機多憚之因贊達磨曰升元閣前懡㦬洛陽峯畔乖張皮髓傳成話隻履無處埋藏不是一番寒徹骨爭得梅華撲鼻香雪堂行一見大稱賞曰先師猶有此人在只消此贊可以坐斷天下人舌頭世奇首座龍門遠法嗣世奇首座者成都人也遍依師席晚造龍門一日燕坐瞌睡間羣蛙忽鳴誤聽為淨髮版響亟趨往有曉之者曰蛙鳴非版也師恍然詣方丈剖露佛眼曰豈不見羅睺羅師遽止曰和尚不必舉待去自看未幾有省乃占偈曰夜中聞版響覺後蝦蟇啼蝦蟇與版響山嶽一時齊由是益加參究洞臻玄奧佛眼命分座師固辭曰此非細事也如金針刺眼毫髮若差眼則破矣願生生居學地而自煅煉佛眼因以偈美之給事馮楫居士龍門遠法嗣給事馮楫濟川居士自壯扣諸名宿最後居龍門從佛眼遠禪師再歲一日同遠經行法堂偶童子趨庭吟曰萬象之中獨露身遠拊公背曰好聻公於是契入紹興丁巳除給事會大慧禪師就明慶開堂大慧下座公挽之曰和尚每言於士大夫前曰此生決不作這蟲豸今日因甚却納敗缺大慧曰盡大地是箇杲上座你向甚處見他公擬對大慧便掌公曰是我招得越月特丐祠坐夏徑山榜其室曰不動軒一日大慧升座舉藥山問石頭曰三乘十二分教某甲粗知承聞南方直指人心見性成佛實未明了伏望慈悲示誨石頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得你作麼生藥山罔措石頭曰子緣不在此可往江西見馬大師去藥山至馬祖處亦如前問祖曰有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目者是有時教伊揚眉瞬目者不是藥山大悟大慧拈罷公隨至方丈曰適來和尚所舉底因緣某理會得了大慧曰你如何會公曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭唎娑婆訶恁麼不恁麼總不得蘇嚧㗭唎娑婆訶大慧印之以偈曰梵語唐言打成一塊咄哉俗人得此三昧公後知卭州所至宴晦無倦嘗自詠曰公事之餘喜坐禪少曾將脅到牀眠雖然現出宰官相長老之名四海傳至二十三年秋乞休致預報親知期以十月三日報終至日令後廳置高座見客如平時至辰巳間降階望闕肅拜請漕使攝卭事著僧衣履踞高座囑諸官吏及道俗各宜向道扶持教門建立法幢遂拈拄杖按膝蛻然而化漕使請曰安撫去住如此自由何不留一頌以表罕聞公張目索筆書曰初三十一中九下七老人言盡龜哥眼赤竟爾長往石頭自回禪師大隨靜法嗣台州釣魚臺石頭自回禪師本郡人也世為石工雖不識字志慕空宗每求人口授法華能誦之棄家投大隨供掃灑寺中令取崖石師手不釋鎚鑿而誦經不輟口大隨見而語曰今日硿磕明日硿磕死生到來作甚折合師愕然釋其器設禮願聞究竟法因隨至方丈大隨令且罷誦經看趙州勘婆因緣師念念不去心久之因鑿石石稍堅盡力一鎚瞥見火光忽然省徹走至方丈禮拜呈頌曰用盡工夫渾無巴鼻火光迸散元在這裏大隨欣然曰子徹也復獻趙州勘婆頌曰三軍不動旗閃爍老婆正是魔王腳趙州無柄鐵掃帚掃蕩煙塵空索索大隨可之遂授以僧服人以其為石工故有回石頭之稱也護聖居靜禪師大隨靜法嗣潼川府護聖愚丘居靜禪師成都楊氏子年十四禮白馬安慧為師聞南堂道望遂往依焉南堂舉香嚴枯木裏龍吟話往返酬詰師於言下大悟一日南堂問曰莫守寒巖異草青坐却白雲宗不妙汝作麼生師曰直須揮劒若不揮劒漁父棲巢南堂矍然曰這小廝兒師珍重便行劍門南修道者大隨靜法嗣劍門南修道者淳厚之士也自大隨一語契投服勤不怠歸謁崇化贇禪師坐次贇以宗門三印問之南曰印空印泥印水平地寒濤競起假饒去就十分也是靈龜曳尾尚書莫將居士大隨靜法嗣莫將尚書字少虗家世豫草分寧因官西蜀謁南堂靜禪師咨決心要南堂使其向好處提撕適如廁俄聞穢氣急以手掩鼻遂有省即呈以偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭南堂答曰一法才通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡僧笑點頭徑山信云莫尚書向鼻尖頭摸得些臭氣便揚出熏人南堂老漢好與三十棒何故養子不教父之過頌云摸得黃金特地愁支離縱好漫風流當時若作今時用截斷尚書臭鼻頭龍圖王蕭居士大隨靜法嗣龍圖王蕭居士字觀復留昭覺日聞開靜板聲有省問南堂曰某有箇見處才被人問却開口不得未審過在甚處南堂曰過在有箇見處南堂却問朝斾幾時到任公曰去年八月四日南堂曰自按察幾時離衙公曰前月二十南堂曰為甚麼道開口不得公乃契悟徑山智䇿禪師雲巖游法嗣臨安府徑山塗毒智䇿禪師天台陳氏子十九造國清謁寂室光灑然有省次謁大圓於明之萬壽大圓問曰甚處來師曰天台來曰見智者大師麼師曰即今亦不少曰因甚在汝腳跟下師曰當面蹉過大圓曰上人不耘而秀不扶而直一日辭去大圓送之門拊師背曰寶所在近此城非實師頷之往豫章謁典牛道由雲居風雪塞路坐閲四十二日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞版聲來典牛曰是甚麼師曰打破虗空全無柄靶典牛曰向上事未在師曰東家暗坐西家廝罵典牛曰嶄然超出佛祖他日起家一麟足矣左丞范沖居士圓通旻法嗣左丞范沖居士字致虗由翰苑守豫章過圓通謁旻禪師茶罷曰某行將老矣墮在金紫行中去此事稍遠圓通呼內翰公應喏圓通曰何遠之有公躍然曰乞師再垂指誨圓通曰此去洪都有四程公佇思圓通曰見即便見擬思即差公乃豁然有省樞密吳居厚居士圓通旻法嗣樞密吳居厚居士擁節歸鍾陵謁圓通旻禪師曰某頃赴省試過此過趙州關因問前住訥老透關底事如何訥曰且去做官今不覺五十餘年旻曰曾明得透關底事麼公曰八次經過常存此念然未甚脫灑在旻度扇與之曰請使扇公即揮扇旻曰有甚不脫灑處公忽有省曰便請末後句旻乃揮扇兩下公曰親切親切旻曰吉獠舌頭三千里中丞盧航居士圓通旻法嗣中丞盧航居士與圓通擁爐次公問諸家因緣不勞拈出直截一句請師指示圓通厲聲指曰看火公急撥衣忽大悟謝曰灼然佛法無多子圓通喝曰放下著公應喏喏左司都貺居士圓通旻法嗣左司都貺居士問圓通曰是法非思量分別之所能解當如何湊泊圓通曰全身入火聚公曰畢竟如何曉會圓通曰驀直去公沈吟圓通曰可更喫茶麼公曰不必圓通曰何不恁麼會公契旨曰元來太近圓通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處圓通曰咦猶有這箇在公曰乞師再垂指示圓通曰便恁麼去鐺是鐵鑄公頓首謝之冶父道川禪師淨因成法嗣無為軍冶父實際道川禪師崑山狄氏子初為縣之弓級聞東齊謙首座為道俗演法往從之習坐不倦一日因不職遭笞忽於杖下大悟遂辭職依謙南嶽下十六世臨濟下十二世教忠彌光禪師徑山杲法嗣泉州教忠晦庵彌光禪師閩之李氏子出嶺謁圓悟禪師於雲居次參黃檗祥高庵悟機語皆契以淮楚盜起歸謁佛心會大慧寓廣因往從之大慧謂曰汝在佛心處所得者試舉一二看師舉佛心上堂拈普化公案曰佛心即不然總不恁麼來時如何劈脊便打從教遍界分身大慧曰汝意如何師曰某不肯他後頭下箇注腳大慧曰此正是以病為法師毅然無信可意大慧曰汝但揣摩看師竟以為不然經旬因記海印信禪師拈曰雷聲浩大雨點全無始無滯趨告大慧大慧以舉道者見琅邪并玄沙未徹語詰之師對已大慧笑曰雖進得一步祇是不著所在如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩說禪者見處總如此何益於事其楊岐正傳三四人而已師慍而去翌日大慧問汝還疑否師曰無可疑者大慧曰祇如古人相見未開口時已知虗實或聞其語便識淺深此理如何師悚然汗下莫知所詣大慧令究有句無句大慧過雲門庵師侍行一日問曰某到這裏不能得徹病在甚處大慧曰汝病最癖世醫拱手何也別人死了活不得汝今活了未曾死要到大安樂田地須是死一回始得師疑情愈深後入室大慧問喫粥了也洗鉢盂了也去却藥忌道將一句來師曰裂破大慧震威喝曰你又說禪也師即大悟大慧撾鼓告衆曰龜毛拈得笑咍咍一擊萬重關鎖開慶快平生在今日孰云千里賺吾來師亦以頌呈之曰一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈得鼻孔失却口東林道顏禪師徑山杲法嗣江州東林卍庵道顏禪師潼川人久參圓悟微有省發洎圓悟還蜀囑依妙喜仍以書致妙喜曰顏川彩繪已畢但缺點眼耳他日嗣其後未可量也妙喜居雲門及洋嶼師皆在焉朝夕質疑方大悟西禪鼎需禪師徑山杲法嗣福州西禪懶庵鼎需禪師本郡林氏子幼舉進士有聲年二十五因讀遺教經忽曰幾為儒冠誤欲去家母難之以親迎在期師乃絶之曰夭桃紅杏一時分付春風翠竹黃華此去永為道伴竟依保壽樂禪師為比丘一錫湖湘遍參名宿法無異味歸里結庵於羌峯絶頂不下山者三年佛心才禪師挽出首衆於大乘嘗問學者即心即佛因緣時妙喜庵于洋嶼師之友彌光與師書云庵主手段與諸方別可來少欵如何師不答彌光以計邀師飯師往赴之會妙喜為諸徒入室師隨喜焉妙喜舉僧問馬祖如何是佛祖曰即心是佛作麼生師下語妙喜詬之曰你見解如此敢妄為人師耶鳴鼓普說訐其平生珍重得力處排為邪解師淚交頤不敢仰視默計曰我之所得既為所排西來不傳之旨豈止此耶遂歸心弟子之列一日妙喜問曰內不放出外不放入正恁麼時如何師擬開口妙喜拈竹篦劈脊連打三下師於此大悟厲聲曰和尚已多了也妙喜又打一下師禮拜妙喜笑曰今日方知吾不汝欺也遂印以偈曰頂門竪亞摩醯眼肘後斜懸奪命符瞎却眼卸却符趙州東壁挂葫蘆於是聲名喧動叢林開善道謙禪師徑山杲法嗣建寧府開善道謙禪師本郡人初之京師依圓悟無所省發後隨妙喜庵居泉南及妙喜領徑山師亦侍行未幾令師往長沙通紫巖居士張公書師自謂我參禪二十年無入頭處更作此行決定荒廢意欲無行友人宗元者叱曰不可在路便參禪不得也去吾與汝俱往師不得已而行在路泣語元曰我一生參禪殊無得力處今又途路奔波如何得相應去宗元告之曰你但將諸方參得底悟得底圓悟妙喜為你說得底都不要理會途中可替底事我盡替你只有五件事替你不得你須自家支當師曰五件者何事願聞其要宗元曰著衣喫飯屙屎放尿䭾箇死尸路上行師於言下領旨不覺手舞足蹈宗元曰你此回方可通書宜前進吾先歸矣宗元即回徑山師半載方返妙喜一見而喜曰建州子你這回別也育王德光禪師徑山杲法嗣慶元府育王佛照德光禪師臨江軍彭氏子志學之年依本郡東山光化寺吉禪師落髮一日入室吉問不是心不是佛不是物是甚麼師罔措遂致疑通夕不寐次日詣方丈請益昨日蒙和尚垂問既不是心又不是佛又不是物畢竟是甚麼望和尚慈悲指示吉震威一喝曰這沙彌更要我與你下注腳在拈棒劈脊打出師於是有省後謁月庵杲應庵華百丈震終不自肯適大慧領育王四海英材鱗集師亦與焉大慧室中問師喚作竹篦則觸不喚作竹篦則背不得下語不得無語師擬對大慧便棒師豁然大悟從前所得瓦解冰消玉泉曇懿禪師徑山杲法嗣福州玉泉曇懿禪師久依圓悟自謂不疑紹興初出住興化祥雲法席頗盛大慧入閩知其所見未諦致書令來師遲遲大慧小參且痛斥仍榜告四衆師不得已破夏謁之大慧鞫其所證既而曰汝恁麼見解敢嗣圓悟老人邪師退院親之一日入室大慧問我要箇不會禪底做國師師曰我做得國師去也大慧喝出居無何語之曰香嚴悟處不在擊竹邊俱胝得處不在指頭上師乃頓明薦福悟本禪師徑山杲法嗣饒州薦福悟本禪師江州人也自江西雲門參侍妙喜至泉南小溪于時英俊畢集受印可者多矣師私謂其棄己且欲發去妙喜知而語之曰汝但專意參究如有所得不待開口吾已識也既而有聞師入室者故謂師曰本侍者參禪許多年逐日只道得箇不會師詬之曰這小鬼你未生時我已三度霍山廟裏退牙了好教你知由是益鋭志以狗子無佛性話舉無字而提撕一夕將三鼓倚殿柱昏寐間不覺無字出口吻忽爾頓悟後三日妙喜歸自郡城師趨丈室足才越閫未及吐詞妙喜曰本鬍子這回方是徹頭也育王遵璞禪師徑山杲法嗣慶元府育王大圓遵璞禪師福州人幼同玉泉懿問道圓悟數載後還里佐懿於莆中祥雲紹興甲寅大慧居洋嶼師往訊之入室次大慧問三聖興化出不出為人不為人話你道這兩箇老漢還有出身處也無師於大慧膝上打一拳大慧曰祇你這一拳為三聖出氣為興化出氣速道速道師擬議大慧便打復謂曰你第一不得忘了這一棒後因大慧室中問僧曰德山見僧入門便棒臨濟見僧入門便喝雪峯見僧入門便道是甚麼睦州見僧便道現成公案放你三十棒你道這四箇老漢還有為人處也無僧曰有大慧曰劄僧擬議大慧便喝師聞遽領微旨大慧欣然許之能仁祖元禪師徑山杲法嗣溫州鴈山能仁枯木祖元禪師七閩林氏子初謁雪峯預次依佛心才皆已機契及依大慧於雲門庵夜坐次睹僧剔燈始徹證有偈曰剔起燈來是火歷劫無明照破歸堂撞見聖僧幾乎當面蹉過不蹉過是甚麼十五年前奇特依前祇是這箇大慧以偈贈之曰萬仞崖頭解放身起來依舊却惺惺饑餐渴飲渾無事那論昔人非昔人蔣山善直禪師徑山杲法嗣建康府蔣山一庵善直禪師德安雲夢人初參妙喜於回鴈峯下一日妙喜問之曰上座甚處人師曰安州人妙喜曰我聞你安州人會廝撲是否師便作相撲勢妙喜曰湖南人喫魚因甚湖北人著鯁師打筋斗而出妙喜曰誰知冷灰裏有粒豆𪹼一日留守陳丞相俊卿會諸山茶話次舉有句無句如藤倚樹公案令諸山批判皆以奇語取奉師最後曰張打油李打油不打渾身只打頭陳大喜近禮侍者徑山杲法嗣近禮侍者三山人久侍大慧嘗默究竹篦話無所入一日入室罷求指示大慧曰你是福州人我說箇喻向你如將名品荔枝和皮殼一時剝了以手送在你口裏祇是你不解吞師不覺失笑曰和尚吞却即禍事大慧後問師曰前日吞了底荔枝祇是你不知滋味師曰若知滋味轉見禍事資壽尼妙總禪師徑山杲法嗣平江府資壽尼無著妙總禪師丞相蘇公頌之孫女也年三十許厭世浮休脫去緣飾咨參諸老已入正信作夏徑山大慧升堂舉藥山初參石頭後見馬祖因緣師聞豁然省悟大慧下座不動居士馮公楫隨至方丈曰某理會得和尚適來所舉公案大慧曰居士如何曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭哩娑婆訶恁麼不恁麼總不得囌嚧㗭哩娑婆訶大慧舉似師師曰曾見郭象注莊子識者曰却是莊子注郭象大慧見其語異復舉巖頭婆子話問之師答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山海月都拋却贏得莊周蝶夢長大慧休去馮公疑其所悟不根後過無錫招至舟中問曰婆生七子六箇不遇知音祇這一箇也不消得便棄水中大慧老師言道人理會得且如何會師曰已上供通並是詣實馮公大驚大慧挂牌次師入室大慧問古人不出方丈為甚麼却去莊上喫油餈師曰和尚放妙總過妙總方敢通箇消息大慧曰我放你過你試道看師曰妙總亦放和尚過大慧曰爭奈油餈何師喝一喝而出於是聲聞四方侍郎張九成居士徑山杲法嗣侍郎無垢居士張九成未第時因客談楊文公呂微仲諸名儒所造精妙皆由禪學而至也於是心慕之聞寶印楚明禪師道傳大通居淨慈即之請問入道之要明曰此事唯念念不捨久久純熟時節到來自然證入復舉趙州柏樹子話令時時提撕公久之無省辭謁善權清禪師公問此事人人有分箇箇圓成是否清曰然公曰為甚麼某無箇入處清於袖中出數珠示之曰此是誰底公俯仰無對清復袖之曰是汝底則拈取去才涉思惟即不是汝底公悚然未幾留蘇氏館一夕如廁以柏樹子話究之聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有玄沙屆明謁法印一禪師機語頗契適私忌就明靜庵供雲水主僧惟尚禪師才見乃展手公便喝尚批公頰公趨前尚曰張學録何得謗大般若公曰某見處祇如此和尚又作麼生尚舉馬祖升堂百丈卷席話詰之敘語未終公推倒卓子尚大呼張學録殺人公躍起問傍僧曰汝又作麼生僧罔措公毆之顧尚曰祖禰不了殃及兒孫尚大笑公獻偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺尚答曰從來高價不饒伊百戰場中奮兩眉奪角衝關君會也叢林誰敢更相欺紹興癸丑魁多士復謁尚於東庵尚曰浮山圓鑑云饒你入得汾陽室始到浮山門亦未見老僧在公作麼生公叱侍僧曰何不祗對僧罔措公打僧一掌曰蝦蟆窟裏果沒蛟龍丁巳秋大慧禪師董徑山學者仰如星斗公閲其語要歎曰是知宗門有人持以語尚恨未一見及為禮部侍郎偶參政劉公請大慧說法于天竺公三往不值暨大慧報謁公見但寒暄而已大慧亦默識之尋奉祠還里至徑山與馮給事諸公議格物大慧曰公祇知有格物而不知有物格公茫然大慧大笑公曰師能開諭乎大慧曰不見小說載唐人有與安祿山謀叛者其人先為閬守有畫像在焉明皇幸蜀見之怒令侍臣以劒擊其像首時閬守居陝西首忽墮地公聞頓領深旨題不動軒壁曰子韶格物妙喜物格欲識一貫兩箇五百大慧始許可後守邵陽丁父難過徑山飯僧秉鈞者意大慧議及朝政遂竄大慧於衡陽令公居家守服服除安置南安丙子春蒙恩北還道次新淦而大慧適至與聯舟劇談宗要未嘗語往事于氏心傳録曰憲自嶺下侍舅氏歸新淦因會大慧舅氏令拜之憲曰素不拜僧舅氏曰汝姑扣之憲知其嘗執卷遂舉子思中庸天命之謂性率性之謂道修道之謂教三句以問大慧曰凡人既不知本命元辰下落處又要牽好人入火坑如何聖賢於打頭一著不鑿破憲曰吾師能為聖賢鑿破否大慧曰天命之謂性便是清淨法身率性之謂道便是圓滿報身修道之謂教便是千百億化身憲得以告舅氏曰子拜何辭繼鎮永嘉丁丑秋丐祠枉道訪大慧於育王越明年大慧得旨復領徑山謁公於慶善院曰某每於夢中必誦語孟何如大慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像公曰非老師莫聞此論也其頌黃龍三關曰我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裏走諱不得我腳何似驢腳又被黐膠粘著翻身直上兜率天已是遭他老鼠藥吐不出人人有箇生緣處鐵圍山下幾千年三灾直到四禪天這驢猶自在旁邊煞得工夫提刑吳偉明居士徑山杲法嗣提刑吳偉明居士字元昭久參真歇了禪師得自受用三昧為極致後訪大慧於洋嶼庵隨衆入室大慧舉狗子無佛性話問之公擬答大慧以竹篦便打公無對遂留咨參一日大慧謂曰不須呈伎倆直須啐地折嚗地斷方敵得生死若祇呈伎倆有甚了期即辭去道次延平倐然契悟連書數頌寄大慧皆室中所問者有曰不是心不是佛不是物通身一具金鎖骨趙州親見老南泉解道鎮州出蘿蔔大慧即說偈證之曰通身一具金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊門司黃彥節居士徑山杲法嗣門司黃彥節居士字節夫號妙德於大慧一喝下疑情頓脫大慧以衣付之嘗舉首山竹篦話至葉縣近前奪得拗折擲向階下曰是甚麼首山曰瞎公曰妙德到這裏百色無能但記得曾作蠟梅絶句曰擬嚼枝頭蠟驚香却肖蘭前村深雪裏莫作嶺梅看天童曇華禪師虎丘隆法嗣明州天童應庵曇華禪師蘄州江氏子首依水南遂禪師染指法味因遍歷江湖與諸老激揚無不契者至雲居禮圓悟禪師圓悟一見痛與提䇿及入蜀指見彰教彰教移虎丘師侍行未半載頓明大事去謁此庵分座連雲開法妙嚴後遷諸巨剎住歸宗日大慧在梅陽有僧傳師垂示語句大慧見之極口稱歎後以偈寄曰坐斷金輪第一峯千妖百怪盡潛蹤年來又得真消息報道楊岐正脉通其歸重如此淨慈師一禪師育王裕法嗣臨安府淨慈水庵師一禪師婺州馬氏子十六披削首參雪峯慧照禪師慧照舉藏身無迹話問之師數日方明呈偈曰藏身無迹更無藏脫體無依便廝當古鏡不勞還自照淡煙和霧濕秋光慧照質之曰畢竟那裏是藏身無迹處師曰嗄慧照曰無蹤迹處因甚麼莫藏身師曰石虎吞却木羊兒慧照深肯之道場法全禪師育王裕法嗣安吉州道場無庵法全禪師姑蘇陳氏子久依佛智每入室佛智以狗子無佛性話問之師罔對一日聞僧舉五祖頌云趙州露刃劒忽大悟有偈曰鼓吹轟轟袒半肩龍樓香噴益州船有時赤腳弄明月踏破五湖波底天慧通清旦禪師大溈泰法嗣潭州慧通清旦禪師蓬州嚴氏子初出關至德山值泰上堂舉趙州曰臺山婆子已為汝勘破了也且道意在甚麼處良久曰就地撮將黃葉去入山推出白雲來師聞釋然翌日入室德山問前百丈不落因果因甚麼墮野狐後百丈不昧因果因甚麼脫野狐師曰好與一坑埋却靈巖仲安師師大溈泰法嗣澧州靈巖仲安禪師幼為比丘壯遊講肆後謁圓悟於蔣山時佛性為座元師扣之即領旨逮佛性住德山遣師至鍾阜通嗣書圓悟問曰千里馳來不辱宗風公案現成如何通信師曰覿面相呈更無回互曰此是德山底那箇是上座底師曰豈有第二人曰背後底聻師投書圓悟笑曰作家禪客天然有在師曰付與蔣山次至僧堂前師捧書問訊首座首座曰玄沙白紙此自何來師曰久默斯要不務速說今日拜呈幸希一覽首座便喝師曰作家首座首座又喝師以書便打首座擬議師曰未明三八九不免自沈吟師以書復打一下曰接時圓悟與佛眼見圓悟曰打我首座死了也佛眼曰官馬廝踢有甚憑據師曰說甚官馬廝踢正是龍象蹴踏圓悟喚師至曰我五百人首座你為甚麼打他曰和尚也須喫一頓始得圓悟顧佛眼吐舌佛眼曰未在却顧師問曰空手把鉏頭步行騎水牛人從橋上過橋流水不流意作麼生師鞠躬曰所供並是詣實佛眼笑曰元來是屋裏人又往見五祖自和尚通法眷書五祖曰書裏說箇甚麼師曰文彩已彰曰畢竟說箇甚麼師曰當陽揮寶劒曰近前來這裏不識幾箇字師曰莫詐敗五祖顧侍者曰是那裏僧曰此上座向曾在和尚會下去五祖曰怪得恁麼滑頭師曰被和尚鈍置來五祖乃將書於香爐上熏曰南無三曼多沒陀南師近前彈指而已五祖便開書回德山日佛果佛眼皆有偈送之未幾靈巖虗席衲子投牒乞師住持遂師法焉國清行機禪師護國元法嗣台州國清簡堂行機禪師本郡人姓楊氏才壓儒林年二十五棄妻孥學出世法晚見此庵密有契證出應莞山刀耕火種單丁者一十七年嘗有偈曰地爐無火客囊空雪似楊華落歲窮拾得斷麻穿壞衲不知身在寂寥中每謂人曰某猶未穩在豈以住山樂吾事邪一日偶看斫樹倒地忽然大悟平昔礙膺之物泮然冰釋未幾有江州圓通之命乃曰吾道將行即欣然曳杖而去登座說法曰圓通不開生藥鋪單單只賣死猫頭不知那箇無思算喫著通身冷汗流室中常舉苕帚柄問學者曰依俙苕帚柄髣佛赤斑蛇衆皆下語不契有僧請益師示以頌曰依俙苕帚柄髣佛赤斑蛇棒下無生忍臨機不識爺淳熙己亥八月朔示微疾染翰別郡守曾公逮夜半書偈辭衆曰鐵樹開華雄雞生卵七十二年搖籃繩斷擲筆示寂覺阿上人靈隱遠法嗣覺阿上人日本國滕氏子也十四得度受具習大小乘有聲二十九屬商者自中都回言禪宗之盛覺阿奮然拉法弟金慶航海而來袖香拜靈隱佛海禪師佛海問其來覺阿輒書而對復書曰我國無禪宗唯講五宗經論國主無姓氏號金輪王以嘉應改元捨位出家名行真年四十四王子七歲令受位今已五載度僧無進納而講義高者賜之某等仰服聖朝遠公禪師之名特詣丈室禮拜願傳心印以度迷津且如心佛及衆生是三無差別離相離言假言顯之禪師如何開示佛海曰衆生虗妄見見佛見世界覺阿書曰無明因何而有佛海便打覺阿即命佛海升座決疑明年秋辭遊金陵抵長蘆江岸聞鼓聲忽大悟始知佛海垂手旨趣內翰曾開居士靈隱遠法嗣內翰曾開居士字天游久參圓悟暨往來大慧之門有日矣紹興辛未佛海補三衢光孝公與超然居士趙公訪之問曰如何是善知識佛海曰燈籠露柱貓兒狗子公曰為甚麼贊即歡喜毀即煩惱佛海曰侍郎曾見善知識否公曰某三十年參問何言不見佛海曰向歡喜處見煩惱處見公擬議佛海震聲便喝公擬對佛海曰開口底不是公罔然佛海召曰侍郎向甚麼處去也公猛省遂點頭說偈曰咄哉瞎驢叢林妖孽震地一聲天機漏泄有人更問意如何拈起拂子劈口截佛海曰也祇得一橛知府葛郯居士靈隱遠法嗣知府葛郯居士字謙問號信齊少擢上第玩意禪悅首謁無庵全禪師求指南無庵令究即心即佛久無所契請曰師有何方便使某得入無庵曰居士太無厭生已而佛海來居劒池公因從遊乃舉無庵所示之語請為衆普說佛海發揮之曰即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里子規枝上月三更留旬日而後返一日舉不是心不是佛不是物豁然頓明頌曰非心非佛亦非物五鳳樓前山突兀艷陽影裏倒翻身野狐跳入金毛窟無庵肯之即遣書頌呈佛海佛海報曰此事非紙筆可既居士能過我當有所聞矣遂復至虎丘佛海迎之曰居士見處止可入佛境界入魔境界猶未得在公加禮不已佛海正容曰何不道金毛跳入野狐窟公乃痛領嘗問諸禪曰夫婦二人相打通兒子作證且道證父即是證母即是或庵體禪師著語曰小出大遇淳熙六年守臨川八年感疾一夕忽索筆書偈曰大洋海裏打鼓須彌山上聞鐘業鏡忽然撲破翻身透出虗空召僚屬示之曰生之與死如晝與夜無足怪者若以道論安得生死若作生死會則去道遠矣語畢端坐而化徑山寶印禪師華藏民法嗣臨安府徑山別峯寶印禪師嘉州李氏子從德山清素得度具戒後聽華嚴起信既盡其說棄依密印於中峯一日密印舉僧問巖頭起滅不停時如何巖頭叱曰是誰起滅師啓悟即首肯會圓悟歸昭覺密印遣師往省因隨衆入室圓悟問從上諸聖以何接人師竪拳圓悟曰此是老僧用底作麼生是從上諸聖用底師以拳揮之圓悟亦舉拳相交大笑而止後至徑山謁大慧大慧問甚處來師曰西川大慧曰未出劒門關與汝三十棒了也師曰不合起動和尚大慧欣然掃室延之楚安慧方禪師文殊道法嗣潭州楚安慧方禪師本郡許氏子參道禪師於大別未幾改寺為神霄宮附商舟過湘南舟中聞岸人操鄉音厲聲云叫那由是有省即說偈曰沔水江心喚一聲此時方得契平生多年相別重相見千聖同歸一路行文殊思業禪師文殊道法嗣常德府文殊思業禪師世為屠宰一日戮豬次忽洞徹心源即棄業為比丘述偈曰昨日夜叉心今朝菩薩面菩薩與夜叉不隔一條線往見文殊文殊曰你正殺豬時見箇甚麼便乃剃頭行腳師遂作鼓刀勢文殊喝曰這屠兒參堂去師便下參堂待制潘良貴居士佛燈珣法嗣待制潘良貴居士字義榮年四十回心祖闈所至挂鉢隨衆參扣後依佛燈久之不契因訴曰某祇欲死去時如何佛燈曰好箇封皮且留著使用而今不了不當後去忽被他換却封皮卒無整理處公又以南泉斬貓兒話問曰某看此甚久終未透徹告和尚慈悲佛燈曰你祇管理會別人家貓兒不知走却自家狗子公於言下如醉醒無為守緣禪師泐潭明法嗣漢州無為隨庵守緣禪師本郡人姓史氏年十三病目去依棲禪慧目能禪師圓具出峽至寶峯值寶峯上堂舉永嘉曰一月普現一切水一切水月一月攝師聞釋然領悟雲居德升禪師龍翔圭法嗣南康軍雲居頑庵德升禪師漢州何氏子謁文殊道禪師問佛法省要文殊示偈曰契丹打破波斯寨奪得寶珠村裏賣十字街頭窮乞兒腰間挂箇風流袋師擬對文殊曰莫錯師退參三年方得旨趣往見佛性機不投入閩至鼓山禮覲便問國師不跨石門句意旨如何竹庵應聲喝曰間言語師即領悟狼山慧溫禪師龍翔圭法嗣通州狼山蘿庵慧溫禪師福州人姓鄭氏遍參諸老晚依竹庵於東林未幾竹庵謝事復謁高庵悟南華昺草堂清皆蒙賞識會竹庵徙閩之乾元師歸省次竹庵問情生智隔想變體殊不用停囚長智道將一句來師乃釋然述偈曰拶出通身是口何妨罵雨訶風昨夜前村猛虎咬殺南山大蟲竹庵首肯中際善能禪師雲居悟法嗣福州中際善能禪師嚴陵人往來龍門雲居有年未有所證一日普請擇菜次高庵忽以貓兒擲師懷中師擬議高庵攔胸踏倒於是大事洞明雲居自圓禪師雲居悟法嗣南康軍雲居普雲自圓禪師綿州雍氏子出關南下歷扣諸大尊宿始詣龍門一日於廊廡間覩繪胡人有省夜白高庵高庵舉法眼偈曰頭戴貂鼠帽腰懸羊角錐語不令人會須得人譯之復策火示之曰我為汝譯了也於是大法明了呈偈曰外國言音不可窮起雲亭下一時通口門廣大無邊際吞盡楊岐栗棘蓬高庵遣師依佛眼佛眼謂曰吾道東矣長蘆守仁禪師烏巨行法嗣真州長蘆且庵守仁禪師越之上虞人依雪堂於烏巨聞普說曰今之兄弟做工夫正如習射先安其足後習其法後雖無心以久習故箭發皆中喝一喝曰只今箭發也看看師不覺倒身作避箭勢忽大悟何山然首座道場辨法嗣安吉州何山然首座姑蘇人侍正堂之久入室次正堂問貓兒為甚麼偏愛捉老鼠曰物見主眼卓竪正堂欣然因命分座東山吉禪師道場琳法嗣臨江軍東山吉禪師因李朝請與甥薌林居士向公子諲謁之遂問家賊惱人時如何師曰誰是家賊李竪起拳師曰賊身已露李曰莫荼糊人好師曰贓證見在李無語南嶽下十七世臨濟下十三世淨慈曇密禪師教忠光法嗣臨安府淨慈混源曇密禪師天台盧氏子習台教棄參大慧於徑山謁雪巢一此庵元入閩留東西禪無省發之泉南教忠俾悅衆解職歸前資偶舉香嚴擊竹因緣豁然契悟述偈呈教忠教忠舉玄沙未徹語詰之無滯教忠曰子方可見妙喜即辭往梅陽服勤四載淨慈彥充禪師東林顏法嗣臨安府淨慈肯堂彥充禪師於潛盛氏子首參大愚宏智正堂大圓後聞東林謂衆曰我此間別無玄妙祇有木札羹鐵釘飯任汝咬嚼師竊喜之直造謁陳所見解東林曰據汝見處正坐在鑑覺中師疑不已將從前所得底一時揚下一日聞僧舉南泉道時人見此一株華如夢相似默有所覺曰打草祇要蛇驚次日入室東林問那裏是巖頭密啓其意處師曰今日捉敗這老賊東林曰達磨大師性命在汝手裏師擬開口驀被攔胸一拳忽大悟直得汗流浹背點首自謂曰臨濟道黃檗佛法無多子豈虗語邪遂呈頌曰為人須為徹殺人須見血德山與巖頭萬里一條鐵東林然之智者真慈禪師東林顏法嗣婺州智者元庵真慈禪師潼川人姓李氏遊講肆聽講圓覺至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我這裏撥著動著放光動地以呈諸講師無能曉之者歸以呈其師遂舉狗子無佛性話詰之師曰雖百千萬億公案不出此頌也其師以為不遜乃叱出師因南遊至廬山圓通挂搭時卍庵為西堂為衆入室舉僧問雲門撥塵見佛時如何雲門曰佛亦是塵師隨聲便喝以手指胸曰佛亦是塵師復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人又頌塵塵三昧曰鉢裏飯桶裏水別寶崑崙坐潭底一塵塵上走須彌明眼波斯笑彈指笑彈指珊瑚枝上清風起卍庵深肯之鼓山安永禪師西禪需法嗣福州鼓山木庵安永禪師閩縣吳氏子謁懶庵於雲門一日入室懶庵曰不問有言不問無言世尊良久不得向世尊良久處會隨後便喝倐然契悟作禮曰不因今日問爭喪目前機懶庵許之劒門安分庵主西禪需法嗣南劒州劒門安分庵主少與木庵同𨽻業安國後依懶庵未有深證辭謁徑山大慧行次江干仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾年箇事挂𮌎懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來遂徑回西禪懶庵迎之付以伽梨吳十三道人開善謙法嗣建寧府仙州山吳十三道人每以己事扣諸禪及開善歸結茆於其左遂往給侍紹興庚申三月八日夜適然啓悟占偈呈開善曰元來無縫罅觸著便光輝既是千金寶何須彈兒開善答曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期宿昔心天童咸傑禪師天童華法嗣慶元府天童密庵咸傑禪師福州鄭氏子遍參知識後謁應庵於衢之明果應庵孤硬難入屢遭呵一日應庵問如何是正法眼師遽答曰破沙盆應庵頷之侍郎李浩居士天童華法嗣侍郎李浩居士字德遠號正信幼閲首楞嚴經如遊舊國志而不忘持橐後造明果投誠入室應庵揕其𮌎曰侍郎死後向甚麼處去公駭然汗下應庵喝出公退參不旬日竟躋堂奧以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還早起誰悟復誰迷應庵見稱善有鬻胭脂者亦久參應庵頗自負公贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來這裏喫拳頭華藏有權禪師道場全法嗣常州華藏伊庵有權禪師臨安昌化祁氏子十八歲禮佛智裕禪師于靈隱時無庵為第一座室中以從無住本建一切法問之師久而有省答曰暗裏穿針耳中出氣無庵可之遂密付心印嘗夜坐達旦行粥者至忘展鉢鄰僧以手觸之師感悟為偈曰黑漆崑崙把釣竿古帆高挂下驚湍蘆華影裏弄明月引得盲龜上釣船佛智嘗問心包太虗量廓沙界時如何師曰大海不宿死尸佛智撫其座曰此子他日當據此座呵佛罵祖去在師自是埋藏頭角益自韜晦遊歷湖湘江浙幾十年依應庵於歸宗參大慧於徑山無庵住道場招師分座說法於是聲名隱然
