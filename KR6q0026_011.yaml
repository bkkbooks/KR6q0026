硬如鐵被這僧連拶便乃四楞塌地溈山一期忍俊不禁不知失却一隻眼忽有僧問冶父法身還解説法也無便與攔胸一踏踏倒教伊起來作箇灑灑落落底漢不見道犀因玩月紋生角象被雷驚華入牙楚石琦云這僧問法身説法蹉過也不知仰山推出枕子又何曾見大小溈山將錯就錯配作劍刃上事縛作一束稱上稱來八兩半斤如無輕重若也當時才見這僧道法身還解説法也無便驟步歸力丈豈不是出格宗師免得天下衲僧貶剝師住觀音時出膀曰看經次不得問事有僧來問訊見師看經旁立而待師卷却經問會麼曰某甲不看經爭得會師曰汝已後會去在其僧到巖頭巖頭問甚處來曰江西觀音來巖頭曰和尚有何言句僧舉前話巖頭曰這箇老師我將謂被故紙埋却元來猶在將順寂數僧侍立師以偈示之曰一二二三子平目復仰視兩口一無舌即是吾宗旨香嚴智間禪師溈山祐法嗣鄧州香嚴智間禪師青州人也在百丈時性識聰敏參禪不得洎百丈遷化遂參溈山溈山問我聞汝在百丈先師處問一答十問十答百此是汝聰明靈利意解識想生死根本父母未生時試道一句看師被一問直得茫然歸寮將平日看過底文字從頭要尋一句酬對竟不能得乃自歎曰畫餅不可充飢屢乞溈山説破溈山曰我若説似汝汝已後罵我去我説底是我底終不干汝事師遂將平昔所看文字燒却曰此生不學佛法也且作箇長行粥飯僧免役心神乃泣辭溈山直過南陽覩忠國師遺迹遂憩止焉一日芟除草木偶拋瓦礫擊竹作聲忽然省悟遽歸沐浴焚香遙禮溈山讚曰和尚大慈恩逾父母當時若為我説破何有今日之事乃有頌曰一擊忘所知更不假修持動容揚古路不墮悄然機處處無蹤迹聲色外威儀諸方達道者咸言上上機溈山聞得謂仰山曰此子徹也仰山曰此是心機意識著述得成待某甲親自勘過仰山後見師曰和尚讚歎師弟發明大事你試説看師舉前頌仰山曰此是夙習記持而成若有正悟別更説看師又成頌曰去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無仰山曰如來禪許師弟會祖師禪未夢見在師復有頌曰我有一機瞬目視伊若人不會別喚沙彌仰山乃報溈山曰且喜間師弟會祖師禪也報慈遂云且道如來禪與祖師禪分不分長慶稜云一時坐却雲居錫徵云衆中商量如來禪淺祖師禪深只如香嚴當時何不問如何是祖師禪若置此一問何處有也溈山云香嚴可謂上無片瓦下無卓錐露裸裸赤灑灑沒可把若不是仰山幾乎放過這漢何故不得雪霜力焉知松柏操徑山杲云溈山晚年好則極教得一棚肉傀儡直是可愛且作麼生是可愛處面面相看手腳動爭知語話是他人楚石琦云師兄師弟去年今年論甚麼道説甚麼禪總是掉棒打月何異掘地討天禪禪也無妙也無玄莫把封皮作信傳徑山信云仰山逼師弟落水香嚴一命償一命若不著無底靴怎解入龍宮頌云無事長林掃地來蒼煙擊竹頂門開溈山今日分明道五月霜花照石苔師初開堂溈山令僧送書并拄杖至師接得便哭蒼天蒼天僧曰和尚為甚麼如此師曰祇為春行秋令上堂若論此事如人上樹口銜樹枝腳不踏枝手不攀枝樹下忽有人問如何是祖師西來意不對他又違他所問若對他又喪身失命當恁麼時作麼生即得時有虎頭招上座出衆曰樹上即不問未上樹時請和尚道師乃呵呵大笑雪竇顯云樹上道即易樹下道即難老僧上樹也致將一問來翠巖芝云問者對者不免喪身失命如今衲僧作麼生徑山杲云吞得栗棘蓬透得金剛圈看這般説話也是泗洲人見大聖大溈杲云香嚴慈悲之故有落草之談仔細檢點將來未免弄巧成拙楚石琦云香嚴老人曲説方便虎頭上座未辨端倪若論激揚此事三生六十劫笑巖寶云香嚴此箇公案拈提者實多直截者似少我當時若見香嚴擬云若論此事如人上樹便與一喝非直教香嚴做伎倆不成亦免使諸老夢中作夢還委悉麼未能言外超方便萬別千差逐水流師問僧甚處來曰溈山來師曰和尚近日有何言句曰有僧問如何是西來意和尚竪起拂子師曰彼中兄弟作麼生會曰彼中商量道即色明心附物顯理師曰會即便會著甚死急僧却問師意如何師亦竪起拂子玄沙備云祇這香嚴腳跟未點地雲居錫云甚麼處是香嚴腳跟未點地處徑山洪諲禪師溈山祐法嗣杭州徑山洪諲禪師吳興人也僧問掩息如灰時如何師曰猶是時人功幹曰幹後如何師曰耕人田不種曰畢竟如何師曰禾熟不臨場天童華云鳳閣香沉雪巢夜冷半明月和氣靄然正與麼時且道歸宗與徑山還有相見分也無見與不見且止只如這僧與麼問還具眼麼苟或未然雲藏無縫襖鳥宿不萌枝許州全明上座先問石霜一毫穿衆穴時如何石霜曰直須萬年去曰萬年後如何石霜曰登科任汝登科拔萃任汝拔萃後問師曰一毫穿衆穴時如何師曰光靴任汝光靴結果任汝結果問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏著不滿其僧不肯便去舉似石霜石霜曰祇為太近實頭僧却問石霜如何是長石霜曰不屈曲曰如何是短石霜曰雙陸盤中不喝彩佛日長老訪師師問伏承長老獨化一方何以薦遊峰頂佛日曰朗月當空挂冰霜不自寒師曰莫是長老家風也無佛日曰峭峙萬重關於中含寶月師曰此猶是文言作麼生是長老家風佛日曰今日賴遇佛日却問隱密全真時人知有道不得太省無辜時人知有道得於此二途猶是時人升降處未審和尚親道自道如何道師曰我家道處無可道佛日曰如來路上無私曲便請玄音和一場師曰任汝二輪更互照碧潭雲外不相關佛日曰為報白頭無限客此回年少莫歸鄉師曰老少同輪無向背我家玄路勿參差佛日曰一言定天下四句為誰宣師曰汝言有三四我道其中一也無定山神英禪師溈山祐法嗣滁州定山神英禪師因樹省和尚行腳時參問不落數量請師道師提起數珠曰是落不落省曰圓珠三竅時人知有請師圓前話師便打省拂袖便出師曰三十年後槌胸大哭去在省住後示衆曰老僧三十年前至定山被他熱謾一上不同小小雪竇顯云定山用即用爭奈險椑樹知即知要且未具擇法眼試請辨看延慶法端禪師溈山祐法嗣襄州延慶山法端禪師僧問蚯蚓斬為兩段兩頭俱動佛性在阿那頭師展兩手洞山價別云問底在阿那頭九峯慈慧禪師溈山祐法嗣福州九峰慈慧禪師初在溈山溈山上堂曰汝等諸人祇得大機不得大用師便抽身出去溈山召之師更不回顧溈山曰此子堪為法器保福展云依稀似曲失前忘後一日辭溈山曰某甲辭違和尚千里之外不離左右溈山動容曰善為京兆府米和尚溈山祐法嗣京兆府米和尚亦謂七師參學後歸受業寺有老宿問月中斷井索時人喚作蛇未審七師見佛喚作甚麼師曰若有佛見即同衆生老宿曰千年桃核師令僧去問仰山曰今時還假悟也無仰山曰悟即不無爭奈落在第二頭師深肯之泐潭清云門庭施設米胡深肯仰山第二頭若是入理深談第一頭猶未悟在天童華云米胡提本分鉗鎚仰山展劒刃上事二老於唱教門中足可稱尊若是衲僧門下總是喫棒底漢又令僧問洞山曰那箇究竟作麼生洞山曰却須問他始得師亦肯之僧問自古上賢還達真正理也無師曰達曰祇如真正理作麼生達師曰當時霍光賣假銀城與單于契書是甚麼人做曰某甲直得杜口無言師曰平地教人作保徑山杲舉此語至契書是甚麼人做云徑山當時若作這僧即下一轉語塞却這老漢口且道下甚麼語良久云若教容易得便作等間看晉州霍山和尚溈山祐法嗣晉州霍山和尚因仰山一僧到自稱集雲峯下四藤條天下大禪佛參師乃喚維那打鐘著大禪佛驟步而去雪竇顯云這漢雖見機而變爭奈有頭無尾昭覺勤云這漢擔却仰山冬瓜印子向人前賣弄若不是霍山幾被塗糊雖然如是可惜令行一半當時不用喚維那好與擒住更打四藤條且聽這漢疑三十年元康和尚溈山祐法嗣元康和尚因訪石樓石樓才見便收足坐師曰得恁麼威儀周足石樓曰汝適來見箇甚麼師曰無端被人領過石樓曰須是與麼始為真見師曰苦哉賺殺幾人來石樓便起身師曰見則見矣動則不動石樓曰盡力道不出定也師拊掌三下南泉願云天下人斷這兩箇是非不得若斷得與他同參常侍王敬初居士溈山祐法嗣襄州王敬初常侍視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主才坐問曰昨日米和尚有甚麼言句便不相見公曰師子咬人韓驢逐塊米聞此語即省前謬遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公乃竪起一隻筯米曰這野狐精公曰這漢徹也大溈云米胡雖然如是且只得一橛常侍云這漢徹去大似看樓打樓大溈即不然常侍雖是箇俗漢筆下有生殺之權米胡是一方善知識要且出他圈䙡不得當時待他擲下筆但向道我從來疑著這漢南嶽下五世南塔光涌禪師仰山寂法嗣袁州仰山南塔光涌禪師豫章豐城章氏子依仰山剃度北遊謁臨濟復歸侍仰山仰山曰汝來作甚麼師曰禮覲和尚仰山曰還見和尚麼師曰見仰山曰和尚何似驢師曰某甲見和尚亦不似佛仰山曰若不似佛似箇甚麼師曰若有所似與驢何別仰山大驚曰凡聖兩忘情盡體露吾以此驗人二十年無決了者子保任之仰山每指謂人曰此子肉身佛也霍山景通禪師仰山寂法嗣晉州霍山景通禪師初參仰山仰山閉目坐師乃翹起右足曰如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是仰山起來打四藤條師因此自稱集雲峰下四藤條天下大禪師歸宗下亦有大禪佛名智通住後有行者問如何是佛法大意師乃禮拜行者曰和尚為甚麼禮俗人師曰汝不見道尊重弟子師問僧甚麼處來僧提起坐具師曰龍頭蛇尾問如何是佛師便打僧亦打師曰汝打我有道理我打汝無道理僧無語師又打趂出師化緣將畢先備薪於郊野遍辭檀信食訖至薪所謂弟子曰日午當來報至日午師自執炬登積薪上以笠置頂後作圓光相手執拄杖作降魔杵勢立終於紅焰中無著文喜禪師仰山寂法嗣杭州無著文喜禪師嘉禾語溪人也往五臺山華嚴寺至金剛窟禮謁遇一老翁牽牛而行邀師入寺翁呼均提有童子應聲出迎翁縱牛引師升堂堂宇皆耀金色翁踞牀指繡墩命坐翁曰近自何來師曰南方翁曰南方佛法如何住持師曰末法比丘少奉戒律翁曰多少衆師曰或三百或五百師却問此間佛法如何住持翁曰龍蛇混雜凡聖同居師曰多少衆翁曰前三三後三三汾陽昭代云識得你雪峯存問靈雲云古人道前三三後三三意旨如何靈雲云水中魚山上鳥雪峯云意作麼生會靈雲云高可射兮深可鈎徑山杲云當時若見只向他道和尚如是住持直是不易天童傑云大衆或三百或五百置之勿論只如文殊道前三三後三三如何話會良久云竹影掃階塵不動月穿潭底水無痕楚石琦云畢竟前三三後三三是多少有底道前三三後三三我不如你你自會得好翁呼童子致茶并進酥酪師納其味心意豁然翁拈起玻璃盞問曰南方還有這箇否師曰無翁曰尋常將甚麼喫茶師無對洞山價代展兩手云有無且置借取這箇看得否曹山寂代云久承大士按劒為什麼處在一塵長慶稜代云若與麼癡客勸主人琅琊覺云若也是去可謂虎口裏奪食若也不是去移舟諳水勢舉棹別波瀾汾陽昭云謝顧問師覩日色稍晚遂問翁擬投一宿得否翁曰汝有執心在不得宿師曰某甲無執心翁曰汝曾受戒否師曰受戒久矣翁曰汝若無執心何用受戒師辭退翁令童子相送師問童子前三三後三三是多少童子召大德師應諾童子曰是多少洞山價云欲觀其父先觀其了汾陽昭於何用受戒處云悔出前言於童子道是多少處云識得你師復問曰此為何處童子曰此金剛窟般若寺也師悽然悟彼翁者即文殊也不可再見即稽首童子願乞一言為別童子説偈曰面上無嗔供養具口裏無嗔吐妙香心裏無嗔是珍寶無垢無染是真常言訖均提與寺俱隱師因駐錫五臺咸通三年至洪州觀音參仰山頓了心契令充典座文殊嘗現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜文殊乃説偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌一日有異僧來求齋食師減己分饋之仰山預知問曰適來果位人至汝給食否師曰輟己回施仰山曰汝大利益洪州米嶺和尚徑山諲法嗣洪州米嶺和尚常語曰莫過於此僧問未審是甚麼莫過於此師曰不出是僧後問長慶甚為麼不出是長慶曰汝擬喚作甚麼雙峯古禪師雙峯法嗣福州雙峰古禪師本業講經因參先雙峰雙峰問大德甚麼處住曰城裏雙峰曰尋常還思老僧否曰常思和尚無由禮覲雙峰曰祇這思底便是大德師從此領旨即罷講席侍奉數年後到石霜但隨衆而已更不參請衆謂古侍者嘗受雙峰印記往往聞于石霜石霜欲詰其所悟而未得其便師因辭去石霜將拂子送出門首召曰古侍者師回首石霜曰擬著即差是著即乖不擬不是亦莫作箇會除非知有莫能知之好去好去師應喏喏即前邁尋屬雙峰示寂師乃繼續住持僧問和尚當時辭石霜石霜恁麼道意作麼生師曰祇教我不著是非報慈遂云且道他會石霜意不會南嶽下六世芭蕉慧清禪師南塔涌法嗣郢州芭蕉山慧清禪師新羅國人也上堂拈拄杖示衆曰你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子靠拄杖下座師謂衆曰我年二十八到仰山參見南塔見上堂曰汝等諸人若是箇漢從娘肚裏出來便作師子吼好麼我於言下歇得身心便住五載清化全怤禪師南塔涌法嗣越州清化全怤禪師吳郡崑山人也初參南塔南塔問從何而來師曰鄂州南塔曰鄂州使君名甚麼師曰化下不敢相觸忤曰此地道不畏師曰大丈夫何必相試南塔囅然而笑遂乃印可南嶽下七世郢州繼徹禪師芭蕉清法嗣郢州芭蕉山繼徹禪師初參風穴風穴問如何是正法眼師曰泥彈子風穴異之次謁先芭蕉芭蕉上堂舉仰山道兩口一無舌此是吾宗旨師豁然有省
