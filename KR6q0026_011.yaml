body:
  text: 南嶽下三世溈山靈祐禪師百丈海法嗣潭州溈山靈祐禪師福州趙氏子二十三遊江西參百丈百丈一見許之入室遂居參學之首侍立次百丈問誰師曰某甲百丈曰汝撥爐中有火否師撥之曰無火百丈躬起深撥得少火舉以示之曰汝道無這箇聻師由是發悟禮謝陳其所解百丈曰此乃暫時岐路耳經云欲識佛性義當觀時節因緣時節既至如迷忽悟如忘忽憶方省己物不從他得故祖師云悟了同未悟無心亦無法祇是無虗妄凡聖等心本來心法元自備足汝今既爾善自護持次日同百丈入山作務百丈曰將得火來麼師曰將得來百丈曰在甚處師乃拈一枝柴吹兩吹度與百丈百丈曰如蟲禦木徑山杲云百丈若無後語洎被典座瞞楚石琦云百丈却因後語被人覷破帶纍典座隨邪逐惡天寧幸是無事汝等諸人來這裏覔箇什麼一盲引衆盲相牽入火坑以拄杖一時趕散司馬頭陀自湖南來謂百丈曰頃在湖南尋得一山名大溈是一千五百人善知識所居之處百丈曰老僧住得否頭陀曰非和尚所居百丈曰何也頭陀曰和尚是骨人彼是肉山設居徒不盈千百丈曰吾衆中莫有人住得否頭陀曰待歷觀之時華林覺為第一座百丈令侍者請至問曰此人如何頭陀請謦咳一聲行數步頭陀曰不可百丈又令喚師師時為典座頭陀一見乃曰此正是溈山主人也百丈是夜召師入室囑曰吾化緣在此溈山勝境汝當居之嗣續吾宗廣度後學而華林聞之曰某甲忝居上首典座何得住持百丈曰若能對衆下得一語出格當與住持即指淨瓶問曰不得喚作淨瓶汝喚作甚麼華林曰不可喚作木棎也百丈乃問師師踢倒淨瓶便出去百丈笑曰第一座輸却山子也師遂往焉是山峭絶敻無人煙猿猱為伍橡栗充食經五七載絶無來者師自念言我本住持為利益於人既絶往還自善何濟即捨庵欲他往行至山口見蛇虎狼豹交橫在路師曰汝等諸獸不用攔吾行路吾若於此山有緣汝等各自散去吾若無緣汝等不用動吾從路過一任汝喫言訖蟲虎四散而去師乃回庵未及一載安上座即懶安也同數僧從百丈來輔佐師安曰某與和尚作典座待僧及五百人不論時節即不造粥便放某甲下自後山下居民率衆共營梵宇連帥李景讓奏號同慶寺相國裴公休嘗咨玄奧繇是天下禪學輻輳焉上堂夫道人之心質直無偽無背無面無詐妄心一切時中視聽尋常更無委曲亦不閉眼塞耳但情不附物即得從上諸聖祇説濁邊過患若無如許多惡覺情見想習之事譬如秋水澄渟清淨無為淡濘無礙喚他作道人亦名無事人時有僧問頓悟之人更有修否師曰若真悟得本他自知時修與不修是兩頭語如今初心雖從緣得一念頓悟自理猶有無始曠劫習氣未能頓淨須教渠淨除現業流識即是修也不可別有法教渠修行趣向從聞入理聞理深妙心自圓明不居惑地縱有百千妙義抑揚當時此乃得坐披衣自解作活計始得以要言之則實際理地不受一塵萬行門中不捨一法若也單刀直入則凡聖情盡體露真常理事不二即如如佛仰山問百千萬境一時來作麼生師曰青不是黃長不是短諸法各住自位非干我事仰山作禮仰山問如何是祖師西來意師指燈籠曰大好燈籠仰山曰莫祇這便是麼師曰這箇是甚麼仰山曰大好燈籠師曰果然不見雪巖欽頌云覿面提來付與伊分明此意沒東西腕頭有力千鈞重誰道通身是水泥一日師謂衆曰如許多人祇得大機不得大用仰山舉此語問山下庵主曰和尚恁麼道意旨如何庵主曰更舉看仰山擬再舉被庵主踏倒仰山歸舉似師師呵呵大笑師在法堂坐庫頭擊木魚火頭擲却火杪拊掌大笑師曰衆中也有恁麼人遂喚來問你作麼生火頭曰某甲不喫粥肚飢所以歡喜師乃點頭師摘茶次謂仰山曰終日摘茶祇聞子聲不見子形仰山撼茶樹師曰子祇得其用不得其體仰山曰未審和尚如何師良久仰山曰和尚祇得其體不得其用師曰放子三十棒仰山曰和尚棒某甲喫某甲棒教誰喫師曰放子三十棒首山念云夫為宗師須具擇法眼始得當時不是溈山便見扶籬摸壁報慈遂云且道過在甚麼處琅琊覺云五更侵早起更有夜行人又云若不是溈山洎合打破蔡州白雲端云父子相投意氣相合機鋒互換啐啄同時雖然如是畢竟如何道得體用雙全去溈山放子三十棒也是養子之緣蔣山勤云張公乍與李公友待罰李公一盞酒倒被李公罰一杯好手手中呈好手玉泉璉云直饒體用兩全爭奈當頭蹉過過則且止放子三十棒又作麼生三盞酒粧公子面一枝華插美人頭上堂僧出曰請和尚為衆説法師曰我為汝得徹困也僧禮拜後人舉似雪峯存雪峯云古人得恁麼老婆心切玄沙備云山頭和尚蹉過古人事也雪峯聞之乃問玄沙云甚麼處是老僧蹉過古人事處玄沙云大小溈山被那僧一問直得百雜碎雪峯乃駭然師坐次仰山入來師曰寂于速道莫入陰界仰山曰慧寂信亦不立師曰子信了不立不信不立仰山曰祇是慧寂更信阿誰師曰若恁麼即是定性聲聞仰山曰慧寂佛亦不立師問仰山涅槃經四十卷多少是佛説多少是魔説仰山曰總是魔説師曰已後無人奈子何仰山曰慧寂即一期之事行履在甚麼處師曰祇貴子眼正不説子行履仰山踏衣次提起問師曰正恁麼時和尚作麼生師曰正恁麼時我這裏無作麼生仰山曰和尚有身而無用師良久却拈起問曰汝正恁麼時作麼生仰山曰正恁麼時和尚還見伊否師曰汝有用而無身師後忽問仰山汝春間有話未圓今試道看仰山曰正恁麼時切忌勃訴師曰停囚長智師一日喚院主院主便來師曰我喚院主汝來作甚麼院主無對曹山寂代云也知和尚不喚某甲又令侍者喚第一座座便至師曰我喚第一座汝來作甚麼座亦無對曹山寂代云若令侍者喚恐不來法眼益云適來侍者喚師問雲巖聞汝久在藥山是否雲巖曰是師曰如何是藥山大人相雲巖曰涅槃後有師曰如何是涅槃後有雲巖曰水灑不著雲巖却問師百丈大人相如何師曰巍巍堂堂煒煒煌煌聲前非聲色後非色蚊子上鐵牛無汝下觜處師過淨瓶與仰山仰山擬接師却縮手曰是甚麼仰山曰和尚還見箇甚麼師曰若恁麼何用更就吾覓仰山曰雖然如此仁義道中與和尚提瓶挈水亦是本分事師乃過淨瓶與仰山師與仰山行次指柏樹子問曰前面是甚麼仰山曰柏樹子師却問耘田翁翁亦曰柏樹子師曰這耘田翁向後亦有五百衆溈山云山僧則不然耘田公子吾不如汝且道大圓是山僧是若人辨得許汝具擇法眼若也不辨佛法熾然生滅神鼎諲云為復意在耘田處為復意在仰山分上為復總不恁麼諸上座一切諸法摐然更不用生事他是父子説法同道方知師問仰山何處來仰山曰田中來師曰禾好刈也未仰山作刈禾勢師曰汝適來作青見作黃見作不青不黃見仰山曰和尚背後是甚麼師曰子還見麼仰山拈禾穗曰和尚何曾問這箇師曰此是鵝王擇乳師問仰山天寒人寒仰山曰大家在這裏師曰何不直説仰山曰適來也不曲和尚如何師曰直須隨流上堂仲冬嚴寒年年事晷運推移事若何仰山進前叉手而立師曰我情知汝答這話不得香嚴曰某甲偏答得這話師躡前問香嚴亦進前叉手而立師曰賴遇寂子不會師謂仰山曰汝須獨自回光返照別人不知汝解處汝試將實解獻老僧看仰山曰若教某甲自看到這裏無圓位亦無一物一解得獻和尚師曰無圓位處元是汝作解處未離心境在仰山曰既無圓位何處有法把何物作境師曰適來是汝作與麼解是否仰山曰是師曰若恁麼是具足心境法未脫我所心在元來有解獻我許汝信位顯人位隱在師一日見劉鐵磨來師曰老牸牛汝來也劉曰來日臺山大會齋和尚還去麼師乃放身作臥勢劉便出去雪竇顯頌云曾騎鐵馬入重城勑下傳聞六國清猶握金鞭問歸客夜深誰共御街行淨慈一云衆中道放身便臥是不去劉鐵磨懡㦬而行有甚交涉殊不知溈山老漢平生一條脊梁拗不曲被劉鐵磨一推推倒直至如今起不得若要扶起溈山請大衆下一轉語衆無語師以拄杖一時趕散中峯本云溈山被鐵磨一拶拶倒要起起不得鐵磨被溈山一推推轉要住住不得本上座與麼批判多少人在背後咬斷拇指師坐次仰山從方丈前過師曰若是百丈先師見子須喫痛棒始得仰山曰即今事作麼生師曰合取兩片皮仰山曰此恩難報師曰非子不才乃老僧年邁仰山曰今日親見百丈師翁來師曰子向甚麼處見仰山曰不道見祇是無別師曰始終作家師問仰山即今事且置古來事作麼生仰山叉手近前師曰猶是即今事古來事作麼生仰山退後立師曰汝屈我我屈汝仰山便禮拜蔣山勤云仰山雖善進前退後發明古今其奈溈山向胡餅裏呷汁壓沙覓油雖然如是且道仰山叉手意作麼生若也知得行腳事辦其或未然老僧不曾孤負諸人自是諸人孤負老僧仰山香嚴侍立次師舉手曰如今恁麼者少不恁麼者多香嚴從東過西立仰山從西過東立師曰這箇因緣三十年後如金擲地相似仰山曰亦須是和尚提唱始得香嚴曰即今亦不少師曰合取口南堂靜云象王嚬呻師子哮吼踞地盤空移星換斗坐斷舌頭合取狗口一回擲地作金聲九曲黃河徹底清師坐次仰山入來師以兩手相交示之仰山作女人拜師曰如是如是師方丈內坐次仰山入來師曰寂子近日宗門令嗣作麼生仰山曰大有人疑著此事師曰子作麼生仰山曰慧寂祇管困來合眼健即坐禪所以未曾説著在師曰到這田地也難得仰山曰據慧寂所見祇如此一句也著不得師曰汝為一人也不得仰山曰自古聖人盡皆如此師曰大有人笑汝恁麼祇對仰山曰解笑者是慧寂同參師曰出頭事作麼生仰山繞禪牀一匝師曰裂破古今蔣山勤云動絃別曲葉落知秋自古自今築著磕著鳥道玄路許他父子親遊若是荊棘林中猶欠悟在以何為驗只如仰山繞禪牀一匝溈山云裂破古今若是明眼衲僧瞞他一點不得仰山香嚴侍立次師曰過去現在未來佛佛道同人人得箇解脫路仰山曰如何是人人解脫路師回顧香嚴曰寂子借問何不答伊香嚴曰若道過去未來現在某甲却有箇祇對處師曰子作麼生祇對香嚴珍重便出師却問仰山曰智間恁麼祇對還契寂子也無仰山曰不契師曰子又作麼生仰山亦珍重出去師呵呵大笑曰如水乳合因僧問如何是祖師西來意師竪起拂子後僧遇王常侍王問溈山近日有何言句僧舉前話王曰彼中兄弟如何商量僧曰借色明心附物顯理王曰不是這箇道理上座快回去好某甲敢寄一書到和尚僧得書遂回持上師拆開見畫一圓相內寫箇日字師曰誰知千里外有箇知音仰山侍次乃曰雖然如是也祇是箇俗漢師曰子又作麼生仰山畫一圓相於中書日字以腳抹却師乃大笑一日師翹起一足謂仰山曰我每日得他負載感伊不徹仰山曰當時給孤園中與此無別師曰更須道始得仰山曰寒時與他襪著也不為分外師曰不負當初子今已徹仰山曰恁麼更要答話在師曰道看仰山曰誠如是言師曰如是如是師問仰山生住異滅汝作麼生會仰山曰一念起時不見有生住異滅師曰子何得遣法仰山曰和尚適來問甚麼師曰生住異滅仰山曰却喚作遣法師問仰山妙淨明心汝作麼生會仰山曰山河大地日月星辰師曰汝祇得其事仰山曰和尚適來問甚麼師曰妙淨明心仰山曰喚作事得麼師曰如是如是石霜會下有二禪客到曰此間無一人會禪後普請搬柴仰山見二禪客歇將一橛柴問曰還道得麼俱無對仰山曰莫道無人會禪好仰山歸舉似師曰今日二禪客被慧寂勘破師曰甚麼處被子勘破仰山舉前話師曰寂子又被吾勘破雲居錫云甚處是溈山勘破仰山處師睡次仰山問訊師便回面向壁仰山曰和尚何得如此師起曰我適來得一夢你試為我原看仰山取一盆水與師洗面少頃香嚴亦來問訊師曰我適來得一夢寂子為我原了汝更與我原看香嚴乃點一碗茶來師曰二子見解過於鶖子蔣山勤云夢中説夢深許溈山妙用神通須還二子傳茶度水耀古騰今年老心孤憐兒惜子向衲僧門下一人在門外一人在門裏更有一人遍界不曾藏佛眼覷不見南堂靜云撥草瞻風孤峯獨宿鼓無絃琴唱無生曲溈仰香嚴鼎之三足臨機不費纖毫力任運分身千百億師因泥壁次李軍容來具公裳直至師背後端笏而立師回首見便側泥盤作接泥勢李便轉笏作進泥勢師便拋下泥盤同歸方丈巖頭奯聞云噫佛法淡泊也大小溈山泥壁也不了明招謙云當時合作麼生免被巖頭點檢代云却轉泥盤作泥壁勢便拋下歸去黃龍新云巖頭錯下名言殊不知溈山軍容弄巧成拙上堂老僧百年後向山下作一頭水牯牛左脅下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作甚麼即得仰山出禮拜而退雲居膺代云師無異號資福寶云當時但作此相拓呈之新羅和尚作此相拓呈之又云同道者方知芭蕉徹作此相拓呈之又云説也説了也注也注了也悟取好乃述偈云不是溈山不是牛一身兩號寶難酬離却兩頭應須道如何道得出常流金粟悟云溈山大似不打自招復云還知金粟落處麼南嶽下四世仰山慧寂禪師溈山祐法嗣袁州仰山慧寂通智禪師韶州懷化葉氏子年九歲於廣州和安寺投通禪師出家即不語通十四歲父母取歸欲與婚媾師不從遂斷手二指跪致父母前誓求正法以答劬勞父母乃許再詣通處而得披剃未登具即遊方初謁耽源已悟玄旨後參溈山遂升堂奧耽源謂師曰國師當時傳得六代祖師圓相共九十七箇授與老僧乃曰吾滅後三十年南方有一沙彌到來大興此教次第傳受無令斷絶我今付汝汝當奉持遂將其本過與師師接得一覽便將火燒却耽源一日問前來諸相甚宜祕惜師曰當時看了便燒却也耽源曰吾此法門無人能會唯先師及諸祖師諸大聖人方可委悉子何得焚之師曰慧寂一覽已知其意但用得不可執本也耽源曰然雖如此於子即得後人信之不及師曰和尚若要重録不難即重集一本呈上更無遺失耽源曰然耽源上堂師出衆作此相以手拓呈了却叉手立耽源以兩手相交作拳示之師進前三步作女人拜耽源點頭師便禮拜師浣衲次耽源曰正恁麼時作麼生師曰正恁麼時向甚麼處見後參溈山溈山問汝是有主沙彌無主沙彌師曰有主曰主在甚麼處師從西過東立溈山異之師問如何是真佛住處溈山曰以思無思之妙返思靈焰之無窮思盡還源性相常住事理不二真佛如如師於言下頓悟自此執侍前後盤桓十五載後參巖頭巖頭舉起拂子師展坐具巖頭拈拂子置背後師將坐具搭肩上而出巖頭曰我不肯汝放祇肯汝收掃地次溈山問塵非掃得空不自生如何是塵非掃得師掃地一下溈山曰如何是空不自生師指自身又指溈山溈山曰塵非掃得空不自生離此二途又作麼生師又掃地一下又指自身并指溈山溈山一日指田問師這丘田那頭高這頭低師曰却是這頭高那頭低溈山曰你若不信向中間立看兩頭師曰不必立中間亦莫住兩頭溈山曰若如是著水看水能平物師曰水亦無定但高處高平低處低平溈山便休徑山杲云顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉喝一喝有施主送絹與溈山師問和尚受施主如是供養將何報答溈山敲禪牀示之師曰和尚何得將衆人物作自己用師在溈山為直歲作務歸溈山問甚麼處去來師曰田中來溈山曰田中多少人師插鍬叉手溈山曰今日南山大有人刈茅師拔鍬便行玄沙備云我若見即踏倒鍬子僧問鏡清怤仰山插鍬意旨如何鏡清云狗銜赦書諸候避道云秖如玄沙踏倒意旨如何鏡清云不奈船何打破𡰷斗云南山刈茅意旨如何鏡清云李靖三兄久經行陳雲居錫云且道鏡清下此一判著不著雪竇顯云諸方咸謂插鍬話奇特大似隨邪逐惡據雪竇見處仰山被溈山一問直得草繩自縛去死十分翠巖芝云仰山只得一橛諸人別有會麼徑山杲云仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣金粟悟云我若作仰山待溈山問田中多少人便乃出不惟截斷溈山後來老婆教伊許大溈山討鼻頭不著亦作天下榜樣師在溈山牧牛時踢天泰上座問曰一毛頭師子現即不問百億毛頭百億師子現又作麼生師便騎牛歸侍立溈山次舉前話方了却見泰來師曰便是這箇上座溈山遂問百億毛頭百億師子現豈不是上座道泰曰是師曰正當現時毛前現毛後現泰曰現時不説前後溈山大笑師曰師子腰折也便下去一日第一座舉起拂子曰若人作得道理即與之師曰某甲作得道理還得否座曰但作得道理便得師乃掣將拂子去雲居錫云甚麼處是仰山道理一日雨下天性上座謂師曰好雨師曰好在甚麼處天性無語師曰某甲却道得天性曰好在甚麼處師指雨天性又無語師曰何得大智而默徑山杲云一人只知看雨一人只知指雨仔細點檢將來大似釘樁搖櫓育王當時待他道好在甚麼處只向他道滴穿眼睛浸爛鼻孔或有箇衲僧出來道育王也是釘樁搖櫓却許他具眼師隨溈山遊山到磐陀石上坐師侍立次忽鴉銜一紅柿落在面前溈山拾與師師接得洗了度與溈山溈山曰子甚處得來師曰此是和尚道德所感溈山曰汝也不得無分即分半與師玄沙備云大小溈山被仰山一坐至今起不得金粟悟云玄沙柢知溈山被仰山一坐至今起不得竟不知仰山被溈山半箇柿子塞却咽喉至今