付阿誰徐與靈源皆屏息遂擲杖投牀枕臂而化雲居了元禪師開先暹法嗣南康軍雲居山了元佛印禪師饒州浮梁林氏子感悟夙習即遍參尋投機於開先法席出為宗匠九坐道場四衆傾向一日與學徒入室次適東坡居士到面前師曰此間無坐榻居士來此作甚麼居士曰暫借佛印四大為坐榻師曰山僧有一問居士若道得即請坐道不得即輸腰下玉帶子居士欣然曰便請師曰居士適來道暫借山僧四大為坐榻祇如山僧四大本空五陰非有居士向甚麼處坐居士不能答遂留玉帶師却贈以雲山衲衣居士乃作偈曰百千燈作一燈光盡是恆沙妙法王是故東坡不敢惜借君四大作禪牀病骨難堪玉帶圍鈍根仍落箭鋒機會當乞食歌姬院奪得雲山舊衲衣此帶閲人如傳舍流傳到我亦悠哉錦袍錯落猶相稱乞與佯狂老萬回南嶽下十一世大梅法英禪師九峯韶法嗣明州大梅法英祖鏡禪師本郡張氏子參九峯九峯見器之與語若久在叢席因痛劄之師領旨宣和初敕天下僧尼為德士師肆筆解老子詣進上覽謂近臣曰法英道德經解言簡理詣於古未有宜賜入道藏流行明年秋詔復天下僧尼師獨無改志至紹興初晨起戴樺皮冠披鶴氅執象簡穿朱履使擊鼓集衆升座召大衆曰蘭芳春谷菊秋籬物必榮枯各有時昔毀僧尼專奉道後平道侫復僧尼且道僧尼形相作麼生復取冠示衆曰吾頂從來似月圓雖冠其髮不成仙今朝拋下無遮障放出神光透碧天擲之于地隨易僧服提鶴氅曰如來昔日貿皮衣數載慚將鶴氅披還我丈夫調御服須知此物不相宜擲之舉象簡曰為嫌禪板太無端豈料遭他象簡瞞今日因何匆放下普天致仕老仙官擲之提朱履曰達磨擕將一隻歸兒孫從此赤腳走借他朱履代麻鞋休道時難事掣肘化鵬未遇不如鵾畫虎不成反類狗擲之橫拄杖曰今朝拄杖化為龍分破華山千萬重復倚肩曰珍重佛心真聖主好將堯德振吾宗擲下拄杖斂目而逝慧林圓照禪師天衣懷法嗣東京慧林宗本圓照禪師常州無錫管氏子遊方至池陽謁振宗振宗舉天親從彌勒內宮而下無著問云人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審説甚麼法天親曰祇説這箇法如何是這箇法師久而開悟一日室中問師即心即佛時如何曰殺人放火有甚麼難於是名播寰宇元豐五年神宗召師為慧林第一祖對延和殿問道賜坐師即跏趺帝問卿受業何寺奏曰蘇州承天永安帝大悅賜茶師即舉盞長吸又蕩而撼之帝曰禪宗方興宜善開導師奏曰陛下知有此道如日照臨臣豈敢自怠即辭退帝目送之謂左右曰真福慧僧也法雲法秀禪師天衣懷法嗣東京法雲寺法秀圓通禪師秦州隴城辛氏子先是麥積山老僧與應乾寺魯和尚者善嘗欲從魯遊方魯老之既去緒語曰他日當尋我竹鋪坡前鐵場嶺下魯後聞其所俄有兒生即往觀焉兒為一笑三歲願隨魯歸遂從魯姓因聞無為軍鐵佛寺懷禪師法席之盛徑往參謁懷問曰座主講甚麼經師曰華嚴曰華嚴以何為宗師曰法界為宗曰法界以何為宗師曰以心為宗曰心以何為宗師無對懷曰毫𨤲有差天地懸隔汝當自看必有發明後聞僧舉白兆參報慈情未生時如何報慈曰隔師忽大悟直詣方丈陳其所證懷曰汝真法器吾宗異日在汝行矣侍郎楊傑居士天衣懷法嗣禮部楊傑居士字次公號無為歷參諸名宿晚從天衣遊天衣每引老龐機語令研究深造後奉祠泰山一日雞一鳴睹日如盤湧忽大悟乃別有男不婚有女不嫁之偈曰男大須婚女長須嫁討甚間工夫更説無生話書以寄天衣天衣稱善會芙蓉楷禪師公曰與師相別幾年芙蓉曰七年公曰學道來參禪來芙蓉曰不打這鼓笛公曰恁麼則空遊山水百無所能也芙蓉曰別來未久善能高鑒公大笑公有辭世偈曰無一可戀無一可捨大虗空中之乎者也將錯就錯西方極樂法明上座報本蘭法嗣荊州開元法明上座依報本未久深得法忍後歸里事落魄多嗜酒呼盧每大醉唱柳詞數闋日以為常鄉民侮之召齋則拒召飲則從如是者十餘年咸指曰醉和尚一日謂寺衆曰吾明旦當行汝等無他往衆竊笑之翌晨攝衣就座大呼曰吾去矣聽吾一偈衆聞奔視師乃曰平生醉裏顛蹶醉裏却有分別今宵酒醒何處楊柳岸曉風殘月言訖寂然撼之已委蛻矣簽判劉經臣居士智海逸法嗣簽判劉經臣居士字興朝少以逸才登仕版於佛法未之信年三十二會東林照覺總禪師與語啓迪之乃敬服因醉心祖道既而抵京師謁慧林沖禪師於僧問雪竇如何是諸佛本源答曰千峯寒色語下有省歲餘官雒幕就參韶山杲禪師將去任辭韶山韶山囑曰公如此用心何愁不悟爾後或有非常境界無量歡喜宜急收拾若收拾得去便成法器若收拾不得則有不寧之疾成失心之患矣未幾復至京師趨智海依正覺逸禪師請問因緣智海曰古人道平常心是道你十二時中放光動地不自覺知向外馳求轉疏轉遠公益疑不解一夕入室智海舉傳燈所載香至國王問波羅提尊者何者是佛尊者曰見性是佛之語問之公不能對疑甚遂歸就寢熟睡至五鼓覺來方追念間見種種異相表裏通徹六根震動天地回旋如雲開月現喜不自勝忽憶韶山臨別所囑之言姑抑之逗明趨智海悉以所得告智海為證據且曰更須用得始得公曰莫要踐履否智海厲聲曰這箇是甚麼事却説踐履公默契乃作發明心地頌八首及著明道諭儒篇以警世南嶽下十二世清獻趙忭居士蔣山泉法嗣清獻公趙抃居士字悅道年四十餘擯去聲色系心宗教會佛慧來居衢之南禪公日親之佛慧未嘗容措一詞後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心源不動湛如水一聲霹𮦷頂門開喚起從前自家底佛慧聞笑曰趙悅道撞彩耳公年七十有二以太子少保致仕而歸作高齋以自適題偈見意曰腰佩黃金已退藏箇中消息也尋常世人欲識高齋老祇是柯村趙四郎復曰切忌錯認南嶽下十三世寶林果昌禪師法雲本法嗣婺州寶林果昌寶覺禪師安州時氏子師與提刑楊次公入山同遊山次楊拈起大士飯石問既是飯石為甚麼咬不破師曰祗為太硬楊曰猶涉繁詞師曰未審提刑作麼生楊曰硬師曰也是第二月楊為寫七佛殿額乃問七佛重出世時如何師曰一回相見一回新天竺從諫講師法雲本法嗣臨安府上天竺從諫慈辨講師處之松陽人也於止觀深有所契嘗以道力扣大通大通一日作書寄之師發緘睹黑白二圓相乃悟天台如庵主本覺一法嗣台州天台如庵主久依法真因看雲門東山水上行語發明己見歸隱故山猿鹿為伍郡守聞其風遣使逼令住持師作偈曰三十年來住此山郡符何事到林間休將瑣瑣塵寰事換我一生間又間遂焚其廬竟不知所止丞相富弼居士投子顒法嗣丞相富弼居士字彥國由清獻公警勵之後不舍晝夜力進此道聞顒禪師主投子法席冠淮甸往質所疑會顒為衆登座見其顧視如象王回旋公微有得因執弟子禮趨函丈命侍者請為入室顒見即曰相公已入來富弼猶在外公聞汗流浹背即大悟慧林懷深禪師長蘆信法嗣東京慧林懷深慈受禪師壽春府夏氏子訪道方外依淨照於嘉禾資聖淨照舉良遂見麻谷因緣問曰如何是良遂知處師即洞明出住資福屨滿戶外蔣山佛鑑勤禪師行化至茶退師引巡寮至千人街坊勤問既是千人街坊為甚麼祇有一人師曰多虗不如少實勤曰恁麼那師赧然偶朝廷以資福為神霄宮因棄往蔣山留西庵陳請益勤曰資福知是般事便休師曰某實未穩望和尚不外勤舉倩女離魂話反覆窮之大豁疑礙呈偈曰祇是舊時行履處等間舉著便誵訛夜來一陳狂風起吹落桃花知幾多勤拊几曰這底豈不是活祖師意萬壽如璝禪師長蘆信法嗣平江府萬壽如璝證悟禪師凡見僧必問近日如何僧擬對即拊其背曰不可思議將示寂衆集復曰不可思議乃合掌而終廣福惟尚禪師保寧英法嗣臨安府廣福院惟尚禪師初參覺印問曰南泉斬貓兒意旨如何覺印曰須是南泉始得覺印以前語詰之師不能對至僧堂忽大悟曰古人道從今日去更不疑天下老和尚舌頭信有之矣述偈呈覺印曰須是南泉第一機不知不覺驀頭錐覿面若無青白眼還如𮭗𮭗守空池舉未絶覺印竪拳曰正當恁麼時作麼生師掀倒禪牀覺印遂喝師曰賊過後張弓便出衛州王大夫元豐滿法嗣衛州王大夫遺其名以喪偶猒世相遂參元豐於言下知歸元豐一日謂曰子乃今之陸亘也公便掩耳既而回壇山之陽縛茅自處者三載偶歌曰壇山裏日何長青松嶺白雲鄉吟鳥啼猿作道場散髮采薇歌又笑從教人道野夫狂
