body:
  text: 南嶽下六世雲門文偃禪師雪峯存法嗣韶州雲門山光奉院文偃禪師嘉興人也敏質生知慧辨天縱及長落髮稟具於毗陵壇侍志澄數年探窮律部以己事未明往參睦州睦州才見來便閉却門師乃扣門睦州曰誰師曰某甲睦州曰作甚麼師曰己事未明乞師指示睦州開門一見便閉却師如是連三日扣門至第三日睦州開門師乃拶入睦州便擒住曰道道師擬議睦州便推出曰秦時𨍏轢鑽遂掩門損師一足師從此悟入睦州指見雪峰師到雪峰莊見一僧乃問上座今日上山去那僧曰是師曰寄一則因緣問堂頭和尚祇是不得道是別人語僧曰得師曰上座到山中見和尚上堂衆才集便出握腕立地曰這老漢項上鐵枷何不脫却其僧一依師教雪峰見這僧與麼道便下座攔胸把住曰速道速道僧無對雪峰拓開曰不是汝語僧曰是某甲語雪峰曰侍者將繩棒來僧曰不是某語是莊上一浙中上座教某甲來道雪峰曰大衆去莊上迎取五百人善知識來師次日上雪峰雪峰才見便曰因甚麼得到與麼地師乃低頭從茲契合溫研積稔密以宗印授焉師出嶺遍謁諸方核窮殊軌鋒辨險絶世所盛聞後抵靈樹冥符知聖禪師接首座之説初知聖住靈樹二十年不請首座常曰我首座生也我首座牧牛也我首座行腳也一日令擊鐘三門外接首座衆出迓師果至直請入首座寮解包人天眼目見靈樹章後廣主命師出世靈樹開堂日廣主親臨曰弟子請益師曰目前無異路法眼益別云不可無益於人舉世尊初生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊師曰我當時若見一棒打殺與狗子喫却貴圖天下太平師在文德殿赴齋有鞠常侍問靈樹果子熟也未師曰甚麼年中得信道生舉雪峯云三世諸佛向火𦦨上轉大法輪師曰火焰為三世諸佛説法三世諸佛立地聽黃龍新云雪峯雲門交互爭輝薪盡火滅三世諸佛向甚麼處聽莫戀白雲深處坐切忌寒灰燒殺人天童華云三世諸佛與火焰説法火焰燒殺三世諸佛元叟端云若向雪峯言下薦得笑殺旁觀若向雲門言下薦得自救不了若向應庵言庵薦得盡大地人眉鬚墮落僧問靈樹如何是祖師西來意靈樹默然遷化後門人立行狀欲入此語問師曰先師默然處如何上師對曰師上堂佛法也太煞有祇是舌頭短良久曰長也普請搬柴次師遂拈一片拋下曰一大藏教祇説這箇見僧量米次問米籮裏有多少達磨眼睛僧無對師代曰斗量不盡師一日以手入木師子口呌曰咬殺我也相救歸宗柔代云和尚出手太殺上堂聞聲悟道見色明心遂舉起手曰觀世音菩薩將錢買糊餅放下手曰元來祇是饅頭白雲端舉了展兩手云有麼有麼又搖手云無也無也乃云曾經大海難為水除却巫山總是煙法雲秀拈拄杖卓一下云這箇是聲色那箇是心良久云世間無限丹青手到此都盧畫不成黃龍清云雲門可謂食飽傷心諸人切忌向胡餅裏討汁五祖演云我即不然乃以手作打杖鼓勢云棚八囉扎南堂靜云老僧即不然張公喫酒李公醉李公喫酒張公醉張公李公酩酊醉鼻息如雷甕裏睡徑山杲拈拄杖云這箇是色卓拄杖云這箇是聲諸人總見總聞那箇是明底心那箇是悟底道喝一喝云貪他一粒米失却半年糧復卓一下靈隱嶽云冶父有條活路要與諸人共行拈拄杖云穿入諸人鼻孔燈籠露柱直得眼睛突出卓柱杖下座楚石琦云汝等諸人不是不聞聲因甚麼不悟道不是不見色因甚麼不明心雲門漝麼提撕妙喜漝麼判斷一曲兩曲無人會雨過夜塘秋水深上堂乾坤之內宇宙之間中有一寶祕在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代曰逐物意移又曰雲起雷興示衆曰十五日已前不問汝十五日已後道將一句來衆無對自代曰日日是好日雪竇顯頌云去却一拈却七上下四維無等匹徐行踏斷流水聲縱觀寫出飛禽迹草茸茸煙空生巖畔花狼藉彈指堪悲舜若多莫動著動著三十棒上堂拈拄杖曰凡夫實謂之有二乘析謂之無緣覺謂之幻有菩薩當體即空衲僧家見拄杖便喚作拄杖行但行坐但坐不得動著徑山杲云我不似雲門老人將虛空剜窟竉驀拈拄杖云拄杖子不屬有不屬無不屬幻不屬空卓一下云凡夫二乘緣覺菩薩盡向這裏各隨根性悉得受用惟於衲僧分上為害為冤要行不得行要坐不得坐進一步則被拄杖子迷了路頭退一步則被拄杖子穿却鼻孔只今莫有不甘底麼試出來與拄杖子相見如無來年更有新條在惱亂春風卒未休楚石琦云凡夫不合起有見二乘不合起無見緣覺不合起幻有見菩薩不合起當體即空見不可放過雲門老漢貪觀白浪失却手橈纍他天下衲僧總落拄杖圈䙡放過不可好與一坑埋却問父母不聽不得出家如何得出家師曰淺曰學人不會師曰深問樹凋葉落時如何師曰體露金風問如何是佛師曰乾屎橛萬峯蔚云雲門大師不妨奇持看他突然一句子疑殺天下衲僧若道不疑乾屎橛汝作麼生會問如何是諸佛出身處師曰東山水上行元叟端云古今見亡佛法情盡則不無雲門大師中峯門下則不然如何是諸佛出身處冬至前後沙飛石走僧問如何是和尚家風師曰有讀書人來報問如何是透法身句師曰北斗裏藏身徑山杲云雲門老人恁麼道只答得法身句未答得透法身句今日或有人問徑山如何是透法身句即向道蟭螟眼裏放夜市大蟲舌上打鞦韆問僧甚處來曰禮塔來師曰謔我曰實禮塔來師曰五戒也不持保福展云智不責愚汾陽昭云彼此相鈍置問如何是法身向上事師曰向上與汝道即不難作麼生會法身曰請和尚鑒師曰鑒即且置作麼生會法身曰與麼與麼師曰這箇是長連牀上學得底我且問你法身還解喫飯麼僧無對雪竇顯云將成九仞之山不進一簣之土過在什麼處庵主永云雲門直得入泥入水保福展云欠他一粒也不得昭覺勤云雲門可謂驅耕夫之牛奪飢人之食權衡佛祖龜鑒宗乘所以後來尊宿各出眼目扶豎大教雖然如是只明得法身邊事未明得法身向上事且如何是法身向上事域中無背面閫外有威權南堂靜云這僧敢將遊艇子撩撥洞庭湖殊不知雲門金鏃慣調曾百戰鐵鞭多力恨無讐若是大隨即不然這僧也拈却雲門也架閣且作麼生會法身良久云任從滄海變終不為君通天童傑云雲門渾剛打就生鐵鑄成不動鉗鎚火星迸散永庵主冷處看把火義出豐年保福閙處愛入頭未免傍觀者哂天童據欵結案也要諸方檢點若檢點得出生陷無間地獄師嘗舉馬大師道一切語言是提婆宗以這箇為主乃曰好語祇是無人問我時有僧問如何是提婆宗師曰西天九十六種你是最下種問僧近離甚處曰西禪師曰西禪近日有何言句僧展兩手師打一掌僧曰某甲話在師却展兩手僧無語師又打問如何是端坐念實相師曰河裏失錢河裏摝上堂函蓋乾坤目機銖兩不涉世緣作麼生承當衆無對自代曰一鏃破三關僧問如何是雲門劒師曰祖問如何是玄中的師曰𡎺問如何是吹毛劒師曰骼又曰胔問如何是正法眼師曰普問如何是啐機師曰響問如何是雲門一路師曰親問殺父殺母向佛前懺悔殺佛殺祖向甚麼處懺悔師曰露問鑿壁偷光時如何師曰恰問三身中那身説法師曰要問承古有言了即業障本來空未了應須償宿債未審二祖是了未了師曰確師垂語曰會佛法如河沙百草頭上道將一句來自代曰俱問直歲甚處去來曰刈茆來師曰刈得幾箇祖師曰三百箇師曰朝打三千暮打八百東家杓柄長西家杓柄短又作麼生直歲無語師便打溈山云直歲為衆竭力到雲門面前乃力盡神疲何故棊逢敵手難藏行水到滄溟始是波徑山杲云直歲無語有三百箇祖師證明雲門令雖行要且棒頭無眼溈山果云這僧若具眼見雲門恁麼道但云和尚休要把髻投衙擬議之間坐具便摵不唯慶快平生亦乃參學眼正楚石琦云大小雲門却被直歲勘破金粟悟云惜乎徑山不與山僧同時若同即代雲門與伊一頓何以要知雲門棒頭有眼僧問秋初夏末前程若有人問作麼生祗對師曰大衆退後曰未審過在甚麼處師曰還我九十日飯錢來溈山云這僧貪程太速致使雲門隨索飯錢而今還有識雲門者麼出來與大溈相見良久云不是弄潮人休入洪波裏昭覺勤云這僧貪觀白浪雲門見機而作雖然斬釘截鐵未是本分草料有問崇寧只對道驢事未去馬事到來待伊如之若何劈脊便打護國元云據虎頭收虎尾則不無斬釘截鐵猶欠一著忽有人問護國劈脊便打待伊道過在什麼處向他道不似雲門索飯錢天童覺云大衆退後衲僧去就豈用機關那容體究蓑翁老熟慣波瀾橈棹不施船放流天童華云這僧有迎刃底謀略雲門具殺活底手段雖然如是報恩門下更須勘過了打天童傑云平如鏡面險似刀山這僧有破關底機謀雲門善用不戰屈人兵底手段雖然如是鼻孔在靈隱手裏有講僧參經時乃曰未到雲門時恰似初生月及乎到後曲彎彎地師得知乃召問是你道否曰是師曰甚好吾問汝作麼生是初生月僧乃斫額作望月勢師曰你如此已後失却目在僧經旬日復來師又問你還會也未曰未會師曰你問我僧便問如何是初生月師曰曲彎彎地僧罔措後果然失目琅琊覺云且道佛法有靈驗麼如今若有人問琅琊如何是初生月向道經堂前打板聲白雲端云這僧失却目雲門和鼻孔不見雖然如是家住州西黃龍新云語驚時聽得無動機若謂這僧失雙目入地獄如箭射東禪觀云這僧雖失雙目光射九天雲門兩眼雖存前明後暗上堂你若不相當且覓箇入頭處微塵諸佛在你舌頭上三藏聖教在你腳跟底不如悟去好還有悟得底麼出來對衆道看雪竇顯云然則養子之緣爭奈壓良為賤其間忽有不甘底出來掀倒禪牀豈不是大丈夫漢雖然如是且問據箇什麼乃驀拈拄杖云洎合停囚長智擊禪牀下座示衆盡十方世界乾坤大地以拄杖畫曰百雜碎雪竇顯云這老漢是即是要且未有出身之路如今拄杖在雪竇手裏復橫按云東西南北甚處得來又曰三乘十二分教達磨西來放過即不可若不放過不消一喝雪竇顯舉了隨後喝一喝云大衆好喝落在甚處若要鼻孔遼天辨取這一喝上堂平地上死人無數過得荊棘林者是好手時有僧出曰與麼則堂中第一座有長處也師曰蘇嚕蘇嚕溈山云若不是雲門被這僧一問幾乎將南作北大溈即不然忽有人道恁麼則堂中第一座有長處也乃拈拄杖云你喚這箇作什麼若喚作拄杖子眉鬚墮落黃龍南拈起拂子云大衆若喚作拂子是平地上死人不喚作拂子未透荊棘林在五祖演云太平即不然平地上箇箇丈夫荊棘林裏坐得是好手何故格泐潭清云只這拂子是荊棘林諸人作麼生過直饒過得也是胡孫繫露柱笑巖寶云雲門被這僧一拶輒自先跳入荊棘林中坐地我若是雲門待這僧云云便打云汝為什麼又深入這一重長老舉菩薩手中赤幡問師作麼生師曰你是無禮漢曰作麼生無禮師曰是你外道奴也作不得上堂要識祖師麼以拄杖指曰祖師在你頭上𨁝跳要識祖師眼睛麼在你腳跟下又曰這箇是祭鬼神茶飯雖然如此鬼神也無厭足徑山杲云不見道留惑潤生時有僧在傍咳嗽一聲妙喜云老漢恁麼道有甚麼過僧擬議便打上堂光不透脫有兩般病一切處不明面前有物是一又透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒透得法身去放過即不可子細點檢將來有甚麼氣息亦是病徑山杲云不用作禪會不用作道會不用作向上商量此是雲門老漢據實而論我恁麼道有沒量罪過汝若點檢得出許汝具擇法眼若點檢不出且向雲門葛藤裏參上堂眼睫橫亘十方眉毛上透乾坤下透黃泉須彌塞却汝咽喉還有人會得麼若有人會得拽取占波共新羅鬪額徑山杲云是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗諸人要識雲門麼不見道三臺須是大家催一日拈起拂子曰這裏得箇人處去揑怪也日木國裏説禪三十三天有箇人出來喚曰吽吽特舍兒擔枷過狀徑山杲云這老漢克由叵耐冒姓佃官田更不納苗稅示衆曰燈籠是你自己把鉢盂噇飯飯不是自己有僧便問飯是自己時如何師曰這野狐精三家村裏漢復曰來來不是你道飯是自己僧曰是師曰驢年夢見三家村裏漢徑山杲云用盡自己心笑破他人口問僧甚處來僧曰江西師曰江西一隊老漢寐語住也未僧無語法眼益因僧舉法眼云大小雲門被這僧勘破五雲逢云什麼處是勘破雲門處要會麼法眼亦被這僧勘破也問僧光明寂照遍河沙豈不是張拙秀才語曰是師曰話墮也問不起一念還有過也無師曰須彌山問一切智通無障礙時如何師曰掃地潑水相公來師到天童天童曰你還定當得麼師曰和尚道甚麼天童曰不會則目前包裹師曰會則目前包裹徑山杲云十字街頭石敢當師到曹山見示衆曰諸方盡把格則何不與他道却令他不疑去師問密密處為甚麼不知有曹山曰祇為密密所以不知有師曰此人如何親近曹山曰莫向密密處親近師曰不向密密處親近時如何曹山曰始解親近師應喏喏徑山杲云濁油更著濕燈心楚石琦云雪山南面三千里師到鵝湖聞上堂曰莫道未了底人長時浮逼逼地設使了得底明明得知有去處尚乃逼浮逼地師下問首座適來和尚意作麼生曰浮逼逼地師曰首座久在此住頭白齒黃作這箇語話曰上座又作麼生師曰要道即得見即便見若不見莫亂道曰祇如道浮逼逼地又作麼生師曰頭上著枷腳下著杻曰與麼則無佛法也師曰此是文殊普賢大人境界溈山云大凡撥草瞻風須是其人雲門可謂青天霹靂旱地震雷直得百里魂慮變懾不見道驚羣須是英靈漢敵勝還他師子兒黃龍新云雲門以錐錐地首座以刀剜空直饒齊下錐刀未免頭上著枷腳下著杻僧舉灌溪上堂曰十方無壁落四面亦無門淨裸裸赤灑灑沒可把師曰舉即易出也大難曰上座不肯和尚與麼道那師曰你適來與麼舉那曰是師曰你驢年夢見灌溪曰某甲話在師曰我問你十方無壁落四面亦無門你道大梵天王與帝釋天商量甚麼事曰豈干他事師喝曰逐隊喫飯漢師到江州有陳尚書者請齋才見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行腳事師曰曾問幾人來陳曰即今問上座師曰即今且置作麼生是教意陳曰黃卷赤軸師曰這箇是文字語言作麼生是教意陳曰口欲談而辭喪心欲緣而慮忘師曰口欲談而辭喪為對有言心欲緣而慮忘為對妄想作麼生是教意陳無語師曰見説尚書看法華經是否陳曰是師曰經中道一切治生産業皆與實相不相違背且道非非想天有幾人退位陳無語師曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會陳禮拜曰某甲罪過南嶽下七世巴陵皓鑒禪師雲門偃法嗣嶽州巴陵新開院皓鑒禪師初到雲門雲門曰雪峯和尚道開却門達磨來也我問你作麼生師曰築著和尚鼻孔雲門曰地神惡發把須彌山一摑𨁝跳上梵天拶破帝釋鼻孔你為甚麼向日本國裏藏身師曰和尚莫瞞人好雲門曰築著老僧鼻孔又作麼生師無語雲門曰將知你祇是學語之流徑山杲云擔一擔懵懂換得一擔骨董無星稱子稱來付與無知漆桶且道無知漆桶將作何用你若道得活脫句許你親見雲門住後更不作法嗣書祇將三轉語上雲門僧問如何是道師曰明眼人落井保寧永頌云秋夜霜天月正明仰觀星象約三更一條大路平如掌歸去何妨徹曉行問如何是吹毛劒師曰珊瑚枝枝撑著月雪竇顯頌云要平不平大巧若拙或指或掌倚天照雪大冶兮磨礱不下良工兮拂拭未歇別別珊瑚枝枝撑著月問如何是提婆宗師曰銀碗裏盛雪雪竇顯頌云老新開端的別解道銀碗裏盛雪九十六箇應自知不知却問天邊月提婆宗提婆宗赤幡之下起清風雲門見曰他後老僧忌日祇消舉此三轉語足以報恩自後忌辰果如所囑雙泉師寬禪師雲門偃法嗣隨州雙泉山師寬明教禪師僧問洞山初和尚如何是佛初曰麻三斤師聞之乃曰向南有竹向北有木師遊山回首座同衆出接首座曰和尚遊山巇嶮不易師提起拄杖曰全得這箇力首座乃奪却師放身便倒大衆皆進前扶起師拈拄杖一時趂散回顧侍者曰向道全得這箇力黃龍南云明教雖然會起會倒不覺弄巧成拙師一日訪白兆白兆曰老僧有箇木魚頌師曰請舉看白兆曰伏惟爛木一橛佛與衆生不別若以杖子擊著直得聖凡路絶師曰此頌有成褫無成褫白兆曰無成褫師曰佛與衆生不別聻侍僧救曰有成褫師曰直得聖凡路絶聻當時白兆一衆失色香林澄遠禪師雲門偃法嗣益州青城香林院澄遠禪師漢州綿竹人在衆日普請鉏草次有一僧曰看俗家失火師曰那裏火曰不見那師曰不見曰這瞎漢是時一衆皆言遠上座敗闕後明教寬聞舉歎曰須是我遠兄始得師將示寂辭知府宋公璫曰老僧行腳去通判曰這僧風狂八十歲行腳去那裏宋曰大善知識去住自由師謂衆曰老僧四十年方打成一片言訖而逝有僧參舉道者一日遊山次僧云香林道老僧三十年求成一片不可得此意如何舉云老僧也恁麼却問其僧會麼云不會舉示偈云香林成一片老僧也恁麼不待此月終重為子決破至月末舉遂遷化洞山守初禪師雲門偃法嗣襄州洞山守初宗慧禪師初參雲門雲門問近離甚處師曰查渡雲門曰夏在甚處師曰