body:
  text: 南嶽下八世清涼文益禪師羅漢琛法嗣金陵清涼院文益禪師餘杭魯氏子抵福州參長慶不大發明後同紹修法進三人欲出嶺過地藏院阻雪少憩附爐次地藏問此行何之師曰行腳去地藏曰作麼生是行腳事師曰不知地藏曰不知最親切又同三人舉肇論至天地與我同根處地藏曰山河大地與上座自己是同是別師曰別地藏竪起兩指師曰同地藏又竪起兩指便起去雪霽辭去地藏門送之問曰上座尋常說三界唯心萬法唯識乃指庭下片石曰且道此石在心內在心外師曰在心內地藏曰行腳人著甚麼來由安片石在心頭師窘無以對即放包依席下求決擇近一月餘日呈見解說道理地藏語之曰佛法不恁麼師曰某甲詞窮理絶也地藏曰若論佛法一切見成師於言下大悟子方上座自長慶來師舉長慶偈問曰作麼生是萬象之中獨露身子方舉拂子師曰恁麼會又爭得曰和尚尊意如何師曰喚甚麼作萬象曰古人不撥萬象師曰萬象之中獨露身說甚麼撥不撥子方豁然悟解述偈投誠自是諸方會下有存知解者翕然而至始則行行如也師微以激發皆漸而服膺海參之衆常不減千計師問修山主毫氂有差天地懸隔兄作麼生會修曰毫氂有差天地懸隔師曰恁麼會又爭得修曰和尚如何師曰毫氂有差天地懸隔修便禮拜東禪齊云山主恁麼祗對為甚麼不肯及乎再請益法眼亦祇恁麼道便得去且道疑訛在甚麼處若看得透道上座有來由五祖戒出法眼劈脊便打保寧勇云修山主當時也好向法眼道與麼會又爭得徑山杲云法眼與修山主絲來線去綿綿密密扶起地藏門風可謂滿目光生若是徑山門下更買草鞋行腳始得何故毫𨤲有差天地懸隔甚處得這消息來楚石琦云二老漢不會轉身句如今忽問天寧毫𨤲有差天地懸隔時如何向他道昨日有人問三十棒趂出院去也師與悟空禪師向火拈起香匙問曰不得喚作香匙兄喚作甚麼悟空曰香匙師不肯悟空後二十餘日方明此語僧參次師指簾時有二僧同去捲師曰一得一失東禪齊云上座作麼生會有云為伊不明旨便去捲簾亦有道指者即會不指而去者即失恁麼會還可不可既不許恁麼會且問上座阿那箇得阿那箇失黃龍清云法眼如鏌鎁在手殺活臨時二僧既齊捲簾且道那箇得那箇失還會麼世事但將公道斷人心難與月輪齊問寶資長老古人道山河無隔礙光明處處透且作麼生是處處透底光明寶資曰東畔打羅聲歸宗柔別云和尚擬隔礙師指竹問僧還見麼曰見師曰竹來眼裏眼到竹邊曰總不恁麼法燈欽云當時但擘眼向師歸宗柔別云和尚祇是不信某甲有俗士獻畫障子師看了問曰汝是手巧心巧曰心巧師曰那箇是汝心俗士無對歸宗柔代云某甲今日却成容易上堂盡十方世界皎皎地無一絲頭若有一絲頭即是一絲頭法燈欽云若有一絲頭不是一絲頭師指凳子曰識得凳子周匝有餘雲門云識得凳子天地懸殊雪竇顯云澤廣藏山理能伏豹雲峯悅云官不容針私通車馬薦福懷云識得凳子是楠木做五祖演云這兩箇漢一人過船一人渡水若檢點得出許你具正法眼圓通秀舉法眼雲門天衣語了云山僧道識得凳子四腳著地大衆其間一出一沒半合半開有得有失有親有疏具眼禪人一任驗取泐潭清舉法眼雲門雪竇語了云三箇漢總是依他作解明昧兩岐不脫見聞如水中月黃龍即不然逼塞乾坤外開張日月前徑山杲云識得凳子好剃頭洗腳雖然如是錯會者多天童華云向周匝有餘處會理上偏枯向天地懸殊處會事上偏枯且道歸宗為人在什麼處犀因玩月紋生角象被雷驚花入牙楚石琦云莫將閒話當閒話往往事從閒話生恕中慍云松直棘曲鵠白烏玄因開井被沙塞却泉眼師曰泉眼不通被沙礙道眼不通被甚麼礙僧無對師代曰被眼礙問僧甚處來曰泗州禮拜大聖來師曰今年大聖出塔否曰出師却問傍僧曰汝道伊到泗州不到浮山遠云這僧到即到泗州只是不見大聖道場全云這僧見即見大聖不曾識法眼東禪觀云這僧到也到泗州見也見大聖識也識法眼只是自討頭不見師謂小兒子曰因子識得你爺你爺名甚麼兒無對法燈欽代云但將衣袖掩面師却問僧若是孝順之子合下得一轉語且道合下得甚麼語僧無對師代曰他是孝順之子師問講百法論僧曰百法是體用雙陳明門是能所兼舉座主是能法座是所作麼生說兼舉有老宿代云某甲喚作箇法座歸宗柔云不勞和尚如此師因患腳僧問訊次師曰非人來時不能動及至人來動不得且道佛法中下得甚麼語曰和尚且喜得較師不肯自別曰和尚今日似減師一日與李王論道罷同觀牡丹花王命作偈師即賦曰擁毳對芳叢由來趣不同髮從今日白花是去年紅豔冶隨朝露馨香逐晚風何須待零落然後始知空王頓悟其意南嶽下九世天台德韶國師清涼益法嗣天台山德韶國師處州龍泉陳氏子也後唐同光中遊方首詣投子見同禪師次謁龍牙乃問雄雄之尊為甚麼近之不得龍牙曰如火與火師曰忽遇水來又作麼生龍牙曰去汝不會我語師又問天不蓋地不載此理如何龍牙曰道者合如是師經十七次問龍牙祇如此答師竟不諭旨再請垂誨龍牙曰道者汝已後自會去師後於通玄峯澡浴次忽省前話遂具威儀焚香遙望龍牙禮拜曰當時若向我說今日決定罵也又問疏山百匝千重是何人境界疏山曰左搓芒繩縛鬼子師曰不落古今請師說曰不說師曰為甚麼不說曰箇中不辨有無師曰師今善說疏山駭之如是歷參五十四員善知識皆法緣未契最後至臨川謁法眼法眼一見深器之一日法眼上堂僧問如何是曹源一滴水法眼曰是曹源一滴水僧惘然而退師於坐側豁然開悟平生凝滯渙若冰釋遂以所悟聞於法眼法眼曰汝向後當為國王所師致祖道光大吾不如也尋回本道遊天台山覩智者顗禪師遺蹤有若舊居師復與智者同姓時謂之後身也初止白沙時忠懿王為王子時刺台州嚮師之名延請問道師謂曰他日為霸主無忘佛恩漢乾祐元年戊申王嗣國位遣使迎之伸弟子之禮有傳天台智者教羲寂者即螺溪也屢言於師曰智者之教年祀浸遠慮多散落今新羅國其本甚備自非和尚慈力其孰能致之乎師於是聞於王王遣使及齎師之書往彼國繕寫備足而回迄今盛行於世師有偈曰通玄峯頂不是人間心外無法滿目青山法眼聞曰即此一偈可起吾宗徑山杲云滅却法眼宗只緣這一頌師因興教明和尚問曰飲光持釋迦丈六之衣在雞足山候彌勒下生將丈六之衣披在千尺之身應量恰好祇如釋迦身長丈六彌勒身長千尺為復是身解短邪衣解長邪師曰汝却會明拂袖便出去師曰小兒子山僧若答汝不是當有因果汝若不是吾當見之明歸七日吐血浮光和尚勸曰汝速去懺悔明乃至師方丈悲泣曰願和尚慈悲許某懺悔師曰如人倒地因地而起不曾教汝起倒明又曰若許懺悔某當終身給侍師為出語曰佛佛道齊宛爾高低釋迦彌勒如印印泥清涼泰欽禪師清涼益法嗣金陵清涼泰欽法燈禪師在衆日性豪逸不事事衆易之法眼獨契重法眼一日問衆曰虎項金鈴是誰解得衆無對師適至法眼舉前語問師曰繫者解得法眼曰汝輩輕渠不得上堂某甲本欲居山藏拙養病過時奈緣先師有未了底公案出來與他了却時有僧問如何是先師未了底公案師便打曰祖禰不了殃及兒孫曰過在甚麼處師曰過在我殃及你江南國主為鄭王時受心法於法眼之室暨法眼入滅復嘗問師曰先師有甚麼不了底公案師曰見分㭊次翠巖芝云為衆竭力禍出私門天童覺云這僧若是箇漢出來便與掀倒禪牀不惟自有出身之路亦免祖禰不了殃及兒孫昭覺勤舉云山僧卑志本亦如斯今日出來祇為五祖先師有箇現成公案對衆舉揚有不惜性命底試出來挨拶看如無不免自拈自弄去也喝一喝以拂子擊禪牀下座靈隱清聳禪師清涼益法嗣杭州靈隱清聳禪師福州人也初參法眼法眼指雨謂師曰滴滴落在上座眼裏師初不喻旨後因閲華嚴感悟承法眼印可百丈道恆禪師清涼益法嗣洪州百丈道恆禪師參法眼因請益外道問佛不問有言不問無言敘語未終法眼曰住住汝擬向世尊良久處會那師從此悟入永明道潛禪師清涼益法嗣杭州永明寺道潛禪師河中府武氏子初謁法眼法眼問曰子於參請外看甚麼經師曰華嚴經法眼曰總別同異成壞六相是何門攝屬師曰文在十地品中據理則世出世間一切法皆具六相也法眼曰空還具六相也無師懵然無對法眼曰汝問我我向汝道師乃問空還具六相也無法眼曰空師於是開悟踊躍禮謝法眼曰子作麼生會師曰空法眼然之異日因四衆士女入院法眼問師曰律中道隔壁聞叉釧聲即名破戒見覩金銀合雜朱紫駢闐是破戒不是破戒師曰好箇入路法眼曰子向後有五百毳徒為王侯所重在報恩慧明禪師清涼益法嗣杭州報恩慧明禪師姓蔣氏南遊於閩越間歷諸禪會莫契本心後至臨川謁法眼師資道合一日有新到參師問近離甚處曰都城師曰上座離都城到此山則部城少上座此間剩上座剩則心外有法少則心法不周說得道理即住不會即去僧無對徑山杲代云和尚謾某甲不得某甲亦謾和尚不得復云即今莫有道得相謾句者麼若也道得許汝跳得金剛圈吞得栗棘蓬師尋遷天台山白沙卓庵有朋彥上座博學強記來訪師敵論宗乘師曰言多去道轉遠今有事借問祇如從上諸聖及諸先德還有不悟者也無彥曰若是諸聖先德豈有不悟者哉師曰一人發真歸源十方虗空悉皆消殞今天台山嶷然如何得消殞去彥無對漢乾祐中忠懿王延入府中問法命住資崇院師盛談玄沙及地藏法眼宗旨臻極王因命翠巖令參等諸禪匠及城下名公定其勝負天龍禪師問曰一切諸佛及諸佛法皆從此經出未審此經從何而出師曰道甚麼天龍擬進語師曰過也資嚴長老問如何是現前三昧師曰還聞麼資嚴曰某甲不患聾師曰果然患聾師復舉雪峰塔銘問諸老宿夫從緣有者始終而成壞非從緣有者歷劫而長堅堅之與壞即且置雪峰即今在甚麼處法眼益別云祇今是成是壞老宿無對設有對者亦不能當其徵詰時羣彥弭伏王大喜悅雲居清錫禪師清涼益法嗣南康軍雲居山清錫禪師泉州人也有廖天使入院見供養法眼和尚真乃問曰真前是甚麼果子師曰假果子天使曰既是假果子為甚麼將供養真師曰也祇要天使識假羅漢智依禪師清涼益法嗣漳州羅漢智依宣法禪師與彥端長老喫餅餤端曰百種千般其體不二師曰作麼生是不二體端拈起餅餤師曰祇守百種千般端曰也是和尚見處師曰汝也是羅公詠梳頭樣師將示滅乃謂衆曰今晚四大不和暢雲騰鳥飛風動塵起浩浩地還有人治得麼若治得永劫不相識若治不得時時常見我言訖告寂報慈文遂禪師清涼益法嗣金陵報慈文遂禪師杭州陸氏子嘗究首楞嚴甄會真妄緣起本末精博於是節科注釋文句交絡厥功既就謁於法眼述己所業深符經旨法眼曰楞嚴豈不是有八還義師曰是曰明還甚麼師曰明還日輪曰日還甚麼師懵然無對法眼誡令焚其所注之文師自此服膺請益始忘知解報恩玄則禪師清涼益法嗣金陵報恩院玄則禪師滑州衛南人也初問青峰如何是學人自己青峰曰丙丁童子來求火後謁法眼法眼問甚處來師曰青峰法眼曰青峰有何言句師舉前話法眼曰上座作麼生會師曰丙丁屬火而更求火如將自己求自己法眼曰與麼會又爭得師曰某甲祇與麼未審和尚如何法眼曰你問我我與你道師問如何是學人自己法眼曰丙丁童子來求火師於言下頓悟開堂日李王與法眼俱在會僧問龍吟霧起虎嘯風生學人知是出世邊事到此為甚麼不會師曰會取好僧舉頭看師又看法眼乃抽身入衆法眼與李王當時失色法眼歸方丈令侍者喚問話僧至法眼曰上座適來問底話許你具眼人天衆前何不禮拜蓋覆却法眼摵一坐具其僧三日後吐光而終歸宗䇿真禪師清涼益法嗣廬山歸宗䇿真法施禪師曹州魏氏子也初名慧超謁法眼問曰慧超咨和尚如何是佛法眼曰汝是慧超師從此悟入昭覺勤云有者道慧超便是佛所以法眼恁麼答有者道大似騎牛覔牛有者道問處便是有甚麼交涉若恁麼會去不惟孤負自己亦乃深屈古人雪竇顯頌云江國春風吹不起鷓鴣啼在深花裏三級浪高魚化龍癡人猶戽夜塘水古賢謹禪師清涼益法嗣澤州古賢院謹禪師侍立法眼次法眼問一僧曰自離此間甚麼處去來曰入嶺來法眼曰不易曰虗涉他如許多山水法眼曰如許多山水也不惡其僧無語師於此有省南嶽下十世永明延壽禪師天台韶法嗣杭州永明延壽禪師餘杭王氏子往天台山天柱峰九旬習定暨謁韶國師一見而深器之密授玄旨仍謂師曰汝與元帥有緣他日大興佛事忠懿王請開山靈隱新寺明年遷永明大道場衆盈二千僧問如何是永明妙旨師曰更添香著曰謝師指示師曰且喜沒交涉僧禮拜師曰聽取一偈欲識永明旨門前一湖水日照光明生風來波浪起問如何是大圓鏡師曰破砂盆廣平守威禪師天台韶法嗣福州廣平院守威宗一禪師本州人也參天台國師得旨乃付衣法時有僧問大庾嶺頭提不起如何今日付於師師提起曰有人敢道天台得麼五雲志逢禪師天台韶法嗣杭州五雲山華嚴院志逢禪師餘杭人也通貫三學了達性相嘗夢升須彌山覩三佛列坐初釋迦次彌勒皆禮其足唯不識第三尊但仰視而已釋尊謂之曰此是補彌勒處師子月佛師方作禮覺後因閲大藏經乃符所夢天福中遊方抵天台雲居參國師賓主緣契頓發玄祕一日入普賢殿中宴坐倐有一神人跪膝於前師問汝其誰乎曰護戒神也師曰吾患有宿愆未殄汝知之乎曰師有何罪唯一小過耳師曰何也曰凡折鉢水亦施主物師每傾棄非所宜也言訖而隱師自此洗鉢水盡飲之積久因致脾疾十載方愈凡折退飲食及涕唾便利等並宜鳴指默念呪發施心而傾棄之智者全肯禪師天台韶法嗣婺州智者寺全肯禪師初參國師國師問汝名甚麼師曰全肯國師曰肯箇甚麼師於言下有省乃禮拜瑞鹿遇安禪師天台韶法嗣溫州瑞鹿寺上方遇安禪師福州人也得法於天台又常閲首楞嚴經到知見立知即無明本知見無見斯即涅槃師乃破句讀曰知見立知即無明本知見無見斯即涅槃於此有省有人語師曰破句了也師曰此是我悟處畢生不易時謂之安楞嚴瑞鹿本先禪師天台韶法嗣溫州瑞鹿寺本先禪師本州鄭氏子參天台國師導以非風幡動仁者心動之語師即悟解爾後示徒曰吾初學天台法門語下便薦然千日之內四儀之中似物礙膺如讐同所一日忽然猛省譬如洗面摸著鼻孔興教洪壽禪師天台韶法嗣杭州興教洪壽禪師同國師普請次聞墮薪有省作偈曰撲落非他物縱橫不是塵山河及大地全露法王身雲居道齊禪師清涼欽法嗣洪州雲居道齊禪師本州金氏子遍歷禪會學心未息後於上藍院主經藏法燈一日謂師曰有人問我西來意答它曰不東不西藏主作麼生會師對曰不東不西法燈曰與麼會又爭得曰道齊祇恁麼未審和尚尊意如何法燈曰他家自有兒孫在師於是頓明厥旨千光瓌省禪師永明潛法嗣杭州千光王寺瓌省禪師溫州鄭氏子幼歲出家精究律部聽天台文句棲心於圓頓止觀後閲楞嚴文理宏濬未能洞曉一夕誦經既久就案假寐夢中見日輪自空而降開口吞之自是倐然發悟差別義門渙然無滯後參永明永明唯印前解無別指喻南嶽下十一世瑞巖義海禪師雲居齊法嗣明州瑞巖義海禪師霅川人也造雲居法席雲居問甚麼物恁麼來師於言下大悟遂有頌曰雲居甚麼物問著頭恍惚直下便承當猶是生埋沒淨土惟正禪師淨土素法嗣杭州淨土院惟正禪師秀州華亭黃氏子提䇿東引學三觀於天台復旋徑山咨單傳之旨於老宿惟素惟素董臨安功臣山淨土院師輔相之久而繼席焉葉內翰清臣牧金陵迎師語道一日葉曰明日府有燕飲師固奉律能為我少留一日欵清話否師諾之翌日遣使邀師留一偈而返曰昨日曾將今日期出門倚杖又思惟為僧祇合居巖谷國士筵中甚不宜坐客皆仰其標致師雅愛跨黃犢出入軍持巾鉢悉挂角上市人爭觀之杭守蔣侍郎嘗與師為方外友每往謁至郡庭下犢談笑終日而去蔣有詩曰禪客尋常入舊都黃牛角上挂瓶盂有時帶雪穿雲去便好和雲畫作圖師嘗作山中偈曰橋上山萬層橋下水千里唯有白鷺鷥見我常來此
