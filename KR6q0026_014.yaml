向人師出曰相隨來也僧問藥山一句子如何説藥山曰非言説師曰早言説了也師一日提笠出雲巖指笠曰用這箇作甚麼師曰有用處雲巖曰忽遇黑風猛雨來時如何師曰蓋覆著雲巖曰他還受蓋覆麼師曰然雖如是且無滲漏溈山問雲巖菩提以何為座雲巖曰以無為為座雲巖却問溈山溈山曰以諸法空為座又問師作麼生師曰坐也聽伊坐臥也聽伊臥有一人不坐不臥速道速道溈山休去溈山問師甚處去來師曰看病來溈山曰有幾人病師曰有病底有不病底溈山曰不病底莫是智頭陀麼師曰病與不病總不干他事速道速道溈山曰道得也與他沒交涉雲巖問師弟家風近日如何師曰教師兄指點堪作甚麼雲巖曰無這箇來多少時也師曰牙根猶帶生澀在有施主施裩藥山提起示衆曰法身還具四大也無有人道得與他一腰裩師曰性地非空空非性地此是地大三大亦然藥山曰與汝一腰裩雲巖不安師乃謂曰離此殼漏子向甚麼處相見雲巖曰不生不滅處相見師曰何不道非不生不滅處亦不求相見雪竇顯云侍者與我記取這一問昭覺勤云何處不逢渠雲巖補鞋次師問作甚麼雲巖曰將敗壞補敗壞師曰何不道即敗壞非敗壞師聞僧念維摩經云八千菩薩五百聲聞皆欲隨從文殊師利師問曰甚麼處去其僧無對師便打後僧問禾山殷禾山云給侍者方諧師到五峰五峰問還識藥山老宿否師曰不識五峰曰為甚麼不識師曰不識石霜問和尚一片骨敲著似銅鳴向甚麼處去也師喚侍者侍者應諾師曰驢年去雲巖曇晟禪師藥山儼法嗣潭州雲巖曇晟禪師鍾陵建昌王氏子參百丈海禪師二十年因緣不契後造藥山藥山問甚處來曰百丈來藥山曰百丈有何言句示徒師曰尋常道我有一句子百味具足藥山曰鹹則鹹味淡則淡味不鹹不淡是常味作麼生是百味具足底句師無對藥山曰爭奈目前生死何師曰目前無生死藥山曰在百丈多少時師曰二十年藥山曰二十年在百丈俗氣也不除他日侍立次藥山又問百丈更説甚麼法師曰有時道三句外省去六句內會取藥山曰三千里外且喜沒交涉藥山又問更説甚麼法師曰有時上堂大衆立定以拄杖一時趂散復召大衆衆回首百丈曰是甚麼藥山曰何不早恁麼道今日因子得見海兄師於言下頓省便禮拜徑山杲云省去即不無爭奈未出葛藤窠笑巖寶云雲巖在百丈二十年懵然無箇入處剛被藥山隨手提起云何不早恁麼道雲巖便悟旨諸禪者還知雲巖悟處麼十年花下路遊遍洞中春一日藥山問汝除在百丈更到甚麼處來師曰曾到廣南來曰見説廣州城東門外有一片石被州主移去是否師曰非但州主闔國人移亦不動藥山又問聞汝解弄師子是否師曰是曰弄得幾出師曰弄得六出曰我亦弄得師曰和尚弄得幾出曰我弄得一出師曰一即六六即一後到溈山溈山問承聞長老在藥山弄師子是否師曰是曰長弄有置時師曰要弄即弄要置即置曰置時師子在甚麼處師曰置也置也法昌遇云好一場師子只是有頭無尾我當時若見溈山道置時師子在甚麼處便與放出踞地金毛直教溈山藏身無路泐潭準云藥山雲巖鈍置殺人兩父子弄一箇師子也弄不出若是準上座只消自弄拽得來拈頭作尾拈尾作頭轉兩箇金睛攫幾鉤鐵爪吼一聲直教百里內猛獸潛蹤滿空裏飛禽亂墜準上座未弄師子請大衆高著眼先做一箇定場擲下拄杖云箇中消息子能有幾人知笑巖寶云這夥老漢只解弄假師子不解弄真師子我若是雲巖待藥山問聞汝會弄師子是否震威與一喝非只截斷藥山腳頭直教影響之流聞之腦裂以致溈山云正值睡時師子在什麼處劈面便掌的使他不知量者便見弄真師子全威不欺之力也師煎茶次道吾問煎與阿誰師曰有一人要曰何不教伊自煎師曰幸有某甲在問石霜甚麼處來曰溈山來師曰在彼中得多少時曰粗經冬夏師曰恁麼即成山長也曰雖在彼中却不知師曰他家亦非知非識石霜無對道吾智聞云得恁麼無佛法身心住後上堂示衆曰有箇人家兒子問著無有道不得底洞山出問曰他屋裏有多少典籍師曰一字也無曰爭得恁麼多知師曰日夜不曾眠洞山曰問一段事還得否師曰道得却不道道吾問大悲千手眼那箇是正眼師曰如人夜間背手摸枕子道吾曰我會也師曰作麼生會道吾曰遍身是手眼師曰道也太煞道祇道得八成道吾曰師兄作麼生師曰通身是手眼掃地次道吾曰太區區生師曰須知有不區區者道吾曰恁麼則有第二月也師竪起掃帚曰是第幾月道吾便行玄沙備云正是第二月長慶稜問玄沙云被他倒轉掃帚攔面摵又作麼生玄沙休去羅山間云噫兩箇漢不識好惡雲巖箇漢縛手腳死來多少時也雲門偃云奴見婢殷勤保福展云雲巖大似泥裏推車步步區區雪竇顯向有第二月也處別云洎合放過溈山行云道吾平地生堆雲巖因行掉臂玄沙道正是第二月面皮厚多少且道雲巖豎起掃帚意作麼生十成好箇金剛鑽攤向門前賣與誰師作草鞋次洞山近前曰乞師眼睛得麼師曰汝底與阿誰去也曰良價無師曰設有汝向甚麼處著洞山無語師曰乞眼睛底是眼否洞山曰非眼師便喝出尼僧禮拜師問汝爺在否曰在師曰年多少曰年八十師曰汝有箇爺不年八十還知否曰莫是恁麼來者師曰恁麼來者猶是兒孫洞山價代云直是不恁麼來者亦是兒孫溈山果云恁麼也不得不恁麼也不得畢竟作麼生良久云從來無位次不用強安排院主遊石室回師問汝去入到石室裏許為祇恁麼便回院主無對洞山代曰彼中已有人占了也師曰汝更去作甚麼洞山曰不可人情斷絶去也船子德誠禪師藥山儼法嗣秀州華亭船子德誠禪師節操高邈度量不羣自印心於藥山與道吾雲巖為同道交洎離藥山乃謂二同志曰公等應各據一方建立藥山宗旨豫率性疏野唯好山水樂情自遣無所能也他後知我所止之處若遇靈利座主指一人來或堪雕琢將授生平所得以報先師之恩遂分擕至秀州華亭泛一小舟隨緣度日以接四方往來之者時人莫知其高𮛫因號船子和尚一日泊船岸邊間坐有官人問如何是和尚日用事師竪橈子曰會麼官人曰不會師曰棹撥清波金鱗罕遇道吾後到京口遇夾山上堂僧問如何是法身夾山曰法身無相曰如何是法眼夾山曰法眼無瑕道吾不覺失笑夾山便下座請問道吾某甲適來祇對這僧話必有不是致令上座失笑望上座不吝慈悲道吾曰和尚一等是出世未有師在夾山曰某甲甚處不是望為説破道吾曰某甲終不説請和尚却往華亭船子處去夾山曰此人如何道吾曰此人上無片瓦下無卓錐和尚若去須易服而往夾山乃散衆束裝直造華亭船子才見便問大德住甚麼寺夾山曰寺即不住住即不似師曰不似似箇甚麼夾山曰不是目前法師曰甚處學得來夾山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鉤三寸子何不道夾山擬開口被師一橈打落水中夾山才上船師又曰道道夾山擬開口師又打夾山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊天奇瑞云句下精通只是事上明白更存此念千生萬劫豈不是繫驢橛所以華亭當堂直截免成魍魎不惜眉毛果然脫落方見從前不是古云不因樵子徑爭到葛洪家夾山遂問拋綸擲釣師意如何師曰𮈔懸淥水浮定有無之意夾山曰語帶玄而無路舌頭談而不談師曰釣盡江波金鱗始遇夾山乃掩耳師曰如是如是遂囑曰汝向去直須藏身處沒蹤迹沒蹤迹處莫藏身吾三十年在藥山祇明斯事汝今已得他後莫住城隍聚落但向深山裏钁頭邊覓取一箇半箇接續無令斷絶夾山乃辭行頻頻回顧師遂喚闍黎夾山乃回首師竪起橈子曰汝將謂別有乃覆船入水而逝長蘆了云棹頭撥轉河漢星輝船子踏翻天地黯黑豎起拂子云這箇是钁頭邊乾白露淨底還知沒蹤迹處隱身不得底麼樹慧省禪師藥山儼法嗣宣州樹慧省禪師洞山參師問來作甚麼洞山曰來親近和尚師曰若是親近用動這兩片皮作麼洞山無對曹山寂云一子親得昭覺勤云椑樹臥起道吾蓋覆一喝當頭掀翻露布溈山智云相逢不相避箇裏聊遊戲喝一喝翻天覆地百巖明哲禪師藥山儼法嗣鄂州百巖明哲禪師藥山看經次師曰和尚休猱人好藥山置經曰日頭早晚也師曰正當午藥山曰猶有文彩在師曰某甲無亦無藥山曰汝太煞聰明師曰某甲祇恁麼和尚作麼生藥山曰跛跛挈挈百醜千拙且恁麼過洞山與密師伯到參師問二上座甚處來洞山曰湖南師曰觀察使姓甚麼曰不得姓師曰名甚麼曰不得名師曰還治事也無曰自有郎幕在師曰還出入也無曰不出入師曰豈不出入洞山拂袖便出師次早入堂召二上座曰昨日老僧對闍黎一轉語不相契一夜不安今請闍黎別下一轉語若愜老僧意便開粥相伴過夏洞山曰請和尚問師曰豈不出入洞山曰太尊貴生師乃開粥同共過夏昭覺勤云正偏回互只要圓融直截當機惟崇尊貴洞山觀機而作百巖理長則就雖然如是曹洞門下即得若於臨濟宗中須別作箇眼目始得當時待伊道不委名便向伊道他不委你你不委他敢問合道得什麼語還有人道得麼若有山僧也不開粥只分付箇龜毛拂子若道不得且參三十年天童傑云明投暗合八面玲瓏不犯當頭轉身有路曹洞門下足可觀光若是臨濟兒孫棒折也未放在當時若見他道不委姓劈脊便與一拳這裏拶得身轉非但開粥相延亦可明下安排有麼有麼喝云漆桶參堂去澧州高沙彌藥山儼法嗣澧州高沙彌初參藥山藥山問甚處來師曰南嶽來藥山曰何處去師曰江陵受戒去藥山曰受戒圖甚麼師曰圖免生死藥山曰有一人不受戒亦無生死可免汝還知否師曰恁麼則佛戒何用藥山曰這沙彌猶挂唇齒在師禮拜而退道吾來侍立藥山曰適來有箇跛腳沙彌却有些子氣息道吾曰未可全信更須勘過始得至晚藥山上堂召曰早來沙彌在甚麼處師出衆立藥山問我聞長安甚鬧你還知否師曰我國晏然法眼益別云見誰説藥山曰汝從看經得請益得師曰不從看經得亦不從請益得藥山曰大有人不看經不請益為甚麼不得師曰不道他不得祇是不肯承當藥山顧道吾雲巖曰不信道一日辭藥山藥山問甚麼處去師曰某甲在衆有妨且往路邊卓箇草庵接待往來茶湯去藥山曰生死事大何不受戒去師曰知是般事便休更喚甚麼作戒藥山曰汝既如是不得離吾左右時復要與子相見師住菴後一日歸來值雨藥山曰你來也師曰是藥山曰可煞濕師曰不打這箇鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮藥山曰今日大好一場曲調天奇瑞云藥山為子情深恐有隨緣不備雖乃密密提持不防壓良為賤三子人中之傑匪肯淈淈𣸩𣸩不犯鋒鋩善能宛轉所以撥轉船頭飽載風月藥山齋時自打鼓師捧鉢作舞入堂藥山便擲下鼓槌曰是第幾和師曰是第二和藥山曰如何是第一和師就桶舀一杓飯便出翠微無學禪師丹霞然法嗣京兆府翠微無學禪師初問丹霞如何是諸佛師丹霞咄曰幸自可憐生須要執巾帚作麼師退身三步丹霞曰錯師進前丹霞曰錯錯師翹一足旋身一轉而出丹霞曰得即得孤他諸佛師由是領旨住後投子問未審二祖初見達磨有何所得師曰汝今見吾復何所得投子頓悟玄旨一日師在法堂內行投子進前接禮問曰西來密旨和尚如何示人師駐步少時投子曰乞師垂示師曰更要第二杓惡水那投子便禮謝師曰莫垛根投子曰時至根苗自生師因供養羅漢僧問丹霞燒木佛和尚為甚麼供養羅漢師曰燒也不燒著供養亦一任供養曰供