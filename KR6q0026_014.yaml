body:
  text: 六祖大鑒禪師法嗣青原行思禪師吉州青原山靜居寺行思禪師本州安城劉氏子幼歲出家每羣居論道師唯默然聞曹溪法席乃往參禮問曰當何所務即不落階級祖曰汝曾作甚麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之徑山杲云莫將間話為間話往往事從間話生楚石琦云弄泥團漢有什麼限會下學徒雖衆師居首焉亦猶二祖不言少林謂之得髓矣一日祖謂師曰從上衣法雙行師資遞授衣以表信法乃印心吾今得人何患不信吾受衣以來遭此多難況乎後代爭競必多衣即留鎮山門汝當分化一方無令斷絶師既得法歸住青原六祖將示滅有沙彌希遷即石頭和尚問曰和尚百年後希遷未審當依附何人祖曰尋思去及祖順世遷每於靜處端坐寂若忘生第一座問曰汝師已逝空坐奚為遷曰我稟遺誡故尋思爾座曰汝有師兄思和尚今住吉州汝因緣在彼師言甚直汝自迷耳遷聞語便禮辭祖龕直詣靜居參禮師曰子何方來遷曰曹溪師曰將得甚麼來曰未到曹溪亦不失師曰若恁麼用去曹溪作甚麼曰若不到曹溪爭知不失遷又曰曹溪大師還識和尚否師曰汝今識吾否曰識又爭能識得師曰衆角雖多一麟足矣遷又問和尚自離曹溪甚麼時至此間師曰我却知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次他日師復問遷汝甚麼處來曰曹溪師乃舉拂子曰曹溪還有這箇麼曰非但曹溪西天亦無師曰子莫曾到西天否曰若到即有也師曰未在更道曰和尚也須道取一半莫全靠學人師曰不辭向汝道恐已後無人承當師令遷持書與南嶽讓和尚曰汝達書了速回吾有箇鈯斧子與汝住山遷至彼未呈書便問不慕諸聖不重己靈時如何南嶽曰子問太高生何不向下問遷曰寧可永劫受沉淪不從諸聖求解脫南嶽便休玄沙備云大小石頭被南嶽推倒直至如今起不得雪竇顯云石頭洎擔板過却又云大小大慧不解據令天奇瑞云前村後塢東店西街酒館花樓星岩月窟遇歌時水仙子鴈兒落一任婆和遇儒時傳以文約以禮豈有差殊大衆我恁麼拈提且道與他合否豈不見道野老門前別有條章遷便回師問子返何速書信達否遷曰書亦不通信亦不達去日蒙和尚許箇鈯斧子祇今便請師垂一足遷便禮拜尋辭往南嶽翠巖芝云思和尚垂足石頭禮拜要且不得斧子且道後來使箇什麼黃龍南云石頭雖然善能馳達不辱宗風其奈逞俊太忙不知落節既是落節回來因什麼得斧子荷澤神會來參師問甚處來曰曹溪師曰曹溪意旨如何會振身而立師曰猶帶瓦礫在曰和尚此間莫有真金與人麼師曰設有汝向甚麼處著玄沙備云果然雲居錫云祇如玄沙道果然是真金是瓦礫金粟悟云諸禪德神會恁麼也不無見處因甚思和尚道猶帶瓦礫在當時合下什麼語免為點罰何不待伊道曹溪意旨如何但向道合取狗口伊若擬議驀面一唾便行豈不俊哉乃振身而立可謂隨邪逐惡更云和尚此間莫有真金與人益見不唧𠺕然則即今莫有振身而立者麼廣慧要與伊三十棒且道賞伊罰伊僧問如何是佛法大意師曰廬陵米作麼價青原下一世石頭希遷禪師青原思法嗣南嶽石頭希遷禪師端州高要陳氏子造曹溪得度未具戒屬祖圓寂稟遺命謁青原青原問曰有人道嶺南有消息師曰有人不道嶺南有消息曰若恁麼大藏小藏從何而來師曰盡從這裏去青原然之師於唐天寶初荐之衡山南寺寺之東有石狀如臺乃結庵其上時號石頭和尚師因看肇論至會萬物為己者其唯聖人乎師乃拊几曰聖人無己靡所不己法身無象誰云自他圓鑑靈照於其間萬象體玄而自現境智非一孰云去來至哉斯語也遂掩卷不覺寢夢自身與六祖同乘一龜遊泳深池之內覺而詳之靈龜者智也池者性海也吾與祖師同乘靈智遊性海矣遂著參同契曰竺土大仙心東西密相付人根有利鈍道無南北祖靈源明皎潔枝派暗流注執事元是迷契理亦非悟門門一切境回互不回互回而更相涉不爾依位住色本殊質象聲元異樂苦暗合上中言明明清濁句四大性自復如子得其母火熱風動搖水濕地堅固眼色耳音聲鼻香舌識醋然依一一法依根葉分布本末須歸宗尊卑用其語當明中有暗勿以暗相遇當暗中有明勿以明相覩明暗各相對比如前後步萬物自有功當言用及處事存函蓋合理應箭鋒拄承言須會宗勿自立規矩觸目不會道運足焉知路進步非近遠迷隔山河固謹白參玄人光陰莫虗度門人道悟問曹溪意旨誰人得師曰會佛法人得曰師還得否師曰不得曰為甚麼不得師曰我不會佛法僧問如何是解脫師曰誰縛汝問如何是淨土師曰誰垢汝問如何是涅槃師曰誰將生死與汝師問新到從甚麼處來曰江西來師曰見馬大師否曰見師乃指一橛柴曰馬師何似這箇僧無對却回舉似馬祖祖云汝見橛柴大小云沒量大祖云汝甚有力僧云何也祖云汝從南嶽負一橛柴來豈不是有力大顛問古人云道有道無俱是謗請師除師曰一物亦無除箇甚麼師却問併却咽喉脣吻道將來大顛曰無這箇師曰若恁麼汝即得入門道悟問如何是佛法大意師曰不得不知悟曰向上更有轉處也無師曰長空不礙白雲飛問如何是禪師曰碌甎問如何是道師曰木頭青原下二世藥山惟儼禪師石頭遷法嗣澧州藥山惟儼禪師絳州韓氏子年十七依朝陽西山慧照禪師出家納戒于衡嶽希操律師博通經論嚴持戒律一日自歎曰大丈夫當離法自淨誰能屑屑事細行於布巾邪首造石頭之室便問三乘十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了伏望和尚慈悲指示石頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生師罔措石頭曰子因緣不在此且往馬大師處去師稟命恭禮馬祖仍伸前問祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生師於言下契悟便禮拜祖曰你見甚麼道理便禮拜師曰某甲在石頭處如蚊子上鐵牛祖曰汝既如是善自護持侍奉三年法雲秀云石頭好箇無孔鐵鎚大似分付不著藥山雖然過江西悟去爭奈平地上喫交有什麼扶策處具眼者試辨看五祖演云老僧在衆日聞兄弟商量道即心即佛也不得不即心即佛也不得若恁磨説話敢稱禪客殊不知古人文武兼備韜略雙全山僧見處也要諸人共知只見波濤湧不見海龍宮大溈智云説什麼在石頭時如蚊子上鐵牛只今又何曾吐露得出溈山果云前箭猶自可後箭射人深藥山直饒恁麼悟去也落第二月徑山杲云好箇話端阿誰會舉舉得十分未敢相許楚石琦云藥山只知蚊子上鐵牛不知鐵牛叮蚊子露柱親遭一口燈籠無地藏身嚇得馬大師變作老妙喜我且問你話端從甚麼處説起相罵饒你插觜相唾饒你潑水一日祖問子近日見處作麼生師曰皮膚脫落盡唯有一真實祖曰子之所得可謂協於心體布於四肢既然如是將三條篾束取肚皮隨處住山去師曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此師乃辭祖返石頭一日在石上坐次石頭問曰汝在這裏作麼曰一物不為石頭曰恁麼即間坐也曰若間坐即為也石頭曰汝道不為不為箇甚麼曰千聖亦不識石頭以偈讚曰從來共住不知名任運相將祇麼行自占上賢猶不識造次凡流豈可明徑山杲云物是實價錢是足陌石頭垂語曰言語動用沒交涉師曰非言語動用亦沒交涉石頭曰我這裏針劄不入師曰我這裏如石上栽華石頭然之後居澧州藥山海衆雲會師與道吾説茗溪上世為節察來道吾曰和尚上世曾為甚麼師曰我痿痿羸羸且恁麼過時道吾曰憑何如此師曰我不曾展他書卷石霜諸別云書卷不曾展謂雲巖曰與我喚沙彌來雲巖曰喚他來作甚麼師曰我有箇折腳鐺子要他提上挈下雲巖曰恁麼則與和尚出一隻手去也師便休溈山云藥山若不得雲巖折腳鐺子幾成廢器大溈折腳鐺子也與諸人共出一隻手何故且圖古風不墜昭覺勤云舉一明三是衲僧尋常行履雲巖既告往知來藥山亦不謬分付崇寧雖百醜千拙有箇沒底籃子更望諸人兩手提挈何故有條攀條天童華云藥山道頭雲巖知尾雖然頭尾相稱要且不識羞耻道吾雲巖侍立次師指按山上枯榮二樹問道吾曰枯者是榮者是道吾曰榮者是師曰灼然一切處光明燦爛去又問雲巖枯者是榮者是雲巖曰枯者是師曰灼然一切處放教枯淡去高沙彌忽至師曰枯者是榮者是高曰枯者從他枯榮者從他榮師顧道吾雲巖曰不是不是師久不升堂院主白曰大衆久思和尚示誨師曰打鐘著衆才集師便下座歸方丈院主隨後問曰和尚既許為大衆説話為甚麼一言不措師曰經有經師論有論師爭怪得老僧雪竇顯云可惜藥山老漢平地上喫撲盡大地人扶不起琅琊覺云藥山下座不妨疑著及乎院主拶著失却一隻眼翠巖芝云藥山下座院主當初怪不為説法可謂誤他三軍薦福懷云藥山還見院主麼院主還見藥山麼三十年後遇著作家不得錯舉五祖演云雖然以己妨人爭奈賊身已露諸人要識藥山麼間持經卷倚松立笑問客從何處來開福寧云藥山慎初護末佛眼難窺院主狹路相逢等間蹉過雪竇宗云威音劫外攜手誰肯同歸十字街頭擲金幾人踏著敢問大衆且道藥山曾説不曾説若道曾説是謗藥山若道不曾説是孤負藥山且道畢竟為人在甚麼處良久云須知雲外千峯上別有靈松帶雨寒天童傑舉翠巖拈了云翠巖只具一隻眼殊不知藥山歸方丈正是勞他三軍資福先云藥山竟歸方丈却似箇好人只被他輕輕一捏便見忘前失後師問雲巖作甚麼雲巖曰擔屎師曰那箇聻雲巖曰在師曰汝來去為誰曰替他東西師曰何不教並行曰和尚莫謗他師曰不合恁麼道曰如何道師曰還曾擔麼問僧甚處來曰湖南來師曰洞庭湖水滿也未曰未師曰許多時雨水為甚麼未滿僧無語道吾智云滿也雲巖晟云湛湛地洞山價云甚麼劫中曾增減來雲門偃云祇在這裏問龐居士一乘中還著得這箇事麼居士曰某甲祇管日求升合不知還著得麼師曰道居士不見石頭得麼居士曰拈一放一未為好手師曰老僧住持事繁居士珍重便出師曰拈一放一的是好手居士曰好箇一乘問宗今日失却也師曰是是師與雲巖遊山腰間刀響雲巖問甚麼物作聲師抽刀驀口作斫勢洞山價舉示衆云看他藥山橫身為這箇事今時人欲明向上事須體此意始得遵布衲浴佛師曰這箇從汝浴還浴得那箇麼遵曰把將那箇來師乃休長慶稜云邪法難扶報慈遂云且道長慶恁麼道在賓在主衆中喚作浴佛語亦云兼帶語且道盡善不盡善問學人有疑請師決師曰待上堂時來與闍黎決疑至晚上堂衆集師曰今日請決疑上座在甚麼處其僧出衆而立師下禪牀把住曰大衆這僧有疑便與一推却歸方丈報慈遂云且道與伊決疑否若決疑甚麼處是決疑若不與決疑又道待上堂時與汝決疑翠巖芝云藥山與麼決疑土上更加泥雖然如是這僧也不得孤負藥山雲居元云大小藥山被這僧勘破師令供養主抄化甘行者問甚處來曰藥山來甘曰來作麼曰教化甘曰將得藥來麼曰行者有甚麼病甘便捨銀兩鋌意山中有人此物却回無人即休化主便歸納疏師問曰子歸何速化主曰問佛法相當得銀兩鋌師令舉其語化主舉已師曰速送還他子著賊了也化主便送還甘曰由來有人遂添銀施之同安顯云早知行者恁麼問終不道藥山來雪峯空云藥山老漢亦自小膽若是東山即便收下何故且教甘贄老漢疑三十年問僧見説汝解算是否曰不敢師曰汝試算老僧看僧無對雲巖晟舉問洞山汝作麼生洞山云請和尚生月師書佛字問道吾是甚麼字道吾曰佛字師曰多口阿師夜參不點燈師垂語曰我有一句子待特牛生兒即向你道有僧曰特牛生兒也祇是和尚不道師曰侍者把燈來其僧抽身入衆洞山價云這僧會只是不肯禮拜清涼欽云特牛兒牸牛兒又代云雙生翠巖芝云我即不然特牛生兒也不向你道何故如此若向你道何處更有王老師投子青云且道甚處是這僧會底道理若道得可為這僧雪屈若道不得却被藥山瞞浮山遠云我有一句子待無舌人問即道昭覺勤云藥山垂釣意在鯤鯨這僧吞鉤三千激浪洞山眼正千里同風法燈重整槍旗再裝甲胄夾山即不然有一句子威音已前道與諸人了或有問明頭合暗頭合只向他道龍得水時添意氣虎逢山色長威獰黃龍震云會麼如人暗中書字字雖不成文彩已彰文彩既彰點燈為甚不見不見道賊是小人智過君子天奇瑞云藥山當時滿口道出又言特牛生兒正是揚聲止響欲隱彌露這僧全身獨露却又歸衆而藏亦是靈龜拽尾拂迹成痕洞山就事傳聲未有師資之禮山僧不然當時只道低聲免得這些絡索看經次僧問和尚尋常不許人看經為甚麼却自看師曰我祇圖遮眼曰某甲學和尚還得也無師曰汝若看牛皮也須穿長慶稜云眼有何過報慈遂云且道長慶會藥山意不會藥山意雪竇宗云真心不動教海澄明得用如如義天炳煥正恁麼時且道是經是眼若向這裏見得徹更不用循行數墨逐妄迷真其或未然牛皮穿透猶自可髑髏遍野幾人知金粟悟云藥山豈只遮眼直得通身𮖐却這僧若看豈只牛皮須穿直得撞破乾坤始得不被瞞却問平田淺草麈鹿成群如何射得麈中主師曰看箭僧放身便倒師曰侍者拖出這死漢僧便走師曰弄泥團漢有甚麼限雪竇顯云三步雖活五步須死頌云麈中主君看取下一箭走三步五步若活成羣趁虎正眼從來付獵人復高聲云看箭雲居元云藥山千鈞之弩不為鼷鼠發機這僧帶箭出門一死更不再活淨慈昌云這僧趂得猢孫入他閙市藥山騎箇猛虎直上高山若作一處商量終是遭人檢點院主報打鐘也請和尚上堂師曰汝與我擎鉢盂去曰和尚無手來多少時師曰汝祇是枉披袈裟曰某甲祇恁麼和尚如何師曰我無這箇眷屬園頭栽菜次師曰栽即不障汝栽莫教根生曰既不教根生大衆喫甚麼師曰汝還有口麼園頭無對師坐次僧問兀兀地思量甚麼師曰思量箇不思量底曰不思量底如何思量師曰非思量無準範頌云兀兀地思量無可得思量無可思量處真箇好思量大庾嶺頭逢六祖鰲山店上見曾郎問學人擬歸鄉時如何師曰汝父母遍身紅爛臥在荊棘林中汝歸何所曰恁麼則不歸去也師曰汝却須歸去汝若歸鄉示汝箇休糧方子曰便請師曰二時上堂不得咬破一粒米朗州刺史李翱問師何姓師曰正是時李不委却問院主某甲適來問和尚姓和尚曰正是時未審姓甚麼院主曰恁麼則姓韓也師聞乃曰得恁麼不識好惡若是夏時對他便是姓熱李初嚮師玄化屢請不赴乃躬謁之師執經卷不顧侍者曰太守在此李性褊急乃曰見面不如聞名拂袖便出師曰太守何得貴耳賤目李回拱謝問曰如何是道師以手指上下曰會麼李曰不會師曰雲在青天水在瓶李欣愜作禮而述偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘説雲在青天水在瓶報慈遂云且道李太守是讚他語明他語須是行腳眼始得李又問如何是戒定慧師曰貧道這裏無此間家具李莫測玄旨師曰太守欲得保任此事直須向高高山頂立深深海底行閨閣中物捨不得便為滲漏張無盡頌云雲在青天水在瓶眼光隨指落深坑溪花不耐風霜苦説甚深深海底行師一夜登山經行忽雲開見月大嘯一聲應澧陽東九十里許居民盡謂東家明晨迭相推問直至藥山徒衆曰昨夜和尚山頂大嘯丹霞天然禪師石頭遷法嗣鄧州丹霞天然禪師本習儒業將入長安應舉方宿於逆旅偶禪者問曰仁者何往曰選官去禪者曰選官何如選佛曰選佛當往何所禪者曰今江西馬大師出世是選佛之場仁者可往遂直造江西才見祖師以手拓幞頭額祖顧視良久曰南嶽石頭是汝師也據抵石頭還以前意投之石頭曰著槽廠去師禮謝入行者房隨次執爨役凡三年忽一日石頭告衆曰來日剗佛殿前草至來日大衆諸童行各備鍬钁剗草獨師以盆盛水沐頭於石頭前胡跪石頭見而笑之便與剃髮又為説戒師乃掩耳而出再往江西謁馬祖未參禮便入僧堂內騎聖僧頸而坐時大衆驚愕遽報馬祖祖躬入堂視之曰我子天然師即下地禮拜曰謝師賜法號因名天然祖問從甚處來師曰石頭祖曰石頭路滑還躂倒汝麼師曰若躂倒即不來也乃杖錫觀方遇慧林寺遇天大寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利院主曰木佛何有舍利師曰既無舍利更取兩尊燒院主自後眉鬚墮落大寧寬因僧問丹霞燒木佛為甚院主眉鬚墮落寬云賊不打貧兒家投子青云不會作客勞煩主人保寧勇云院主眉鬚墮落即且置且道丹霞眉毛在也無若也見得與古佛同參若也不見切忌撥無因果寶峯文云丹霞燒木佛院主眉鬚落驀拈拄杖云不是木佛擲下拄杖云誰敢燒你擬即眉鬚落不擬又且如何高聲云行者拈起拄杖東禪嶽云古人做處今人合知如展一面皂纛旗殺一有罪而天下咸服如其無罪法亦難施直饒千聖出頭來安排一字也不得天童華云諸方商量道院主忽起疑心而致斯禍又云院主天寒不與丹霞火向致令燒却木佛遂乃眉鬚墮落殊不知院主買鐵得金一場富貴靈隱嶽云諸人要知麼大小丹霞向深村裏失却一隻眼院主也是如蟲禦木偶爾成文光孝門下也無木佛得燒只有一星無煙火直是難近傍擬之則燎却面門諸人須是退步看驀地冷灰裏豆爆驚天動地直教佛祖救不得喝一喝謁忠國師問侍者國師在否曰在即在不見客師曰太深遠生曰佛眼亦不見師曰龍生龍子鳳生鳳兒國師睡起侍者以告國師乃打侍者二十棒遣出師聞曰不謬為南陽國師明日再往禮拜見國師便展坐具國師曰不用不用師退後國師曰如是如是師却進前國師曰不是不是師繞國師一匝便出國師曰去聖時遙人多懈怠三十年後覓此漢也難得保福展云丹霞貪程不覺行困溈山云丹霞可謂懷藏至寶遇智者乃增輝國師鴻門大啓陟者須是奇人如今還有為丹霞作主者麼出來與大溈相見有麼不是龍門客切忌遭點額泐潭準云客路如天遠侯門似海深登彌天釋之門者須是奇人接待高賓應有孟嘗君之度量苟不如是便見主賓道異雲泥不合大溈果云丹霞一進一退暗中嬴得一著國師倒東擂西未免傍觀者哂蔣山勤云賓主相見欲展不展退後進前禮過成諂猶幸南陽老而不耄東禪觀云明鏡當臺胡來胡現漢來漢現霜鐘在架大扣大鳴小扣小鳴一卷一舒一擒一縱可謂照用兩全行説俱到且如國師道去聖時遙人多懈怠三十年後討箇師僧也難得畢竟是褒是貶天奇瑞云三驗而骨髓親見三答而命脈全彰不犯風煙自然契合乾坤之內寬行大步海嶽之中惸尊獨貴訪龐居士見女子靈照洗菜次師曰居士在否女子放下菜籃斂手而立師又問居士在否女子提籃便行師遂回須臾居士歸女子乃舉前話居士曰丹霞在麼女曰去也居士曰赤土塗牛妳溈山云大小丹霞被居士女子勘破山僧當時若作丹霞但與呵呵大笑待他問長老笑箇甚麼却向道不是冤家不聚頭蔣山勤云丹霞從苗辨地靈照因語識人放下菜籃當處發生提起菜籃隨處滅盡居士云赤土塗牛嬭屋裏販揚州且道畢竟如何各自散去免增話會又一日訪龐居士至門首相見師乃問居士在否居士曰飢不擇食師曰龐老在否居士曰蒼天蒼天便入宅去師曰蒼天蒼天便回師因去馬祖處路逢一老人與一童子師問公住何處老人曰上是天下是地師曰忽遇天崩地陷又作麼生老人曰蒼天蒼天童子噓一聲師曰非父不生其子老人便與童子入山去正覺顯云上天下地不妨聰明蒼天蒼天隨語生解是父是子褒貶分明𭊌一聲却較些子師問龐居士昨日相見何似今日居士曰如法舉昨日事來作箇宗眼師曰祇如宗眼還著得龐公麼居士曰我在你眼裏師曰某甲眼窄何處安身居士曰是眼何窄是身何安師休去居士曰更道取一句便得此話圓師亦不對居士曰就中這一句無人道得蔣山勤云是眼何窄是身何安昨日今日事無兩般淮南兩浙秋熱春寒恁麼會得也大無端三十年後莫受人瞞師與龐居士行次見一泓水居士以手指曰便與麼也還辨不出師曰灼然是辨不出居士乃戽水潑師二掬師曰莫與麼莫與麼居士曰須與麼須與麼師却戽水潑居士三掬師曰正與麼時堪作甚麼居士曰無外物師曰得便宜者少居士曰誰是落便宜者元和三年於天津橋橫臥會留守鄭公出呵之不起吏問其故師徐曰無事僧留守異之問僧甚麼處宿曰山下宿師曰甚麼處喫飯曰山下喫飯師曰將飯與闍黎喫底人還具眼也無僧無對長慶稜問保福將飯與人喫感恩有分為甚麼不具眼保福云施者受者二俱瞎漢長慶云盡其機來還成瞎不保福云道某甲瞎得麼報慈遂徵云且道長慶明丹霞意為復自用家財芭蕉徹云各具一得一失又代僧云爭不足讓有餘又代丹霞云施受俱無利益汾陽昭代云若不上山爭識丹霞保寧勇代云今日被和尚勘破天童華云丹霞既已龍頭蛇尾長慶保福只得將錯就錯雖然二三老宿要且不知老僧落處具擇法眼者試請辨看潭州大川禪師石頭遷法嗣潭州大川禪師亦曰大湖江陵僧參師問幾時發足江陵僧提起坐具師曰謝子遠來下去僧繞禪牀一匝便出師曰若不恁麼爭知眼目端的僧拊掌曰苦殺人洎合錯判諸方師曰甚得禪宗道理僧舉似丹霞丹霞云於大川法道即得我這裏不然云未審此間作麼生丹霞云猶較大川三步在僧禮拜丹霞云錯判諸方者多洞山價云不是丹霞難分玉石金粟悟云洞山老漢失却一隻眼須知這僧禮拜不是好心只是後來少一轉語前話不圓所以遭人簡點當時待丹霞云錯判諸方底甚多但拊掌笑云這老漢大似不打自招如此則任是老丹霞也未免疑著大顛寶通禪師石頭遷法嗣潮州靈山大顛寶通禪師初參石頭石頭問那箇是汝心師曰見言語者是石頭便喝出經旬日師却問前者既不是除此外何者是心石頭曰除却揚眉瞬目將心來師曰無心可將來石頭曰元來有心何言無心無心盡同謗師於言下大悟徑山杲云且道大顛悟得箇甚麼異日侍立次石頭問汝是參禪僧是州縣白踏僧師曰是參禪僧石頭曰何者是禪師曰揚眉瞬目石頭曰除却揚眉瞬目外將你本來面目呈看師曰請和尚除却揚眉瞬目外鑒石頭曰我除竟師曰將呈了也石頭曰汝既將呈我心如何師曰不異和尚石頭曰不關汝事師曰本無物石頭曰汝亦無物師曰既無物即真物石頭曰真物不可得汝心見量意旨如此也大須護持韓文公一日相訪問師春秋多少師提起數珠曰會麼公曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何首座扣齒三下及見師理前問師亦扣齒三下公曰原來佛法無兩般師曰是何道理公曰適來問首座亦如是師乃召首座是汝如此對否首座曰是師便打趂出院保福展云首座知前不知後大顛令不單行徑山信云大顛和尚賊過後張弓活埋他俗人雖然如是祇救得一半頌云夜深賊被狗子咬墻洞慌忙補得好補不好長安幾箇知天曉文公