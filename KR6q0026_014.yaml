麼生師曰針針相似洞山曰二十年同行作這箇語話豈有與麼工夫師曰長老又作麼生洞山曰如大地火發底道理師問洞山智識所通莫不遊踐徑截處乞師一言洞山曰師伯意何得取功師因斯頓覺下語非常後與洞山過獨木橋洞山先過了拈起木橋曰過來師喚價闍黎洞山乃放下橋木夾山善會禪師船子誠法嗣澧州夾山善會禪師廣州廖氏子因道吾勸發往見船子由是師資道契微眹不留語見船子章西川座主罷講遍參到襄州華嚴和尚處問曰祖意教意是同是別華嚴曰如車二輪如鳥二翼座主曰將為禪門別有長處元來無遂歸蜀後聞師道播諸方令小師持此語問師曰雕砂無鏤玉之談結草乖道人之意座主聞舉遙禮曰元來禪門中別有長處問撥塵見佛時如何師曰直須揮劒若不揮劒漁父棲巢僧後問石霜撥塵見佛時如何石霜曰渠無國土甚處逢渠僧回舉似師師上堂舉了乃曰門庭施設不如老僧入理深談猶較石霜百步護國元云參須實參見須實見毫端許言之本末皆為自欺今夜忽有人問三峯撥塵見佛時如何和聲便打還會麼真金自有真金價終不和沙賣與人師在溈山作典座溈山問今日喫甚菜師曰二年同一春溈山曰好好修事著師曰龍宿鳳巢上堂百草頭薦取老僧閙市裏識取天子雲門偃云蝦蟇鑽你鼻孔毒蛇穿你眼睛且向葛藤裏會取雲峯悅云雲門與麼道大似和泥脫墼若無後語疑殺天下人山僧今日因行不妨掉臂乃豎起拄杖云還見雲門麼保寧勇云百草頭上分明顯露為甚不薦閙市裏終日相逢為甚不識未開眼者且莫錯怪夾山雖然如是干保寧什麼事雲居舜云古人與麼實為慈悲大衆且作麼生是閙市門頭天子會麼愁人莫向愁人説説向愁人愁殺人又舉了云我則不然婦搖機軋軋兒弄口喎喎徑山杲云夾山垛生招箭雲門認賊為子雖然如是知恩者少負恩者多楚石琦云百草頭薦阿誰閙市裏識什麼虎頭上座參師問甚處來曰湖南來師曰曾到石霜麼曰要路經過爭得不到師曰聞石霜有毬子話是否曰和尚也須急著眼始得師曰作麼生是毬子曰跳不出師曰作麼生是毬杖曰沒手足師曰且去老僧未與闍黎相見雪竇顯云親見這僧從石霜來夾山因什麼道不相識智海逸云夾山恁麼道肯這僧不肯這僧若辨得出許你具擇法眼徑山策云入虎穴者不畏死登危竿者不怕險這僧要路經過夾山因茲落草檢點將來未免如貓弄鼠塗毒若作夾山待他道和尚也須急著眼即和聲打出便向道淨地上不要放屙還知麼傷鱉恕龜殺活由我明日升座師曰昨日新到在麼虎頭出應諾師曰目前無法意在目前不是目前法非耳目之所到虎頭曰今日雖問要且不是師曰片月難明非關天地虎頭曰莫沸便作掀禪牀勢師曰且緩緩虧著上座甚麼處虎頭竪起拳曰目前還著得這箇麼師曰作家作家虎頭又作掀禪牀勢師曰大衆看這一員戰將若是門庭布列山僧不如他若據入理之談也較山僧一級地東禪嶽云夾山口吹無孔笛手提氊拍板大家唱云去年梅今歲柳顏色馨依舊且道是何曲調還會麼曲終人不見江上數峯青問如何是夾山境師曰猿抱子歸青嶂裏鳥銜華落碧巖前法眼益云我二十年秖作境話會浮山遠云直饒不作境話會亦未會在何故犀因玩月紋生角象被雷驚華入牙黃龍心拈拂子云看看拂子變作夾山老子出來見麼有僧云謝和尚指示心云見你不顧而今却入露柱中去也黃龍新云這僧分明問境法眼因甚不作境會既不作境會作麼生會長憶江南三月裏鷓鴣啼處百花香黃龍震云直饒法眼盡力𨁝跳也出夾山綣繢不得法眼既出不得且道是什麼人出得乃豎起拂子云須是這老漢始得高峯妙云大衆還會麼直饒向這裏會得見法眼則易見夾山則難師問僧甚麼處來曰洞山來師曰洞山有何言句示徒曰尋常教學人三路學師曰何者三路曰玄路鳥道展手師曰實有此語否曰實有師曰軌持千里鈔林下道人悲清平令遵禪師翠微學法嗣鄂州清平山安樂院令遵禪師東平人也初參翠微便問如何是西來的的意翠微曰待無人即向汝説師良久曰無人也請和尚説翠微下禪牀引師入竹園師又曰無人也請和尚説翠微指竹曰這竿得恁麼長那竿得恁麼短師雖領其微言猶未徹其玄旨出住大通上堂舉初見翠微機緣謂衆曰先師入泥入水為我自是我不識好惡僧問如何是大乘師曰井索曰如何是小乘師曰錢貫曰如何是有漏師曰笊籬曰如何是無漏師曰木杓法雲秀云大乘小乘井索錢索有漏無漏笊籬木杓徑山杲云且道是醍醐句毒藥句問如何是清平家風師曰一斗作三箇蒸餅問如何是禪師曰猢猻上樹尾連顛投子大同禪師翠微學法嗣舒州投子山大同禪師本州懷寧劉氏子初習安般觀次閲華嚴教發明性海復謁翠微頓悟宗旨語見翠微章後旋故土隱投子山結茅而居一日趙州和尚至桐城師亦出山途中相遇乃逆而問曰莫是投子山主麼師曰茶鹽錢布施我趙州先歸庵中坐師後擕一瓶油歸趙州曰久嚮投子及乎到來祇見箇賣油翁師曰汝祇識賣油翁且不識投子趙州曰如何是投子師提起油瓶曰油油南堂靜云趙州作家罏鞴要煅百煉精金投子本分鉗鎚不免途中受用諸人還見二老落處麼十年辛苦無人問一旦成名天下知趙州問大死底人却活時如何師曰不許夜行投明須到趙州曰我早候白伊更候黑師指庵前一片石謂雪峰曰三世諸佛總在裏許雪峰曰須知有不在裏許者師曰不快漆桶師與雪峰遊龍眠有兩路雪峰問那箇是龍眠路師以杖指之雪峰曰東去西去師曰不快漆桶問一槌便就時如何師曰不是性燥漢曰不假一槌時如何師曰不快漆桶雪峰問此間還有人參也無師將钁頭拋向雪峰面前雪峯曰恁麼則當處掘去也師曰不快漆桶雪峯辭師送出門召曰道者雪峯回首應諾師曰途中善為雪竇顯云然則一期折挫雪峯且投子是作家罏鞴我當時若作雪峯待投子道不是性𢤁漢只向伊道鉗鎚在我手裏諸上座合與投子著得箇甚麼語若能道得便乃性𢤁平生光揚宗眼若也瞞頇頂上一椎莫言不道溈山云雪峯雖是本分鉗鎚爭奈投子是作家罏鞴山僧今日亦為諸人開箇罏鞴衆中還有本分鉗鎚者麼如無山僧為你諸人下一鎚直是火星迸散乃卓拄杖云看看諸人護取眉毛好東禪觀云與麼酬對喚作作家罏鞴正是認狸為虎自取疑怖若據性空見處投子心肝五臟被雪峯盡情摟出巨榮禪客參次師曰老僧未曾有一言半句挂諸方唇齒何用要見老僧巨榮曰到這裏不施三拜要且不甘師曰出家兒得恁麼沒記巨榮乃繞禪牀一匝而去師曰有眼無耳朵六月火邊坐雪竇顯云也不得放過才轉便擒住是誰不甘若跳得出不妨是一員衲僧溈山云這僧雖是慣戰沙場爭奈投子善能折挫何故真金若不經罏冶爭得光華徹底鮮問如何是十身調御師下禪牀立又有問凡聖相去多少師下禪牀立雪竇顯云此公案諸人無不委知若與麼舉天下衲僧盡為念話社家雪竇還有長處也無試為大衆舉看凡聖相去多少投子下禪牀立如何是十身調御投子下禪牀立且道與前來舉底是同是別若道一般許上座具一隻眼若道別有奇特也許上座具一隻眼復更開一線道凡聖相去多少請上座下一轉語如何是十身調御請上座答一轉語非但參見投子亦乃知雪竇長處或若總道下禪牀立惜取眉毛好五祖演云或有人問山僧亦下禪牀立為什麼却依樣畫貓兒待我計較得成却向你道問一等是水為甚麼海鹹河淡師曰天上星地下木法眼益別云大似相違問僧甚麼處來曰東西山禮祖師來師曰祖師不在東西山僧無語法眼益代云和尚識祖師白雲山約禪師翠微學法嗣建州白雲約禪師韶國師參師問甚麼處來韶曰江北來師曰船來陸來曰船來師曰還逢見魚鱉麼曰往往遇之師曰遇時作麼生韶曰咄縮頭去師大笑歙州茂源禪師孝義空法嗣歙州茂源禪師因平田參師欲起身平田乃把住曰開口即失閉口即喪去此二途請師速道師以手掩耳平田放手曰一步易兩步難師曰有甚麼死急平田曰若非此箇師不免諸方點檢師不對青原下五世大光居誨禪師石霜諸法嗣潭州大光山居誨禪師京兆人也初造石霜長坐不臥麻衣草履亡身為法石霜遂令主性空塔院一日石霜知緣熟試其所得問曰國家每年放舉人及第朝門還得拜也無師曰有一人不求進石霜曰憑何師曰他且不為名石霜曰除却今日別更有時也無師曰他亦不道今日是如是酬問往復無滯盤桓二十餘祀衆請出世九峯道虔禪師石霜諸法嗣瑞州九峯道虔禪師福州人也嘗為石霜侍者洎石霜歸寂衆請首座繼住持師白衆曰須明得先師意始可首座曰先師有甚麼意師曰先師道休去歇去冷湫湫地去一念萬年去寒灰枯木去古廟香爐去一條白練去其餘則不問如何是一條白練去首座曰這箇祇是明一色邊事師曰元來未會先師意在首座曰你不肯我那但裝香來香煙斷處若去不得即不會先師意遂焚香香煙未斷首座已脫去師拊首座背曰坐脫立亡即不無先師意未夢見在開福寧云大衆且道首座是會先師意不會先師意若道會爭奈虔侍者撫背云坐脫立亡即不無首座先師意未夢見在若道不會其奈首座良哉快便撒手便行且道利害在什麼處會麼路遠夜長休把火大家吹滅暗中行南華昺云透生死關高超物表秉殺活劒獨據寰中若非智眼洞明未免扶籬摸壁要會麼春蘭與秋菊各自一時榮薦福行云大凡本分法席肘臂欲其重非重不能權衡佛祖爪牙欲其利非利無以開托人天看他石霜遷化首座侍者各出一隻手扶持石霜宗旨直是光前絶後今古罕聞諸人要辨來端各請拗折弓箭踏翻射垛來與老僧相見徑山杲云兩箇無孔鐵鎚就中一箇最重楚石琦云首座坐脫立亡侍者説黃道黑先師意在鈎頭須信曲中有直若在臨濟門下三十棒教誰喫才説是非者便是是非人天奇瑞云當時待九峯道盡答他一箇著甚死急使他左右侍候不敢不依却不向活處行機恰似箇趕山獵犬自己尚不能了如何與人為師蓋因二六時中趣寂惟求速生速死不知情沉有作返認為奇所以古云兔棲月殿鷺倚雪巢被此換却眼睛墮在大功雖要轉身方見剎塵受用免滯孤虗大衆如何即是鑊湯爐炭馬面牛頭涌泉景欣禪師石霜諸法嗣台州涌泉景欣禪師泉州人也自石霜開示而止涌泉強德二禪客於路次見師騎牛不識師忽曰蹄角甚分明爭奈騎者不鑒師驟牛而去強德憩於樹下煎茶師回却下牛問曰二禪客近離甚麼處強曰那邊師曰那邊事作麼生強提起茶盞師曰此猶是這邊事那邊事作麼生強無對師曰莫道騎者不鑒好保寧勇代師指參隨人云歸到山中分明舉似雲蓋志元禪師石霜諸法嗣潭州雲蓋山志元圓淨禪師遊方時問雲居曰志元不奈何時如何雲居曰祇為闍黎功力不到師不禮拜直造石霜亦如前問石霜曰非但闍黎老僧亦不奈何師曰和尚為甚麼不奈何石霜曰老僧若奈何拈過汝不奈何師便禮拜僧問石霜萬戶俱閉即不問萬戶俱開時如何石霜曰堂中事作麼生僧無對經半年方始下一轉語曰無人接得渠石霜曰道即太煞道祇道得八成曰和尚又且如何石霜曰無人識得渠師知乃禮拜乞為舉石霜不肯師乃抱石霜上方丈曰和尚若不道打和尚去在石霜曰得在師頻禮拜石霜曰無人識得渠師於言下頓省翠巖芝云先行不到末後太過天童覺云穩密田地忌墮功勳貼肉衣裳會須脫去寰中辨的量外之機須仔細始得同中之異灼然尚帶依俙異中之同直是難臻妙極還知石霜父子轉側處麼燭曉玉人初夢破夜寒青女未登機潭州道正表聞馬王乞師論義王請師上殿相見茶罷師就王乞劒師握劒問道正曰你本教中道恍恍惚惚其中有物是何物杳杳冥冥其中有精是何精道得不斬道不得即斬道正茫然便禮拜懺悔師謂王曰還識此人否王曰識師曰是誰王曰道正師曰不是其道若正合對得臣僧此祇是箇無主孤魂因茲道士更不紛紜覆船洪薦禪師石霜諸法嗣福州覆船山洪薦禪師道吾問久嚮和尚會禪是否師曰蒼天蒼天道吾近前掩師口曰低聲低聲師與一掌道吾曰蒼天蒼天師把住曰得恁麼無禮道吾却與一掌師曰老僧罪過道吾拂袖便行師呵呵大笑曰早知如是不見如是僧參師便作起勢僧便出師曰闍黎且來人事僧回作抽坐具勢師却歸方丈僧曰蒼天蒼天師曰龍頭蛇尾僧近前叉手立師曰敗將投王不存性命鳳翔石柱禪師石霜諸法嗣鳳翔府石柱禪師遊方時到洞山時虔和尚垂語曰有四種人一人説過佛祖一步行不得一人行過佛祖一句説不得一人説得行得一人説不得行不得阿那箇是其人師出衆曰一人説過佛祖行不得者祇是無舌不許行一人行過佛祖一句説不得者祇是無足不許説一人説得行得者祇是函蓋相稱一人説不得行不得者如斷命求活此是石女兒披枷帶鎖洞山曰闍黎分上作麼生師曰該通分上卓卓寧彰洞山曰祇如海上明公秀又作麼生師曰幻人相逢拊掌呵呵龍湖普聞禪師石霜諸法嗣邵武軍龍湖普聞禪師唐僖宗太子也幼不茹葷長無經世意僖宗鍾愛之然百計陶寫終不能回中和初僖宗幸蜀師斷髮逸遊人無知者造石霜問曰祖師別傳事肯以相付乎石霜曰莫謗祖師師曰天下宗旨盛大豈妄為之邪石霜曰是實事那師曰師意如何石霜曰待案山點頭即向汝道師於言下頓省張拙秀才石霜諸法嗣張拙秀才因禪月大師指參石霜石霜問秀才何姓曰姓張名拙石霜曰覓巧尚不可得拙自何來公忽有省乃呈偈曰光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趣向真如亦是邪隨順世緣無挂礙涅槃生死等空花洛浦元安禪師夾山會法嗣澧州洛浦山元安禪師鳳翔麟遊人也問道臨濟後為侍者臨濟嘗對衆美之曰臨濟門下一隻箭誰敢當鋒師蒙印可自謂已足一日侍立次有座主參臨濟臨濟問有一人於三乘十二分教明得有一人不於三乘十二分教明得且道此二人是同是別座主曰明得即同明不得即別師曰這裏是甚麼所在説同説別臨濟顧師曰汝又作麼生師便喝臨濟送座主回問師汝豈不是適來喝老僧者師曰是臨濟便打師後辭臨濟臨濟問甚麼處去師曰南方去臨濟以拄杖畫一畫曰過得這箇便去師乃喝臨濟便打師作禮而去臨濟明日升堂曰臨濟門下有箇赤梢鯉魚搖頭擺尾向南方去不知向誰家虀甕裏淹殺師遊歷罷直往夾山卓庵經年不訪夾山夾山乃修書令僧馳往師接得便坐却再展手索僧無對師便打曰歸去舉似和尚僧回舉似夾山曰這僧若開書三日內必來若不開書斯人救不得也師果三日後至見夾山不禮拜乃當面叉手而立夾山曰雞棲鳳巢非其同類出去師曰自遠趨風請師一接夾山曰目前無闍黎此間無老僧師便喝夾山曰住住且莫草草匆匆雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師佇思夾山便打因茲服膺興化獎云但知作佛愁什麼衆生雪竇顯云這漢可悲可痛鈍置他臨濟他既雲月是同我亦溪山各異説什麼無舌人不解語以坐具劈口便摵夾山若是箇知方漢必然明下安排五祖戒出洛浦語云更説道理看便出去大陽玄代云也要和尚證明昭覺勤云雪竇雖是賊過後張弓不妨與臨濟雪屈若仔細檢點將來令行一半儻若擔荷正法眼藏待伊道爭教無舌人解語便與掀倒禪牀喝散大衆更待什麼明下安排剔起便行直饒機如掣電眼似流星辨瀉懸河也卒著手腳不得且道譊訛在甚麼處乃云險師問夾山佛魔不到處如何體會夾山曰燭明千里像暗室老僧迷又問朝陽已升夜月不現時如何夾山曰龍銜海珠遊魚不顧夾山將示滅垂語曰石頭一枝看看即滅矣師曰不然夾山曰何也師曰他家自有青山在夾山曰苟如是即吾宗不墜矣問僧近離甚處曰荊南師曰有一人與麼去還逢麼曰不逢師曰為甚不逢曰若逢即頭粉碎師曰闍黎三寸甚密雲門於江西見其僧乃問還有此語否曰是雲門曰洛浦倒退三千里上堂孫臏收鋪去也有卜者出來僧曰請和尚卜師曰汝家爺死僧無對法眼益代拊掌三下徑山杲云這僧沒興死却爺又被他人拊掌信知禍不單行福無雙至然洛浦善卜法眼善斷若仔細思量爻象吉凶二老一時漏逗既占得火風鼎卦何故斷作地火明夷雲門却不然驀拈拄杖云孫臏門下死却即罷連卓三下云會麼內屬艮宮再求外象又卓三下云千靈萬聖萬聖千靈莫順人情復卓一下云吉凶上卦楚石琦云洛浦道汝家爺死拄却舌頭妙喜牙上生牙角上生角妄談休咎強説是非一時抖亂六十四卦了也問一毫吞盡巨海於中更復何言師曰家有白澤之圖必無如是妖怪保福展別云家無白澤之圖亦無如是妖怪侍者謂師曰肇法師制得四論甚奇怪師曰肇公甚奇怪要且不見祖師侍者無對清涼欽代云和尚甚麼處是雲居錫云甚麼處是肇公不見祖師處莫是有許多言語麼又云肇公有多少言語十二月一日告衆曰吾非明即後也今有一事問汝等若道這箇是即頭上安頭若道不是即斬頭求活第一座對曰青山不舉足日下不挑燈師曰是甚麼時節作這箇語話時有彥從上座對曰離此二途請和尚不問師曰未在更道曰彥從道不盡師曰我不管汝盡不盡曰彥從無侍者祇對和尚師便休至夜令侍者喚從問曰闍黎今日祇對甚有道理汝合體得先師意先師道目前無法意在目前不是目前法非耳目之所到且道那句是賓那句是主若擇得出分付鉢袋子曰彥從不會師曰汝合會曰彥從實不會師喝出乃曰苦苦報慈遂云且道從上座實不會是怕見鉢袋子拈著伊二日午時別僧舉前話問師師曰慈舟不棹清波上劒峽徒勞放木鵝便告寂黃山月輪禪師夾山會法嗣撫州黃山月輪禪師福唐許氏子初謁三峯機緣靡契尋聞夾山盛化乃往叩之夾山問名甚麼師曰月輪夾山作一圓相曰何似這箇師曰和尚恁麼語話諸方大有人不肯在夾山曰闍黎作麼生師曰還見月輪麼夾山曰闍黎恁麼道此間大有人不肯諸方師乃服膺參訊一日夾山抗聲問曰子是甚麼處人師曰閩中人夾山曰還識老僧麼師曰和尚還識學人麼夾山曰不然子且還老僧草鞋錢然後老僧還子廬陵米價師曰恁麼則不識和尚也未委廬陵米作麼價夾山曰真師子兒善能哮吼乃入室受印依附七年天奇瑞云神之通也虎穴魔宮無不自在用之妙也海角天涯有何障蔽縱之星布高穹奪之風捲殘雲自古明鎗易躲至今暗箭難防怪哉鼷口鼠食人不覺疼若人會得八表橫行韶山寰普禪師夾山會法嗣洛京韶山寰普禪師僧參師問莫是多口白頭因麼因曰不敢師曰有多少口曰通身是師曰尋常向甚麼處屙曰向韶山口裏屙師曰有韶山口即得無韶山口向甚麼處屙因無語師便打雲門偃代云這話墮阿師放你三十棒又云韶山今日瓦解冰消遵布衲訪師在山下相見遵問韶山路向甚麼處去師以手指曰嗚那青青黯黯處去遵近前把住曰久嚮韶山莫便是否師曰是即是闍黎有甚麼事遵曰擬伸一問師還答否師曰看君不是金牙作爭解彎弓射尉遲遵曰鳳凰直入煙霄去誰怕林間野兒師曰當軒畫鼓從君擊試展家風似老僧遵曰一句迥超千聖外松蘿不與月輪齊師曰饒君直出威音外猶較韶山半月程遵曰過在甚處師曰倜儻之辭時人知有遵曰恁麼則真玉泥中異不撥萬機塵師曰魯般門下徒施巧妙遵曰學人即恁麼未審師意如何師曰玉女夜拋梭織錦於西舍遵曰莫便是和尚家風也無師曰耕夫製玉漏不是行家作遵曰此猶是文言如何是和尚家風師曰橫身當宇宙誰是出頭人遵無語師遂同歸山才人事了師召近前曰闍黎有衝天之氣老僧有入地之謀闍黎橫吞巨海老僧背負須彌闍黎按劒上來老僧掗鎗相待向上一路速道速道遵曰明鏡當臺請師一鑒師曰不鑒遵曰為甚不鑒師曰水淺無魚徒勞下釣遵無對師便打黃龍新云好打這般漢打百千萬箇有什麼過當時若在黃龍手裏棒折也未放過在何山珣云縵天布網打鳳羅龍主則琢玉鏤冰賓則攢花簇錦當機不讓覿面爭先結角羅紋互存互奪諸方咸謂好手手中呈好手還端的也無若約慧日見處遵布衲若能慎初護末待韶山指出路頭驟步便升堂奧管取明下安排非唯截斷葛藤亦免上他鈎線何也一著不到處滿盤空用心徑山杲云笑殺睦州陳尊宿天童華舉黃龍語了云死心和尚一期大驚小怪殊不知韶山自遭遵布衲毒手之後至今無人檢得出且道誵訛在甚麼處太原海湖禪師夾山會法嗣太原海湖禪師因有人請灌頂三藏供養敷坐訖師乃就彼位坐時有雲涉座主問曰和尚甚麼年行道師曰座主近前來涉近前師曰祇如憍陳如是甚麼年行道涉茫然師喝曰這尿牀鬼三角令圭禪師清平遵法嗣蘄州三角山令圭禪師初參清平清平問來作麼師曰來禮拜清平曰禮拜阿誰師曰特來禮拜和尚清平咄曰這鈍根阿師師乃禮拜清平以手斫師頸一下從此領旨投子感溫禪師投子同法嗣投子感溫禪師遊山見蟬蛻侍者問曰殼在這裏蟬向甚麼處去也師拈殼就耳畔搖三五下作蟬聲侍者於是開悟觀音巖俊禪師投子同法嗣東京觀音院巖俊禪師者邢臺廉氏子謁投子投子問昨夜宿何處師曰不動道場投子曰既言不動曷由至此師曰至此豈是動邪投子曰元來宿不著處投子默許之尋住觀音衆常數百周高祖世宗二帝潛隱時每登方丈必施禮及即位特賜紫衣署淨戒大師青原下六世禾山無殷禪師九峯虔法嗣吉州禾山無殷禪師福州吳氏子七歲從雪峰出家依年受具謁九峰九峰問汝遠遠而來睴睴音袞隨衆是何境界而可修行由何徑路而能出離師曰重昏廓闢盲者自盲九峰乃許入室後住禾山江南李氏召而問曰和尚何處來師曰禾山來曰山在甚麼處師曰人來朝鳳闕山嶽不曾移國主重之六通院紹禪師湧泉欣法嗣台州六通院紹禪師一日涌泉問甚麼處去來師曰燒畬來涌泉曰火後事作麼生師曰鐵蛇鑽不入青峯傳楚禪師洛浦安法嗣鳳翔府青峯傳楚禪師涇州人也一日洛浦問曰院主去甚麼處來師曰掃雪來洛浦曰雪深多少師曰樹上總是洛浦曰得即得汝向後住箇雪窟定矣訪白水白水曰見説洛浦有生機一路是否師曰是白水曰止却生路向熟路上來師曰生路上死人無數熟路上不著活漢白水曰此是洛浦底你底作麼生師曰非但洛浦夾山亦不奈何白水曰夾山為甚麼不奈何師曰不見道生機一路永安善靜禪師洛浦安法嗣京兆府永安院善靜禪師郡之王氏子唐天復中南謁洛浦洛浦器之容其入室乃典園務力營衆事一日有僧辭洛浦洛浦曰四面是山闍黎向甚麼處去僧無對洛浦曰限汝十日下語得中即從汝去其僧經行冥搜偶入園中師問曰上座既是辭去今何在此僧具陳所以堅請代語師曰竹密豈妨流水過山高那阻野雲飛其僧喜踊師囑之曰不得道是某甲語僧遂白洛浦曰誰語曰某甲語洛浦曰非汝語僧具言園頭見教洛浦至晚上堂謂衆曰莫輕園頭他日座下有五百人在後住永安衆餘五百果符洛浦之記洞溪戒定禪師洛浦安法嗣嘉州洞溪戒定禪師初問洛浦月樹無枝長覆蔭請師直指妙玄微洛浦曰森羅秀處事不相依淥水千波孤峯自異師於是領旨木平善道禪師蟠龍文法嗣袁州木平山善道禪師初謁洛浦問一漚未發已前如何辨其水脈洛浦曰移舟諳水脈舉棹別波瀾師不契乃參蟠龍語同前問蟠龍曰移舟不別水舉棹即迷源師從此悟入雲峯悅云木平若於洛浦言下會去猶較些子可惜許向蟠龍死水裏淹殺後有問如何是木平對云不勞斤斧果然只在這裏諸禪德大凡發言超方也須甄別邪正識辨真偽帶些子眼筋始得雖然如是也是賊過後張弓徑山杲云雲峯此語亦能瞎人眼亦能開人眼凡有新到未許參禮先令運土三擔而示偈曰南山路側東山低新到莫辭三轉泥嗟汝在途經日久明明不曉却成迷金陵李氏嚮其道譽迎請供養待以師禮嘗問如何是木平師曰不勞斤斧曰為甚麼不勞斤斧師曰木平郢州桐泉禪師黃山輪法嗣郢州桐或作潼泉山禪師參黃山黃山問天門一合十方無路有人道得擺手出漳江師曰蟄戶不開龍無龍句黃山曰是你恁麼道師曰是即直言是不是直言不是黃山曰擺手出漳江黃山復問卞和到處荊山秀玉印從他天子傳時如何師曰靈鶴不於林下憩野老不重太平年黃山深肯之
