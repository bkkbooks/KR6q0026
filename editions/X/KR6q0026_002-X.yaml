body:
  text: 西天祖師一祖摩訶迦葉尊者一祖摩訶迦葉尊者摩竭陀國人也姓婆羅門父飲澤母香志昔為鍛金師善明金性使其柔伏付法傳云甞於久遠劫中毗婆尸佛入涅槃後四眾起塔塔中像面金色有缺壞時有貧女將金珠往金師所請飾佛面既而因共發願願我二人為無姻夫妻由是因緣九十一劫身皆金色後生梵天天壽盡生中天摩竭陀國婆羅門家名曰迦葉波此云飲光勝尊葢以金色為號也繇是志求出家冀度諸有佛言善來比丘鬚髮自除袈裟著體常於眾中稱歎第一復言吾以清淨法眼將付於汝汝可流布無令斷絕爾時迦葉告諸比丘佛已茶毗金剛舍利非我等事我等宜當結集法眼無令斷絕於是得神通者悉集王舍耆闍崛山畢鉢羅窟時阿難為漏未盡不得入會後證阿羅漢果由是得入迦葉乃白眾言此阿難比丘多聞總持有大智慧常隨如來梵行清淨所聞佛法如水傳器無有遺餘佛所讚歎聰敏第一宜可請彼集修多羅藏大眾默然迦葉告阿難曰汝今宜宣法眼阿難聞語禮眾僧足升法座而宣是言如是我聞一時佛住某處說某經教乃至人天等作禮奉行時迦葉問諸比丘阿難所言不錯謬乎皆曰不異世尊所說迦葉乃告阿難言我今年不久留今將正法付囑於汝汝善守護聽吾偈言法法本來法無法無非法何於一法中有法有不法說偈已乃持僧伽梨衣入雞足山俟慈氏下生即周孝王五年丙辰歲也二祖阿難尊者二祖阿難尊者王舍城人也姓剎利帝父斛飯王實佛之從弟也梵語阿難陀此云慶喜亦云歡喜如來成道夜生因為之名多聞博達智慧無礙世尊以為總持第一甞所讚歎加以宿世有大功德受持法藏如水傳器佛乃命為侍者尊者一日白佛言今日入城見一奇特事佛曰見何奇特事尊者曰入城時見一攢樂人作舞出城總見無常佛曰我昨日入城亦見一奇特事尊者曰未審見何奇特事佛曰我入城時見一攢樂人作舞出城時亦見樂人作舞一日問迦葉曰師兄世尊傳金襴袈裟外別傳箇甚麼迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著汾陽昭云不問那知五祖戒云露翠巖芝云千年無影樹今時沒底靴泐潭清云剎竿未倒穿却諸人髑髏換却諸人眼睛剎竿倒後向什麼處見釋迦老子天童覺頌云影略門前倒剎竿箇中消息授傳難玲瓏侍者能相委盤走明珠珠走盤萬峯蔚云迦葉喚阿難暗號私通倒却門前剎竿依前不會若問嵩山世尊傳金襴外別傳何物只對他道低聲低聲且道古人是同是別天奇瑞云七處徵心八還顯見徒誇浪裡之花五陰揭蓋七大遍周枉現空中之色若不重詢焉知不是何故醒後方知酒悞人一呼之下千古分明何須倒却門前剎竿丹霞遙映祠前水疑是成川血上流尊者念先所度脫弟子應當來集須臾五百羅漢從空而下為諸仙人出家授具其仙眾中有二羅漢一名商那和修二名末田底迦尊者知是法器乃告之曰昔如來以大法眼付大迦葉迦葉入定而付於我我今將滅用傳於汝汝受吾教當聽偈言本來付有法付了言無法各各須自悟悟了無無法三祖商那和修尊者三祖商那和修尊者摩突羅國人也亦名舍那婆斯姓毗舍多父林勝母憍奢耶在胎六年而生梵語商諾迦此云自然服即西域九枝秀草名也若聖人降生則此草生於淨潔之地和修生時瑞草斯應昔如來行化至摩突羅國見一青林枝葉茂盛語阿難曰此林地名優留茶吾滅度後一百年有比丘商那和修於此轉妙法輪後百歲果誕和修出家證道受慶喜尊者法眼化導有情及止此林降二火龍歸順佛教龍因施其地以建梵宮尊者化緣既久思付正法尋於吒利國得優波毱多以為給侍因問毱多曰汝年幾邪毱多曰我年十七尊者曰汝身十七性十七邪毱多曰師髮已白為髮白邪心白邪尊者曰我但髮白非心白耳毱多曰我身十七非性十七也金粟悟云大小祖師話作兩橛尊者知是法器後三載遂為落髮授具乃告曰昔如來以無上法眼付囑迦葉展轉相授而至於我我今付汝勿令斷絕汝受吾教聽吾偈言非法亦非心無心亦無法說是心法時是法非心法說偈已即隱於罽賓國南象白山中四祖優波毱多尊者四祖優波毱多尊者吒利國人也十七出家二十證果隨方行化至摩突羅國得度者甚眾由是魔宮震動波旬愁怖遂竭其魔力以害正法尊者即入三昧觀其所由波旬復伺便密持瓔珞縻之于頸及尊者出定乃取人狗蛇三屍化為華䎡言慰諭波旬曰汝與我瓔珞甚是珍妙吾有華以相酬奉波旬大喜引頸受之即變為三種臭屍蟲蛆壞爛波旬厭惡大生憂惱盡己神力不能移動乃升六欲天告諸天主又詣梵王求其解免彼各告言十力弟子所作神變我輩凡陋何能去之波旬曰然則柰何梵王曰汝可歸心尊者即能除斷乃為說偈令其回向曰若因地倒還因地起離地求起終無其理波旬受教已即下天宮禮尊者足哀露懺悔尊者告曰汝自今去於如來正法更不作嬈害否波旬曰我誓回向佛道永斷不善尊者曰若然者汝可口自唱言皈依三寶魔王合掌三唱華悉除乃歡喜踊躍作禮尊者在世化導證果最多每度一人以一籌置於石室其室縱十八肘廣十二肘充滿其間最後有一長者子名曰香眾來禮尊者志求出家尊者問曰汝身出家心出家答曰我來出家非為身心尊者曰不為身心復誰出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心無形相其體亦然尊者曰汝當大悟心自通達宜依佛法僧紹隆聖種即為剃度授具足戒仍告之曰汝父甞夢金日而生汝可名提多迦復謂曰如來以大法眼藏次第傳授以至於我今復付汝聽吾偈言心自本來心本心非有法有法有本心非心非本法五祖提多迦尊者五祖提多迦尊者摩伽陀國人也梵語提多迦此云通真量初生之時父夢金日自屋而出照耀天地前有大山諸寶嚴飾山頂泉涌滂沱四流後遇毱多尊者設禮奉持後至中印度彼國有八千大仙彌遮迦為首聞尊者至率眾瞻禮謂尊者曰昔與師同生梵天我遇阿私陀仙授我仙法師逢十力弟子修習禪那自此報分殊途已經六劫尊者曰支離累劫誠哉不虗今可捨邪歸正以入佛乘彌遮迦曰昔阿私陀仙人授我記云汝却後六劫當遇同學獲無漏果今也相遇非宿緣邪願師慈悲令我解脫尊者即度出家命諸聖授戒其餘仙眾始生我慢尊者示大神通於是俱發菩提心一時出家尊者乃告彌遮迦曰昔如來以大法眼藏密付迦葉展轉相授而至於我我今付汝當護念之乃說偈曰通達本法心無法無非法悟了同未悟無心亦無法六祖彌遮迦尊者六祖彌遮迦尊者中印度人也既傳法已遊化至北天竺國見雉堞之上有金色祥雲歎曰斯道人氣也必有大士為吾法嗣乃入城於闤闠間有一人手持酒噐逆而問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否祖曰此是觸噐而負淨者曰師識我否祖曰我即不識識即非我復謂之曰汝試自稱名氏吾當後示本因彼說偈答曰我從無量劫至于生此國本姓頗羅墮名字婆須蜜祖曰我師提多迦說世尊昔遊北印度語阿難言此國中吾滅度後三百年有一聖人姓頗羅墮名婆須蜜而於禪祖當獲第七世尊記汝汝應出家彼乃置噐禮師側立而言曰我思往劫甞作檀那獻一如來寶座彼佛記我曰汝於賢劫釋迦法中宣傳至教今符師說願加度脫祖即與披剃復圓戒相乃告之曰正法眼藏今付於汝勿令斷絕乃說偈曰無心無可得說得不名法若了心非心始解心心法七祖婆須蜜尊者七祖婆須蜜尊者北天竺國人也姓頗羅墮常服淨衣執酒噐遊行里閈或吟或嘯人謂之狂及遇彌遮迦尊者宣如來往誌自省前緣投噐出家受法行化至迦摩羅國廣興佛事於法座前忽有智者自稱我名佛陀難提今與師論義祖曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽服曰我願求道霑甘露味祖遂與剃度而授具戒復告之曰如來正法眼藏我今付汝汝當護持乃說偈曰心同虗空界示等虗空法證得虗空時無是無非法八祖佛陀難提尊者八祖佛陀難提尊者迦摩羅國人也姓瞿曇氏頂有肉髻辯捷無礙初遇婆須蜜出家受教既而領徒行化至提伽國毗舍羅家見舍上有白光上騰謂其徒曰此家有聖人口無言說真大乘噐不行四衢知觸穢耳言訖長者出致禮問何所須祖曰我求侍者長者曰我有一子名伏䭾蜜多年已五十口未曾言足未曾履祖曰如汝所說真吾弟子伏䭾聞之遽起禮拜而說偈曰父母非我親誰是最親者諸佛非我道誰為最道者祖以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏䭾聞偈已便行七步祖曰此子昔曾值佛悲願廣大慮父母愛情難捨故不言不履耳長者遂捨令出家祖尋授具戒復告之曰我今以如來正法眼藏付囑於汝勿令斷絕乃說偈曰虗空無內外心法亦如此若了虗空故是達真如理九祖伏䭾蜜多尊者九祖伏䭾蜜多尊者提伽國人也姓毗舍羅既受八祖付囑後至中印度行化時有長者香葢𢹂一子而來瞻禮祖曰此子處胎六十歲因號難生甞會一仙者謂此兒非凡當為法噐今遇尊者可令出家祖即與落髮授戒告之曰如來大法眼藏今付於汝汝護念之乃說偈曰真理本無名因名顯真理受得真實法非真亦非偽十祖脇尊者十祖脇尊者中印度人也本名難生後值九祖執侍左右未甞睡眠謂其脇不至席遂號脇尊者初至華氏國憩一樹下右手指地而告眾曰此地變金色當有聖人入會言訖即變金色時有長者子富那夜奢合掌前立祖問曰汝從何來夜奢曰我心非往祖曰汝何處住夜奢曰我心非止祖曰汝不定邪夜奢曰諸佛亦然祖曰汝非諸佛夜奢曰諸佛亦非大愚芝云祖師一問童子一答總欠會在如今諸人作麼生會徑山杲云直饒如今會得更參三生六十劫祖因說偈即度出家復具戒品乃告之曰如來大法藏今付於汝汝護念之乃說偈曰真體自然真因真說有理領得真真法無行亦無止十一祖富那夜奢尊者十一祖富那夜奢尊者華氏國人也既得法於脇尊者尋詣波羅柰國有馬鳴大士迎而作禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是馬鳴曰佛既不識焉知是乎祖曰既不識佛焉知不是馬鳴曰此是鋸義祖曰彼是木義祖問鋸義者何馬鳴曰與師平出馬鳴却問木義者何祖曰汝被我解馬鳴豁然省悟稽首皈依遂求剃度祖謂眾曰此大士者昔為毗舍利國王其國有一類人如馬裸露王運神力分身為蠶彼乃得衣王後復生中印度馬人感戀悲鳴因號馬鳴如來記云吾滅度後六百年當有賢者馬鳴於波羅柰國摧伏異道度人無量繼吾傳化今正是時即告之曰如來大法眼藏今付於汝即說偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二十二祖馬鳴大士十二祖馬鳴大士者波羅柰國人也既受法於夜奢尊者後於華氏國轉妙法輪忽有老人座前仆地祖謂眾曰此非庸流當有異相言訖不見俄從地涌出一金色人復化為女子右手指祖而說偈曰稽首長老尊當受如來記今於此地上宣通第一義說偈已瞥然不見祖曰將有魔來與吾較力有頃風雨暴至天地晦冥祖曰魔之來信矣吾當除之即指空中現一大金龍奮發威神震動山岳祖儼然於座魔事隨滅經七日有一小蟲大若蟭螟潛形座下祖以手取之示眾曰斯乃魔之所變盜聽吾法耳乃放之令去魔不能動祖告之曰汝但歸依三寶即得神通遂復本形作禮懺悔祖問曰汝名誰邪眷屬多少曰我名迦毗摩羅有三千眷屬祖曰盡汝神力變化若何曰我化巨海極為小事祖曰汝化性海得否曰何謂性海我未甞知祖即為說性海曰山河大地皆依建立三昧六通由茲發現迦毗摩羅聞言遂發信心與徒眾三千俱求剃度祖乃召五百羅漢與授具戒復告之曰如來大法眼藏今當付汝汝聽偈言隱顯即本法明暗元不二今付悟了法非取亦非離十三祖迦毗摩羅尊者十三祖迦毗摩羅尊者華氏國人也初為外道有徒三千通諸異論後於馬鳴尊者得法領徒至西印度彼有太子名雲自在仰尊者名請於宮中供養祖曰如來有教沙門不得親近國王大臣權勢之家太子曰今我國城之北有大山焉山有一石窟可禪寂于此否祖曰諾即入彼山行數里逢一大蟒祖直前不顧盤繞祖身祖因與授三皈依蟒聽訖而去祖將至石窟復有一老人素服而出合掌問訊祖曰汝何所止答曰我昔甞為比丘多樂寂靜有初學比丘數來請益而我煩於應答起嗔恨想命終墮為蟒身住是窟中今已千載適遇尊者獲聞戒法故來謝爾祖問曰此山更有何人居止曰北去十里有大樹蔭覆五百大龍其樹王名龍樹常為龍眾說法我亦聽受耳祖遂與徒眾詣彼龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹聞已悔謝祖即與度脫及五百龍眾俱授具戒復告之曰今以如來大法眼藏付囑於汝諦聽偈言非隱非顯法說是真實際悟此隱顯法非愚亦非智十四祖龍樹尊者十四祖龍樹尊者西天竺國人也亦名龍勝始於摩羅尊者得法後至南印度彼國之人多信福業祖為說法𮞏相謂曰人有福業世間第一徒言佛性誰能覩之祖曰汝欲見佛性先須除我慢彼人曰佛性大小祖曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心祖復於座上現自在身如滿月輪一切眾唯聞法音不覩祖相彼眾中有長者子名迦那提婆謂眾曰識此相否眾曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之葢以無相三昧形如滿月佛性之義廓然虗明言訖輪相即隱復居本座而說偈言身現圓月相以表諸佛體說法無其形用辨非聲色彼眾聞偈頓悟無生咸願出家以求解脫祖即為剃髮命諸聖授具其國先有外道五千餘眾作大幻術眾皆宗仰祖悉化之令歸三寶復造大智度論中論十二門論垂之於世後告上首弟子迦那提婆曰如來大法眼藏今當付汝聽吾偈言為明隱顯法方說解脫理於法心不證無瞋亦無喜十五祖迦那提婆尊者十五祖迦那提婆尊者南天竺國人也姓毗舍羅初求福業兼樂辯論後謁龍樹大士將及門龍樹知是智人先遣侍者以滿鉢水置於座前尊者覩之即以一針投之而進欣然契會金粟悟云迦那提婆刺腦入膠盆即今莫有救得者麼若也救得還我頭來龍樹即為說法不起於座現月輪相唯聞其聲不見其形祖語眾曰今此瑞者師現佛性表說法非聲色也祖既得法後至迦毗羅國彼有長者曰梵摩淨德一日園樹生耳如菌味甚美唯長者與第二子羅睺羅多取而食之取已隨長盡而復生自餘親屬皆不能見祖知其宿因遂至其家長者廼問其故祖曰汝家昔曾供養一比丘然此比丘道眼未明以虗霑信施故報為木菌唯汝與子精誠供養得以享之餘即否矣又問長者年多少答曰七十有九祖乃說偈曰入道不通理復身還信施汝年八十一此樹不生耳長者聞偈已彌加歎伏且曰弟子衰老不能事師願捨次子隨師出家祖曰昔如來記此子當第二五百年為大教主今之相遇葢符宿因即與剃髮執侍而付法眼偈曰本對傳法人為說解脫理於法實無證無終亦無始十六祖羅睺羅多尊者十六祖羅睺羅多尊者迦毗羅國人也行化至室羅筏城有河名曰金水其味殊美中流復現五佛影祖告眾曰此河之源凡五百里有聖者僧伽難提居於彼處佛誌一千年後當紹聖位語已領諸學眾泝流而上至彼見僧伽難提安坐入定祖與眾伺之經三七日方從定起祖問曰汝身定邪心定邪難提曰身心俱定祖曰身心俱定何有出入難提曰雖有出入不失定相如金在井金體常寂祖曰若金在井若金出井金無動靜何物出入難提曰言金動靜何物出入言金出入金非動靜祖曰若金在井出者何金若金出井在者何物難提曰金若出井在者非金金若在井出者非物祖曰此義不然難提曰彼義非著祖曰此義當墮難提曰彼義不成祖曰彼義不成我義成矣難提曰我義雖成法非我故祖曰我義已成我無我故難提曰我無我故復成何義祖曰我無我故故成汝義難提曰仁者師誰得是無我祖曰我師迦那提婆證是無我以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然即求度脫祖曰汝心自在非我所繫於是祖命僧伽難提而付法眼偈曰於法實無證不取亦不離法非有無相內外云何起十七祖僧伽難提尊者十七祖僧伽難提尊者室羅筏城寶莊嚴王之子也生而能言常讚佛事七歲即厭世樂以偈告其父母曰稽首大慈父和南骨血母我今欲出家幸願哀愍故父母固止之遂終日不食乃許其在家出家號僧伽難提復命沙門禪利多為之師積十九載未甞退倦每自念言身居王宮胡為出家一夕天光下矚見一路坦平不覺徐行約十里許至大巖前有石窟焉乃燕寂于中父既失子即擯禪利多出國訪尋其子不知所在經十年祖得法受記已行化至摩提國忽有涼風襲眾身心悅適非常而不知其然祖曰此道德之風也當有聖者出世嗣續祖燈乎言訖以神力攝諸大眾遊歷山谷食頃至一峯下謂眾曰此峯頂有紫雲如葢聖人居此矣即與大眾徘徊久之見山舍一童子持圓鑑直造祖前祖問汝幾歲邪童曰百歲祖曰汝年尚幼何言百歲童曰我不會理正百歲耳祖曰汝善機邪童曰佛言若人生百歲不會諸佛機未若生一日而得決了之祖曰汝手中者當何所表童曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似彼父母聞子語即捨令出家祖𢹂至本處授具戒訖名伽耶舍多他時聞風吹殿鈴聲祖問曰鈴鳴邪風鳴邪舍多曰非風鈴鳴我心鳴耳祖曰心復誰乎舍多曰俱寂靜故祖曰善哉善哉繼吾道者非子而誰即付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾十八祖伽耶舍多尊者十八祖伽耶舍多尊者摩提國人也母夢大神持鑑因而有娠凡七日而誕肌體瑩如琉璃未甞洗沐自然香潔幼好閑靜語非常童持鑑出遊遇難提尊者得度後領徒至大月氏國見一婆羅門舍有異氣祖將入彼舍舍主鳩摩羅多問曰是何徒眾祖曰是佛弟子彼聞佛號心神竦然即時閉戶祖良久扣其門羅多曰此舍無人祖曰答無者誰羅多聞語知是異人遽開關延接祖曰昔世尊記曰吾滅後一千年有大士出現於月氏國紹隆玄化今汝值吾應斯嘉運於是鳩摩羅多發宿命智投誠出家授具訖付法偈曰有種有心地因緣能發萌於緣不相礙當生生不生十九祖鳩摩羅多尊者十九祖鳩摩羅多尊者大月氏國婆羅門之子也昔為自在天人欲界第六天見菩薩瓔珞忽起愛心墮生忉利欲界第二天聞憍尸迦說般若波羅蜜多以法勝故升于梵天色界以根利故善說法要諸天尊為導師以繼祖時至遂降月氏後至中天竺國有大士名闍夜多問曰我家父母素信三寶而常縈疾瘵凡所營作皆不如意而我鄰家久為旃陀羅行而身常勇徤所作和合彼何幸而我何辜祖曰何足疑乎且善惡之報有三時焉凡人但見仁夭暴壽逆吉義凶便謂亡因果虗罪福殊不知影響相隨毫釐靡忒縱經百千萬劫亦不磨滅時闍夜多聞是語已頓釋所疑祖曰汝雖已信三業而未明業從惑生惑因識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻闍夜多承言領旨即發宿慧懇求出家既受具乃付法眼偈曰性上本無生為對求人說於法既無得何懷決不決二十祖闍夜多尊者二十祖闍夜多尊者北天竺國人也智慧淵沖化導無量後至羅閱城敷揚頓教彼有學眾唯尚辯論為之首者名婆修盤頭此云徧行常一食不臥六時禮佛清淨無欲為眾所歸祖將欲度之先問彼眾曰此徧行頭陀能修梵行可得佛道乎眾曰我師精進何故不可祖曰汝師與道遠矣設苦行歷於塵劫皆虗妄之本也眾曰尊者蘊何德行而譏我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道時徧行聞已發無漏智歡喜讚歎祖又語彼眾曰會吾語否吾所以然者為其求道心切夫絃急即斷故吾不贊令其住安樂地入諸佛智復告徧行曰吾適對眾抑挫仁者得無惱於衷乎徧行曰我憶念七劫前生常安樂國師與智者月淨記我非久當證斯陀含果時有大光明菩薩出世我以老故䇿杖禮謁師叱我曰重子輕父一何鄙哉時我自謂無過請師示之師曰汝禮大光明菩薩以杖倚壁畫佛面以此過慢遂失二果我責躬悔過以來聞諸惡言如風如響況今獲飲無上甘露而反生熱惱邪惟願大慈以妙道垂誨祖曰汝久植眾德當繼吾宗聽吾偈曰言下合無生同於法界性若能如是解通達事理竟二十一祖婆修盤頭尊者二十一祖婆修盤頭尊者羅閱城人也姓毗舍佉父光葢母嚴一家富而無子父母禱於佛塔而求嗣焉一夕母夢吞明暗二珠覺而有孕經七日有一羅漢名賢眾至其家光葢設禮賢眾端坐受之嚴一出拜賢眾避席曰回禮法身大士光葢罔測其由遂取一寶珠跪獻賢眾即受之殊無遜謝光葢不能忍問曰我是丈夫致禮不顧我妻何德尊者避之賢眾曰我受禮納珠貴福汝耳汝婦懷聖子生當為世燈慧日故吾避之賢眾又曰汝婦當生二子一名婆修盤頭則吾所尊者也二名芻尼此云野鵲子昔如來在雪山修道芻尼巢於頂上佛既成道芻尼受報為那提國王佛記云汝至第二五百年生羅閱城毗舍佉家與聖同胞今無爽矣後一月果產二子尊者婆修盤頭年至十五禮光度羅漢出家感毗婆訶菩薩與之授戒行化至那提國彼王名常自在有二子一名摩訶羅次名摩拏羅王問祖曰羅閱城土風與此何異祖曰彼土曾三佛出世今王國有二師化導王曰二師者誰祖曰佛記第二五百年有二神力大士出家繼聖即王之次子摩拏羅是其一也吾雖德薄敢當其一王曰誠如尊者所言當捨此子作沙門祖曰善哉大王能遵佛旨即與授具付法偈曰泡幻同無礙如何不了悟達法在其中非今亦非古二十二祖摩拏羅尊者二十二祖摩拏羅尊者那提國常自在王之子也年三十遇婆修祖師出家傳法至西印度彼國王名得度即瞿曇種族歸向佛乘勤行精進一日於行道處現一小塔欲取供養眾莫能舉王即大會梵行禪觀呪術等三眾欲問所疑時祖亦赴此會是三眾皆莫能辨祖即為王廣說塔之所因今之出現王福力之所致也王聞是說乃曰至聖難逢世樂非久即傳位太子投祖出家七日而證四果祖深加慰誨曰汝居此國善自度人今異域有大法噐吾當往化得度曰師應迹十方動念當至寧勞往邪祖曰然於是焚香遙語月氏國鶴勒那比丘曰汝在彼國教導鶴眾道果將證宜自知之時鶴勒那為彼國王寶印說修多羅偈忽覩異香成穗王曰是何祥也勒那曰此是西印土傳佛心印祖師摩拏羅將至先降信香耳王曰此師神力何如勒那曰此師遠承佛記當於此土廣宣玄化時王與鶴勒那俱遙作禮祖知已即辭得度比丘往月氏國受王與鶴勒那供養後鶴勒那問祖曰我止林間已經九白印度以一年為一白有弟子龍子者幼而聰慧我於三世推窮莫知其本祖曰此子於第五劫中生妙喜國婆羅門家曾以旃檀施於佛宇作槌撞鐘受報聰敏為眾欽仰又問我有何緣而感鶴眾祖曰汝第四劫中甞為比丘當赴會龍宮汝諸弟子咸欲隨從汝觀五百眾中無有一人堪任妙供時諸弟子曰師常說法於食等者於法亦等今既不然何聖之有汝即令赴會自汝捨生趣生轉化諸國其五百弟子以福微德薄生於羽族今感汝之惠故為鶴眾相隨鶴勒那問曰以何方便令彼解脫祖曰我有無上法寶汝當聽受化未來際而說偈曰心隨萬境轉轉處實能幽隨流認得性無喜復無憂二十三祖鶴勒那尊者二十三祖鶴勒那尊者月氏國人也姓婆羅門父千勝母金光以無子故禱于七佛金幢即夢須彌山頂一神童持金環云我來也覺而有孕年七歲遊行聚落覩民間淫祀乃入廟叱之曰汝妄興禍福幻惑於人歲費牲牢傷害斯甚言訖廟貌忽然而壞由是鄉黨謂之聖子年二十二出家三十遇摩拏羅尊者付法眼藏行化至中印度彼國王名無畏海崇信佛道祖為說正法次王忽見二人緋素服拜祖王問曰此何人也祖曰此是日月天子吾昔曾為說法故來禮拜良久不見唯聞異香王曰日月國土總有多少祖曰千釋迦佛所化世界各有百億迷盧日月我若廣說即不能盡王聞忻然時祖演無上道度有緣眾以上足龍子早夭有兄師子博通強記事婆羅門厥師既逝乃歸依尊者而問曰我欲求道當何用心祖曰汝欲求道無所用心曰既無用心誰作佛事祖曰汝若有用即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞是語已即入佛慧時祖忽指東北問曰是何氣象師子曰我見氣如白虹貫乎天地復有黑氣五道橫亘其中祖曰其兆云何曰莫可知矣祖曰吾滅後五十年北天竺國當有難起嬰在汝身吾將滅矣今以法眼付囑於汝善自護持乃說偈曰認得心性時可說不思議了了無可得得時不說知二十四祖師子比丘二十四祖師子比丘者中印度人也姓婆羅門得法遊方至罽賓國有波利迦者本習禪觀故有禪定知見執相捨相不語之五眾祖詰而化之四眾皆默然心服唯禪定師達磨達者聞四眾被責憤悱而來祖曰仁者習定何當來此既至于此胡云習定彼曰我雖來此心亦不亂定隨人習豈在處所祖曰仁者既來其習亦至既無處所豈在人習彼曰定習人故非人習定我當來此其定常習祖曰人非習定定習人故當自來時其定誰習彼曰如淨明珠內外無翳定若通達必當如此祖曰定若通達一似明珠今見仁者非珠之徒彼曰其珠明徹內外悉定我心不亂猶若此淨祖曰其珠無內外仁者何能定穢物非動搖此定不是淨達磨達蒙祖開悟心地朗然祖既攝五眾名聞遐邇方求法嗣遇一長者引其子問祖曰此子名斯多當生便拳左手今既長矣終未能舒願尊者示其宿因祖覩之即以手接曰可還我珠童子遽開手奉珠眾皆驚異祖曰吾前報為僧有童子名婆舍吾甞赴西海齋受䞋珠付之今還吾珠理固然矣長者遂捨其子出家祖即與授具以前緣故名婆舍斯多祖即謂之曰吾師密有懸記罹難非久如來正法眼藏今轉付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即于今祖說偈已以僧伽梨密付斯多俾之他國隨機演化斯多受教直抵南天祖謂難不可以苟免獨留罽賓時本國有外道二人一名摩目多二名都落遮學諸幻法欲共謀亂乃盜為釋子形象潛入王宮且曰不成即罪歸佛子妖既自作禍亦旋踵王果怒曰吾素歸心三寶何乃構害一至于斯即命破毀伽藍祛除釋眾又自秉劒至尊者所問曰師得蘊空否祖曰已得蘊空王曰離生死否祖曰已離生死王曰既離生死可施我頭祖曰身非我有何恡於頭王即揮刃斷尊者首白乳涌高數尺王之右臂旋亦墮地七日而終玄沙備云大小師子尊者頭也不解作得主玄覺遂徵云且道斬着斬不着汾陽昭別云知師不恡雪竇顯云作家君王天然有在黃龍新云黃龍要問雪竇既是作家君王因甚臂落徑山杲云孟八郎漢又與麼去天童華云玄沙云大小尊者頭也不解作得主師云隨氀𣯜漢玄覺徵云且道斬着斬不着師云將鰕釣鼈汾陽別云知師不恡師云將錯就錯雪竇云作家君王天然有在師云提水放火翠巖云當時祖引頸王舉劍與麼時有人諫得住麼至今無人斷得此公案如今衲僧作麼生斷師云莫要說夢芭蕉云賣寶撞着瞎波斯師云誣人之罪瑯琊云罽賓好一口劍爭奈劍上無眼尊者好箇師子且不解返擲師云賊過後張弓復云這一隊漢被山僧勦絕了也還見師子尊者麼驀拈拄杖卓一下云修身慎行恐辱先也孤峯深頌云本是山中人愛說山中話五月賣松風人間恐無價二十五祖婆舍斯多尊者二十五祖婆舍斯多尊者罽賓國人也姓婆羅門父寂行母常安樂初母夢得神劒因而有孕既誕拳左手遇師子尊者顯發宿因密授心印後適南天至中印度彼國王名迦勝設禮供養時有外道號無我尊先為王禮重嫉祖之至欲與論義幸而勝之以固其事乃於王前謂祖曰我解默論不假言說祖曰孰知勝負彼曰不爭勝負但取其義祖曰汝以何為義彼曰無心為義祖曰汝既無心豈得義乎彼曰我說無心當名非義祖曰汝說無心當名非義我說非心當義非名彼曰當義非名誰能辨義祖曰汝名非義此名何名彼曰為辨非義是名無名祖曰名既非名義亦非義辨者是誰當辨何物如是往返五十九番外道杜口信伏芭蕉清云譬如象馬𢤱悷難調加諸楚毒至于徹骨方乃調伏大陽玄云蚌鷸相持死在漁人之手乃云何用繁言徑山杲云婆舍斯多何用忉怛當時若見他道請師默論不假言說便云義墮也即今莫有與妙喜默論者麼或有箇衲僧出來道義墮也我也知你向鬼窟裏作活計楚石琦云我若作二十五祖纔見外道入門便連棒打出豈不丈夫更待他道請師默論至於徃返五十九番遠之遠矣于時祖忽面北合掌長吁曰我師師子尊者今日遇難即辭王南邁達于南天潛隱山谷時彼國王名天德迎請供養王有二子一名德勝凶暴而色力充盛一名不如密多和柔而長嬰疾苦祖乃為陳因果王即頓釋所疑又有呪術師忌祖之道乃潛置毒藥于飲食中祖知而食之彼返受禍遂投祖出家祖即與授具後六十載德勝即位復信外道致難于祖不如密多以進諫被囚王遽問祖曰予國素絕妖訛師所傳者當是何宗祖曰王國昔來實無邪法我所得者即是佛宗王曰佛滅已千二百載師從誰得邪祖曰飲光大士親受佛印展轉至二十四世師子尊者我從彼得王曰予聞師子比丘不能免於刑戮何能傳法後人祖曰我師難未起時密授我信衣法偈以顯師承王曰其衣何在祖即於囊中出衣示王王命焚之五色相鮮薪盡如故王即追悔致禮師子真嗣既明乃赦密多密多遂求出家祖問曰汝欲出家當為何事密多曰我若出家不為其事祖曰不為何事密多曰不為俗事祖曰當為何事密多曰當為佛事祖曰太子智慧天至必諸聖降迹即許出家六年侍奉後於王宮受具羯磨之際大地震動頗多靈異祖乃命之曰吾已衰朽安可久留汝當善護正法眼藏普濟羣有聽吾偈曰聖人說知見富境無是非我今悟真性無道亦無理不如密多聞偈再啟祖曰法衣宜可傳授祖曰此衣為難故假以證明汝身無難何假其衣化被十方人自信向不如密多聞語作禮而退二十六祖不如密多尊者二十六祖不如密多尊者南印度天德王之次子也既受度得法至東印度彼王名堅固奉外道師長爪梵志暨尊者將至王與梵志同覩白氣貫于上下王曰斯何瑞也梵志預知祖入境恐王遷善乃曰此是魔來之兆耳何瑞之有即鳩諸徒眾議曰不如密多將入都城誰能挫之弟子曰我等各有呪術可以動天地入水火何患哉祖至先見宮牆有黑氣乃曰小難耳直詣王所王曰師來何為祖曰將度眾生王曰以何法度祖曰各以其類度之時梵志聞言不勝其怒即以幻法化大山於祖頂上祖指之忽在彼眾頭上梵志等怖懼投祖祖愍其愚惑再指之化山隨滅乃為王演說法要俾趣真乘謂王曰此國當有聖人而繼於我是時有婆羅門子年二十許幼失父母不知名氏或自言纓絡故人謂之纓絡童子遊行閭里丐求度日若常不輕之類人問汝行何急即答曰汝行何緩或曰何姓乃曰與汝同姓莫知其故後王與尊者同車而出見纓絡童子稽首於前祖曰汝憶往事否童曰我念遠劫中與師同居師演摩訶般若我轉甚深修多羅今日之事葢契昔因祖又謂王曰此童子非他即大勢至菩薩是也此聖之後復出二人一人化南印度一人緣在震旦四五年內却返此方遂以昔因故名般若多羅付法眼藏偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智二十七祖般若多羅尊者二十七祖般若多羅尊者東印度人也既得法已行化至南印度彼王名香至崇奉佛乘尊重供養施無價寶珠時王有三子曰月淨多羅曰功德多羅曰菩提多羅其季開士也祖欲試其所得乃以所施珠問三王子曰此珠圓明有能及否第一王子第二王子皆曰此珠七寶中尊固無踰也非尊者道力孰能受之第三王子曰此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自照要假智光光辨於此既辨此已即知是珠既知是珠即明其寶若明其寶寶不自寶若辨其珠珠不自珠珠不自珠者要假智珠而辨世珠寶不自寶者要假智寶以明法寶然則師有其道其寶即現眾生有道心寶亦然祖歎其辯慧乃復問曰於諸物中何物無相曰於諸物中不起無相又問於諸物中何物最高曰於諸物中人我最高又問於諸物中何物最大曰於諸物中法性最大徑山杲云說得道理好歸依佛法僧祖知是法嗣以時尚未至且默而混之及香至王厭世眾皆號絕唯第三子菩提多羅於柩前入定經七日而出乃求出家既受具戒祖告曰如來以正法眼付大迦葉如是展轉乃至於我我今囑汝聽吾偈曰心地生諸種因事復生理果滿菩提圓華開世界起祖因東印度國王請祖齋次王乃問諸人盡轉經唯師為甚不轉祖曰貧道出息不隨眾緣入息不居蘊界常轉如是經百千萬億卷非但一卷兩卷汾陽昭云却勞尊者心力大溈智云諸仁者還見二十七祖看經麼行時脚跟不着地坐時心識似風飄頌云秋高月色連雲白澹泊禪心滋味長歷歷分明今古意何須特地更商量天童覺頌云靈犀翫月璨含輝木馬遊春駿不眉底一雙寒碧眼看經那得透牛皮明白心超曠劫英雄力破重圍妙圓樞口轉靈機寒山忘却來時路拾得相將携手歸
