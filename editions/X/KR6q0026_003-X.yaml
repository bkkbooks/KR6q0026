body:
  text: 東土祖師初祖菩提達磨大師初祖菩提達磨大師者南天竺國香至王第三子也姓剎帝利本名菩提多羅後遇二十七祖般若多羅至本國受王供養知師密迹因試令與二兄辨所施寶珠發明心要既而尊者謂曰汝於諸法已得通量夫達磨者通大之義也宜名達磨因改號菩提達磨祖乃告尊者曰我既得法當往何國而作佛事願垂開示尊者曰汝雖得法未可遠遊且止南天待吾滅後六十七載當往震旦設大法藥直接上根慎勿速行衰於日下祖又曰彼有大士堪為法器否千載之下有留難否尊者曰汝所化之方獲菩提者不可勝數吾滅後六十餘年彼國有難水中文布自善降之汝至南方勿住彼唯好有為功業不見佛理汝縱到彼亦不可久留聽吾偈曰路逢跨水復逢羊獨自栖栖暗渡江日下可憐雙象馬二株嫰桂久昌昌又問曰此後更有何事尊者曰從是已去一百五十年而有小難聽吾讖曰心中雖吉外頭㐫川下僧房名不中為遇毒龍生武子忽逢小鼠寂無窮又問此後如何尊者曰却後二百二十年林下見一人當得道果聽吾讖曰震旦雖濶無別路要假兒孫脚下行金雞解銜一粒粟供養十方羅漢僧復演諸偈皆預讖佛教隆替祖恭稟教義服勤左右垂四十年未甞廢闕迨尊者順世遂演化本國時有二師一名佛大先二名佛大勝多本與祖同學佛陀䟦陀小乘禪觀佛大先既遇般若多羅尊者捨小趣大與祖並化時號二甘露門矣而佛大勝多更分徒而為六宗第一有相宗第二無相宗第三定慧宗第四戒行宗第五無得宗第六寂靜宗各封己解別展化源聚落崢嶸徒眾甚盛祖喟然歎曰彼之一師已陷牛跡況復支離繁盛而分六宗我若不除永纏邪見言已微現神力至有相宗所問曰一切諸法何名實相彼眾中有一尊長薩婆羅答曰於諸相中不互諸相是名實相祖曰一切諸相而不互者若名實相當何定邪彼曰於諸相中實無有定若定諸相何名為實祖曰諸相不定便名實相汝今不定當何得之彼曰我言不定不說諸相當說諸相其義亦然祖曰汝言不定當為實相定不定故即非實相彼曰定既不定即非實相知我非故不定不變祖曰汝今不變何名實相已變已往其義亦然彼曰不變當在在不在故故變實相以定其義祖曰實相不變變即非實於有無中何名實相薩婆羅心知聖師懸解潛達即以手指虗空曰此是世間有相亦能空故當我此身得似此否祖曰若解實相即見非相若了非相其色亦然當於色中不失色體於非相中不礙有故若能是解此名實相彼眾聞已心意朗然欽禮信受祖瞥然匿跡至無相宗所問曰汝言無相當何證之彼眾中有波羅提答曰我明無相心不現故祖曰汝心不現當何明之彼曰我明無相心不取捨當於明時亦無當者祖曰於諸有無心不取捨又無當者諸明無故彼曰入佛三昧尚無所得何況無相而欲知之祖曰相既不知誰云有無尚無所得何名三昧彼曰我說不證證無所證非三昧故我說三昧祖曰非三昧者何當名之汝既不證非證何證波羅提聞祖辯㭊即悟本心禮謝於祖懺悔往謬祖記曰汝當得果不久證之此國有魔非久降之言已忽然不現至定慧宗所問曰汝學定慧為一為二彼眾中有婆蘭陀者答曰我此定慧非一非二祖曰既非一二何名定慧彼曰在定非定處慧非慧一即非一二亦不二祖曰當一不一當二不二既非定慧約何定慧彼曰不一不二定慧能知非定非慧亦復然矣祖曰慧非定故然何知哉不一不二誰定誰慧婆蘭陀聞之疑心氷釋至第四戒行宗所問曰何者名戒云何名行當此戒行為一為二彼眾中有一賢者答曰一二二一皆彼所生依教無染此名戒行祖曰汝言依教即是有染一二俱破何言依教此二違背不及於行內外非明何名為戒彼曰我有內外彼已知竟既得通達便是戒行若說違背俱是俱非言及清淨即戒即行祖曰俱是俱非何言清淨既得通故何談內外賢者聞之即自慚伏至無得宗所問曰汝云無得無得何得既無所得亦無得得彼眾中有寶靜者答曰我說無得非無得得當說得得無得是得祖曰得既不得得亦非得既云得得得得何得彼曰見得非得非得是得若見不得名為得得祖曰得既非得得得無得既無所得當何得得寶靜聞之頓除疑網至寂靜宗所問曰何名寂靜於此法中誰靜誰寂彼眾中有尊者答曰此心不動是名為寂於法無染名之為靜祖曰本心不寂要假寂靜本來寂故何用寂靜彼曰諸法本空以空空故於彼空空故名寂靜祖曰空空已空諸法亦爾寂靜無相何靜何寂彼尊者聞師指誨豁然開悟既而六眾咸誓歸依由是化被南天聲馳五印經六十載度無量眾後值異見王輕毀三寶每云我之祖宗皆信佛道陷於邪見壽年不永運祚亦促且我身是佛何更外求善惡報應皆因多智之者妄搆其說至於國內耆舊為前王所奉者悉從廢黜祖知已歎彼德薄當何救之即念無相宗中二首領其一波羅提者與王有緣將證其果其二宗勝者非不博辯而無宿因時六宗徒眾亦各念言佛法有難師何自安祖遙知眾意即彈指應之六眾聞云此是我師信響我等宜速行以副慈命即至祖所禮拜問訊祖曰一葉翳空孰能翦拂宗勝曰我雖淺薄敢憚其行祖曰汝雖辯慧道力未全宗勝自念我師恐我見王大作佛事名譽顯達映奪尊威縱彼福慧為王我是沙門受佛教旨豈難敵也言訖潛去至王所廣說法要及世界苦樂人天善惡等事王與之往返徵詰無不詣理王曰汝今所解其法何在宗勝曰如王治化當合其道王所有道其道何在王曰我所有道將除邪法汝所有法將伏何人祖不起于座懸知宗勝義墮遽告波羅提曰宗勝不稟吾教潛化於王須臾理屈汝可速救波羅提恭稟祖旨曰願假神力言已雲生足下至大王前默然而住時王正問宗勝忽見波羅提乘雲而至愕然忘其問答曰乘空之者是正是邪波羅提曰我非邪正而來正邪王心若正我無邪正王雖驚異而驕慢方熾即擯宗勝令出波羅提曰王既有道何擯沙門我雖無解願王致問王怒而問曰何者是佛波羅提曰見性是佛王曰師見性否波羅提曰我見佛性王曰性在何處波羅提曰性在作用王曰是何作用我今不見波羅提曰今現作用王自不見王曰於我有否波羅提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現波羅提曰若出現時當有其八王曰其八出現當為我說波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔徧現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟悔謝前非咨詢法要時宗勝既被斥逐退藏深山念曰我今百歲八十為非二十年來方歸佛道性雖愚昧行絕瑕疵不能禦難生何如死言訖即自投崖俄有神人以手捧置巖上安然無損宗勝曰我忝沙門當與正法為主不能抑絕王非是以捐身自責何神祐助一至於斯願埀一語以保餘年於是神人乃說偈宗勝聞偈欣然即於巖間宴坐時王復問波羅提曰仁者智辯當師何人提曰我所出家即娑羅寺烏沙婆三藏為受業師其出世師者即大王叔菩提達磨是也王聞祖名驚駭久之曰鄙薄忝嗣王位而趣邪背正忘我尊叔遽敕近臣特加迎請祖即隨使而至為王懺悔往非王聞規誡泣謝于祖又詔宗勝歸國大臣奏曰宗勝被謫投崖今已亡矣王告祖曰宗勝之死皆自於吾如何大慈令免斯罪祖曰宗勝今在巖間宴息但遣使召當即至矣王即遣使入山果見宗勝端居禪寂宗勝蒙召乃曰深愧王意貧道誓處巖泉且王國賢德如林達磨是王之叔六眾所師波羅提法中龍象願王崇仰二聖以福皇基使者復命未至祖謂王曰知取得宗勝否王曰未知祖曰一請未至再命必來良久使還果如祖語師念震旦緣熟行化時至乃先辭祖塔次別同學後至王所慰而勉之曰當勤修白業護持三寶吾去非晚一九即回王聞師言涕淚交集曰此國何罪彼土何祥叔既有緣非吾所止惟願不忘父母之國事畢早回王即具大舟實以眾寶躬率臣寮送至海壖祖汎重溟凡三周寒暑達于南海實梁普通七年庚子歲九月二十一日也廣州刺史蕭昂具主禮迎接表聞武帝帝覽奏遣使齎詔迎請十月一日至金陵帝問曰朕即位已來造寺寫經度僧不可勝紀有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不領悟汾陽昭代云弟子智淺五祖戒云賣寶遇着瞎波斯保寧勇代帝吐舌示之雪竇顯頌云聖諦廓然何當辨的對朕者誰還云不識因茲暗渡江豈免生荊棘盍國人追不再來千古萬古空相憶休相憶清風帀地有何極師顧示左右云這裏還有祖師麼喚來與老僧洗脚祖知機不契是月十九日潛回江北十一月二十三日屆于洛陽當魏孝明帝正光元年也寓止于嵩山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門時有僧神光者曠達之士也久居伊洛博覽羣書善談玄理每歎曰孔老之教禮術風規莊易之書未盡妙理近聞達磨大士住止少林至人不遙當造玄境乃往彼晨夕參承祖常端坐面壁莫聞誨勵光自惟曰昔人求道敲骨取髓刺血濟饑布髮掩泥投崖飼虎古尚若此我又何人其年十二月九日夜天大雨雪光堅立不動遲明積雪過膝祖憫而問曰汝久立雪中當求何事光悲淚曰惟願和尚慈悲開甘露門廣度羣品祖曰諸佛無上妙道曠劫精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘徒勞勤苦光聞祖誨勵潛取利刀自斷左臂置于祖前祖知是法器乃曰諸佛最初求道為法忘形汝今斷臂吾前求亦可在祖遂因與易名曰慧可慧可曰諸佛法印可得聞乎祖曰諸佛法印匪從人得慧可曰我心未寧乞師與安祖曰將心來與汝安慧可良久曰覔心了不可得祖曰我與汝安心竟芭蕉徹云金剛與泥人揩背五祖戒云若即恁麼何用西來雲居元云彼自無瘡勿傷之也雖然如是一言易出駟馬難追白雲端頌云終始覔心無可得寥寥不見少林人滿庭舊雪重知冷鼻孔依然搭上唇五祖演舉至請祖安心處乃云白雲當時若見好與三十棒何故他人見將謂說安心法畢竟如何菩薩龍王行雨潤遮身向上數重雲昭覺勤云正當與麼時法身在甚麼處徑山杲頌云覔心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡謾萬峯蔚云九年面壁暗地藏刀立雪齊腰泥中有刺神光踏發毒箭射中疑牛却道覔心了不可得和贓捉敗達磨云吾與汝安心竟血濺梵天且道覔心了不可得如何話會越九年欲返天竺命門人曰時將至矣汝等盍各言所得乎時有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可禮拜依位而立祖曰汝得吾髓乃顧慧可而告之曰昔如來以正法眼付迦葉大士展轉囑累而至於我我今付汝汝當護持并授汝袈裟以為法信薦福懷云祖師與麼說話無計較中翻成計較無塗轍中翻成塗轍若教伊踏着德山臨濟門下免見九年冷坐被人喚作壁觀胡僧直饒如是也未免殃及兒孫大陽玄云且道更有一人出來得箇什麼自云不得不得又云意况不到翠巖芝云二祖被他當面塗糊莫道髓皮也不曾摸着因甚却紹祖位五祖演云當時若見四人恁麼各與三十棒只如白雲也合喫二十九棒留一棒與汝諸人其間若有知痛痒者不惟不孤負先聖亦乃得見白雲脫或未然堂裏喫粥喫飯更須爛嚼多見渾崙吞却簡庵清頌云捏目生花立問端得它皮髓被它瞞這般瞎漢能多事六月無霜也道寒高峯妙頌云死欵都來一口供情窮理極卒難容若將皮髓論高下爭見花開五葉紅萬峯蔚云至道無難惟嫌揀擇達磨大師分皮分髓分別不少且道有法付神光無法付神光若道無少室因甚麼付囑若道有且道付箇甚麼慧可曰請師指陳祖曰內傳法印以契證心外付袈裟以定宗旨後代澆薄疑慮競生云吾西天之人言汝此方之子憑何得法以何證之汝今受此衣法却後難生但出此衣并吾法偈用以表明其化無礙至吾滅後二百年衣止不傳法周沙界潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成祖又曰吾有楞伽經四卷亦用付汝即是如來心地要門令諸眾生開示悟入吾自到此凡五度中毒我甞自出而試之置石石裂緣吾未離南印來此東土見赤縣神州有大乘氣象遂踰海越漠為法求人際會未諧如愚若訥今得汝傳授吾意已終別記云祖初居少林寺九年為二祖說法祇教外息諸緣內心無喘心如墻壁可以入道慧可種種說心性曾未契理祖祇遮其非不為說無念心體慧可忽曰我已息諸緣祖曰莫成斷滅去否慧可曰不成斷滅祖曰此是諸佛所傳心體更勿疑也言已乃與徒眾往禹門千聖寺止三日有期城太守楊衒之早慕佛乘問祖曰西天五印師承為祖其道如何祖曰明佛心宗行解相應名之曰祖即說偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同躔超然名之曰祖時魏氏奉釋禪雋如林光統律師流支三藏者乃僧中之鸞鳳也覩師演道斥相指心每與師論義是非蜂起祖遐振玄風普施法雨而偏局之量自不堪任競起害心數加毒藥至第六度以化緣已畢傳法得人遂不復救之端居而逝即魏莊帝永安元年戊申十月五日也其年十二月二十八日塟熊耳山起塔於定林寺後三歲魏宋雲奉使西域回遇祖于蔥嶺見手𢹂隻履翩翩獨逝宋雲問師何往祖曰西天去宋雲歸具說其事及門人啟壙唯空棺一隻革履存焉禾山方曰死心先師每舉隻履西歸話以問衲子而實難明諸方或謂之隱顯或謂不可有兩箇或謂惟此一事實若也恁麼未識祖師意旨諸人要見麼頌云濁中清清中濁勿謂麒麟生隻角西行東向路不差大用頭頭如啐啄莫莫玄要靈機休卜度二祖慧可大師二祖慧可大師者武牢人也姓姬氏父寂未有子時甞自念言我家崇善豈令無子禱之既久一夕感異光照室其母因而懷姙及長遂以照室之瑞名之曰光自幼志氣不羣博涉詩書尤精玄理而不事家產好遊山水後覽佛書超然自得即抵洛陽龍門香山依寶靜禪師出家受具於永穆寺浮游講肆徧學大小乘義年三十三却返香山終日宴坐又經八載於寂默中倐見一神人謂曰將欲受果何滯此邪大道匪遙汝其南矣祖知神助因改名神光翌日覺頭痛如刺其師欲治之空中有聲曰此乃換骨非常痛也祖遂以見神事白于師師視其頂骨即如五峯秀出矣乃曰汝相吉祥當有所證神令汝南者斯則少林達磨大士必汝之師也祖受教造于少室其得法傳衣事迹達磨章具之矣自少林託化西歸大師繼闡玄風博求法嗣至北齊天平二年有一居士年踰四十不言名氏聿來設禮而問祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺居士良久曰覔罪不可得祖曰與汝懺罪竟宜依佛法僧住居士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然居士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之瑯琊覺云猶欠作云何梵在梁山觀於覓罪了不可得處云罪性向什麼處去也又云非但罪性覓者亦不見有雲居齊云二祖深器之是肯他會佛法耶肯他說道理耶即為剃髮云是吾寶也宜名僧璨其年三月十八日於光福寺受具自茲疾漸愈執侍經二載祖乃告曰菩提達磨遠自竺乾以正法眼藏并信衣密付於吾吾今授汝汝當守護無令斷絕聽吾偈曰本來緣有地因地種華生本來無有種華亦不曾生祖付衣法已又曰汝受吾教宜處深山未可行化當有國難僧璨曰師既預知願垂示誨祖曰非吾知也斯乃達磨傳般若多羅懸記云心中雖吉外頭㐫是也吾校年代正在于汝汝當諦思前言勿罹世難然吾亦有宿累今要酬之善去善行俟時傳付祖付囑已即往鄴都隨宜說法一音演暢四眾皈依如是積三十四載遂韜光混跡變易儀相或入諸酒肆或過於屠門或習街談或隨廝役人問之曰師是道人何故如是祖曰我自調心何關汝事又於筦城縣匡救寺三門下談無上道聽者林會時有辯和法師者於寺中講涅槃經學徒聞師闡法稍稍引去辯和不勝其憤興謗于邑宰翟仲侃仲侃惑其邪說加祖以非法祖怡然委順識真者謂之償債時年一百七歲即隋文帝開皇十三年癸丑歲三月十六日也皓月供奉問長沙岑和尚古德云了即業障本來空未了應須償宿債只如師子尊者二祖大師為甚麼得償債去長沙云大德不識本來空皓月云如何是本來空長沙云業障是云如何是業障長沙云本來空是皓月無語長涉以偈示之云假有元非有假滅亦非無涅槃償債義一性更無殊三祖僧璨大師三祖僧璨大師者不知何許人也初以白衣謁二祖既受度傳法隱於舒州之皖公山屬後周武帝破滅佛法祖往來太湖縣司空山居無常處積十餘載時人無能知者至隨開皇十二年壬子歲有沙彌道信年始十四來禮祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信於言下大悟天奇瑞云只知請問解脫不知刺頭入膠盆當時不遇作家焉得以楔出楔忽然夢醒方見無端劈面云猫服勞九載後於吉州受戒侍奉尤謹祖屢試以玄微知其緣熟乃付衣法偈曰華種雖因地從地種華生若無人下種華地盡無生師信心銘曰至道無難唯嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虛無欠無餘良由取捨所以不如莫逐有緣勿住空忍一種平懷泯然自盡止動歸止止更彌動唯滯兩邊寧知一種一種不通兩處失功遣有沒有從空背空多言多慮轉不相應絕言絕慮無處不通歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋纔有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩段元是一空一空同兩齊含萬象不見精麤寧有偏黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絕惱繫念乖真昏沉不好不好勞神何用踈親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空華何勞把捉得失是非一時放却眼若不睡諸夢自除心若不異萬法一如一如體玄兀爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑盡淨正信調直一切不留無可記憶虛明自照不勞心力非思量處識情難測真如法界無他無自要急相應唯言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絕境界極大同小不見邊表有即是無無即是有若不如是必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今圓悟勤云人多錯會道至道本無難亦無不難只是唯嫌揀擇若恁麼會一萬年也未夢見在四祖道信大師四祖道信大師者姓司馬氏世居河內後徙於蘄州廣濟縣生而超異幼慕空宗諸解脫門宛如宿習既嗣祖風攝心無寐脅不至席者六十年隋大業十三載領徒眾抵吉州值羣盜圍城七旬不解萬眾惶怖祖愍之教令念摩訶般若時賊眾望雉堞間若有神兵乃相謂曰城內必有異人稍稍引去唐武德甲申歲師却返蘄春住破頭山學侶雲臻一日往黃梅縣路逢一小兒骨相奇秀祖問曰子何姓荅曰姓即有不是常姓祖曰是何姓荅曰是佛性祖曰汝無姓邪荅曰性空故無祖默識其法器即俾侍者至其母所乞令出家母以宿緣故殊無難色遂捨為弟子以至付法傳衣偈曰華種有生性因地華生生大緣與性合當生生不生天童覺頌云黃梅果熟白藕花開問唯佛性體異凡胎衣傳南嶺人將去松老西山我再來兩借皮囊成底事一壺風月湛無埃五祖弘忍大師五祖弘忍大師者蘄州黃梅人也先為破頭山中栽松道者甞請於四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化邪儻若再來吾尚可遲汝迺去行水邊見一女子浣衣揖曰寄宿得否女曰我有父兄可往求之曰諾我即敢行女首肯之遂回䇿而去女周氏季子也歸輙孕父母大惡逐之女無所歸日傭紡里中夕止於眾館之下已而生一子以為不祥因拋濁港中明日見之泝流而上氣體鮮明大驚遂舉之成童隨母乞食里人呼為無姓兒後遇信大師得法嗣化於破頭山咸亨中有一居士姓盧名慧能自新州來參謁祖問曰汝自何來盧曰嶺南祖曰欲須何事盧曰唯求作佛祖曰嶺南人無佛性若為得佛盧曰人即有南北佛性豈然祖知是異人乃訶曰著槽廠去盧禮足而退便入碓房服勞於杵臼之間晝夜不息經八月祖知付授時至遂告眾曰正法難解不可徒記吾言持為己任汝等各自隨意述一偈若語意冥符則衣法皆付時會下七百餘僧上座神秀者學通內外眾所宗仰咸推稱曰若非尊秀疇敢當之神秀竊聆眾譽不復思惟乃於廊壁書一偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖因經行忽見此偈知是神秀所述乃讚歎曰後代依此修行亦得勝果其壁本欲令處士盧珍繪楞伽變相及見題偈在壁遂止不畫各令念誦盧在碓坊忽聆誦偈乃問同學是何章句同學曰汝不知和尚求法嗣令各述心偈此則秀上座所述和尚深加歎賞必將付法傳衣也盧曰其偈云何同學為誦盧良久曰美則美矣了則未了同學訶曰庸流何知勿發狂言盧曰子不信邪願以一偈和之同學不答相視而笑盧至夜密告一童子引至廊下盧自秉燭請別駕張日用於秀偈之側寫一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖後見此偈曰此是誰作亦未見性眾聞師語遂不之顧逮夜祖潛詣碓坊問曰米白也未盧曰白也未有篩祖於碓以杖三擊之盧即以三皷入室祖告曰諸佛出世為一大事故隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙秘密圓明真實正法眼藏付于上首大迦葉尊者展轉傳授二十八世至達磨屆于此土得可大師承襲以至於今以法寶及所傳袈裟用付於汝善自保護無令斷絕聽吾偈曰有情來下種因地果還生無情既無種無性亦無生盧行者跪受衣法啟曰法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明得法今信心已熟衣乃爭端止於汝身不復傳也且當遠隱俟時行化所謂受衣之人命如懸絲也盧曰當隱何所祖曰逢懷即止遇會且藏盧禮足已捧衣而出是夜南邁大眾莫知五祖自後不復上堂大眾疑怪致問祖曰吾道行矣何更詢之復問衣法誰得邪祖曰能者得於是眾議盧行者名能尋訪既失潛知彼得即共奔逐六祖慧能大師六祖慧能大師者俗姓盧氏其先范陽人父行瑫武德中左官于南海之新州遂占籍焉三歲喪父其母守志鞠養及長家尤貧窶師樵採以給一日負薪至市中聞客讀金剛經至應無所住而生其心有所感悟而問客曰此何法也得於何人客曰此名金剛經得於黃梅忍大師祖遽告其母以為法尋師之意直抵韶州遇高行士劉志略結為交友尼無盡藏者即志略之姑也常讀涅槃經師暫聽之即為解說其義尼遂執卷問字祖曰字即不識義即請問尼曰字尚不識曷能會義祖曰諸佛妙理非關文字尼驚異之告鄉里耆艾曰能是有道之人宜請供養於是居人競來瞻禮近有寶林古寺舊地眾議營緝俾祖居之四眾霧集俄成寶坊祖一日忽自念曰我求大法豈可中道而止明日遂行至昌樂縣西山石室間遇智遠禪師祖遂請益遠曰觀子神姿爽拔殆非常人吾聞西域菩提達磨傳心印於黃梅汝當往彼參決祖辭去直造黃梅之東山即唐咸亨二年也忍大師一見默而識之後傳衣法令隱于懷集四會之間儀鳳元年丙子正月八日屆南海遇印宗法師於法性寺講涅槃經祖寓止廊廡間暮夜風颺剎幡聞二僧對論一曰幡動一曰風動往復酬答曾未契理祖曰可容俗流輙預高論否直以風幡非動動自心耳印宗竊聆此語竦然異之雪峯存云大小祖師龍頭蛇尾好與二十棒孚上座侍次咬齒雪峯云我與麼道也好與二十棒保福展云作賊人心虗也是蕭何置律五祖戒云着甚來由巴陵鑑云祖師道不是風動不是旛動既不是風旛向甚處着有人與祖師作主出來與巴陵相見頌云非風非旛無處着是風是旛無着處遼天俊鶻悉迷蹤踞地金毛還失措阿呵呵悟不悟令人轉憶謝三郎一線獨釣寒江雨雪竇顯云風動旛動既是風旛向甚處着有人與巴陵作主出來與雪竇相見法昌遇頌云不是風兮不是旛黑花猫子面門斑夜行人只貪明月不覺和衣渡水寒泐潭清云不是風動不是旛動若是靈利漢懸崖撒手便好承當顧後瞻前轉生迷悶仁者心動而今還有為祖師作主者麼有則出來與老僧相見徑山杲云要識孚上座麼犀牛翫月紋生角要識雪峯麼象被雷驚花入牙天童華云一盲引眾盲相牽入火坑笑巖寶云善則甚善美則未美當時見二僧紛紜不已但出前云仁者也不是旛動也不是風動便乃休去非只令二僧知恩有地直使天下兒孫感戴祖師無有休日還知麼萬機雖不思春力時到只教花自開明日邀祖入室徵風幡之義祖具以理告印宗不覺起立曰行者定非常人師為是誰祖更無所隱直敘得法因由於是印宗執弟子之禮請授禪要乃告四眾曰印宗具足凡夫今遇肉身菩薩乃指座下盧居士曰即此是也因請出所傳信衣悉令瞻禮正月十五日印宗會諸名德為之剃髮二月八日就法性寺智光律師授滿分戒其戒壇即宋朝求那䟦陀三藏之所置也三藏記云後當有肉身菩薩在此壇受戒又梁末真諦三藏於壇之側手植二菩提樹謂眾曰却後一百二十年有大開士於此樹下演無上乘度無量眾祖具戒已於此樹下開東山法門宛如宿契明年二月八日忽謂眾曰吾不願此居欲歸舊隱即印宗與緇白千餘人送祖歸寶林寺韶州刺史韋據請於大梵寺轉妙法輪并受無相心地戒門人紀錄目為壇經盛行于世後返曹溪雨大法雨學者不下千數中宗神龍元年降詔云朕請安秀二師宮中供養萬機之暇每究一乘二師並推讓曰南方有能禪師密受忍大師衣法可就彼問今遣內侍薛簡馳詔迎請願師慈念速赴上京祖上表辭疾願終林麓簡曰京城禪德皆云欲得會道必須坐禪習定若不因禪定而得解脫者未之有也未審師所說法如何祖曰道由心悟豈在坐也經云若見如來若坐若臥是行邪道何故無所從來亦無所去若無生滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈況坐邪簡曰弟子回主上必問願和尚慈悲指示心要祖曰道無明暗明暗是代謝之義明明無盡亦是有盡相待立名故經云法無有比無相待故簡曰明喻智慧暗況煩惱修道之人儻不以智慧照破煩惱無始生死憑何出離祖曰煩惱即是菩提無二無別若以智慧照煩惱者此是二乘小見羊鹿等機大智上根悉不如是簡曰如何是大乘見解祖曰明與無明其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道祖曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說無生我說不生不滅者本自無生今亦無滅所以不同外道汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恒沙簡蒙指教豁然大悟禮辭歸闕表奏祖語有詔謝師并賜磨衲袈裟絹五百匹寶鉢一口祖因僧問黃梅意旨什麼人得祖曰會佛法人得僧云和尚還得不祖曰我不得僧云和尚為什麼不得祖曰我不會佛法汾陽昭代云方知密旨難傳翠巖芝云會得即二頭不會得即三首作麼生便有出身之路圓悟勤頌云斬釘截鐵大巧若拙一句單提不會佛法儘他葉落花開不問春寒秋熱別別萬古寒潭空界月徑山杲云還見祖師麼若也不見徑山與你指出蕉芭蕉芭有葉無丫忽然一陣狂風起恰似東京大相國寺裏三十六院東廊下壁角頭王和尚破袈裟畢竟如何歸堂喫茶楚石琦云棒打石人頭論實事一日祖謂眾曰諸善知識汝等各各淨心聽吾說法汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須達一相三昧一行三昧若於一切處而不住相彼相中不生憎愛亦無取捨不念利益成壞等事安閑恬靜虗融澹泊此名一相三昧若於一切處行住坐臥純一直心不動道場真成淨土名一行三昧若人具二三昧如地有種能含藏長養成就其實一相一行亦復如是我今說法猶如時雨溥潤大地汝等佛性譬諸種子遇茲霑洽悉得發生承吾旨者決獲菩提依吾行者定證妙果先天元年告諸四眾曰吾忝受忍大師衣法今為汝等說法不付其衣葢汝等信根淳熟決定不疑堪任大事聽吾偈曰心地含諸種普雨悉皆生頓悟華情已菩提果自成說偈已復曰其法無二其心亦然其道清淨亦無諸相汝等慎勿觀淨及空其心此心本淨無可取捨各自努力隨緣好去甞有僧舉臥輪禪師偈曰臥輪有伎倆能斷百思想對境心不起菩提日日長祖聞之曰此偈未明心地若依而行之是加繫縛因示一偈曰慧能沒伎倆不斷百思想對境心數起菩提作麼長先天二年七月一日謂門人曰吾欲歸新州汝速理舟檝時大眾哀慕乞師且住祖曰諸佛出現猶示涅槃有來必去理亦常然吾此形骸歸必有所眾曰師從此去早晚却回祖曰葉落歸根來時無口法雲秀云非但來時無口去時亦無鼻孔白雲端云祖師可謂善解借手行拳有般漢徃往道言猶在耳不見道子期去不返浩浩良可悲不知天地間知音復是誰五祖演云祖師恁麼道猶欠悟在又問師之法眼何人傳受祖曰有道者得無心者通
