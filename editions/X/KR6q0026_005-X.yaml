body:
  text: 六祖大鑒禪師法嗣南嶽懷讓禪師南嶽懷讓禪師姓杜氏金州人唐儀鳳二年四月八日降誕年十五歲往荊州玉泉寺依弘景律師出家通天二年受戒後習毗尼藏一日自歎曰夫出家者為無為法天上人間無有勝者乃詣曹谿參六祖祖問甚麼處來曰嵩山來祖曰甚麼物恁麼來師無語遂經八載忽然有省乃白祖曰某甲有箇會處祖曰作麼生師曰說似一物即不中祖曰還假修證否師曰修證則不無污染即不得祖曰祇此不污染諸佛之所護念汝既如是吾亦如是西天般若多羅讖汝足下出一馬駒踏殺天下人師執侍左右十五年先天二年往衡嶽居般若寺開元中有沙門道一即馬祖在衡嶽山常習坐禪師知是法器往問曰大德坐禪圖甚麼道一曰圖作佛師乃取一甎於彼庵前石上磨道一曰磨作甚麼師曰磨作鏡道一曰磨甎豈得成鏡邪師曰磨甎既不成鏡坐禪豈得作佛道一曰如何即是師曰如牛駕車車若不行打車即是打牛即是道一無對師又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理一聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣道一曰有成壞否師曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成一蒙開悟心意超然侍奉十秋日益玄奧入室弟子總有六人師各印可曰汝等六人同證吾身各契其一一人得吾眉善威儀常浩一人得吾眼善顧盻智達一人得吾耳善聽理坦然一人得吾鼻善知氣神照一人得吾舌善譚說嚴峻一人得吾心善古今道一有一大德問如鏡鑄像像成後未審光向甚麼處去師曰如大德為童子時相貌何在法眼益云阿那箇是大德鑄成底像曰祇如像成後為甚麼不鑑照師曰雖然不鑑照謾他一點不得後馬大師闡化於江西師問眾曰道一為眾說法否總未見人持箇消息來因遣一僧去囑曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬師云自從胡亂後三十年不曾少鹽醬師然之徑山杲云雲門即不然夜夢不祥書門大吉楚石琦云且道妙喜與馬祖是同是別如何黑漆屏風上更寫盧仝月蝕詩南嶽下一世江西馬祖道一禪師南嶽讓法嗣江西道一禪師漢州什邡縣人姓馬氏牛行虎視引舌過鼻足下有二輪文開元中習禪定於衡嶽山中遇讓和尚同參六人唯師密受心印讓之一猶思之遷也同源而異派故禪法之盛始于二師劉軻云江西主大寂湖南主石頭往來憧憧不見二大士為無知矣西天般若多羅記達磨云震旦雖濶無別路要假兒孫脚下行金雞解銜一粒粟供養十方羅漢僧又六祖謂讓和尚曰向後佛法從汝邊去馬駒蹋殺天下人厥後江西嗣法布於天下時號馬祖一日謂眾曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經文以印眾生心地恐汝顛倒不自信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界唯心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時說菩提亦祇寧事理俱無礙當生即不生僧問和尚為甚麼說即心即佛師曰為止小兒啼曰啼止時如何師曰非心非佛曰除此二種人來如何指示師曰向伊道不是物曰忽遇其中人來時如何師曰且教伊體會大道問如何是西來意師曰即今是甚麼意龐居士問不昧本來人請師高著眼師直下居士曰一等沒絃琴唯師彈得妙師直上居士禮拜師歸方丈居士隨後曰適來弄巧成拙雲峯悅云且道是賓家弄巧成拙主家弄巧成拙還有人揀得出麼若揀得出三十棒一棒也較不得若揀不出明年更有新條在惱亂春風卒未休瑯琊覺云一夜作竊不覺天曉智海逸云二老漢一箇開口了合不得一箇合口了開不得更有一箇未欲說破乃呵呵大笑歸方丈徑山杲云馬大師覷上覷下即不無爭奈昧却本來人居士雖禮拜也是渾崙吞箇棗馬師歸方丈居士隨後云弄巧成拙救得一半楚石琦云說甚麼救得一半三十年後換手椎胷去在金粟悟云我作馬祖待他道不昧本來人請師高著眼劈脊便打他更道一種沒絃琴唯師彈得妙乃連棒打出免伊向弄巧成拙處坐地又問如水無筋骨能勝萬斛舟此理如何師曰這裏無水亦無舟說甚麼筋骨一夕西堂百丈南泉隨侍翫月次師問正恁麼時如何西堂曰正好供養百丈曰正好修行南泉拂袖便行師曰經入藏禪歸海唯有普願獨超物外翠巖真云神鼎叔翁云只為老婆心切翠巖即不然垂萬里鈎駐千里烏騅布漫天網打衝浪巨鱗還有麼有則衝浪來相見如無且歸巖下待月明泐潭清云是則全是非則全非後來神鼎道只為老婆心切神鼎與麼道大似金沙混雜玉石不分只如馬大師道經入藏禪歸海惟有普願獨超物外什麼處是老婆心切處還辯得麼不省這箇意修行徒苦辛虎丘隆云馬駒踏殺天下人一摑直須一掌血三大士各展家風不覺翻成老婆心切叢林浩浩商量總道翫月話奇特檢點將來克由尀耐何故三人證龜成鱉靈隱嶽於正好供養處云望梅林止渴正好修行處云金不博金拂袖便行處云只得一橛獨超物外處云唵摩呢達呢吽㗶吒復云這一夥落鼻孔總被穿却了也你諸人向什麼處出氣擊拂子下座百丈問如何是佛法旨趣師曰正是汝放身命處師問百丈汝以何法示人百丈竪起拂子師曰祇這箇為當別有百丈拋下拂子有小師耽源行脚回於師前畫箇圓相就上拜了立師曰汝莫欲作佛否曰某甲不解揑目師曰吾不如汝小師不對鄧隱峯辭師師曰甚麼處去曰石頭去師曰石頭路滑曰竿木隨身逢場作戲便去纔到石頭即繞禪牀一匝振錫一聲問是何宗旨石頭曰蒼天蒼天隱峯無語却回舉似師師曰汝更去問待他有答汝便噓兩聲隱峯又去依前問石頭乃噓兩聲隱峯又無語回舉似師師曰向汝道石頭路滑有僧於師前作四畫上一畫長下三畫短曰不得道一畫長三畫短離此四字外請和尚答師乃畫地一畫曰不得道長短答汝了也忠國師聞別云何不問老僧溈山果云借婆裙子拜婆年天奇瑞云這僧却似夢裏渡河不知渾身泥水馬祖就樹採花未覺遠飛他圃山僧待忠國師道何不問老僧當時只對他道自屎不覺臭大眾三人且止即今不道長不道短又作麼生會有講僧問曰未審禪宗傳持何法師却問曰座主傳持何法座主曰忝講得經論二十餘本師曰莫是師子兒否座主曰不敢師作噓噓聲座主曰此是法師曰是甚麼法座主曰師子出窟法師乃默然座主曰此亦是法師曰是甚麼法座主曰師子在窟法師曰不出不入是甚麼法座主無對百丈代云見麼天奇瑞云在窟出窟空擔師子之名噓噓默然枉費兩頭奔競若是山僧待馬祖道莫是師子兒否便道這畜生非但把住百丈亦使馬祖有口無言何故殺斬不由獻帝存留盡在曹公遂辭出門師召曰座主座主回首師曰是甚麼座主亦無對師曰這鈍根阿師洪州廉使問曰喫酒肉即是不喫即是師曰若喫是中丞祿不喫是中丞福師入室弟子一百三十九人各為一方宗主轉化無窮師於真元四年正月示疾院主問和尚近日尊候如何師曰日面佛月面佛南嶽下二世百丈懷海禪師馬祖一法嗣洪州百丈山懷海禪師者福州長樂人姓王氏丱歲離塵三學該練屬大寂闡化江西乃傾心依附與西堂智藏南泉普願同號入室時三大士為角立焉師侍馬祖行次見一羣野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂把師鼻扭負痛失聲祖曰又道飛過去也師於言下有省雪竇顯頌云野鴨子知何許馬祖見來相共語話盡雲山水月情依然不會還飛去却把住道道却歸侍者寮哀哀大哭同事問曰汝憶父母邪師曰無曰被人罵邪師曰無曰哭作甚麼師曰我鼻孔被大師扭得痛不徹同事曰有甚因緣不契師曰汝問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲說大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然笑巖寶云馬祖雖捉住箇黃鼠不覺兩手臊氣百丈雖拾得鼻頭不知打失口齒直教飛去忽飛來復云險次日馬祖陞堂眾纔集師出卷却席祖便下座師隨至方丈祖曰我適來未曾說話汝為甚便卷却席師曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心師曰鼻頭今日又不痛也祖曰汝深明昨日事師作禮而退雪竇顯云諸方皆謂奇特漝麼舉還當麼若當譬如水母以蝦為目若不當又空讚歎圖箇什麼眾中一般漢亂踏向前問古人意旨如何更有老底不識好惡對云將謂仙陀客又云來日更到座前苦哉苦哉如此自稱宗匠欲開人天眼目驢年去諸上座雪竇當時若見伊出來卷席劈胷一踏令坐者倒者俱起不得且要後人別有生涯去免見反相鈍置豈不是箇英靈底漢會也無歸堂白雲端出馬祖語云我鈍置猶可伱鈍置太煞黃龍心云馬祖陞堂百丈卷席後人不善來風盡道不留眹迹殊不知桃花浪裏正好張帆七里灘頭更堪垂釣如今必有辨浮沉識深淺底漢試出來定當水脉看有麼如無且將漁父笛閒向海邊吹師再參侍立次祖目視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子竪起祖曰即此用離此用師挂拂子於舊處祖振威一喝師直得三日耳聾汾陽昭云悟去便休說什麼三日耳聾石門聰云若不三日耳聾何得悟去汾陽云我與麼道較他石門半月程雪竇顯云奇恠諸禪德如今列其派者多究其源者少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢謾他一點不得只如馬師道爾後開兩片皮將何為人百丈竪拂為復如蟲禦木為復啐啄同時諸人要會三日耳聾麼大冶精金應無變色東林總云當言不避截舌當爐不避火迸佛法豈可曲順人情東林今日向驪龍窟內爭珠去也百丈大智不無他三日耳聾汾州石門爭免箇二俱瞎漢只這三箇老漢還曾悟去也無良久云祖禰不了殃及兒孫雲蓋智云發大機顯大用非馬祖而誰能為即此用離此用獨百丈得其旨為甚麼被馬祖一喝直得三日耳聾要會麼不入驚人浪難逢稱意魚黃龍新云黃龍路見不平要問雪竇既是大冶精金應無變色為甚麼三日耳聾要會麼從前汗馬無人識只要重論蓋代功圓悟勤云然則作家共相提唱不妨各有為人眼要且只明得馬祖百丈大機未明馬祖百丈大用不惜眉毛露箇消息也要諸方檢責還知這一喝麼直似奮雷霹靂聽者喪膽亡魂要會三日耳聾正如擊塗毒鼓聞者喪身失命舉拂子云或有箇問即此用離此用和聲便打隨後與喝復云還見馬祖百丈麼恕中慍云無辯龍蛇眼目難以荷負正宗無超佛祖機謀難以定論今古馬祖一喝何止百丈三日耳聾直得盡浮幢王剎海若聖若凡被他轟破耳門聽事不真喚鐘作甕與麼舉揚諸人還知落處麼良久雲收雨霽長空濶一對鴛鴦畵不成徑山信云父子互換縱奪可觀冷眼看來總是白地上弄精魂頌云三日耳聾也大奇業風揭塞髑髏泥而今鼓弄唇皮者能得幾人像阿師何以故此處無銀三十兩咄一日師謂眾曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼黃檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見黃檗便禮拜溈山問仰山百丈再參馬祖因緣此二尊宿意旨如何仰山云此是顯大機大用溈山云馬祖出八十四人善知識幾人得大機幾人得大用仰山云百丈得大機黃檗得大用餘者盡是唱導之師溈山云如是如是有僧哭入法堂來師曰作麼曰父母俱喪請師選日師曰明日來一時埋却溈山五峯雲嚴侍立次師問溈山併却咽喉唇吻作麼生道溈山曰却請和尚道師曰不辭向汝道恐已後喪我兒孫又問五峯五峯曰和尚也須併却師曰無人處斫額望汝又問雲巖雲巖曰和尚有也未師曰喪我兒孫雪竇顯頌云却請和尚道虎頭生角出荒草十洲春盡花凋殘珊瑚樹林日杲杲和尚也併却龍蛇陣上看謀略令人長憶李將軍萬里秋空飛一鶚和尚有也未金毛師子不踞地兩兩三三舊路行大雄山上空彈指師謂眾曰我要一人傳語西堂阿誰去得五峯曰某甲去師曰汝作麼生傳語五峯曰待見西堂即道師曰見後道甚麼五峯曰却來說似和尚師每上堂有一老人隨眾聽法一日眾退唯老人不去師問汝是何人老人曰某非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人於言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師令維那白椎告眾食後送亡僧大眾聚議一眾皆安涅槃堂又無病人何故如是食後師領眾至山後巖下以杖挑出一死野狐乃依法火塟師至晚上堂舉前因緣黃檗便問古人錯祇對一轉語墮五百生野狐身轉轉不錯合作箇甚麼師曰近前來向汝道黃檗近前打師一掌師拍手笑曰將謂胡鬚赤更有赤鬚胡溈山祐在會下作典座司馬頭陀舉前話問溈山溈山乃撼門扇三下司馬云太麤生溈山云佛法不是這箇道理溈山又舉問仰山仰山云黃檗常用此機溈山云天生得從人得仰山云亦是稟受師承亦是自性宗通溈山云如是如是法昌遇云敢問諸人不落因果為什麼墮野狐不昧因果為什麼脫野狐直饒道得落處分明也未出他野狐窟裏法昌當時若見但與他拈出雪峯古鏡教伊動轉不得然後放出紫胡狗子盡却性命免見兒孫今日成羣作隊法昌與麼舉論大似持蠡酌海明眼人前一場笑具何故曾經大海難為水慣聽無絃不易琴黃龍新問元首座百丈野狐話意作麼生首座云甜瓜徹蒂甜苦瓠連根苦師肯之真淨文頌云不落藏鋒不昧分要伊從此脫狐身人人盡道休官去林下何曾見一人真如頌云大冶洪鑪烹佛烹祖規模鎔盡識者罔措大溈智云費盡自己心笑破他人口徑山杲云不落與不昧半明與半晦不昧與不落兩頭空索索五百生前箇野狐而今冷地謾追呼喝一喝云座中既有江南客何必樽前唱鷓鴣高峯妙云大眾前云不落後云不昧還有得失也無若無因甚有墮有脫若有試出來分明道看有麼有麼總是一隊野狐精莫恠山僧壓良為賤楚石琦云這箇公案批判者多盡向不落不昧上妄生卜度未有一箇格外提持帶累百丈老人也在野狐隊裏天寧不是釘樁搖櫓膠柱調絃海枯終見底人死脚皮穿上堂靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛普請钁地次忽有一僧聞鼓鳴舉起钁頭大笑便歸師曰俊哉此是觀音入理之門師歸院乃喚其僧問適來見甚麼道理便恁麼曰適來肚饑聞鼓聲歸喫飯師乃笑圓悟勤云這僧洪音大振直得一千五百人大善知識眼目定動及乎勘證將來却打箇背翻筋斗若不是溈山爭見汗馬功高後來道有此一僧只得一半道無此一僧只得一半今日板聲鐘聲魚聲鼓聲齊振或有箇拍手呵呵大笑直向伊道觀世音菩薩來也此章或列于溈山章故諸師皆云溈山此從傳燈錄因僧問西堂有問有答即且置無問無答時如何西堂曰怕爛却那師聞舉乃曰從來疑這箇老兄曰請和尚道師曰一合相不可得師謂眾曰有一人長不喫飯不道饑有一人終日喫飯不道飽眾無對天奇瑞云飢則可以喫飯飽則可以安眠有人會得須彌高而無高大海淵而無淵且道與百丈是同是別雲巖問和尚每日區區為阿誰師曰有一人要雲巖曰因甚麼不教伊自作師曰他無家活問趙州近離甚處曰南泉師曰南泉有何言句曰未得之人直須悄然師便喝趙州作怕勢師曰大好悄然趙州乃作舞而出師有時說法竟大眾下堂乃召之大眾回首師曰是甚麼藥山目之為百丈下堂句師凡作務執勞必先於眾主者密收作具師曰吾無德爭合勞於人既徧求作具不獲而亦忘飡故有一日不作一日不食之語南泉普願禪師池州南泉普願禪師鄭州新鄭人姓王氏幼慕空宗後扣大寂之室頓然忘筌得遊戲三昧一日為眾僧行粥次馬祖問桶裏是甚麼師曰這老漢合取口作恁麼語話祖便休上堂然燈佛道了也若心相所思出生諸法虗假不實何以故心尚無有云何出生諸法猶如形影分別虗空如人取聲安置篋中亦如吹網欲令氣滿故老宿云不是心不是佛不是物且教你兄弟行履據說十地菩薩住首楞嚴三昧得諸佛秘密法藏自然得一切禪定解脫神通妙用至一切世界普現色身或示現成等正覺轉大法輪入涅槃使無量入毛孔演一句經無量劫其義不盡教化無量億千眾生得無生法忍尚喚作所知愚極微細所知愚與道全乖大難大難珍重上堂曰王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草擬向溪西牧亦不免食他國王水草不如隨分納些些總不見得雲門偃云且道牛內納牛外納直饒你說得納處分明我更問你覓牛在溈山云雲門只解索牛不解穿他鼻孔拈拄杖云三世諸佛天下老和尚鼻孔盡被山僧拄杖一時穿却且道山僧鼻孔在什麼處良久云誣人之罪以全罪科之長慶稜云你道南泉前頭為人後頭為人雪竇顯云一時穿却昭覺勤云和光順物與世同塵不犯鋒𨦵收放自在是南泉本分草料山僧自小養一頭水牯牛有時孤峯獨立有時閙市縱橫不論溪東溪西一向破塵破的且道即今在甚麼處試着眼看天童傑云南泉起模畫樣長慶披沙揀金雲門鼻孔先穿雪竇據欵結案拈拄杖更有一箇在什麼處擲下拄杖靈隱嶽云王老師傾膓倒腹則不無未見移風易俗在山僧只養得一頭驢一向東倒西攂順時一日何啻千里萬里抝時直是一步不移且道與王老師水牯牛相去多少良久云漁人舞棹野老謳歌金粟悟云南泉希圖本分不知翻成分外師問僧曰夜來好風曰夜來好風師曰吹折門前一枝松曰吹折門前一枝松次問一僧曰夜來好風曰是甚麼風師曰吹折門前一枝松曰是甚麼松師曰一得一失翠巖真云眾中商量甚多有云前來據實祇對所以云得後來不合云是什麼風所以云失然只知車書混同泥玉一所何哉不知道之根源理之深淺要會麼路逢劒客須呈劒不是詩人莫獻詩師有書與茱萸曰理隨事變寬廓非外事得理融寂寥非內僧達書了便問茱萸如何是寬廓非外茱萸曰問一答百也無妨曰如何是寂寥非內茱萸曰覩對聲色不是好手僧又問長沙長沙瞪目視之僧又進後語長沙乃閉目示之僧又問趙州趙州作喫飯勢僧又進後語趙州以手作拭口勢後僧舉似師師曰此三人不謬為吾弟子蔣山懃云南泉雖則養子之緣其奈憐兒不覺醜殊不知這三人一人有目無足一人有足無目一人足目俱無雖然如是皆可與南泉為師為甚如此理事分明南泉山下有一庵主人謂曰近日南泉和尚出世何不去禮見庵主曰非但南泉出世直饒千佛出興我亦不去師聞乃令趙州去勘趙州去便設拜庵主不顧趙州從西過東又從東過西庵主亦不顧趙州曰草賊大敗遂拽下簾子便歸舉似師師曰我從來疑著這漢次日師與沙彌擕茶一瓶盞三隻到庵擲向地上乃曰昨日底昨日底庵主曰昨日底是甚麼師於沙彌背上拍一下曰賺我來賺我來拂袖便回雪竇顯云大小南泉趙州被這箇檐板漢勘破了溈山云庵主坐觀勝敗大小南泉趙州向淨地上喫交智海禾云是即是庵主即解把定封疆不能同生同死趙州禮拜時但云這賊我識得你了也待伊從東過西從西過東拽拄杖趂出庵且看趙州別有什麼伎倆上堂道箇如如早是變了也今時師僧須向異類中行歸宗曰雖行畜生行不得畜生報師曰孟八郎漢又恁麼去也德山密云南泉中毒也瑯琊覺云山僧不然遇水喫水遇草喫草焉知畜生行法華舉云且道作麼生是異類中行石牛長臥三春霧木馬時嘶秋夜泉天奇瑞云戴角披毛須是親到此地始得若是妄去鑽研決定不能奈何茲者但念水草餘無所知是箇當家人方說着實話且道變則異類不變又作麼生不見道孟八郎又恁麼去上堂文殊普賢昨夜三更相打每人與二十棒趁出院也趙州曰和尚棒教誰喫師曰且道王老師過在甚處趙州禮拜而出雲門偃代云深領和尚慈悲某甲歸衣鉢下得箇安樂又代云與眾除害報慈遂云且道趙州休去是肯南泉不肯南泉夾山齡云南泉一期逞俊爭奈平地起堆趙州雖是覿面投機不覺腦門著地昭覺勤云南泉動絃趙州別曲苦痛蒼天寒山拾得若是崇寧則不然燈籠露柱昨夜起佛見法見各與二十棒令歸本位去也或有箇出云和尚棒教誰喫只對他道落賓落主徑山杲頌云南泉無過口能招禍趙州禮拜草賊大敗徑山不管結案據欵文殊普賢且過一邊師因至莊所莊主預備迎奉師曰老僧居常出入不與人知何得排辦如此莊主曰昨夜土地報道和尚今日來師曰王老師修行無力被鬼神覰見侍者便問和尚既是善知識為甚麼被鬼神見師曰土地前更下一分飯因聖頴云南泉被這僧一問不免向鬼窟裏作活計雲居錫云是賞伊是罰伊只如土地覷見是南泉不是南泉翠巖真云眾中多有道蘇嚧蘇嚧便是土地前一分飯如斯理論深屈古人何故只知枝詞蔓說不知南泉道理諸人要會麼執之失度必入邪路放之自然體無去住天童覺云老僧當時若見莊主與麼道便與捉住云放汝不得何故不見道來說是非者便是是非人師有時曰江西馬祖說即心即佛王老師不恁麼道不是心不是佛不是物恁麼道還有過麼趙州禮拜而出時有一僧隨問趙州曰上座禮拜便出意作麼生趙州曰汝却問取和尚僧乃問適來諗上座意作麼生師曰他却領得老僧意旨黃龍心云古人恁麼道譬若管中窺豹但見一班設使入林不動草入水不動波猶是騎馬向冰稜上行若是射鵰底手何不向蛇頭揩痒透關者試辯看良久云鴛鴦繡出自金針徑山杲云兩箇老漢雖善靴裏動指殊不知傍觀者醜楚石琦云南泉趙州總被這僧一狀領過黃檗與師為首座一日捧鉢向師位上坐師入堂見乃問曰長老甚麼年中行道黃檗曰威音王已前師曰猶是王老師兒孫在下去黃檗便過第二位坐師便休溈山祐云欺敵者亡仰山云不然須知黃檗有陷虎之機溈山云子見處得與麼長雪竇顯云可惜王老師只見錐頭利我當時若作南泉待伊道威音王已前即便於第二位坐令黃檗一生起不得雖然如此也須救取南泉雲峯悅云後來叢林中多有商量或道黃檗有陷虎之機南泉有殺虎之用若作與麼說話誠實苦哉殊不知這老賊有年無德喫飯坐處也不依本分若向雲峯門下說甚威音王已前王老師更大直須喫棒趂出徑山杲云何待問他甚年行道纔入堂見他在主位便捧鉢向第二位坐直饒黃檗有陷虎之機擬向甚處施設師一日問黃檗黃金為世界白銀為壁落此是甚麼人居處黃檗曰是聖人居處師曰更有一人居何國土黃檗乃叉手立師曰道不得何不問王老師黃檗却問更有一人居何國土師曰可惜許師問黃檗定慧等學明見佛性此理如何黃檗曰十二時中不依倚一物師曰莫是長老見處麼黃檗曰不敢師曰漿水錢且置草鞋錢教阿誰還溈山祐問仰山莫是黃檗搆南泉不得麼仰山云不然須知黃檗有陷虎之機溈山云子見處得與麼長保福展云若無溈仰埋沒着黃檗五祖戒云仰山大似為蛇畵足雲峯悅云若不同牀睡焉知被底穿大溈智云欺敵者亡徑山杲云路逢劒客須呈劒不是詩人不獻詩楚石琦云又是逢便宜又是落便宜乃擊木三下僧放下斧子歸僧堂師歸法堂良久却入僧堂見僧在衣鉢下坐師曰賺殺人問師歸丈室將何指南師曰昨夜三更失却牛天明起來失却火師因東西兩堂爭猫兒師遇之白眾曰道得即救取猫兒道不得即斬却也眾無對師便斬之趙州自外歸師舉前語示之趙州乃脫履安頭上而出師曰子若在即救得猫兒也雪峯存問德山南泉斬猫意旨如何德山以拄杖便打趂出復召云會麼雪峯云不會德山云我與麼老婆猶自不會保福展云雖然如是也即是破草鞋翠巖芝云大小趙州祇可自救雪竇顯頌南泉斬猫云兩堂俱是杜禪和撥動煙塵不奈何賴得南泉能舉令一刀兩段任偏頗頌趙州戴鞋云公案圓來問趙州長安城裏任閒遊草鞋頭戴無人會歸到家山便即休大溈智云南泉據令而行趙州見機而作雖然如是未免掛人脣吻大圓要與南泉把手共行遂拈拂子云若道得即奪取去眾無語乃云啼得血流無用處不如緘口過平生萬峯蔚云兩堂首座無定亂之機南泉乃有安邦之手看他正令纔行誰敢當場開口趙州救得猫兒來遲未為好手嵩山拂袖便行且道救也不救天奇瑞云閒時安排底簇錦攢花及至臨時却似泥塑木雕你等諸人俱到南泉為箇甚麼提起數珠云是什麼于今禪和子不看當機正令只在斬不斬處生情立見所以蹉過南泉大命你看英靈自然各別亦不論你閑言便以本分事露出所以方允若不如是盡是盲人摸象師在方丈與杉山向火次師曰不用指東指西直下本分事道來杉山插火箸叉手師曰雖然如是猶較王老師一線道有僧問訊叉手而立師曰太俗生其僧便合掌師曰太僧生僧無對徑山杲云合掌太僧生叉手又俗氣總不恁麼時尊體無頓處有巴鼻唵蘇嚕蘇嚕悉唎悉唎喝一喝云是甚麼近來王令稍嚴不許攙行奪市楚石琦云叉手太俗合掌太僧不僧不俗誰敢安名檢點將來也是垛生招箭且道落在這僧分上落在南泉分上一僧洗鉢次師乃奪却鉢其僧空手而立師曰鉢在我手裏汝口喃喃作麼僧無對師因入菜園見一僧師乃將瓦子打之其僧回顧師乃翹足僧無語師便歸方丈僧隨後入問訊曰和尚適來擲瓦子打某甲豈不是警覺某甲師曰翹足又作麼生其僧無對後有僧問石霜諸云南泉翹足意作麼生石霜舉手云還恁麼也無上堂王老師賣身去也還有人買麼一僧出曰某甲買師曰不作貴不作賤汝作麼生買僧無對趙州諗代云明年與和尚縫一領布衫臥龍球代云屬某甲去也禾山殷代云是何道理雪竇顯云雖然作家競買要且不解輸機且道南泉還肯麼雪竇也擬詶箇價直令南泉進且無門退亦無路良久云別處容和尚不得笑巖寶云這賣身話歷代尊宿拈提相酬價者甚多只是終不能奈何得伊山僧今日也斬新出箇價直教南泉此身更屬已不得屬人不得作賓不得作主不得待云不作貴不作賤汝作麼生買只向伊云且請和尚暫回方丈喫茶師曰三世諸佛不知有猫奴白牯却知有大溈智云三世諸佛既不知有狸奴白牯又何曾夢見灼然須知向上有知有底人始得且作麼生是知有底人喫官酒臥官街當處死當處埋沙場無限英雄漢堆山積嶽露屍骸徑山杲頌云三世諸佛不知有老老大大外邊走眼皮蓋盡五須彌大洋海裏翻筋斗狸奴白牯却知有瀑布不澑青山走却笑無端王老師錯認簸箕作熨斗師與歸宗麻谷同去參禮南陽國師師於路上畫一圓相曰道得即去歸宗便於圓相中坐麻谷作女人拜師曰恁麼則不去也歸宗曰是甚麼心行師乃相喚便回更不去禮國師報慈遂云只如南泉恁麼道是肯語是不肯語雲居錫云比來去禮國師南泉為甚麼却相喚回且道古人意作麼生泐潭英云學般若菩薩須到這箇田地始得如金盤裏盛珠不撥而自轉然雖如是只如南泉道與麼則不去也利害在甚麼處還有人道得麼試出來道看如無山僧與你下箇注脚良久云不入洪波裏爭顯弄潮人中峯本云南泉畫地為牢歸宗墮坑落壍麻谷恭而無禮點檢將來一人眼空四海一人舌拄梵天一人入地獄如箭師在山上作務僧問南泉路向甚麼處去師拈起鎌子曰我這茆鎌子三十錢買得曰不問茆鎌子南泉路向甚麼處去師曰我使得正快有一座主辭師師問甚麼處去對曰山下去師曰第一不得謗王老師對曰爭敢謗和尚師乃噴嚏曰多少座主便出去雲居膺云非師本意曹山寂云賴也石霜諸云不為人斟酌長慶稜云晴領話雲居錫云座主當時出去是會不會師一日掩方丈門將灰圍却門外曰若有人道得即開或有祇對多未愜師意趙州曰蒼天師便開門師翫月次僧問幾時得似這箇去師曰王老師二十年前亦恁麼來曰即今作麼生師便歸方丈陸亘大夫問弟子從六合來彼中還更有身否師曰分明記取舉似作家曰和尚不可思議到處世界成就師曰適來總是大夫分上事陸大夫異日謂師曰弟子亦薄會佛法師便問大夫十二時中作麼生曰寸絲不挂師曰猶是堦下漢師又曰不見道有道君王不納有智之臣上堂次陸大夫曰請和尚為眾說法師曰教老僧作麼生說曰和尚豈無方便師曰道他欠少甚麼曰為甚麼有六道四生師曰老僧不教他陸大夫與師見人雙陸指骰子曰恁麼不恁麼正恁麼信彩去時如何師拈起骰子曰臭骨頭十八陸又問弟子家中有一片石或時坐或時臥如今擬鐫作佛還得否師曰得曰莫不得否師曰不得雲巖晟云坐即佛不坐即非佛洞山价云不坐即佛坐即非佛保福展云南泉看樓打樓雲巖洞山一起一倒五祖戒云南泉只解移風不解易俗雲巖洞山夢中說夢天童覺云轉功就位轉位就功還他洞上父子且道南泉意作麼生直是針錐不入五祖演云夫為善知識者須明決擇為什麼他人道得也道得他人道不得也道不得還知南泉落處麼白雲與你註破得又是誰道來不得又是誰道來高峯妙云南泉恁麼祇對正所謂聖人無常心以百姓心為心也天奇瑞云陸亘大夫向這石頭上坐臥不安仔細檢點將來皆是自不守分不是南泉爭得風光遍界恁麼便恁麼不恁麼便不恁麼若不具眼總是泥裏洗土塊雲巖證據洞山交互方見得打鼓弄琵琶相逢兩會家笑巖寶云許多尊宿空說道理不能直下截斷大夫惑我當時是南泉只向大夫道未鐫作佛時喚伊作箇甚麼趙州問道非物外物外非道如何是物外道師便打趙州捉住棒曰已後莫錯打人去師曰龍蛇易辨衲子難謾雪竇顯云趙州如龍無角似蛇有足當時不管盡法無民直須喫棒了趂出師喚院主院主應諾師曰佛九十日在忉利天為母說法時優填王思佛請目連運神通三轉攝匠人往彼彫佛像祇雕得三十一相為甚麼梵音相雕不得院主問如何是梵音相師曰賺殺人師問維那今日普請作甚麼對曰拽磨師曰磨從你拽不得動著磨中心樹子維那無語保福展代云比來拽磨如今却不成法眼益代云恁麼即不拽也一日有大德問師曰即心是佛又不得非心非佛又不得師意如何師曰大德且信即心是佛便了更說甚麼得與不得祇如大德喫飯了從東廊上西廊下不可總問人得與不得也師住庵時有一僧到庵師向伊道我上山去作務待齋時作飯自喫了送一分上來少時其僧自作飯喫了却一時打破家事就牀臥師待不見來便歸庵見僧臥師亦就伊邊臥僧便起去師住後曰我往前住庵時有箇靈利道者直至如今不見五祖戒云也是貧兒思舊債翠巖芝云兩箇漢前不至村後不至店徑山杲頌云南泉打破閒家具浩浩諸方作話看今日為君重舉過明明歷歷不瞞頇高峯妙云南泉雖則步步踏實未免隨人起倒這僧縱解飽食高眠決定不知飯是米做高峯恁麼告報設有一字妄虗永墮舌地獄師拈起毬子問僧那箇何似這箇對曰不似師曰甚麼處見那箇便道不似僧曰若問某甲見處和尚放下手中物師曰許你具一隻眼陸大夫向師道肇法師也甚奇怪解道天地與我同根萬物與我一體師指庭前牡丹花曰大夫時人見此一株花如夢相似大夫罔測保寧勇代大夫拍手云阿誰得到這般田地黃龍心舉問僧云南泉恁麼道如何得見與我一體僧舉起坐具黃龍云舉則易見還難毗盧頂上天風寒峩峩直下蒼龍窟誰敢覷着昭覺勤云陸亘手攀金鎖南泉八字打開直得七珍八寶羅列目前乃竪起拂子云天地一指萬物一馬通身是口分踈不下徑山杲云若向理上看非但南泉謾他陸亘大夫一點不得亦未摸着他脚跟下一莖毛在若向事上看非但陸亘大夫謾他南泉一點不得亦未夢見他汗臭氣在或有出來道大小徑山說理說事只向他道但向理事上會取楚石琦云大眾還會麼你若向天地同根萬物一體上會落在肇法師圈䙡裏若向理事上會又落在妙喜葛藤中總無自由分只如南泉指牡丹向陸亘道大夫時人見此一株花如夢相似你畢竟如何會天寧不惜眉毛為你諸人下箇註脚平蕪盡處是青山行人更在青山外天奇瑞云大夫情上生情句上猜句所以到烈㷔紅爐徒勞摸𢱢欲要死人知見斷人命根須是向石火電光中施機方不辜負從上佛祖若不恁麼盡是滅胡種族固南泉舉金剛王寶劍當頭直截免得盡大地人只在這鬼窟裏為奇不知喪本逐末手指香爐云會麼時人見此香爐如夢相似笑巖寶云南泉老漢被大夫將箇墼子一磕直得無窮寶藏罄囊倒出陸大夫辭歸宣城治所師問大夫去彼將何治民曰以智慧治民師曰恁麼則彼處生靈盡遭塗炭去也師入宣州陸大夫出迎接指城門曰人人盡喚作甕門未審和尚喚作甚麼門師曰老僧若道恐辱大夫風化曰忽然賊來時作麼生師曰王老師罪過大夫又問大悲菩薩用許多手眼作甚麼師曰祇如國家又用大夫作甚麼師洗衣次僧問和尚猶有這箇在師拈起衣曰爭奈這箇何報慈遂云且道是一箇是兩箇師問僧良欽空劫中還有佛否對曰有師曰是阿誰對曰良欽師曰居何國土良欽無語師問僧不思善不思惡思總不生時還我本來面目來曰無容止可露洞山价云還曾將示人麼師問座主你與我講經得麼曰某甲與和尚講經和尚須與某甲說禪始得師曰不可將金彈子博銀彈子去曰某甲不會師曰汝道空中一片雲為復釘釘住為復藤纜著僧辭問曰學人到諸方有人問和尚近日作麼生未審如何祇對師曰但向道近日解相撲曰作麼生師曰一拍雙泯師將順世第一座問和尚百年後向甚麼處去師曰山下作一頭水牯牛去首座曰某甲隨和尚去還得也無師曰汝若隨我即須銜取一莖草來鹽官齊安國師杭州鹽官海昌院齊安國師海門郡人也姓李氏大寂一見深器之乃令入室密示正法僧問如何是本身盧舍那師曰與老僧過淨瓶來僧將淨瓶至師曰却安舊處著僧送至本處復來詰問師曰古佛過去久矣雲門偃云無朕迹雪竇顯云直得一手指天一手指地爭得無還會麼雲在嶺頭閒不徹溈山云山僧不然忽有人問但云大眾歸堂去若人向大溈門下薦得古釋迦不先新彌勒不後且道轉身一句作麼生道良久云明年更有新條在惱亂春風卒未休東禪觀云盲者難以與乎文彩聵者難以與乎音聲這僧既不薦來機國師只成虗設雲門道無朕迹扶國師不起雪竇云一手指天一手指地爭得無也扶國師不起以拂子畫一畫云前來葛藤一時畫斷且道畢竟如何是本身盧舍那擲拂子下座天奇瑞云雷霆之聲聾者難聞赫日之光盲者難見且道運水搬柴挑囊負鉢憑箇什麼人恩力良久云古佛古佛有講僧來參師問座主蘊何事業對曰講華嚴經師曰有幾種法界曰廣說則重重無盡略說有四種師竪起拂子曰這箇是第幾種法界座主沉吟師曰思而知慮而解是鬼家活計日下孤燈果然失照保福展聞云若禮拜即喫和尚棒禾山殷代云某甲不煩和尚莫恠法眼益代拊掌三下蔣山懃云鹽官以強陵弱則且置如何道得一句語免他道鬼家活計良久云劒閣路雖險夜行人更多大溈泰云大眾這僧將成九仞之山不進一簣之土當時山僧若作座主待竪起拂子云這箇是第幾種法界中收只向他道向下文長付在來日徑山杲云兩段不同收歸上科僧問大梅如何是西來意大梅曰西來無意師聞乃曰一箇棺材兩箇死漢師一日喚侍者曰將犀牛扇子來侍者曰破也師曰扇子既破還我犀牛兒來侍者無對石霜諸代云若還和尚即無也雪竇云犀牛兒猶在投子同代云不辭將出恐頭角不全雪竇云我要不全底頭角保福展代云和尚年尊別請人好雪竇云可惜勞而無功資福遠代作一圓相於中書牛字雪竇云適來為甚不將出雪竇又云若要清風再復頭角重生請諸禪客下一轉語乃問扇子既破還我犀牛兒來時有僧云大眾參堂去師喝云拋鈎釣鯤鯨釣得箇蝦䗫雲居舜云三伏當時正須扇子為侍者不了事雖然如是鹽官太絮何不大家割捨侍者當時見他道扇子既破還我犀牛兒來只對云已𩗺在搕𢶍堆頭了也地藏恩云從上知識各說異端作盡伎倆其奈總未知犀牛兒所在山僧見處也要諸人共知扇子既破還我犀牛兒來別處容和尚不得天奇瑞云投子須乃不落因緣就裏拖泥帶水資福全機棒獻也是將無作有石霜昧己從他不知本具保福欲要推惡離己反為負德辜恩侍者終日明明白白因甚不知當央拈出所以魚不識水鳥不識空固將犀牛扇子一時喪却師一日謂眾曰虗空為鼓須彌為椎甚麼人打得眾無對南泉云王老師不打這破鼓法眼益別云王老師不打雪竇顯云打者甚多聽者極少且問誰是解打者莫謗鹽官好南泉道王老師不打這破鼓法眼云王老師不打兩箇既不奈何一箇更是懡㦬又云王老師不打還肯得諸方也無代云千年田八百主黃龍心云南泉法眼只知瞻前不能顧後且如鹽官道虛空為鼓須彌為椎什麼處是破處還檢點得出麼直饒檢點得破處分明我更問你覓鼓在天童華云南泉法眼大似喫李子只向赤邊咬山僧今日與鹽官相見去也虗空為鼓須彌為椎要打便打莫問是誰乃拈拄杖卓一下天童傑云鹽官提水放火南泉撥亂星飛法眼埋兵掉鬪諸方尊宿各出隻手並無一人性𢤁只是隨後打鼓祥符直截為諸人道虗空為鼓須彌為椎漆桶參堂去歸宗智常禪師廬山歸宗寺智常禪師上堂從上古德不是無知解他高尚之士不同常流今時不能自成自立虗度時光諸子莫錯用心無人替汝亦無汝用心處莫就他覔從前祇是依他解發言皆滯光不透脫祇為目前有物師甞與南泉同行後忽一日相別煎茶次南泉問曰從來與師兄商量語句彼此已知此後或有人問畢竟事作麼生師曰這一片地大好卓庵南泉曰卓庵且置畢竟事作麼生師乃打飜茶銚便起南泉曰師兄喫茶了普願未喫茶師曰作這箇語話滴水也難銷五祖戒云南泉只解作客不解作主溈山云南泉逢強即弱歸宗逢弱即強三十年同行畢竟事不通商量然雖如是猶較王老師一線道昭覺勤云驚羣之句誰不聳然有般道南泉搆他歸宗不着所以遭他呵叱殊不知行人更在青山外蔣山不惜眉毛為諸人下箇註脚南泉探頭太過歸宗壁立萬仞且道還有出身路也無喝下須教三日聾天童華云南泉貪程太急歸宗薄處先穿二老雖發明馬祖正眼要且極則事未夢見在何故家住東州師因官人來乃拈起帽子兩帶曰還會麼曰不會師曰莫怪老僧頭風不卸帽子師剗草次有講僧來參偶見一虵過師以鋤斷之僧曰久嚮歸宗元來是箇麤行沙門師曰你麤我麤曰如何是麤師竪起鉏頭曰如何是細師作斬蛇勢曰與麼則依而行之師曰依而行之且置你甚處見我斬虵僧無對德山鑑因雪峯問古人斬蛇意旨如何德山便打雪峯便走德山召云布衲子雪峯回首德山云他後悟去方知老漢徹底老婆心雪竇顯云歸宗只解慎初不能護末德山頗能據令未明斬蛇乃云大眾看翠峯今日斬三五條以拄杖打散雲巖來參師作挽弓勢雲巖良久作劒勢師曰來太遲生僧辭師問甚麼處去曰諸方學五味禪去師曰諸方有五味禪我這裏祇有一味禪曰如何是一味禪師便打僧曰會也會也師曰道道僧擬開口師又打黃檗運云馬大師出八十四員善知識箇箇阿轆轆地唯有歸宗較些子雪竇顯云以強欺弱有什麼難我這裏有一味禪為甚不學但向道收待伊拈起有般無眼漢只管喫吽吽雪竇門下誰敢昭覺勤云若非黃檗深辯端倪洎乎勞而無功資福先云歸宗幸是好一味禪無端傷鹽傷醋却成五味了也如今忽有人來辭去諸方學五味禪只向他道善為道路若是箇漢必然別有生涯江州刺史李㴾問教中所言須彌納芥子㴾即不疑芥子納須彌莫是妄譚否師曰人傳使君讀萬卷書籍還是否曰然師曰摩頂至踵如椰子大萬卷書向何處著李㴾異日又問一大藏教明得箇甚麼邊事師舉拳示之曰還會麼曰不會師曰這箇措大拳頭也不識曰請師指示師曰遇人即途中授與不遇即世諦流布大梅法常禪師明州大梅山法常禪師襄陽人姓鄭氏初參大寂問如何是佛大寂曰即心是佛師即大悟遂之四明梅子真舊隱縛茆燕處真元中大寂聞師住山乃令僧問和尚見馬大師得箇甚麼便住此山師曰大師向我道即心是佛我便向這裏住僧曰大師近日佛法又別師曰作麼生曰又道非心非佛師曰這老漢惑亂人未有了日任他非心非佛我祇管即心即佛其僧回舉似馬祖祖曰梅子熟也僧問禾山殷大梅恁麼道意作麼生禾山云真師子兒龐居士聞之欲驗師實特去相訪纔相見居士便問久嚮大梅未審梅子熟也未師曰熟也你向甚麼處下口居士曰百雜碎師伸手曰還我核子來居士無語翠巖芝云此二人大似把手上高山寶峯文云且道二人相見還有優劣也無夾山與定山同行言話次定山曰生死中無佛即無生死夾山曰生死中有佛即不迷生死互相不肯同上山見師夾山便舉問未審二人見處那箇較親師曰一親一疎夾山復問那箇親師曰且去明日來夾山明日再上問師曰親者不問問者不親夾山住後自云當時失一隻眼雪竇顯云夾山畢竟不知換得一隻眼大梅老漢當時聞舉以棒一時打出豈止劃斷兩人葛藤亦乃為天下宗匠五洩靈默禪師婺州五洩山靈默禪師毗陵人姓宣氏初謁馬祖遂得披剃受具後謁石頭便問一言相契即住不契即去石頭據坐師便行石頭隨後召曰闍黎師回首石頭曰從生至死祇是這箇回頭轉腦作麼師言下大悟乃抝折拄杖而棲止焉洞山价云當時若不是五洩先師大難承當然雖如此猶涉在途長慶稜云險報慈遂云那箇是涉在途處有僧云為伊三寸途中薦得所以在途報慈云為復薦得自己為復薦得三寸若是自己為甚麼成三寸若是三寸為甚麼悟去且道洞山意作麼生莫亂說仔細好翠巖芝云石頭據坐五洩回首石頭召他却成多事雲峯悅云大小石頭坐不定把不住似這檐板漢放去便休又喚回被他糊塗一上道我向這裏有箇悟處驢年夢見溈山行云五洩當時便去可謂坐斷天下人舌頭既被喚回已是糊塗不少抝折拄杖也是賊過後張弓如今得失是非一時坐斷敢問大眾石頭據坐意作麼生地藏恩云只合與麼去不合與麼來盤山寶積禪師幽州盤山寶積禪師因於市肆行見一客人買猪肉語屠家曰精底割一斤來屠家放下刀叉手曰長史那箇不是精底師於此有省一日出門見人舁喪謌郎振鈴云紅輪決定沉西去未委魂靈往那方幕下孝子哭曰哀哀師忽身心踊躍歸舉似馬祖祖印可之上堂夫心月孤圓光吞萬象光非照境境亦非存光境俱亡復是何物徑山杲云千年常住一朝僧禪德譬如擲劒揮空莫論及之不及斯乃空輪無迹劒刃無虧若能如是心心無知全心即佛全佛即人人佛無異始為道矣徑山杲云咄咄咄我王庫內無如是刀師將順世告眾曰有人邈得吾真否眾將所寫真呈皆不契師意普化出曰某甲邈得師曰何不呈似老僧普化乃打筋斗而出師曰這漢向後掣風狂去在保福展云普化掣顛不少盤山醜拙更多長蘆了撼身云快活殺我也若無爍破乾坤底眼孔爭見渾金璞玉復云山僧依普化樣子摸得一本今夜展開要且大家瞻仰遂打筋斗歸堂麻谷寶徹禪師蒲州麻谷山寶徹禪師侍馬祖行次問如何是大涅槃祖曰急師曰急箇甚麼祖曰看水師同南泉二三人去謁徑山路逢一婆乃問徑山路向甚處去婆曰驀直去師曰前頭水深過得否婆曰不濕脚師又問上岸稻得與麼好下岸稻得與麼怯婆曰總被螃蠏喫却也師曰禾好香婆曰沒氣息師又問婆住在甚處婆曰祇在這裏三人至店婆煎茶一瓶携盞三隻至謂曰和尚有神通者即喫茶三人相顧間婆曰看老朽自逞神通去也於是拈盞傾茶便行東寺如會禪師湖南東寺如會禪師始興曲江人初謁徑山後參大寂學徒既眾僧堂牀榻為之陷折時稱折牀會也自大寂去世師常患門徒以即心即佛之譚誦憶不已且謂佛於何住而曰即心心如畫師而云即佛遂示眾曰心不是佛智不是道劒去遠矣爾萬刻舟時號東寺為禪窟焉虛堂愚頌云昨日因過竹院西鄰家稚子隔溪啼山寒水肅半黃落無數歸鴉卜樹棲相國崔公羣出為湖南觀察使見師問曰師以何得師曰見性得師方病眼公譏曰既云見性其柰眼何師曰見性非眼眼病何害公稽首謝之法眼益云是相公眼公見鳥於佛頭上放糞乃問鳥還有佛性也無師曰有公曰為甚麼向佛頭上放糞師曰是伊為甚麼不向子頭上放仰山參師問汝是甚處人仰山曰廣南人師曰我聞廣南有鎮海明珠是否仰山曰是師曰此珠如何仰山曰黑月即隱白月即現師曰還將得來也無仰山曰將得來師曰何不呈似老僧仰山叉手近前曰昨到溈山亦被索此珠直得無言可對無理可伸師曰真師子兒善能哮吼蔣山懃云東寺只索一顆仰山傾出一栲栳仰山禮拜了却入客位具威儀再上人事師纔見乃曰已相見了也仰山曰恁麼相見莫不當否師歸方丈閉却門仰山歸舉似溈山溈山曰寂子是甚麼心行仰山曰若不恁麼爭識得他西堂智藏禪師䖍州西堂智藏禪師䖍化廖氏子參禮大寂與百丈海禪師同為入室皆承印記一日大寂遣師詣長安奉書于忠國師國師問曰汝師說甚麼法師從東過西而立國師曰祇這箇更別有師却從西過東邊立國師曰這箇是馬師底仁者作麼生師曰早箇呈似和尚了也尋又送書上徑山語在國一章屬連帥路嗣恭延請大寂居府應期盛化師回郡得大寂付授衲袈裟令學者親近僧問馬祖離四句絕百非請師直指西來意祖曰我今日勞倦不能為汝說得問取智藏昭覺云錯其僧乃來問師師曰汝何不問和尚僧曰和尚令某甲來問上座師曰我今日頭痛不能為汝說得問取海兄去昭覺云錯僧又去問海百丈和尚海曰我到這裏却不會昭覺云錯僧乃舉似馬祖祖曰藏頭白海頭黑昭覺云錯錯溈山云這僧與麼問馬師與麼答離四句絕百非智藏海兄都不知會麼不見道馬駒踏殺天下人五祖演云馬大師無着慙惶處只道得箇藏頭白海頭黑這僧擔一檐懵懂換得一箇不會若也眼似流星多少人失錢遭罪昭覺勤云若是明眼漢一舉便知落處白雲先師道這僧擔一檐懵懂換得箇不安樂馬大師道藏頭白海頭黑白雲拈云風后先生只知其一不知其二只如山僧下五箇錯且道落在什麼處莫將閑學解埋沒祖師心高峯妙云馬師父子一門非特佛口蛇心亦善六韜三略這僧若無諸葛孔明之作管取喪身失命天奇瑞云這僧欲出淤泥不知轉陷淤泥大師就水推船筭來水涸船停藏公雖是明中捨施不如海公暗裏填還看來三箇宗師被箇挑脚漢弄得家返宅亂至今父子不和還有解交者麼良久丟下杖子入寢室徑山信云這僧非惟眼瞎亦復耳聾頌云簷前風過白雲斜幾度笙歌意轉賖犬吠夜深途路客為貪花柳未歸家馬祖一日問師曰子何不看經師曰經豈異邪祖曰然雖如此汝向後為人也須得師曰智藏病思自養敢言為人祖曰子末年必興於世師便禮拜李尚書甞問僧馬大師有甚麼言教僧曰大師或說即心即佛或說非心非佛尚書曰總過這邊尚書却問師馬大師有甚麼言教師呼李翱尚書應諾師曰鼓角動也僧問有問有答賓主歷然無問無答時如何師曰怕爛却那有僧舉問長慶稜長慶云相逢盡道休官去林下何曾見一人雪竇顯云何不與本分草料師住西堂後有一俗士問有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚恁麼道莫錯否師曰汝曾見尊宿來邪曰某甲曾參徑山和尚來師曰徑山向汝作麼生道曰他道一切總無師曰汝有妻否曰有師曰徑山和尚有妻否曰無師曰徑山和尚道無即得俗士禮謝而去章敬懷暉禪師京兆府章敬寺懷暉禪師泉州謝氏子百丈和尚令僧來候師上堂次展坐具禮拜了起來拈師一隻靸鞋以衫袖拂却塵了倒覆向下師曰老僧罪過黃龍心云百丈逞盡神通不消章敬道箇老僧罪過鼓山珪云黃龍孟八郎猶欠一着在只知百丈逞神通殊不知百丈伎倆俱盡只知章敬道箇老僧罪過不知章敬一欵便招會麼蛇吞蝦䗫猶自可更有蜈蚣在後頭有僧來遶師三匝振錫而立師曰是是長慶稜代云和尚佛法身心何在其僧又到南泉亦遶南泉三匝振錫而立南泉曰不是不是此是風力所轉終成敗壞僧曰章敬道是和尚為甚麼道不是南泉曰章敬即是是汝不是長慶稜云和尚是甚麼心行雲居錫云章敬未必道是南泉未必道不是又云這僧當初但持錫出去恰好徑山杲舉麻谷持錫到章敬遶禪牀三匝振錫一下卓然而立云純鋼打就生鐵鑄成章敬云是是妙喜云錦上鋪花三五重麻谷又持錫到南泉遶禪牀三匝振錫一下卓然而立妙喜云已納敗闕了也南泉云不是不是妙喜云柳上更着杻麻谷云章敬道是和尚為甚麼道不是妙喜云愁人莫向愁人說南泉云章敬則是是汝不是此是風力所轉終成敗壞妙喜云試把火照看南泉面皮厚多少復召大眾云雲門恁麼批判且道肯他不肯他楚石琦云麻谷遶牀振錫參禮常儀為什麼章敬道是南泉道不是苦瓠連根苦甜瓜徹蒂甜天奇瑞云大凡行脚須具箇參方正眼免被諸方籠罩蓋因其僧用處不明所以受人處分章敬隨波逐浪南泉截斷眾流若是從容中道泛應曲當如龍得水似虎靠山若是尋香逐氣滯跡迷踪如羊觸籓似猿在檻此僧須乃大用盈懷爭奈諳含來處如今有持錫到山僧處遶牀三匝振錫而立山僧只問他是什麼免得這僧向是非裏走大珠慧海禪師越州大珠慧海禪師建州朱氏子初參馬祖祖問從何處來曰越州大雲寺來祖曰來此擬須何事曰來求佛法祖曰我這裏一物也無求甚麼佛法自家寶藏不顧拋家散走作麼曰阿那箇是慧海寶藏祖曰即今問我者是汝寶藏一切具足更無欠少使用自在何假外求師於言下自識本心不由知覺踊躍禮謝師事六載自撰頓悟入道要門論一卷法姪玄晏竊出江外呈馬祖祖覽訖告眾曰越州有大珠圓明光透自在無遮障處也僧問如何得大涅槃師曰不造生死業曰如何是生死業師曰求大涅槃是生死業捨垢取淨是生死業有得有證是生死業不脫對治門是生死業曰云何即得解脫師曰本自無縛不用求解直用直行是無等等有三藏法師問真如有變易否師曰有變易三藏曰禪師錯也師却問三藏有真如否曰有師曰若無變易決定是凡僧也豈不聞善知識者能回三毒為三聚淨戒回六識為六神通回煩惱作菩提回無明為大智真如若無變易三藏真是自然外道也三藏曰若爾者真如即有變易也師曰若執真如有變易亦是外道源律師問和尚修道還用功否師曰用功曰如何用功師曰饑來喫飯困來即眠曰一切人總如是同師用功否師曰不同曰何故不同師曰他喫飯時不肯喫飯百種須索睡時不肯睡千般計較所以不同也律師杜口泐潭法會禪師洪州泐潭法會禪師問馬祖如何是祖師西來意祖曰低聲近前來向汝道師便近前祖打一摑曰六耳不同謀且去來日來師至來日獨入法堂曰請和尚道祖曰且去待老漢上堂出來問與汝證明師忽有省遂曰謝大眾證明乃繞法堂一匝便去杉山智堅禪師池州杉山智堅禪師初與歸宗南泉行脚時路逢一虎各從虎邊過了南泉問歸宗適來見虎似箇甚麼歸宗曰似箇猫兒歸宗却問師師曰似箇狗子又問南泉南泉曰我見是箇大蟲大溈智云三箇老漢聚頭寐語若要徹一時參取這大蟲始得師喫飯次南泉收生飯乃曰生聻師曰無生南泉曰無生猶是末南泉行數步師召曰長老南泉回頭曰作麼師曰莫道是末普請擇蕨次南泉拈起一莖曰這箇大好供養師曰非但這箇百味珍羞他亦不顧南泉曰雖然如是箇箇須甞過始得翠巖芝云只如杉山與麼道還有免得麼若免得去未具眼在若免不得又違前話泐潭惟建禪師洪州泐潭惟建禪師一日在法堂後坐禪馬祖見乃吹師耳兩吹師起見是祖却復入定祖歸方丈令侍者持一椀茶與師師不顧便自歸堂茗溪道行禪師澧州茗谿道行禪師甞曰吾有大病非世所醫後僧問曹山寂古人云吾有大病非世所醫未審是甚麼病曹山云攢簇不得底病云一切眾生還有此病也無曹山云人人盡有云和尚還有此病也無曹山云正覔起處不得云一切眾生為甚麼不病曹山云一切眾生若病即非眾生云未審諸佛還有此病也無曹山云有云既有為甚麼不病曹山云為伊惺惺石鞏慧藏禪師撫州石鞏慧藏禪師本以弋獵為務惡見沙門因逐鹿從馬祖庵前過祖乃逆之師遂問還見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰汝一箭射幾箇曰一箭射一箇祖曰汝不解射曰和尚解射否祖曰解射曰一箭射幾箇祖曰一箭射一羣曰彼此生命何用射他一羣祖曰汝既知如是何不自射曰若教某甲自射直是無下手處祖曰這漢曠劫無明煩惱今日頓息師擲下弓箭投祖出家雪竇顯云馬師一箭一羣信彩射得有甚用處不如石鞏一箭一箇却是好手雪竇今日効古人之作擬放一箭高聲喝云看箭又云中也清涼欽云且道作麼是一箭射一羣底道理直是三千大千世界生命也不消一箭翠巖芝云馬祖一箭一羣猶未善在山僧一箭射蠢動含靈無不中者雖然如是只道得一半更有一半留與諸上座道一日在廚作務次祖問作甚麼曰牧牛祖曰作麼生牧曰一回入草去驀鼻拽將回祖曰子真牧牛師便休師住後常以弓箭接機載三平章師問西堂汝還解捉得虗空麼西堂曰捉得師曰作麼生捉西堂以手撮虗空師曰汝不解捉西堂却問師兄作麼生捉師把西堂鼻孔拽西堂作忍痛聲曰太煞拽人鼻孔直欲脫去師曰直須恁麼捉虗空始得天奇瑞云當時若解師子返擲慧藏粉骨碎身皆因靠壁倚墻所以遭人毒手可惜盡力提持爭奈罕逢別者今日當陽還有通方者麼只如山僧如此口吧吧地如何劍為不平離寶匣藥因救病出金壺北蘭讓禪師江西北蘭讓禪師湖塘亮長老問承聞師兄畫得先師真暫請瞻禮師以兩手擘胷開示之亮便禮拜師曰莫禮莫禮亮曰師兄錯也某甲不禮師兄師曰汝禮先師真那亮曰因甚麼教莫禮師曰何曾錯南源道明禪師袁州南源道明禪師上堂快馬一鞭快人一言有事何不出頭來無事各自珍重僧問一言作麼生師乃吐舌曰待我有廣長舌相即向汝道洞山參方上法堂師曰已相見了也洞山便下去明日却上問曰昨日已蒙和尚慈悲不知甚麼處是與某甲巳相見處師曰心心無間斷流入於性海洞山曰幾合放過洞山辭師曰多學佛法廣作利益洞山曰多學佛法即不問如何是廣作利益師曰一物莫違中邑洪恩禪師朗州中邑洪恩禪師每見僧來拍口作和和聲仰山謝戒師亦拍口作和和聲仰山從西過東師又拍口作和和聲仰山從東過西師又拍口作和和聲仰山當中而立然後謝戒師曰甚麼處得此三昧仰山曰於曹谿印子上脫來師曰汝道曹谿用此三昧接甚麼人仰山曰接一宿覺仰山曰和尚甚處得此三昧師曰我於馬大師處得此三昧瑯琊覺云愁人莫向愁人說仰山又問如何得見佛性義師曰我與汝說箇譬喻如一室有六內有一獼猴外有獼猴從東邊喚猩猩猩猩即應如是六俱喚俱應仰山禮謝起曰適蒙和尚譬喻無不了知更有一事祇如內獼猴睡著外獼猴欲與相見又且如何師下繩牀執仰山手作舞曰猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭呌云土曠人稀相逢者少雲居錫云中邑當時若不得仰山這一句語何處有中邑也崇壽稠云還有人定得此道理麼若定不得只是箇弄精魂脚手佛性義在甚麼處玄覺遂云若不是仰山爭得見中邑且道甚麼處是仰山得見中邑處泐潭常興禪師洪州泐潭常興禪師南泉至見師面壁乃拊師背師問汝是阿誰曰普願師曰如何曰也尋常師曰汝何多事汾州無業禪師汾州無業禪師商州上洛杜氏子聞馬大師禪門鼎盛特往瞻禮祖覩其狀貌奇偉語音如鐘乃曰巍巍佛堂其中無佛師禮跪而問曰三乘文學粗窮其旨常聞禪門即心是佛實未能了祖曰祇未了底心即是更無別物師曰如何是祖師西來密傳心印祖曰大德正閙在且去別時來師纔出祖召曰大德師回首祖曰是甚麼師便領悟乃禮拜祖曰這鈍漢禮拜作麼雲居錫云甚麼處是汾州正閙師住開元精舍學者致問多答之曰莫妄想唐憲宗屢召師皆辭疾不赴暨穆宗即位齎詔迎請師微笑曰貧道何德累煩世主且請前行吾從別道去矣乃澡身剃髮至中夜告弟子惠愔等曰汝等見聞覺知之性與太虗同壽不生不滅一切境界本自空寂無一法可得迷者不了即為境惑一為境惑流轉不窮汝等當知心性本自有之非因造作猶如金剛不可破壞一切諸法如影如響無有實者經云唯此一事實餘二則非真常了一切空無一物當情是諸佛用心處汝等勤而行之言訖跏趺而逝鵝湖大義禪師信州鵝湖大義禪師衢州須江徐氏子唐憲宗甞詔入內於麟德殿論義帝乃問何者是佛性師對曰不離陛下所問帝默契真宗益加欽重有一僧乞置塔李翱尚書問曰教中不許將屍塔下過又作麼生僧無對僧却問師師曰他得大闡提伊闕自在禪師伊闕伏牛山自在禪師吳興李氏子初依國一禪師受具後參馬祖發明心地祖令送書與忠國師國師曰馬大師以何法示徒曰即心即佛國師曰是甚麼語話良久又問曰此外更有何言教師曰非心非佛或曰不是心不是佛不是物國師曰猶較些子師曰馬大師即恁麼未審和尚此間如何國師曰三點如流水曲似刈禾鎌雪竇顯向猶較些子處便喝又向曲似刈禾鎌處云是恁麼語話也好與一拶見之不取千載難忘溈山云當時但呵呵大笑復問國師此問如何待云三點如流水又呵呵大笑教他國師進且無門退亦無路何故入虎穴撩虎兒須是其人姜山方云大小國師有頭無尾待伊道不是心不是佛不是物亦向道是什麼語話豈不光前絕後師後居伏牛山上堂曰即心即佛是無病求藥句非心非佛是藥病對治句僧問如何是脫灑底句師曰伏牛山下古今傳三角總印禪師潭州三角山總印禪師上堂若論此事眨上眉毛早已蹉過也麻谷便問眨上眉毛即不問如何是此事師曰蹉過也麻谷乃掀倒禪牀師便打長慶稜代云悄然保福展云三角賊過後張弓雪竇顯云兩箇有頭無尾漢眉毛未曾眨上說什麼此事蹉過尋有僧問眉毛為甚不眨上師便打昭覺勤云慣調金鏃久歷沙場一箭落雙鵰人前誇敏手雖然大似把手上高山未免傍觀者哂若據崇寧見處喚作此事早是好肉上剜瘡了也何況更論眨上眉毛早已蹉過麻谷雪竇賊過後張弓則故是更有一箇驀拈拄杖便下座徑山杲云蹉過麻谷也不知魯祖寶雲禪師池州魯祖山寶雲禪師洞山來參禮拜起侍立少頃而出却再入來師曰祇恁麼祇恁麼所以如此洞山曰大有人不肯師曰作麼取汝口辯洞山便禮拜僧問如何是不言言師曰汝口在甚麼處曰無口師曰將甚麼喫飯僧無對洞山价代云他不飢喫什麼飯雪竇顯云好劈脊棒這般漢開口了合不得合口了開不得黃龍新云雪竇只知這僧開口了合不得合口了開不得殊不知魯祖被這擔板漢勘破天童覺云這僧只解握死蛇頭不能捋猛虎鬚當時待他問你口在什麼處便與一喝拂袖便行直饒魯祖全機往往做手脚不及師尋常見僧來便面壁南泉聞曰我尋常向師僧道向佛未出世時會取尚不得一箇半箇他恁麼驢年去報慈遂云為復唱和語不肯語保福展問長慶祇如魯祖節文在甚麼處被南泉恁麼道長慶云退己讓於人萬中無一箇羅山閑云陳老師當時若見背上與五火抄何故為伊解放不解收玄沙備云我當時若見也與五火抄雲居錫云羅山玄沙總恁麼道為復一般別有道理若擇得出許上座佛法有去處徑山杲云魯祖不得南泉幾乎覷破壁笑巖寶云魯祖若非南泉幾成滯貨當時若有箇納僧入來纔見伊恁麼便與掀倒不惟打斷諸老葛藤亦免魔魅人家男女徑山信云魯祖面壁若作佛法商量入地獄如箭射芙蓉太毓禪師常州芙蓉山太毓禪師金陵范氏子因行食到龐居士前居士擬接師乃縮手曰生心受施淨名早訶去此一機居士還甘否居士曰當時善現豈不作家師曰非關他事居士曰食到口邊被他奪却師乃下食居士曰不消一句昭覺勤云善現作家芙蓉奇特盡被龐居士一時領過了也只如居士道不消一句且道是那一句端坐受供養施主常安樂天奇瑞云若有生心受食水外必然有波若不生心受食淨名因甚過二十恒河世界直向香積國中捧來若受彼食波外決定有水且道即今喚什麼作食淡笑云曲不藏直真不掩偽居士又問馬大師著實為人處還分付吾師否師曰某甲尚未見他作麼生知他著實處居士曰祇此見知也無討處師曰居士也不得一向言說居士曰一向言說師又失宗若作兩向三向師還開得口否師曰直是開口不得可謂實也居士撫掌而出蔣山懃云芙蓉何不道分付與我待問如何是着實處便好與一掌待他眼睛定動更與一掌何故且要打斷許多葛藤紫玉道通禪師唐州紫玉山道通禪師盧江何氏子詣建陽謁馬祖祖尋遷龔公山師亦隨之祖將歸寂謂師曰夫玉石潤山秀麗益汝道業遇可居之是秋遊洛回至唐州西紫玉山遂剪茅構舍而居于頔相公問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于公失色師乃指曰這箇便是漂墮羅剎鬼國公又問如何是佛師喚相公公應諾師曰更莫別求藥山儼聞云噫可惜于家漢生埋向紫玉山中公聞乃謁見藥山藥山問云聞相公在紫玉山中大作佛事是否公云不敢乃云承聞有語相救今日特來藥山云有疑但問公云如何是佛藥山召于頔公應諾藥山云是甚麼公於此有省長慶稜共羅山舉次長慶云藥山一等是道甚是奇特雲泥有隔羅山云不得草草當時賴遇是于頔可中草窠裏撥着箇焦尾大蟲何處有藥山也長慶云作麼生羅山云還知于頔是鍛了底金麼大溈智云于頔當時若會見藥山喚云是什麼只向道和尚賺我來拂袖便去不惟作箇慷慨丈夫亦乃不鈍置紫玉天奇瑞云一呼一諾賓主分明因什麼却墮羅剎鬼國皆因逐語隨言拋真棄覺被這黑風扇鼓萬劫漂沉焉得不為客作賤人竪拂子云若向這裏會得頓出無明業海免宿門前草庵五臺隱峰禪師五臺山隱峯禪師邵武軍鄧氏子時稱鄧隱峯幼若不慧父母聽其出家初遊馬祖之門而未能覩奧復來往石頭雖兩番不捷語見馬祖章而後於馬祖言下相契師問石頭如何得合道去石頭曰我亦不合道師曰畢竟如何石頭曰汝被這箇得多少時邪石頭剗草次師在左側叉手而立石頭飛剗子向師前剗一株草師曰和尚祇剗得這箇不剗得那箇石頭提起剗子師接得便作剗草勢石頭曰汝祇剗得那箇不解剗得這箇師無對洞山价云還有堆阜麼師一日推車次馬祖展脚在路上坐師曰請師收足祖曰已展不縮師曰已進不退乃推車碾損祖脚祖歸法堂執斧子曰適來碾損老僧脚底出來師便出於祖前引頸祖乃置斧天奇瑞云師勝資強人間少有切不可流俗見解雖然蓋世禪和能有幾箇作家何故未到盡驚山嶮峻從來方識路高低師到南泉覩眾僧參次南泉指淨瓶曰銅瓶是境瓶中有水不得動著境與老僧將水來師拈起淨瓶向南泉面前瀉南泉便休師後到溈山便入堂於上板頭解放衣鉢溈山聞師叔到先具威儀下堂內相看師見來便作臥勢溈山便歸方丈師乃發去少間溈山問侍者師叔在否曰已去溈山曰去時有甚麼語曰無語溈山曰莫道無語其聲如雷唐元和中荐登五臺路出淮西屬吳元濟阻兵違拒王命官軍與賊軍交鋒未決勝負師曰吾當去解其患乃擲錫空中飛身而過兩軍將士仰觀事符預夢鬪心頓息師既顯神異慮成惑眾遂入五臺於金剛窟前將示滅先問眾曰諸方遷化坐去臥去吾甞見之還有立化也無曰有師曰還有倒立者否曰未甞見有師乃倒立而化亭亭然其衣順體時眾議舁就茶毗屹然不動遠近瞻覩驚歎無已師有妹為尼時亦在彼乃拊而咄曰老兄疇昔不循法律死更熒惑於人於是以手推之僨然而踣西園曇藏禪師南嶽西園蘭若曇藏禪師受心印於大寂後謁石頭瑩然明徹出住西園禪侶日盛一日自燒浴次僧問何不使沙彌師撫掌三下僧舉似曹山寂曹山云一等是拍手撫掌就中西園奇恠俱胝一指頭禪葢為承當處不諦當僧却問曹山西園撫掌豈不是奴兒婢子邊事曹山云是云向上更有事也無曹山云有云如何是向上事曹山叱云這奴兒婢子楊岐甄叔禪師袁州楊岐山甄叔禪師禪月問如何是祖師西來意師呈起數珠禪月罔措師曰會麼曰不會師曰某甲參見石頭來曰見石頭得何意旨師指庭前鹿曰會麼曰不會師曰渠儂得自由馬頭神藏禪師磁州馬頭峯神藏禪師上堂知而無知不是無知而說無知便下座南泉願云恁麼依師道始道得一半黃檗運云不是南泉駁他要圓前話華林善覺禪師潭州華林善覺禪師常持錫杖夜出林麓間七步一振錫一稱觀音名號夾山問遠聞和尚念觀音是否師曰然夾山曰騎却頭時如何師曰出頭即從汝騎不出頭騎甚麼夾山無對僧參方展坐具師曰緩緩曰和尚見甚麼師曰可惜許磕破鐘樓其僧從此悟入觀察使裴休訪之問曰還有侍者否師曰有一兩箇祇是不可見客裴公曰在甚麼處師乃喚大空小空時二虎自庵後而出裴公覩之驚悸師語二虎曰有客且去二虎哮吼而去裴公問曰師作何行業感得如斯師乃良久曰會麼曰不會師曰山僧常念觀音水塘和尚汀州水塘和尚問歸宗甚麼人歸宗曰陳州人師曰年多少歸宗曰二十二師曰闍黎未生時老僧去來歸宗曰和尚幾時生師竪起拂子歸宗曰這箇豈有生邪師曰會得即無生曰未會在師無語烏臼和尚烏臼和尚玄紹二上座參師乃問二禪客發足甚麼處玄曰江西師便打玄曰久知和尚有此機要師曰汝既不會後面箇師僧祇對看紹擬近前師便打曰信知同坑無異土參堂去雪竇顯云宗師眼目須至漝麼如金翅擘海直取龍吞有般漢眼目未辨東西拄杖不知顛倒只管說照用同時人境俱奪溈山云烏臼大似巨靈逞擘太華之威蒼龍展奪驪珠之勢直得乾坤失色乃拈拄杖云諸人還識烏臼麼若也識去橫按鏌鎁寰中獨據若也未識棒頭有眼明如日卓拄杖下座白雲端云眾中商量道拄杖在烏臼手裏以強陵弱有什麼難苦哉作這般見解水亦難消所以道醍醐上味為世所珍遇斯等人翻成毒藥要識烏臼麼橫按鏌鎁全正令太平寰宇斬癡頑昭覺勤云雪竇明辨古今分別邪正若不知有爭恁麼道雖然如是只見烏臼放行處未明烏臼把住處要知烏臼把住處麼直得釋迦彌勒猶為走使不敢正眼覷着若使據令而行盡大地人並須喫棒古寺和尚古寺和尚丹霞來參經宿明旦粥熟行者祇盛一鉢與師又盛一椀自喫殊不顧丹霞丹霞亦自盛粥喫侍者曰五更侵早起更有夜行人丹霞問師何不教訓行者得恁麼無禮師曰淨地上不要點污人家男女丹霞曰幾不問過這老漢石臼和尚石臼和尚初參馬祖祖問甚麼處來師曰烏臼來祖曰烏臼近日有何言句師曰幾人於此茫然祖曰茫然且置悄然一句作麼生師乃近前三步祖曰我有七棒寄打烏臼你還甘否師曰和尚先喫某甲後甘昭覺勤云草窠裏撥出一箇半箇有什麼共語處雖然如是猶放過一着在本谿和尚本谿和尚因龐居士問丹霞打侍者意在何所師曰大老翁見人長短在居士曰為我與師同參方敢借問師曰若恁麼從頭舉來共你商量居士曰大老翁不可共你說人是非師曰念翁年老居士曰罪過罪過石林和尚石林和尚見龐居士來乃竪起拂子曰不落丹霞機試道一句子居士奪却拂子却自竪起拳師曰正是丹霞機居士曰與我不落看師曰丹霞患瘂龐公患聾居士曰恰是師無語居士曰向道偶爾又一日問居士某甲有箇借問居士莫惜言語居士曰便請舉來師曰元來惜言語居士曰這箇問訊不覺落他便宜師乃掩耳居士曰作家作家西山亮座主亮座主蜀人也頗講經論因參馬祖祖問見說座主大講得經論是否師曰不敢祖曰將甚麼講師曰將心講祖曰心如工伎兒意如和伎者爭解講得師抗聲曰心既講不得虗空莫講得麼祖曰却是虗空講得師不肯便出將下堦祖召曰座主師回首祖曰是甚麼師豁然大悟便禮拜祖曰這鈍根阿師禮拜作麼師曰某甲所講經論將謂無人及得今日被大師一問平生功業一時氷釋禮謝而退乃隱于洪州西山更無消息法眼益云看他古人恁麼慈悲教人如今作麼生會莫聚頭向這裏妄想齊峯和尚齊峯和尚龐居士來師曰俗人頻頻入僧院討箇甚麼居士回顧兩邊曰誰恁麼道師乃咄之居士曰在這裏師曰莫是當陽道麼居士曰背後底聻師回首曰看看居士曰草賊大敗居士却問此去峯頂有幾里師曰甚麼處去來居士曰可謂峻硬不得問著師曰是多少居士曰一二三師曰四五六居士曰何不道七師曰纔道七便有八居士曰得也得也師曰一任添取居士曰不得堂堂道師曰還我恁麼時龐老主人公來居士曰少神作麼師曰好箇問訊問不著人居士曰將為將為天童華云發大機顯大用且非電光石火疾㷔過風要須平地上嶮崖孤峻處平坦看他二老深入虎穴透徹淵源至於結角羅紋游刃磅礴得大自在因甚華頂峯未曾到只如齊峯云還我恁麼時龐老主人公來居士云少神作麼歸宗向這裏擬着箇眼也要諸人瞥地良久云竹影掃堦塵不動月穿波底水無痕大陽和尚大陽和尚因伊禪師相見乃問伊禪近日有一般知識向目前指教人了取目前事作這箇為人還會文彩未兆時也無曰擬向這裏致一問不知可否師曰答汝已了莫道可否曰還識得目前也未師曰若是目前作麼生識曰要且遭人檢點師曰誰曰某甲師便喝伊禪退步而立師曰汝祇解瞻前不解顧後曰雪上更加霜師曰彼此無便宜百靈和尚百靈和尚一日與龐居士路次相逢問曰南嶽得力句還曾舉向人也無居士曰曾舉來師曰舉向甚麼人居士以手自指曰龐公師曰直是妙德空生也讚歎不及居士却問阿師得力句是誰得知師戴笠子便行居士曰善為道路師更不回首徑山杲云這箇話端若不是龐公幾乎錯舉似人雖然如是百靈輸他龐老一着何故當時若不得箇破笠頭遮却髑髏有甚面目見他龐公楚石琦云百靈戴笠便去得力句分明舉似來因甚麼妙喜老人道百靈有甚面目見他龐公也是扶強不扶弱有人與妙喜作主要問作麼生是得力句速道速道擬議不來劈脊便棒天奇瑞云作者相見終不在言句上作活計須不在言句上也要八海通流問處乘風答處自在孰不讚嘆為什麼末後反追不吐一言鳥飛高漢濶魚躍淯潭深金牛和尚鎮州金牛和尚每自做飯供養眾僧至齋時舁飯桶到堂前作舞呵呵大笑曰菩薩子喫飯來長慶稜云大似因齋慶讚大光誨因僧問云長慶道因齋慶讚意旨如何大光乃作舞僧禮拜大光云見甚道理便禮拜僧却作舞大光云這野狐精東禪齊云古人自出手作飯舞了喚人來喫意作麼生還會麼秖如長慶與大光是明古人意別為他分析今問上座每日持鉢掌盂時迎來送去時為當與古人一般別有道理若道別且作麼生得別來若一般恰到他舞又被喚作野狐精有會處麼若未會行脚眼在甚麼處雪竇顯云雖然如是金牛不是好心頌云前箭猶輕後箭深誰云黃葉是黃金曹溪波浪如相似無限平人被陸沉昭覺勤云且道大光云這野狐精與藏頭白海頭黑是同是別這漆桶又道好師僧且道是同是別師因臨濟來乃橫按拄杖方丈前坐臨濟遂拊掌三下歸堂去師却下去人事了便問賓主相見各有軌儀上座何得無禮臨濟曰道甚麼師擬開口臨濟便打一坐具師作倒勢臨濟又打一坐具師曰今日不著便遂歸方丈溈山問仰山此二尊宿還有勝負否仰山云勝即總勝負即總負溈山果云一人焦磚打着連底凍一人得便宜是落便宜具眼者辨取乳源和尚韶州乳源和尚上堂西來的的意不妨難道眾中莫有道得者出來試道看時有僧出禮拜師便打曰是甚麼時節出頭來便歸方丈僧舉似長慶稜長慶云不妨不妨保福展代云為和尚不惜身命承天宗云宗乘也不易扶竪這兩箇老漢扶不起我道這僧若不出頭棒即是乳源自喫仰山作沙彌時念經聲高師咄曰這沙彌念經恰似哭曰慧寂祇恁麼未審和尚如何師乃顧視仰山曰若恁麼與哭何異師便休松山和尚松山和尚同龐居士喫茶居士舉橐子曰人人盡有分為甚麼道不得師曰祇為人人盡有所以道不得居士曰阿兄為甚麼却道得師曰不可無言也居士曰灼然灼然師便喫茶居士曰阿兄喫茶為甚麼不揖客師曰誰居士曰龐公師曰何須更揖後丹霞聞乃曰若不是松山幾被箇老翁惑亂一上居士聞之乃令人傳語丹霞曰何不會取未舉橐子時則川和尚則川和尚蜀人也龐居士相看次師曰還記得見石頭時道理否居士曰猶得阿師重舉在師曰情知久參事慢居士曰阿師老耄不啻龐公師曰二彼同時又爭幾許居士曰龐公鮮徤且勝阿師師曰不是勝我祇欠汝箇幞頭居士拈下幞頭曰恰與師相似師大笑而已師摘茶次居士曰法界不容身師還見我否師曰不是老師洎答公話居士曰有問有答葢是尋常師乃摘茶不聽居士曰莫怪適來容易借問師亦不顧居士喝曰這無禮儀老漢待我一一舉向明眼人師乃拋却茶籃便歸方丈雪竇顯云則川只解把定封疆不能同生同死當時與捋下幞頭誰敢喚作龐居士蔣山懃云兩回不顧拋籃便歸且道旨歸何處還會麼苦瓠連根苦甜瓜徹蒂甜則川老漢經事多矣打地和尚忻州打地和尚自江西領旨常晦其名凡學者致問唯以棒打地示之時謂之打地和尚一日被僧藏却棒然後致問師但張其口僧問門人曰祇如和尚每日有人問便打地意旨如何門人即於竈內取柴一片擲在釜中徑山杲云養子不及父家門一世衰秀溪和尚潭州秀溪和尚谷山問聲色純真如何是道師曰亂道作麼谷山却從東過西立師曰若不恁麼即禍事也谷山又從西過東立師乃下禪牀方行兩步被谷山捉住曰聲色純真事作麼生師便打一掌谷山曰三十年後要箇人下茶也無在師曰要谷山這漢作甚麼谷山呵呵大笑樹和尚江西樹和尚臥次道吾近前牽被覆之師曰作麼道吾曰葢覆師曰臥底是坐底是道吾曰不在這兩處師曰爭奈葢覆何道吾曰莫亂道師向火次道吾問作麼師曰和合道吾曰恁麼即當頭脫去也師曰隔濶來多少時邪道吾便拂袖而去道吾一日從外歸師問甚麼處去來道吾曰親近來師曰用簸這兩片皮作麼道吾曰借師曰他有從汝借無作麼生道吾曰祇為有所以借草堂和尚京兆草堂和尚自罷參大寂至海昌和尚處海昌問甚麼處來師曰道場來海昌曰這裏是甚麼處師曰賊不打貧人家興平和尚京兆興平和尚洞山來禮拜師曰莫禮老朽洞山曰禮非老朽師曰非老朽者不受禮洞山曰他亦不止洞山却問如何是古佛心師曰即汝心是洞山曰雖然如此猶是某甲疑處師曰若恁麼即問取木人去洞山曰某甲有一句子不借諸聖口師曰汝試道看洞山曰不是某甲洞山辭師曰甚麼處去洞山曰㳂流無定止師曰法身㳂流報身㳂流洞山曰總不作此解師乃拊掌保福展云洞山自是一家乃別云覔得幾人逍遙和尚逍遙和尚鹿西和尚問念念攀緣心心永寂師曰昨晚也有人恁麼道鹿西曰道箇甚麼師曰不知鹿西曰請和尚說師以拂子驀口打鹿西拂袖便出師召眾曰頂門上著眼蔣山懃云老僧雖頂門無眼也驗得你骨出何也古墓毒蛇頭戴角南山猛虎尾吒水潦和尚洪州水潦和尚初參馬祖問曰如何是西來的的意祖曰禮拜著師纔禮拜祖乃當胷蹋倒師大悟起來拊掌呵呵大笑曰也大奇也大奇百千三昧無量妙義祇向一毫頭上識得根源去禮謝而退瑯琊覺云大眾你道水潦還曾悟也未天童覺云馬大師不合放過待伊起來恁麼道但問只這一毫頭從甚處得來待伊擬議更與一踏師住後每告眾曰自從一喫馬祖蹋直至如今笑不休浮盃和尚浮盃和尚凌行婆來禮拜師與坐喫茶婆乃問盡力道不得底句分付阿誰師曰浮盃無剩語婆曰未到浮盃不妨疑著師曰別有長處不妨拈出婆斂手哭曰蒼天中更添冤苦師無語婆曰語不知偏正理不識倒邪為人即禍生後有僧舉似南泉南泉曰苦哉浮盃被這老婆摧折一上婆後聞笑曰王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關在婆乃哭曰可悲可痛澄一罔措婆曰會麼澄一合掌而立婆曰伎死禪和如麻似粟澄一舉似趙州趙州曰我若見這臭老婆問教口瘂澄一曰未審和尚怎生問他趙州便打澄一曰為甚麼却打某甲趙州曰似這伎死漢不打更待幾時連打數棒婆聞却曰趙州合喫婆手裏棒後僧舉似趙州趙州哭曰可悲可痛婆聞此語合掌歎曰趙州眼光爍破四天下趙州令僧問如何是趙州眼婆乃竪起拳頭僧回舉似趙州趙州作偈曰當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答曰哭聲師已曉已曉復誰知當時摩竭國幾喪目前機龍山和尚潭州龍山和尚亦云隱山洞山與密師伯經由見溪流菜葉洞山曰深山無人因何有菜隨流莫有道人居否乃共議撥草溪行五七里間忽見師羸形異貌放下行李問訊師曰此山無路闍黎從何處來洞山曰無路且置和尚從何而入師曰我不從雲水來洞山曰和尚住此山多少時邪師曰春秋不涉洞山曰和尚先住此山先住師曰不知洞山曰為甚麼不知師曰我不從人天來洞山曰和尚得何道理便住此山師曰我見兩箇泥牛闘入海直至于今絕消息洞山始具威儀禮拜便問如何是主中賓師曰青山覆白雲曰如何是賓中主師曰長年不出戶曰賓主相去幾何師曰長江水上波曰賓主相見有何言說師曰清風拂白月洞山辭退師乃述偈曰三間茅屋從來住一道神光萬境閑莫把是非來辨我浮生穿鑿不相關因茲燒庵入深山不見後人號為隱山和尚龐蘊居士襄州居士龐蘊初謁石頭乃問不與萬法為侶者是甚麼人石頭以手掩其口豁然有省後與丹霞為友一日石頭問曰子見老僧以來日用事作麼生居士曰若問日用事即無開口處乃呈偈曰日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絕點埃神通并妙用運水及搬柴石頭然之後參馬祖問曰不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道居士於言下頓領玄旨乃留駐參承二載自爾機辯迅捷諸方嚮之因辭藥山藥山命十禪客相送至門首居士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處居士遂與一掌全曰也不得草草居士曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生居士又掌曰眼見如盲口說如瘂雪竇顯別初問云但握雪團便打有女名靈照常鬻竹漉籬以供朝夕居士有偈曰心如境亦如無實亦無虗有亦不管無亦不拘不是賢聖了事凡夫易復易即此五蘊有真智十方世界一乘同無相法身豈有二若捨煩惱入菩提不知何方有佛地又偈曰護生須是殺殺盡始安居會得箇中意鐵船水上浮昭覺勤云且道殺箇什麼殺眾生物命凡夫見解殺六賊煩惱座主見解殺佛殺祖大闡提人見解衲僧分上畢竟殺箇什麼試定當看中峯本云莫是殺生與護生一念平等麼恁麼商量瞎人眼目居士坐次問靈照曰古人道明明百草頭明明祖師意如何會靈照曰老老大大作這箇語話居士曰你作麼生靈照曰明明百草頭明明祖師意居士乃笑居士將入滅謂靈照曰視日早晚及午以報靈照遽報日已中矣而有蝕也居士出戶觀次靈照即登父座合掌坐亡居士笑曰我女鋒捷矣於是更延七日州牧于公頔問疾次居士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕于公膝而化
