body:
  text: 南嶽下四世臨濟義玄禪師黃檗運法嗣鎮州臨濟義玄禪師曹州南華邢氏子幼負出塵之志及落髮進具便慕禪宗初在黃檗會中行業純一時睦州為第一座乃問上座在此多少時師曰三年睦州曰曾參問否師曰不曾參問不知問箇甚麼睦州曰何不問堂頭和尚如何是佛法的的大意師便去問聲未絕黃檗便打師下來睦州曰問話作麼生師曰某甲問聲未絕和尚便打某甲不會睦州曰但更去問師又問黃檗又打如是三度問三度被打師白睦州曰早承激勸問法累蒙和尚賜棒自恨障緣不領深旨今且辭去睦州曰汝若去須辭和尚了去師禮拜退睦州先到黃檗處曰問話上座雖是後生却甚奇特若來辭方便接伊已後為一株大樹覆蔭天下人去在師來日辭黃檗黃檗曰不須他去祇往高安灘頭參大愚必為汝說師到大愚大愚曰甚處來師曰黃檗來大愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過大愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師於言下大悟乃曰元來黃檗佛法無多子大愚搊住曰這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見箇甚麼道理速道速道師於大愚肋下築三拳大愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗黃檗見便問這漢來來去去有甚了期師曰祇為老婆心切便人事了侍立黃檗問甚處去來師曰昨蒙和尚慈旨令參大愚去來黃檗曰大愚有何言句師舉前話黃檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌黃檗曰這風顛漢來這裏捋虎鬚師便喝黃檗喚侍者曰引這風顛漢參堂去溈山祐舉問仰山臨濟當時得大愚力得黃檗力仰山云非但騎虎頭亦解把虎尾白雲端頌云一拳拳倒黃鶴樓一趯趯翻鸚鵡洲有意氣時添意氣不風流處也風流保寧勇頌云雷電喧轟海岳昏一家愁閉雨中門狂風忽起烏雲散白日滿天星斗分黃檗一日普請次師隨後行黃檗回頭見師空手乃問钁在何處師曰有一人將去了也黃檗曰近前來共汝商量箇事師便近前黃檗竪起钁曰祇這箇天下人拈掇不起師就手掣得竪起曰為甚麼却在某甲手裏黃檗曰今日自有人普請便回寺仰山侍溈山次溈山舉此話未了仰山便問钁在黃檗手裏為甚麼却被臨濟奪却溈山云賊是小人智過君子師普請鉏地次見黃檗來拄钁而立黃檗曰這漢困那師曰钁也未舉困箇甚麼黃檗便打師接住棒一送送倒黃檗呼維那扶起我來維那扶起曰和尚爭容得這風顛漢無禮黃檗纔起便打維那師钁地曰諸方火塟我這裏活埋溈山問仰山黃檗打維那意作麼生仰山云正賊走却邏贓人喫棒真淨文頌云奪旗掣鼓着精神父子雖親法不親為報四方禪客道等聞莫作守株人月堂昌頌云黃檗活作死醫臨濟死作活用維那聽事不真未免喚鐘作甕師一日在僧堂裏睡黃檗入堂見以拄杖打板頭一下師舉首見是黃檗却又睡黃檗又打板頭一下却往上間見首座坐禪乃曰下間後生却坐禪汝在這裏妄想作麼首座曰這老漢作甚麼黃檗又打板頭一下便出去溈山舉問仰山祇如黃檗意作麼生仰山云兩彩一賽師栽松次黃檗曰深山裏栽許多松作甚麼師曰一與山門作境致二與後人作標牓道了將钁頭𡎺地三下黃檗曰雖然如是子已喫吾三十棒了也師又𡎺地三下噓一噓黃檗曰吾宗到汝大興於世溈山舉問仰山黃檗當時祇囑臨濟一人更有人在仰山云有祇是年代深遠不欲舉似和尚溈山云雖然如是吾亦要知汝但舉看仰山云一人指南吳越令行遇大風即止溈山云臨濟與麼大似平地喫交雖然如是臨危不變方稱丈夫黃檗云吾宗到汝大興於世也是憐兒不覺醜天童華云黃檗道雖然如是子已喫吾三十棒了也養子之緣故當如是臨濟正令雖行可惜甘自向钁頭邊活埋仰山見解未出常流豈止遇大風則止當時何不道直待虛空界盡此話方始大行豈不頭正尾正應庵今日捋下面皮要與諸人相見去也驀拈拄杖卓一下云驚羣須是英靈漢敵勝還他師子兒黃檗因入厨下問飯頭作甚麼飯頭曰揀眾僧飯米黃檗曰一頓喫多少飯頭曰二石五黃檗曰莫大多麼飯頭曰猶恐少在黃檗便打飯頭舉似師師曰我與汝勘這老漢纔到侍立黃檗舉前話師曰飯頭不會請和尚代一轉語黃檗曰汝但舉師曰莫太多麼黃檗曰來日更喫一頓師曰說甚麼來日即今便喫隨後打一掌黃檗曰這風顛漢又來這裏捋虎鬚師喝一喝便出去溈山舉問仰山此二尊宿意作麼生仰山云和尚作麼生溈山云養子方知父慈仰山云不然溈山云子又作麼生仰山云大似勾賊破家師半夏上黃檗山見黃檗看經師曰我將謂是箇人元來是唵黑豆老和尚住數日乃辭黃檗曰汝破夏來何不終夏去師曰某甲暫來禮拜和尚黃檗便打趂令去師行數里疑此事却回終夏後又辭黃檗黃檗曰甚處去師曰不是河南便歸河北黃檗便打師約住與一掌黃檗大笑乃喚侍者將百丈先師禪板几案來師曰侍者將火來黃檗曰不然子但將去已後坐斷天下人舌頭去在溈山舉問仰山臨濟莫孤負他黃檗也無仰山云不然溈山云子作麼生仰山云知恩方解報恩溈山云從上莫有報恩事不仰山云有只是年代深遠不欲舉似溈山云吾且不知子但舉看仰山云如楞嚴會上阿難讚佛云將此深心奉塵剎是則名為報佛恩豈不是報恩之事溈山云如是如是見與師齊減師半德見過於師方堪傳受到達磨塔頭塔主問先禮佛先禮祖師曰祖佛俱不禮塔主曰祖佛與長老有甚冤家師拂袖便出師為黃檗馳書至溈山與仰山語次仰山曰汝向後北去有箇住處師曰豈有與麼事仰山曰但去已後有一人佐輔汝此人祇是有頭無尾有始無終懸記普化師後住鎮州臨濟學侶雲集一日謂普化克符二上座曰我欲於此建立黃檗宗旨汝且成禠我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚前日打普化作甚麼師亦打長蘆仁云普化克符不可放過臨濟老人放過不可若是且庵一生擔板無人成禠然雖恁麼須知遠烟浪別有好商量至晚小參曰有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪問答語具克符章中峯本云有時奪人錯有時奪境錯有時人境兩俱奪錯有時人境俱不奪錯臨濟大師到這裏鎻却咽喉了也莫有為伊出氣者麼切忌將錯就錯同普化赴施主齋次師問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然普化趯倒飯牀師曰太麤生曰這裏是甚麼所在說麤說細次日又同赴齋師復問今日供養何似昨日普化又趯倒飯牀師曰得即得太麤生普化喝曰瞎漢佛法說甚麼麤細師乃吐舌雪竇顯云兩箇老賊喫飯也不了好與三十棒棒雖行且那箇是正賊昭覺勤云精金不百煉爭見光輝至寶不酬價爭辨真假不是臨濟不能騐他普化不是普化不能抗他臨濟所謂如水入水如金博金雖然如是放過則彼此作家點檢則二俱失利具擇法眼者試請辨看南堂靜云二尊宿如二龍爭珠拏雲攫霧不動波瀾如二虎爭餐活捉生擒不傷物命或有人問毛吞巨海芥納須彌為復神通妙用為復法爾如然只向道不見先師翁云一拳拳倒黃鶴樓一踢踢飜鸚鵡洲有意氣時添意氣不風流處也風流南華昺云臨濟覿面提撕普化全機酬酢直得南山鼈鼻吞却東海鯉魚陝府鐵牛觸倒嘉州大像為甚如此相逢不下馬各自奔前程天童華云一出一沒一往一來猛虎口裏奪餐毒蛇頭上揩痒要且未稱大丈夫事二老名喧宇宙價重當時山僧豈可謹密三寸二俱放過為他弄假像真二俱不放過為他搕𢶍太甚是汝諸人若作佛法商量達磨一宗掃土而盡僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正作道人念念心不間斷自達磨大師從西土來祇是覓箇不受人惑底人後遇二祖一言便了始知從前虗用工夫山僧今日見處與祖佛不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無著問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人乃曰大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝等諸人作麼生會師謂僧曰有時一喝如金剛王寶劒有時一喝如踞地師子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝示眾參學之人大須子細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物祇隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎻出善知識前知識更與安一重枷鎻學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正師問洛浦從上來一人行棒一人行喝阿那箇親曰總不親師曰親處作麼生洛浦便喝師乃打上堂有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養徑山杲云賊身已露雲巖游云識取鈎頭意莫認定盤星楚石琦云天共白雲曉水和明月流師問院主甚處去來曰州中糶黃米來師曰糶得盡麼院主曰糶得盡師以拄杖畫一畫曰還糶得這箇麼院主便喝師便打典座至師舉前話典座曰院主不會和尚意師曰你又作麼生典座禮拜師亦打黃龍南云寺主下喝不可放過典座禮拜放過不可臨濟令行歸宗放過三十年後有人說破黃龍新云典座禮拜有過無功寺主一喝有功無過既是有功為甚麼却被打棒頭有眼明如日要識真金火裏看徑山杲頌云一堆紅燄亘晴空不問金銀銕錫同入裏盡教成水去那容蚊蚋泊其中天童華云二尊宿雖則力提綱要檢點將來未免依草附木殊不知大小臨濟被這兩箇漢破家散宅還會麼殺人刀活人劍上堂一人在孤峰頂上無出身路一人在十字街頭亦無向背且道那箇在前那箇在後不作維摩詰不作傅大士珍重有一老宿參便問禮拜即是不禮拜即是師便喝老宿便拜師曰好箇草賊老宿曰賊賊便出去師曰莫道無事好時首座侍立師曰還有過也無首座曰有師曰賓家有過主家有過曰二俱有過師曰過在甚麼處首座便出去師曰莫道無事好南泉願聞云官馬相踏保寧勇云這一羣賊其中有正賊有草賊那箇是正賊那箇是草賊還辨得麼口欵易招贓物難認護國元云這僧身挨白刃臨濟劍不虗施首座不善傍觀惹得一身泥水雖然如是且道前頭無事與後頭無事相較幾何於此緇素分明不但穿却臨濟鼻孔亦許你眼光爍破四天下其或未然莫道無好事師到京行化至一家門首曰家常添鉢有婆曰太無厭生師曰飯也未曾得何言太無厭生婆便閉却門師陞堂有僧出師便喝僧亦喝便禮拜師便打翠巖芝云臨濟也心麤好彩賴是這僧若是今時衲僧且作麼生出得東禪觀云臨濟除是不作作則萬竅怒號這僧搏扶搖而上九萬里趙州游方到院在後架洗脚次師便問如何是祖師西來意趙州曰恰遇山僧洗脚師近前作聽勢趙州曰會即便會啗作什麼師便歸方丈趙州曰三十年行脚今日錯為人下註脚一作趙州行脚時參師遇師洗脚次趙州便問如何是祖師西來意師云恰值老僧洗脚趙州近前作聽勢師云更要第二杓惡水潑在趙州便下去法雲秀云眾中商量道趙州不識臨濟作賊却為他下箇註脚臨濟當時作聽勢何不劈耳便掌若恁麼商量何曾夢見趙州識得臨濟殊不知兩箇盡是老賊須知一箇好手敢問諸人那箇是好手具眼者辨取教忠光云臨濟有驗人眼趙州又飽叢林等閑略露風規自然頭正尾正還會麼若不得流水還應過別山問僧甚處來曰定州來師拈棒僧擬議師便打僧不肯師曰已後遇明眼人去在僧後參三聖纔舉前話三聖便打僧擬議三聖又打天童華云臨濟三聖當時若有轉身句後代兒孫未至掃土驀拈拄杖更有一箇甚處去卓拄杖一下師應機多用喝會下參徒亦學師喝師曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲這裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝示眾我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時駈耕夫之牛奪饑人之食敲骨取髓痛下針錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子汾陽昭云先照後用且共汝商量先用後照汝也是箇人始得照用同時汝作麼生當抵照用不同時汝作麼生湊泊瑯琊覺云先照後用露師子之爪牙先用後照縱象王之威猛照用同時如龍得水致雨騰雲照用不同時提獎嬰兒俯憐赤子此是古人建立法門為合如是不合如是若合如是紀信乘九龍之輦不合如是項羽失千里之騅還有為瑯琊出氣底麼如無山僧自道去也卓拄杖下座慈明圓云有時先照後用有時先用後照有時照用同時有時照用不同時所以道有明有暗有起有倒乃喝一喝云且道是照是用還有緇素得出底麼若有試出來呈醜拙看若無山僧今日失利徑山杲云若也先照後用則瞎一切人眼若也先用後照則開一切人眼若也照用同時則半瞎半開若也照用不同時則全開全瞎此四則語有一則有賓無主有一則有主無賓有一則賓主俱無有一則全具賓主即今眾中或有箇不受人瞞底漢來道這裏是甚麼所在說有說無說虗說實說照說用說主說賓攔胷搊住拽下禪牀痛椎一頓也恠伊不得師行脚時到龍光值上堂師出問不展鋒鋩如何得勝龍光據坐師曰大善知識豈無方便龍光瞪目曰嗄師以手指曰這老漢今日敗缺也徑山杲云可惜龍光放過這漢雖然如是也須救取臨濟老漢始得次到三峰平和尚處平問甚處來師曰黃檗來平曰黃檗有何言句師曰金牛昨夜遭塗炭直至如今不見蹤平曰金風吹玉管那箇是知音師曰直透萬重關不住青霄內平曰子這一問太高生師曰龍生金鳳子衝破碧琉璃平曰且坐喫茶又問近離甚處師曰龍光平曰龍光近日如何師便出去又往鳳林路逢一婆子婆問甚處去師曰鳳林去婆曰恰值鳳林不在師曰甚處去婆便行師召婆婆回首師便行一作師曰誰道不在到鳳林鳳林曰有事相借問得麼師曰何得剜肉作瘡鳳林曰海月澄無影游魚獨自迷師曰海月既無影游魚何得迷鳳林曰觀風知浪起翫水野帆飄師曰孤蟾獨耀江山靜長嘯一聲天地秋鳳林曰任張三寸揮天地一句臨機試道看師曰路逢劒客須呈劒不是詩人不獻詩鳳林便休師乃有頌曰大道絕同任向西東石火莫及電光罔通溈山祐問仰山石火莫及電光罔通從上諸聖以何為人仰山云和尚意作麼生溈山云但有言說都無實義仰山云不然溈山云子又作麼生仰山云官不容針私通車馬師侍德山次德山曰今日困師曰這老漢寐語作麼德山便打師掀倒禪牀雪竇顯云二員作者具啐啄同時眼有啐啄同時用雪竇擬向飢鷹爪下奪肉餓虎口裏爭餐敢謂德山臨濟俱是瞎漢有人辯得天下橫行雲峯悅云奇恠諸德看此二員作家一拶一捺略露風規大似把手上高山雖然如是未免傍觀者哂且道誰是傍觀者喝一喝下座徑山杲云雲峯與麼批判大似普州人徑山若見縛作一束送在河裏不見道蚌鷸相持俱落漁人之手西堂顯云然則德山門下草偃風行爭奈臨濟當機不讓雖然如是未出葛藤窠裏護國元云奇恠諸禪德二老漢忒煞傍若無人當時真如若見每人與二十棒且道利害在什麼處有人明得許汝親見臨濟德山要見真如亦未可何故鶴有九臯難翥翼馬無千里謾追風楚石琦云眾中道德山臨濟好手手中呈好手紅心心裡中紅心殊不知用盡自己心笑破他人口麻谷問十二面觀音那箇是正面師下禪牀擒住曰十二面觀音甚處去也速道速道麻谷轉身擬坐師便打麻谷接住棒相捉歸方丈師問一尼善來惡來尼便喝師拈棒曰更道更道尼又喝師便打師一日拈餬餅示洛浦曰萬種千般不離這箇其理不二洛浦曰如何是不二之理師再拈起餅示之洛浦曰與麼則萬種千般也師曰屙屎見解洛浦曰羅公照鏡溈山云臨濟便風帆掛洛浦鼓棹揚波然雖如是臨濟門下則得溈山門下不得師見僧來舉起拂子僧禮拜師便打又有僧來師亦舉拂子僧不顧師亦打又有僧來參師舉拂子僧曰謝和尚指示師亦打雲門偃代云祇宜老漢大覺云得即得猶未見臨濟機在徑山杲頌云五月五日午時書赤口毒舌盡消除更饒急急如律令不須門上畵蜘蛛麻谷問大悲千手眼那箇是正眼師搊住曰大悲千手眼作麼生是正眼速道速道麻谷拽師下禪牀却坐師問訊曰不審麻谷擬議師便喝拽麻谷下禪牀却坐麻谷便出因聖頴云諸德此二尊宿如此且道怎生今時人總道照用照什麼椀一切人只解自騎馬去捉賊自持刀去殺賊此二人便能奪賊馬捉賊奪賊刀殺賊雖然如是臨濟雖是得便宜却是失便宜上堂僧問如何是佛法大意師竪起拂子僧便喝師便打又僧問如何是佛法大意師亦竪拂子僧便喝師亦喝僧擬議師便打乃曰大眾夫為法者不避喪身失命我於黃檗先師處三度問佛法的的大意三度被打如蒿枝拂相似如今更思一頓誰為下手時有僧出曰某甲下手師度與拄杖僧擬接師便打雪竇顯云臨濟放去較危收來太速五祖戒云臨濟大似貧兒思舊債雪竇宗云且道臨濟今日用底棒與當時喫底棒是同是別若道同孤負他黃檗若道別屈他臨濟若也盡其機來且道在阿誰分上乃拈拄杖云退後退後天童華云臨濟在黃檗處三度喫棒底意旨諸人還覷得透也未直饒一咬便斷也未是大丈夫漢三世諸佛口挂壁上天下老和尚將什麼喫飯靈隱嶽舉雪竇語了拈拄杖云臨濟據令而行不知孤負黃檗雪竇盡力擔板也只見一邊且道薦福節文在甚處擲下拄杖千巖長云二尊宿一人聾雙耳朵一人瞎隻眼睛不惟孤負臨濟亦乃喪我兒孫無明今日路見不平且要與渠雪屈良久云不得動着動着打折你驢腰天奇瑞云臨濟鈎頭着餌為釣錦鱗這僧不識謄城自取喪身若是作家擒縱殺活一一現成須然他得便宜也是李廣陷番死中得活雪竇也是扶強不扶弱汝等諸人到這裏如何即是鴛鴦繡出從君看不把金針度與人師示眾曰有一無位真人常向汝等諸人面門出入未證據者看看時有僧出問如何是無位真人師下繩牀搊住曰道道僧無語師拓開曰無位真人是什麼乾屎橛雪峯存云臨濟大似白拈賊雪竇顯云夫善竊者鬼神莫知既被雪峯覷破臨濟不是好手復召大眾雪竇今日換却你諸人眼睛了也你若不信各歸寮舍自摸索看瑯琊覺云臨濟可謂冰稜上度九𨸰劒刃上得全身薦福行云臨濟老人一條脊梁硬似鐵拗不折可憐末後不奈船何打破戽斗師與王常侍到僧堂王問這一堂僧還看經麼師曰不看經曰還習禪麼師曰不習禪曰既不看經又不習禪畢竟作箇甚麼師曰總教伊成佛作祖去曰金屑雖貴落眼成翳師曰我將謂你是箇俗漢師上堂次兩堂首座相見同時下喝廣慧璉云諸人且道還有賓主也無若道有賓主只是箇瞎漢若道無賓主亦是箇瞎漢不有不無萬里崖州若向這裏道得也好與三十棒若道不得亦與三十棒衲僧家到這裏作麼生出得山僧圈䙡去良久云苦哉蝦䗫蚯蚓𨁝跳上三十三天撞着須彌山百雜碎遂拈拄杖云一隊無孔鐵鎚速退速退僧問師還有賓主也無師曰賓主歷然師召眾曰要會臨濟賓主句問取堂中二首座承天宗云臨濟此語走殺天下衲僧我即不然當時見僧舉但云一對無孔鐵鎚昭覺勤云正勑既行諸侯避道大溈智云作麼生是賓主歷然底道理若也會得一雙孤鴈撲地高飛其或未然一對鴛鴦池中獨立師後居大名府興化寺東堂咸通八年丁亥四月十日將示滅說傳法偈曰㳂流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨復謂眾曰吾滅後不得滅却吾正法眼藏三聖出曰爭敢滅却和尚正法眼藏師曰已後有人問你向他道甚麼三聖便喝師曰誰知吾正法眼藏向這瞎驢邊滅却言訖端坐而逝溈山秀云古者忍死待來因何正法眼藏却向瞎驢邊滅臨濟行計速速三聖又却怱怱因斯父子情忘遂使後人失望若不得流水多應過別山南嶽下五世臨濟下一世興化存獎禪師臨濟玄法嗣魏府興化存獎禪師在三聖會裏為首座常曰我向南方行脚一遭拄杖頭不曾撥著一箇會佛法底人三聖聞得問曰你具甚麼眼便恁麼道師便喝三聖曰須是你始得後大覺聞舉遂曰作麼生得風吹到大覺門裏來師後到大覺為院主一日大覺喚院主我聞你道向南方行脚一遭拄杖頭不曾撥著一箇會佛法底你憑箇甚麼道理與麼道師便喝大覺便打師又喝大覺又打師來日從法堂過大覺召院主我直下疑你昨日這兩喝師又喝大覺又打師再喝大覺又打師曰某甲於三聖師兄處學得箇賓主句總被師兄折倒了也願與某甲箇安樂法門大覺曰這瞎漢來這裏納敗缺脫下衲衣痛打一頓師於言下薦得臨濟先師於黃檗處喫棒底道理師後開堂日拈香曰此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師師有時喚僧僧應諾師曰點即不到又喚一僧僧應諾師曰到即不點僧問四方八面來時如何師曰打中間底僧便禮拜師曰昨日赴箇村齋中途遇一陣卒風㬥雨却向古廟裏軃避得過晦堂心頌云一不是二不成落花芳草伴啼鸎閑庭雨歇夜初靜片月還從海上生徑山杲頌云古廟裏頭回避得紙錢堆裏暗嗟吁閑神野鬼都驚怕只為渠儂識梵書天童華云眾中商量道向古廟裏避得過是空劫已前自己又道便是他安身立命處殊不知腰纏十萬貫騎鶴上揚州又云我見燈明佛本光瑞如此示眾我聞前廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化向虗空裏却撲下來一點氣也無待我蘇息起來向汝道未在何故我未曾向紫羅帳裏撒真珠與汝諸人去在胡喝亂喝作麼徑山杲頌云對眾全提摩竭令豈是閑開兩片皮喝下瞎驢成隊走夢中推倒五須彌雲居住三峰庵時師問權借一問以為影草時如何雲居無對師曰想和尚答這話不得不如禮拜了退二十年後雲居曰如今思量當時不消道箇何必後遣化主到師處師問和尚住三峰庵時老僧問伊話對不得如今道得也未化主舉前話師曰雲居二十年祇道得箇何必興化即不然爭如道箇不必三聖然云雲居二十年道得底猶較他興化半月程保寧勇云明月照見夜行人徑山杲云何必不必綿綿密密覿面當機有人續得末後句許伊親見二尊宿師謂克賓維那曰汝不久為唱導之師克賓曰不入這保社師曰會了不入不會了不入曰總不與麼師便打曰克賓維那法戰不勝罰錢五貫設饡飯一堂次日師自白椎曰克賓維那法戰不勝不得喫飯即便出院雪竇顯云克賓要承嗣興化罰錢出院且置却須索這一頓棒始得且問諸人棒既喫了作麼生索雪竇要斷不平之事今夜與克賓維那雪屈以拄杖一時打散雲居舜云大冶精金應無變色其奈興化令行大嚴不是克賓維那也大難承當若是如今汎汎之徒翻轉面皮多少時也徑山杲云雲居拗曲作直妙喜道要作臨濟烜赫兒孫直須翻轉面皮始得楚石琦云克賓法戰不勝興化據令而行稱提臨濟宗風揭示正法眼藏棒頭出孝子佛法無人情當時將謂茅長短燒却元來地不平徑山信云賊是小人智過君子興化脚跟被克賓掀起半空過一小劫方得着地克賓古佛其心安如海會麼賣盡衣單終不赤膊好則好矣美則盡美生鐵橛子只不得飯喫師在臨濟為侍者洛浦來參臨濟問甚處來洛浦曰鑾城來臨濟曰有事相借問得麼洛浦曰新戒不會臨濟曰打破大唐國覓箇不會底人也無參堂去師隨後請問曰適來新到是成他褫不成褫他臨濟曰我誰管你成褫不成褫師曰和尚祇解將死就地彈不解將一轉語蓋覆却臨濟曰你又作麼生師曰請和尚作新到臨濟遂曰新戒不會師曰却是老僧罪過臨濟曰你語藏鋒師擬議臨濟便打至晚臨濟又曰我今日問新到是將死就地彈就窠子裏打及至你出得語又喝起了向青雲裏打師曰草賊大敗臨濟便打示眾曰若是作家戰將便請單刀直入更莫如何若何有旻德禪師出禮拜起便喝師亦喝旻德又喝師亦喝旻德禮拜歸眾師曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用首山念云看他興化與麼用為甚麼放得他過諸上座且道甚麼處是一喝不作一喝用前一喝後一喝且道那箇是賓那箇是主雖然如是亦須仔細便下座又云二俱有過二俱無過瑯琊覺云且道那一喝不作一喝用興化若無後語疑殺天下人雖然如是曉者還稀昭覺勤云作家相見須是恁麼機如掣電眼似流星原始要終扶頭接尾所謂羽毛相似言氣相合只如兩家互換相喝且作麼生辨得一喝不作一喝用要承當臨濟正法眼藏須明取二老宿意且道意作麼生百尺竿頭須進步紫羅帳裏撒真珠教忠光云興化與旻德各出隻手要發明臨濟正法眼藏殊不知臨濟一宗掃土而盡且道利害在什麼處具眼者辨取師見同參來纔上法堂師便喝僧亦喝師又喝僧亦喝師近前拈棒僧又喝師曰你看這瞎漢猶作主在僧擬議師直打下法堂侍者請問適來那僧有甚觸忤和尚師曰他適來也有權也有實也有照也有用及乎我將手向伊面前橫兩橫到這裏却去不得似這般瞎漢不打更待何時昭覺勤云辨王庫刀振塗毒皷掣電未足以擬其迅震雷未足以方其威可謂善驅耕夫之牛能奪饑人之食只如主賓互換有照有用有權有實則且置甚處是興化將手向伊面前劃兩遭處若這裏洞明可以荷負臨濟正法眼藏如或泥水未分未免瞎驢隨大隊天童華云興化門墻千仞從來家法森嚴這僧暗透重關要看洞中春色好則好未免二俱失利只如興化道我將手向伊面前橫兩橫又作麼生天堂未就地獄先成育王光云高提祖印獨耀寰中大啟洪爐烹凡煅聖非興化不能驗同參非同參不能見興化直得主賓互換照用雙行且道那裏是興化將手向伊面前橫兩橫處這裏明得臨濟一宗掃土而盡脫或未然卓拄杖一下金鏃慣調曾百戰鐵鞭多力恨無讐後唐莊宗車駕幸河北回至魏府行宮詔師問曰朕收中原獲得一寶未曾有人酬價師曰請陛下寶看帝以兩手舒幞頭脚師曰君王之寶誰敢酬價報慈遂徵云且道興化肯莊宗不肯莊宗若肯莊宗興化眼在甚麼處若不肯莊宗過在甚麼處雪竇顯云至尊所得只可傍觀若非興化作家往往高價酬却翠巖芝云興化當時下一着可謂酩酊如今作麼生斷雲峯悅云真不掩偽曲不藏直有眼底辨取黃龍心云興化一期見機而作爭奈埋沒伊一朝天子當時若但向道蚌蛤之珠收得也無用處教伊向後別有生涯免得相鈍置而今若有人問又作麼生酬價龍顏大悅賜紫衣師號師皆不受乃賜馬與師乘騎馬忽驚師墜傷足師喚院主與我做箇木柺子院主做了將來師接得遶院行問僧曰汝等還識老僧麼曰爭得不識和尚師曰𨁸脚法師說得行不得又至法堂令維那聲鐘集眾師曰還識老僧麼眾無對師擲下柺子端然而逝寶壽沼禪師臨濟玄法嗣鎮州寶壽沼禪師第一世因僧問訊次師曰百千諸聖盡不出此方丈內曰祇如古人道大千沙界海中漚未審此方丈向甚麼處著師曰千聖現在曰阿誰證明師便擲下拂子僧從西過東立師便打僧曰若不久參焉知端的師曰三十年後此話大行昭覺勤云寶壽向方丈裏布網張羅這僧向鈎餌邊擎頭帶角三度衝浪上來三度被來籠罩且道他得箇甚麼還會麼重賞之下必有勇夫趙州來師在禪牀背面而坐趙州展坐具禮拜師起入方丈趙州收坐具而出胡釘鉸參師問汝莫是胡釘鉸麼曰不敢師曰還釘得虗空麼曰請和尚打破師便打胡曰和尚莫錯打某甲師曰向後有多口阿師與你點破在胡後到趙州舉前話趙州曰汝因甚麼被他打胡曰不知過在甚麼處趙州曰祇這一縫尚不奈何胡於此有省趙州曰且釘這一縫雪竇顯云我要打這三箇漢一打趙州不合瞎却胡釘鉸眼二打保壽不能塞斷趙州口三打胡釘鉸不合放過保壽驀拈拄杖云更有一箇大眾一時退乃擊禪牀一下溈山云這漢雖然省去可惜趙州當時待他道某甲過在甚處劈脊便棒非但承他保壽威光亦乃與叢林為龜為鑑溈山果云保壽大似無風起浪平地生堆胡釘鉸貪程太速不覺墮坑落壍若不遇趙州點破爭得歸家穩坐大眾且道那裏是趙州點破處要會麼良久云斬新日月特地乾坤徑山杲云直饒釘得這一縫點檢將來亦非好手可憐兩箇老禪翁却對俗人說家醜鼓山永云保壽雖具打破虗空底鉗鎚未免傷鋒犯手胡公末後悟去誰知眼尚𪾾西院來參問踏倒化城來時如何師曰不斬死漢西院曰斬師便打西院連道斬斬師又隨聲打師却回方丈曰適來這僧將赤肉抵他乾棒有甚死急三聖慧然禪師臨濟玄法嗣鎮州三聖院慧然禪師自臨濟受訣遍歷叢林至仰山仰山問汝名甚麼師曰慧寂仰山曰慧寂是我名師曰我名慧然仰山大笑而已雪竇顯頌云雙收雙放若為宗騎虎由來要絕功笑罵不知何處去只應千古動悲風昭覺勤云這箇笑與巖頭笑不同巖頭笑有毒藥這箇笑千古萬古清風凜凜地為甚麼雪竇末後却道只應千古動悲風也是死而不弔一時與你註解了也爭奈天下人啗不入不知落處縱是山僧也不知落處諸人還知麼徑山杲云兩箇藏身露影漢殊不顧旁觀者仰山因有官人相訪仰山問官居何位曰推官仰山竪起拂子曰還推得這箇麼官人無對仰山令眾下語皆不契時師不安在涅槃堂內將息仰山令侍者去請下語師曰但道和尚今日有事仰山又令侍者問未審有甚麼事師曰再犯不容到香嚴香嚴問甚處來師曰臨濟香嚴曰將得臨濟喝來麼師以坐具驀口打又到德山纔展坐具德山曰莫展炊巾這裏無殘羹餿飯師曰縱有也無著處德山便打師接住棒推向禪牀上德山大笑師哭蒼天便下參堂溈山行云三聖撥草瞻風有舒有卷德山看凡驗聖有放有收德山笑去即且置三聖哭蒼天便出意作麼生不貪香餌味可謂碧潭龍雲巖游云三聖便展坐具作賊人心虗德山云不用展炊巾尾巴露也三聖云設有向什麼處着口是禍門德山便打裂破古今三聖接住棒推德山向繩牀上老鼠入牛角更有一轉語待無舌人忌口却向汝道堂中首座號踢天泰問行脚高士須得本道公驗作麼生是本道公驗師曰道甚麼首座再問師打一坐具曰這漆桶前後觸忤多少賢良首座擬人事師便過第二座人事又到道吾道吾預知以緋抹額持神杖於門下立師曰小心祗候道吾應喏師參堂了再上人事道吾具威儀方丈內坐師纔近前道吾曰有事相借問得麼師曰也是適來野狐精便出去住後上堂我逢人即出出則不為人便下座興化獎云我逢人則不出出則便為人白雲端云此二尊宿各有一處打得着且道那箇在前那箇在後還有人向這裏定當得麼良久云妙舞莫誇回雪手三臺須是大家催保寧勇云此二尊宿恁麼為人猶在半途保寧今日路見不平拈拄杖下座大眾一時走散擲下歸方丈寶峯文云這兩箇老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼衲僧只得好笑諸禪德且道笑箇甚麼還知落處麼若知一任七顛八倒若不知且向三聖興化葛藤裏咬嚼五祖演云大眾此二尊宿一人文章浩渺一人武藝全施若道興化是文亦不得若道三聖是武亦不得若於此辨得出許你通身是眼若辨不出你自相度昭覺勤云一人在孤峯頂上土面灰頭一人在十字街頭斬釘截鐵有頭有尾同死同生且道出即不為人底是出即便為人底是萬古碧潭空界月再三撈摝始應知徑山杲云真淨老人大似欺誣亡沒杲上座即不然豁開三要三玄路坐斷須彌第一峯且道在三聖分上耶在興化分上耶具眼者辨取天童傑舉白雲端語了云大眾白雲端和尚錯下名言殊不知二尊宿前不搆村後不迭店直至于今飜成話何故字經三寫烏焉成馬靈隱嶽云二老漢滅却臨濟正法眼却向長安路上把手共行直至于今相鈍置且如何是共行一句掣開金殿鎻撞動玉樓鐘楚石琦云三聖興化明眼宗師因什麼活計本同生涯逈異但有路可上更高人也行金粟悟云古今拈提未有出他圈䙡金粟路見不平每人與二十棒更與二十棒待打箇人僧問如何是祖師西來意師曰臭肉來蠅興化獎云破驢脊上乏蒼蠅問僧近離甚處僧便喝師亦喝僧又喝師又喝僧曰行棒即瞎便喝師拈棒僧乃轉身作受棒勢師曰下坡不走快便難逢便棒僧曰這賊便出去師遂拋下棒次有僧問適來爭容得這僧師曰是伊見先師來魏府大覺和尚臨濟玄法嗣魏府大覺和尚參臨濟臨濟纔見竪起拂子師展坐具臨濟擲下拂子師收坐具參堂去時僧眾曰此僧莫是和尚親故不禮拜又不喫棒臨濟聞說令侍者喚適來新到上來師隨侍者到方丈臨濟曰大眾道汝來參長老又不禮拜又不喫棒莫是長老親故師乃珍重下去臨終時謂眾曰我有一隻箭要付與人時有一僧出曰請和尚箭師曰汝喚甚麼作箭僧喝師打數下便歸方丈却喚其僧入來問曰汝適來會麼曰不會師又打數下擲却拄杖曰已後遇明眼人分明舉似便乃告寂灌谿志閑禪師臨濟玄法嗣灌谿志閑禪師魏府館陶史氏子幼從栢巖禪師披剃受具後見臨濟臨濟驀胸搊住師曰領領臨濟拓開曰且放汝一頓師離臨濟至末山住後上堂曰我在臨濟爺爺處得半杓末山孃孃處得半杓共成一杓喫了直至如今飽不飢天童華云灌溪氣宇如王被臨濟活埋在鎮州城裏十字街頭當時若是光孝棒折也未放你在何故家肥生孝子國有謀臣靈隱嶽云爐鞴之所鈍鐵尤多雖然如是不因夜來鴈爭見海門秋師會下一僧去參石霜石霜問甚處來曰灌谿來石霜曰我南山不如他北山僧無對僧回舉似師師曰何不道灌谿修涅槃堂了也問久嚮灌谿到來祇見漚麻池師曰汝祇見漚麻池且不見灌谿曰如何是灌谿師曰劈箭急後人舉似玄沙備玄沙云更學三十年未會禪𣵠州紙衣和尚臨濟玄法嗣𣵠州紙衣和尚即克符道者初問臨濟如何是奪人不奪境臨濟曰煦日發生鋪地錦嬰兒垂髮白如絲師曰如何是奪境不奪人臨濟曰王令已行天下遍將軍塞外絕煙塵師曰如何是人境俱奪臨濟曰并汾絕信獨處一方師曰如何是人境俱不奪臨濟曰王登寶殿野老謳謌師於言下領旨定州善崔禪師臨濟玄法嗣定州善崔禪師州將王令公於衙署張座請師說法師陞座拈拄杖曰出來也打不出來也打僧出曰崔禪聻師擲下拄杖曰久立令公伏惟珍重歸宗一云作麼生道得一語救得崔禪清涼欽云和尚且自救好是肯他不肯他瑯琊覺云久經行陣者終不展槍旗雲蓋智云身挨白刃不懼死生也須是這僧始得崔禪為甚麼當機放過要會麼錦鱗已得休勞力收取絲綸歸去休薦福行云崔禪上堂美則美矣善則未善何故大似放過這僧山僧即不然待這僧出眾來問未開口已前與他痛棒若是皮下有血必然別有生涯龜峯光云崔禪布長蛇偃月大陣欲統四大部洲為一世界不是這僧攙旗奪鼓未免陷在虜庭且道坐籌帷幄鎮靜八方水乳和同風雲會合一句作麼生道若不藍田射石虎幾乎悞殺李將軍鎮州萬壽和尚臨濟玄法嗣鎮州萬壽和尚訪寶壽寶壽坐不起師展坐具寶壽下禪牀師却坐寶壽驟入方丈閉却門知事見師坐不起曰請和尚庫下喫茶師乃歸院翌日寶壽來復謁師踞禪牀寶壽展坐具師亦下禪牀寶壽却坐師歸方丈閉却門寶壽入侍者寮取灰圍却方丈門便歸去師遂開門見曰我不恁麼他却恁麼幽州譚空和尚臨濟玄法嗣幽州譚空和尚鎮州牧有姑為尼行脚回欲開堂為人牧令師勘過師問曰見說汝欲開堂為人是否尼曰是師曰尼是五障之身汝作麼生為人尼曰龍女八歲南方無垢世界成等正覺又作麼生師曰龍女有十八變你試一變看尼曰設使變得也祇是箇野狐精師便打牧聞舉乃曰和尚棒折那翠巖芝云且道尼具眼麼只擔得斷貫索且作麼生會寶壽和尚問除却中上二根人來時師兄作麼生師曰汝適來舉早錯也寶壽曰師兄也不得無過師曰汝却與我作師兄寶壽側掌曰這老賊米倉和尚臨濟玄法嗣滄州米倉和尚州牧請師與寶壽入廳供養令人傳語請二長老譚論佛法寶壽曰請師兄答話師便喝寶壽曰某甲話也未問喝作麼師曰猶嫌少在寶壽却與一喝虎谿庵主臨濟玄法嗣虎谿庵主有僧問和尚何處人事師曰隴西人曰承聞隴西出鸚鵡是否師曰是曰和尚莫不是否師便作鸚鵡聲僧曰好箇鸚鵡師便打定上座臨濟玄法嗣定上座初參臨濟問如何是佛法大意臨濟下禪牀擒住師擬議臨濟與一掌師佇思傍僧曰定上座何不禮拜師方作禮忽然大悟後南游路逢巖頭雪峰欽山三人巖頭問上座甚處來師曰臨濟來巖頭曰和尚萬福師曰和尚已順世也巖頭曰某甲三人特去禮拜薄福不遇不知和尚在日有何言句請上座舉一兩則師遂舉臨濟上堂曰赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看時有僧問如何是無位真人臨濟下禪牀搊住曰道道僧擬議臨濟拓開曰無位真人是甚麼乾屎橛巖頭不覺吐舌雪峯曰臨濟大似白拈賊欽山曰何不道赤肉團上非無位真人師便擒住曰無位真人與非無位真人相去多少速道速道欽山被擒直得面黃面青語之不得巖頭雪峯曰這新戒不識好惡觸忤上座且望慈悲師曰若不是這兩箇老漢𡎺殺這尿牀鬼子師在鎮府齋回到橋上坐次逢三人座主一人問如何是禪河深處須窮到底師擒住擬拋向橋下二座主近前諫曰莫怪觸忤上座且望慈悲師曰若不是這兩箇座主直教他窮到底奯上座臨濟玄法嗣奯上座離臨濟參德山德山纔見下禪牀作抽坐具勢師曰這箇且置或遇心境一如底人來向伊道箇甚麼免被諸方檢責德山曰猶較昔日三步在別作箇主人公來師便喝德山默然師曰塞却這老漢咽喉也拂袖便出溈山佑聞舉云奯上座雖得便宜爭奈掩耳偷鈴蔣山懃云奯公一喝賓主歷然德山無語言徧天下溈山老子雪上加霜仔細檢點將來總不可放過乃擲下拄杖又參百丈茶罷百丈曰有事相借問得麼師曰幸自非言何須甌茶百丈曰與麼則許借問百丈曰收得安南又憂塞北師擘開胷曰與麼不與麼百丈曰要且難搆要且難搆師曰知即得知即得仰山寂云若有人知得此二人落處不妨奇特若辨不得大似日中迷路南嶽下六世臨濟下二世南院慧顒禪師興化獎法嗣汝州南院慧顒禪師亦曰寶應上堂赤肉團上壁立千仞僧問赤肉團上壁立千仞豈不是和尚道師曰是僧便掀倒禪牀師曰這瞎驢亂作僧擬議師便打徑山杲云吾今為汝保任此事終不虗也天童華云也是勾賊破家若非這僧敢捋虎鬚爭見南院汗馬功高雖然如是山僧更資一路赤肉團上壁立千仞若有僧出劈脊便打何故殺人刀活人劒具眼者看楚石琦云這僧敢在毒蛇頭上揩痒蒼龍頷下批鱗誰不賞他大膽只是末上少了一着自出洞來無敵手得饒人處且饒人問僧近離甚處曰長水師曰東流西流曰總不恁麼師曰作麼生僧珍重師便打僧參師舉拂子僧曰今日敗缺師放下拂子僧曰猶有這箇在師便打問僧近離甚處曰襄州師曰來作甚麼曰特來禮拜和尚師曰恰遇寶應老不在僧便喝師曰向汝道不在又喝作甚麼僧又喝師便打僧禮拜師曰這棒本是汝打我我且打汝要此話大行瞎漢參堂去僧問從上諸聖甚麼處去師曰不上天堂即入地獄曰和尚作麼生師曰還知寶應老落處麼僧擬議師以拂子驀口打復喚僧近前曰令合是汝行又打一拂子雪竇顯云令既自行且拂子不知來處雪竇道箇瞎且要雪上加霜徑山杲云權衡臨濟三要三玄須還他南院始得雪竇為甚麼却道拂子不知來處妙喜亦道箇瞎且圖兩得相見思明和尚未住西院時到參禮拜了曰無可人事從許州來收得江西剃刀一柄獻和尚師曰汝從許州來為甚却收得江西剃刀思明把師手掐一掐師曰侍者收取思明以衣袖拂一拂便行師曰阿剌剌阿剌剌上堂諸方祇具啐同時眼不具啐同時用僧便問如何是啐同時用師曰作家不啐啐同時失曰此猶未是某甲問處師曰汝問處作麼生僧曰失師便打其僧不肯翠巖真云運籌帷幄決勝千里南院雖則全機受敵其奈土曠人稀溈山云南院高提祖印縱奪當機這僧善能當機抗敵爭奈力竭計窮如今還有本色衲僧麼出來與大溈相見不圖鼓舞揚聲貴要宗風不墮有麼有麼如無大溈今日大似索戰無功淨因成云全軍制勝草偃風行南院如師子搏兔亦全其力後於雲門會下聞二僧舉此話一僧曰當時南院棒折那其僧忽契悟遂奔回省覲師已圓寂乃謁風穴風穴一見便問上座莫是當時問先師啐同時話底麼僧曰是師曰汝當時作麼生會曰某甲當時如在燈影裏行相似風穴曰汝會也翠巖真出風穴語云當時待這僧擬議祗對以坐具劈口摵溈山云大小風穴却將惡水潑人大溈即不然問你當時作麼生待云某甲當時如燈影裏行先師肉猶暖在你作這箇見解以拄杖打下法堂免見孤他南院東禪觀云扶南院門風還他風穴諸方往往道伊肯這僧殊不知這僧被伊推在萬丈坑裏問祖意教意是同是別師曰王尚書李僕射曰意旨如何牛頭南馬頭北徑山杲云前頭答得着後頭答不着守廓侍者興化獎法嗣守廓侍者問德山曰從上諸聖向甚麼處去德山曰作麼作麼師曰勑點飛龍馬跛鼈出頭來德山便休去來日浴出師過茶與德山德山於背上拊一下曰昨日公案作麼生師曰這老漢今日方始瞥地德山又休去雪竇顯云然精金百鍊須要本分鉗鎚德山既以己妨人這僧還同受屈以拄杖畫一畫云適來公案且置從上諸聖什麼處去大眾擬議一時趂出黃龍南云德山持聾作啞雖然暗得便宜廓公掩耳偷鈴爭奈傍觀者哂溈山云若不登龍門焉知滄海寬直饒浪激千尋爭奈龍王不顧雲居元云大凡一賓一主須是知音同死同生方堪受敵廓侍者獨立於懸崖石上飜身倒捋虎鬚周金剛安坐於大海波心背手逆擒麟角在檀特山前列陣向占波國裏爭鋒分明有輸有贏且道誰得誰失請諸人斷看師行脚到襄州華嚴和尚會下一日華嚴上堂曰大眾今日若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何便請單刀直入華嚴與汝證據師出禮拜起便喝華嚴亦喝師又喝華嚴亦喝師禮拜起曰大眾看這老漢一場敗缺又喝一喝拍手歸眾華嚴下座歸方丈時風穴作維那上去問訊華嚴曰維那汝來也叵耐守廓適來把老僧扭揑一上待集眾打一頓趂出風穴曰趂他遲了也自是和尚言過他是臨濟下兒孫本分恁麼華嚴方息怒風穴下來舉似師師曰你著甚來由勸這漢我未問前早要棒喫得我話行如今不打搭却我這話也風穴曰雖然如是已遍天下也西院思明禪師寶壽沼法嗣汝州西院思明禪師從上座到法席旬日常自曰莫道會佛法人覓箇舉話底人也無師聞而默之異日上法堂次師召從舉首師曰錯進三兩步師又曰錯近前師曰適來兩錯是上座錯是思明老漢錯曰是從錯師曰錯錯乃曰上座且在這裏過夏共汝商量這兩錯不肯便去後住相州天平山每舉前話曰我行脚時被惡風吹到汝州有西院長老勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足南方去時早知錯了也首山念云據天平作恁麼解會未夢見西院在何故話在昭覺勤云如今人聞他道發足向南方去時早知道錯了也便去卜度道未行脚時自無許多佛法禪道及至行脚被諸方熱瞞不可未行脚時喚地作天喚山作水幸無一星事若總恁麼作流俗見解何不買一片㡌戴大家過時有什麼用處佛法不是這箇道理寶壽和尚寶壽沼法嗣寶壽和尚第二世在先寶壽為供養主寶壽問父母未生前還我本來面目來師立至夜深下語不契翌日辭去寶壽曰汝何往師曰昨日蒙和尚設問某甲不契往南方參知識去寶壽曰南方禁夏不禁冬我此間禁冬不禁夏汝且作街坊過夏若是佛法闤闠之中浩浩紅塵常說正法師不敢違一日街頭見兩人交爭揮一拳曰你得恁麼無面目師當下大悟走見寶壽未及出語寶壽便曰汝會也不用說師便禮拜昭覺勤云築着磕着當頭彰本地風光應聲應色直下無絲毫透漏還會他道得恁麼無面目麼龍袖拂開全體現寶壽臨遷化時囑三聖請師開堂師開堂曰三聖推出一僧師便打三聖曰與麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師擲下拄杖便歸方丈雪竇顯云保壽三聖雖發明臨濟正法眼藏要且只解無佛處稱尊當時這僧若是箇漢纔被推出便掀倒禪牀直饒保壽全機也較三千里法眼益云什麼處是瞎却人眼處雲居元云眾中盡道此語奇特大似韓獹逐塊殊不知保壽正賊不識悞罪平人這僧有理不伸至今受屈承天欲斷不平之事拈拄杖云要為天下宗師此棒別有分付黃龍新云保壽見機而作其奈三聖不甘直饒甘去未免瞎却鎮州一城人眼昭覺勤云保壽大似毒龍攪海雨似盆傾三聖雖然雷震青霄未助得威光一半在可中有箇直下承當底非但瞎鎮州一城人眼瞎却天下人眼去在天童華云叢林中商量盡道保壽三聖是作家爐韛本分鉗鎚有甚交涉殊不知二大老被這僧一拶直至如今扶不起今日莫有為二老雪屈底麼出來與明果相見有麼驀拈拄杖擲下云龍蛇易辨衲子難瞞天童傑云二尊宿美則美矣若要扶臨濟正宗每人合喫一頓棒在且道那裏是欠處具擇法眼者試定當看際上座紙衣法嗣際上座行脚到洛京南禪時有朱行軍設齋入僧堂顧視曰直下是遂行香口不住道至師面前師便問直下是箇甚麼行軍便喝師曰行軍幸是會佛法底人又惡發作甚麼行軍曰喚作惡發即不得師便喝行軍曰鉤在不疑之地師又喝行軍便休齋退令客司請適來下喝僧來師至便共行軍言論並不顧諸人僧錄曰行軍適來爭容得這僧無禮行軍曰若是你諸人喝下官有劒僧錄曰某等固是不會須是他暉長老始得行軍曰