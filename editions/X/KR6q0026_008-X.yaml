且行且語曰見面不如聞名遂去神鼎遣人追之不可歎曰汾州乃有此兒邪師自是名重叢林師到大愚芝和尚處芝坐間開合子取香燒師問作麼生燒芝便放香爐中燒師指曰訝郎當漢又恁麼去也師室中插劒一口以草鞋一對水一盆置在劒邊每見入室即曰看看有至劒邊擬議者師曰險喪身失命了也便喝出天童華云我當時若見便去左耳邊低聲地下一轉語待他貪觀天上却與一指擬議劍便斬驀拈拄杖下座大眾一時趕散師冬日牓僧堂作此字二三其下注曰若人識得不離四威儀中首座見曰和尚今日放參師聞而笑之寶元戊寅李都尉遣使邀師曰海內法友唯師與楊大年耳大年棄我而先僕年來頓覺衰落忍死以一見公仍以書抵潭帥敦遣之師惻然與侍者舟而東下舟中作偈曰長江行不盡帝里到何時既得凉風便休將艣棹施至京師與李公會月餘而李公果歿臨終畫一圓相又作偈獻師世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若覓死生問取皮袋師曰如何是本來佛性公曰今日熱如昨日隨聲便問師臨行一句作麼生師曰本來無罣礙隨處任方圓公曰晚來困倦更不答話師曰無佛處作佛公於是泊然而逝仁宗皇帝尤留神空宗聞李公之化與師問答加歎久之師哭之慟臨壙而別有旨賜官舟南歸中途謂侍者曰我忽得風痺疾視之口吻已喎斜侍者以足頓地曰當柰何平生呵佛罵祖今乃爾師曰無憂為汝正之以手整之如故曰而今而後不鈍置汝法華全舉禪師汾陽昭法嗣舒州法華院全舉禪師到公安遠和尚處遠問作麼生是伽藍師曰深山藏獨虎淺草露羣蛇曰作麼生是伽藍中人師曰青松蓋不得黃葉豈能遮曰道甚麼師曰少年翫慧天邊月潦倒扶桑沒日頭曰一句兩句雲開月露作麼生師曰照破佛祖到大愚芝和尚處芝問古人見桃花意作麼生師曰曲不藏直曰那箇且從這箇作麼生師曰大街拾得金四隣爭得知曰上座還知麼師曰路逢劒客須呈劒不是詩人不獻詩曰作家詩客師曰一條紅線兩人牽曰玄沙道諦當甚諦當敢保老兄未徹在又作麼生師曰海枯終見底人死不知心曰却是師曰樓閣凌雲勢峰巒疊翠層到琅邪覺和尚處覺問近離甚處師曰兩浙曰船來陸來師曰船來曰船在甚處師曰步下曰不涉程途一句作麼生道師以坐具摵一摵曰杜撰長老如麻似粟拂袖而出覺問侍者此是甚麼人侍者曰舉上座覺曰莫是舉師叔麼先師教我尋見伊遂下旦過問上座莫是舉師叔麼莫怪適來相觸忤師便喝復問長老何時到汾陽覺曰某時到師曰我在浙江早聞你名元來見解祇如此何得名播寰宇覺遂作禮曰某甲罪過徑山杲云賓則始終賓主則始終主二大士驀剳相逢主賓互換直下發明臨濟心髓苟非徹證向上巴鼻具出常情正眼未免作得失論量徑山信云拳來脚去此是衲僧家本分鉗鎚若將破提籃盛水救火非惟不能息其燄笑殺傍觀者三十年後有人說破示眾云釋迦不出世達磨不西來佛法遍天下譚玄口不開徑山杲云作賊人心虗師到杭州西菴菴主曾見明招菴主舉頌曰絕頂西峯上峻機誰敢當超然凡聖外瞥起兩重光師曰如何是兩重光菴主曰月從東出日向西沒師曰菴主未見明招時如何菴主曰滿盞油難盡師曰見後如何菴主曰多心易得乾芭蕉谷泉禪師汾陽昭法嗣南嶽芭蕉菴大道谷泉禪師泉州人也受法汾陽放蕩湖湘後省同參慈明禪師慈明問白雲橫谷口道人何處來師左右顧視曰夜來何處火燒出古人墳慈明曰未在更道師作虎聲慈明以坐具便摵師接住推慈明置禪牀上慈明却作虎聲師大笑曰我見七十餘員善知識今日始遇作家山有湫毒龍所蟄墮葉觸波必雷雨連日過者不敢喘師與慈明暮歸捉慈明衣曰可同浴慈明掣肘徑去於是師解衣躍入霹靂隨至腥風吹雨林木振搖慈明蹲草中意師死矣須臾晴霽忽引頸出波間曰㘞徑山信云谷泉作風作顛毒龍不敢動其一毫毛慈明老老大大猶有這箇在頌云谷泉忒殺作風顛一撥龍湫浪括天雷雨至今如不息慈明抱死草中眠師因倚遇上座來參問菴主在麼師曰誰曰行脚僧師曰作甚麼曰禮拜菴主師曰恰值菴主不在曰你聻師曰向道不在說甚麼你我拽棒趂出遇次日再來師又趂出遇一日又來問菴主在麼師曰誰曰行脚僧揭簾便入師攔胷搊住曰我這裏狼虎縱橫尿牀鬼子三回兩度來討甚麼曰人言菴主親見汾陽來師解衣抖擻曰你道我見汾陽有多少奇特曰如何是菴中主師曰入門須辨取曰莫祇這便是麼師曰賺却幾多人曰前言何在師曰聽事不真喚鐘作甕曰萬法泯時全體現君臣合處正中邪去也師曰驢漢不會便休亂統作麼曰未審客來將何祗待師曰雲門餬餅趙州茶曰恁麼則謝師供養去也師叱曰我這裏火種也未有早言謝供養龍華曉愚禪師汾陽昭法嗣蘄州黃梅龍華寺曉愚禪師到五祖戒和尚處五祖問曰不落唇吻一句作麼生道師曰老老大大話頭也不照顧五祖便喝師亦喝五祖拈棒師拍手便出五祖召曰闍黎且住話在師將坐具搭在肩上更不回首天聖皓泰禪師汾陽昭法嗣安吉州天聖皓泰禪師到琅邪琅邪問埋兵掉鬬未是作家匹馬單鎗便請相見師指琅邪曰將頭不猛帶累三軍琅邪打師一坐具師亦打琅邪一坐具琅邪接住曰適來一坐具是山僧令行上座一坐具落在甚麼處師曰伏惟尚饗琅邪拓開曰五更侵早起更有夜行人師曰賊過後張弓琅邪曰且坐喫茶龍潭智圓禪師汾陽昭法嗣唐州龍潭智圓禪師辭汾陽汾陽曰別無送路與子一枝拄杖一條手巾師曰手巾和尚受用拄杖即不消得汾陽曰汝但將去有用處在師便收汾陽曰又道不用師便喝汾陽曰已後不讓臨濟師曰正令已行汾陽來日送出三門乃問汝介山逢尉遲時如何師曰一刀兩段汾陽曰彼現那叱又作麼生師便拽拄杖汾陽喝曰這回全體分付浮山法遠禪師葉縣省法嗣舒州浮山法遠圓鑒禪師鄭州人也投三交嵩和尚出家幼為沙彌見僧入室請問趙州庭栢因緣嵩詰其僧師傍有省進具後謁汾陽葉縣皆蒙印可嘗與達觀頴薛大頭七八輩遊蜀幾遭橫逆師以智脫之眾以師曉吏事故號遠錄公師與王質待制論道畫一圓相問曰一不得匹馬單鎗二不得衣錦還鄉鵲不得喜鴉不得殃速道速道王罔措師曰勘破了也歐陽文忠公聞師奇逸造其室未有以異之與客碁師坐其旁文忠遽收局請因碁說法師即令撾鼓陞座曰若論此事如兩家著碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底祇解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞綽斡所以道肥邊易得瘦肚難求思行則往往失粘心麤而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在甚麼處良久曰從來十九路迷悟幾多人文忠嘉歎從容謂同僚曰脩初疑禪語為虗誕今日見此老機緣所得所造非悟明於心地安能有此妙旨哉金山曇頴禪師谷隱聰法嗣潤州金山曇頴達觀禪師首謁大陽玄禪師遂問洞山特設偏正君臣意明何事大陽曰父母未生時事師曰如何體會大陽曰夜半正明天曉不露師罔然遂謁谷隱舉前話谷隱曰大陽不道不是祇是口門窄滿口說未盡老僧即不然師問如何是父母未生時事谷隱曰糞墼子師曰如何是夜半正明天曉不露谷隱曰牡丹花下睡猫兒師愈疑駭一日普請谷隱問今日運薪邪師曰然谷隱曰雲門問僧人搬柴搬柴人如何會師無對谷隱曰此事如人學書點畫可効者工否者拙葢未能忘法耳當筆忘手手忘心乃可也師於是默契良久曰如石頭曰執事元是迷契理亦非悟谷隱曰汝以為藥語為病語師曰是藥語谷隱呵曰汝以病為藥又安可哉師曰事如函得葢理如箭直鋒妙寧有加者而猶以為病實未喻旨谷隱曰妙至亦是祇名理事祖師意旨智識所不能到矧事理能盡乎故世尊曰理障礙正見知事障續諸生死師恍如夢覺曰如何受用谷隱曰語不離窠臼安能出葢纏師歎曰纔涉唇吻便落意思盡是死門終非活路上堂三世諸佛是奴婢一大藏教是涕唾良久曰且道三世諸佛是誰奴婢乃將拂子畫一畫曰三世諸佛過這邊且道一大藏教是誰涕唾師乃自唾一唾大乘德遵禪師谷隱聰法嗣唐州大乘山德遵禪師問谷隱曰古人索火意旨如何曰任他滅師曰滅後如何曰初三十一師曰恁麼則好時節也曰汝見甚麼道理師曰今日一場困谷隱便打師乃有頌曰索火之機實快哉藏鋒妙用少人猜要會我師親的旨紅爐火盡不添柴永慶光普禪師谷隱聰法嗣果州永慶光普禪師初問谷隱古人道來日大悲院裏有齋意旨如何曰日出隈陽坐天寒不舉頭師入室次谷隱曰適來因緣汝作麼生會師曰會則途中受用不會則世諦流布曰未在更道師拂袖便出駙馬李遵勗居士谷隱聰法嗣駙馬都尉李遵勗居士謁谷隱問出家事谷隱以崔趙公問徑山公案答之公於言下大悟作偈曰學道須是鐵漢著手心頭便判直趣無上菩提一切是非莫管公一日與堅上座送別公問近離上黨得屆中都方接麈談遽回虎錫指雲屏之翠嶠訪雪嶺之清流未審此處彼處的的事作麼生堅曰利劒拂開天地靜霜刀繞舉斗牛寒公曰恰直今日耳聵堅曰一箭落雙鵰公曰上座為甚麼著草鞋睡堅以衣袖一拂公低頭曰今日可謂降伏也堅曰普化出僧堂公臨終時膈胃躁熱有尼道堅謂曰眾生見劫盡大火所燒時都尉切宜照管主人公公曰大師與我煎一服藥來尼無語公曰這師姑藥也不會煎得公與慈明問答罷泊然而終語見慈明傳中英公夏竦居士谷隱聰法嗣英公夏竦居士字子喬自契機於谷隱日與老衲遊偶上藍溥禪師至公問百骸潰散時那箇是長老自家底上藍曰前月二十離蘄陽公休去上藍却問百骸潰散時那箇是相公自家底公便喝上藍曰喝則不無畢竟那箇是相公自家底公對以偈曰休認風前第一機太虗何處著思惟山僧若要通消息萬里無雲月上時上藍曰也是弄精魂華嚴道隆禪師廣慧璉法嗣東京華嚴道隆禪師初參石門徹和尚問曰古者道但得隨處安閑自然合他古轍雖有此語疑心未歇時如何石門曰知有乃可隨處安閑如人在州縣住或聞或見千奇百怪他總將作尋常不知有而安閑如人在村落住有少聲色則驚怪傅說師於言下有省石門盡授其洞上厥旨後為廣慧嗣一日福嚴承和尚問曰禪師親見石門如何却嗣廣慧師曰我見廣慧渠欲剃髮使我擎凳子來廣慧曰道者我有凳子詩聽取乃曰放下便平穩我時便肯伊因敘在石門處所得廣慧曰石門所示如百味珍羞祇是飽人不得文公楊億居士廣慧璉法嗣文公楊億居士字大年幼舉神嬰及壯負才名而未知有佛一日過同僚見讀金剛經笑且罪之彼讀自若公疑之曰是豈出孔孟之右乎何侫甚因閱數板懵然始少敬信後會翰林李公維勉令參問及由秘書監出守汝州首謁廣慧廣慧接見公便問布鼓當軒擊誰是知音者廣慧曰來風深辨公曰恁麼則禪客相逢祇彈指也廣慧曰君子可八公應喏喏廣慧曰草賊大敗夜語次廣慧曰秘監曾與甚人道話來公曰某曾問雲巖諒監寺兩箇大虫相齩時如何諒曰一合相某曰我祇管看未審恁麼道還得麼廣慧曰這裏即不然公曰請和尚別一轉語廣慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裏走金毛獅子變作狗擬欲將身北斗藏應須合掌南辰後公問廣慧曰承和尚有言一切罪業皆因財寶所生勸人踈於財利況南閻浮提眾生以財為命國以財聚人教中有財法二施何得勸人疎財乎廣慧曰幡竿尖上鐵龍頭公曰海壇馬子似驢大廣慧曰楚鷄不是丹山鳳公曰佛滅二千歲比丘少慚愧公因微恙問環大師曰某今日忽違和大師慈悲如何醫療環曰丁香湯一盌公便作吐勢環曰恩愛成煩惱環為煎藥次公呌曰有賊環下藥於公前叉手側立公瞠目眎之曰少叢林漢環拂袖而出又一日問曰某四大將欲離散大師如何相救環乃槌胷三下公曰賴遇作家環曰幾年學佛法俗氣猶未除公曰禍不單行環作噓噓聲公書偈遺李都尉曰漚生與漚滅二法本來齊欲識真歸處趙州東院西都尉見遂曰泰山廟裏賣紙錢都尉即至公已逝矣
