後僧舉似大嶺庵閑和尚即羅山也閑曰還有人道得麼僧曰未有人道得閑曰汝歸與疎山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人累他匠人眉鬚墮落僧回如教而說師具威儀望大嶺作禮歎曰將謂無人大嶺有古佛放光射到此間難然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺浮山遠云踈山以錐錐地大嶺用刀剜空雖然二古德錯下錐刀今時人亦難搆副何故後語中有梢有殺然雖如是河裏失錢河裏摝雪竇宗云說甚麼龜毛長三尺臘月蓮華盡是和衣草裏輥直饒向這裏分三列四說得倜儻分明祖師正眼未夢見在我當時若見踈山恁麼道只向道一文也無待他更說道理便與掀倒禪牀拆却壽塔教這老漢無依倚處為甚如此知恩方解報恩師常握木蛇有僧問手中是甚麼師提起曰曹家女因鼓山舉威音王佛師師乃問作麼生是威音王佛師鼓山曰莫無慚愧好師曰闍黎恁麼道即得若約病僧即不然鼓山曰作麼生是威音王佛師師曰不坐無貴位青林師䖍禪師洞山价法嗣青林師䖍禪師初參洞山洞山問近離甚處師曰武陵曰武陵法道何似此間師曰胡地冬抽笋洞山曰別甑炊香飯供養此人師拂袖便出洞山曰此子向後走殺天下人在師在洞山栽松次有劉翁者求偈師作偈曰長長三尺餘鬱鬱覆青草不知何代人得見此松老劉得偈呈洞山洞山謂曰此是第三代洞山主人師辭洞山洞山曰子向甚麼處去師曰金輪不隱的徧界絕紅塵洞山曰善自保任師珍重而出洞山門送謂師曰恁麼去一句作麼生道師曰步步踏紅塵通身無影像洞山良久師曰老和尚何不速道洞山曰子得恁麼性急師曰某甲罪過便禮辭師住青林後遷洞山凡有新到先令般柴三轉然後參堂有一僧不肯問師曰三轉內即不問三轉外如何師曰鐵輪天子寰中旨僧無對師便打趂出大溈秀云夫欲君臣道合應須水乳和同這僧既抗節朝堂不覺喪身失命當時見道鐵輪天子寰中勑將坐具便摵待伊擬議便打上堂祖師門下鳥道玄微功窮皆轉不究難明汝等諸人直須離心意識參出凡聖路學方可保任若不如是非吾子息徑山杲云饒你離心意識參得透出凡聖路學得成也是雪峯道底白水本仁禪師洞山价法嗣高安白水本仁禪師因設先洞山忌齋僧問供養先師先師還來也無師曰更下一分供養著上堂老僧尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝說答汝話若向這裏會得有箇入處雪竇顯云本仁也甚奇恠要且貪觀天上既非聲前句後且作麼生入大溈秀云本仁只知橫千不會豎百如何是聲不是聲莫逐音響如何是色不是色莫逐青黃且從伊向聲前句後覓箇安身自然別有生涯徑山杲云本仁將一穿雲居子換却天下人眼睛却被這僧將一條斷貫索不動干戈穿却鼻孔後來舜老夫拈云本仁既已入草這僧又落深村然則陽春雪曲時人難和邨歌社舞到處與人合得着妙喜云舜老夫是則也是未免隨摟搜杲上座不惜眉毛為諸人說破聲不是聲色不是色馬後驢前神出鬼沒雪曲陽春和不齊邨歌社舞且淈𣸩以拂子擊禪牀云這箇決定不是聲復舉起云這箇決定不是色且畢竟是箇甚麼喝一喝云此時若不究根源直待當來問彌勒楚石琦云本仁也只道得箇聲不是聲色不是色別有甚麼奇特白雪陽春雖唱得爭奈時人和不得誵訛在甚麼處聲不是聲色不是色天奇瑞云三箇老漢皆明物外就裏掬水月在手弄花香滿衣不知放倒旗槍和泥合水免得強生枝節反陷自身且道色即是色聲即是聲要不悶依本分會麼萬頃荷花遮碧水一羣練雀噪青林他日逢人不得錯舉師謂鏡清曰時寒道者鏡清曰不敢師曰還有臥單也無曰設有亦無展底工夫師曰直饒道者滴水氷生亦不干他事曰滴水氷生事不相涉師曰是曰此人意作麼生師曰此人不落意曰不落意此人聻師曰高山頂上無可與道者㗖長生然和尚問如何是西來意師曰還見庭前杉樧樹否曰恁麼則和尚今日因學人致得是非師曰多口座主然去後師方知是雪峰禪客乃曰盜法之人終不成器然住後眾緣不備果符師記因僧問從上宗乘如何舉唱然云不可為闍黎一人荒却長生山也玄沙聞云然師兄佛法即大行受記之緣亦就白馬遁儒禪師洞山价法嗣洛京白馬遁儒禪師僧問如何是法身向上事師曰井底蝦蟆吞却月僧問黃龍如何是井底蝦蟆吞却月黃龍云不奈何云恁麼則吞却去也黃龍云一任吞云吞後如何黃龍云好蝦蟇龍牙居遁禪師洞山价法嗣潭州龍牙山居遁證空禪師撫州人也因參翠微乃問學人自到和尚法席一箇餘月不蒙一法示誨意在於何翠微曰嫌甚麼師又問洞山洞山曰爭怪得老僧法跟益別云祖師來也雲居齊云此三人尊宿還有親踈也無若有那箇親若無親踈眼在甚麼處師又問翠微如何是祖師意翠微曰與我將禪板來師遂過禪板翠微接得便打師曰打即任打要且無祖師意又問臨濟如何是祖師意臨濟曰與我將蒲團來師乃過蒲團臨濟接得便打師曰打即任打要且無祖師意後有僧問和尚行脚時問二尊宿祖師意未審二尊宿明也未師曰明即明也要且無祖師意東禪齊云眾中道佛法即有祇是無祖師意若恁麼會有何交涉別作麼生會無祖師意底道理五祖戒云祖師土宿臨頭又云和尚得與麼面長雪竇顯云臨濟翠微只解放不解收我當時若作龍牙待伊索蒲團禪板拈得劈胷便擲翠巖芝云當初如是今時衲僧皮下還有血麼溈山云翠微臨濟可謂本分宗師龍牙一等是撥草瞻風與他後人為龜鑒又舉住後僧問處乃云龍牙瞻前顧後應