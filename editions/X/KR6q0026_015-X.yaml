body:
  text: 青原下四世洞山良价禪師雲巖晟法嗣瑞州洞山良价悟本禪師會稽俞氏子幼歲從師念般若心經至無眼耳鼻舌身意處忽以手捫面問師曰某甲有眼耳鼻舌等何故經言無其師駭然異之曰吾非汝師年二十一詣嵩山具戒遊方首詣南泉值馬祖諱辰修齋南泉問眾曰來日設馬祖齋未審馬祖還來否眾皆無對師出對曰待有伴即來南泉曰此子雖後生甚堪雕琢師曰和尚莫壓良為賤次參溈山問曰頃聞南陽忠國師有無情說法話某甲未究其微溈山曰闍黎莫記得麼師曰記得溈山曰汝試舉一徧看師遂舉僧問如何是古佛心國師曰墻壁瓦礫是僧曰墻壁瓦礫豈不是無情國師曰是僧曰還解說法否國師曰常說熾然說無間歇僧曰某甲為甚麼不聞國師曰汝自不聞不可妨他聞者也僧曰未審甚麼人得聞國師曰諸聖得聞僧曰和尚還聞否國師曰我不聞僧曰和尚既不聞爭知無情解說法國師曰賴我不聞我若聞即齊於諸聖汝即不聞我說法也僧曰恁麼則眾生無分去也國師曰我為眾生說不為諸聖說僧曰眾生聞後如何國師曰即非眾生僧曰無情說法據何典教國師曰灼然言不該典非君子之所談汝豈不見華嚴經云剎說眾生說三世一切說師舉了溈山曰我這裏亦有祇是罕遇其人師曰某甲未明乞師指示溈山竪起拂子曰會麼師曰不會請和尚說溈山曰父母所生口終不為子說師曰還有與師同時慕道者否溈山曰此去澧陵攸縣石室相連有雲巖道人若能撥草瞻風必為子之所重師曰未審此人如何溈山曰他曾問老僧學人欲奉師去時如何老僧對他道直須絕滲漏始得他道還得不違師旨也無老僧道第一不得道老僧在這裏師遂辭溈山徑造雲巖舉前因緣了便問無情說法甚麼人得聞雲巖曰無情得聞師曰和尚聞否雲巖曰我若聞汝即不聞吾說法也師曰某甲為甚麼不聞雲巖竪起拂子曰還聞麼師曰不聞雲巖曰我說法汝尚不聞豈況無情說法乎師曰無情說法該何典教雲巖曰豈不見彌陀經云水鳥樹林悉皆念佛念法師於此有省乃述偈曰也大奇也大奇無情說法不思議若將耳聽終難會眼處聞時方得知師問雲巖某甲有餘習未盡雲巖曰汝曾作甚麼來師曰聖諦亦不為雲巖曰還歡喜也未師曰歡喜則不無如糞掃堆頭拾得一顆明珠師問雲巖擬欲相見時如何曰問取通事舍人師曰見問次曰向汝道甚麼師辭雲巖雲巖曰甚麼處去師曰雖離和尚未卜所止曰莫湖南去師曰無曰莫歸鄉去師曰無曰早晚却回師曰待和尚有住處即來曰自此一別難得相見師曰難得不相見臨行又問百年後忽有人問還邈得師真否如何祇對雲巖良久曰祇這是師沈吟雲巖曰价闍黎承當箇事大須審細師猶涉疑後因過水睹影大悟前旨有偈曰切忌從他覓迢迢與我疎我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如他日因供養雲巖真次僧問先師道祇這是莫便是否師曰是曰意旨如何師曰當時幾錯會先師意曰未審先師還知有也無師曰若不知有爭解恁麼道若知有爭肯恁麼道長慶稜云既知有為甚麼恁麼道又云養子方知父慈師在泐潭見初首座有語曰也大奇也大奇佛界道界不思議師遂問曰佛界道界即不問祇如說佛界道界底是甚麼人初良久無對師曰何不速道初曰爭即不得師曰道也未曾道說甚麼爭即不得初無對師曰佛之與道俱是名言何不引教初曰教道甚麼師曰得意忘言初曰猶將教意向心頭作病在師曰說佛界道界底病大小初又無對次日忽遷化時稱師為問殺首座价師因雲巖諱日營齋僧問和尚於雲巖處得何指示師曰雖在彼中不蒙指示曰既不蒙指示又用設齋作甚麼師曰爭敢違背他曰和尚初見南泉為甚麼却與雲巖設齋師曰我不重先師道德佛法祇重他不為我說破曰和尚為先師設齋還肯先師也無師曰半肯半不肯曰為甚麼不全肯師曰若全肯即孤負先師也問欲見和尚本來師如何得見師曰年牙相似即無阻矣僧擬進語師曰不躡前蹤別請一問僧無對雲居膺代云恁麼則不見和尚本來師也僧問長慶稜如何是年牙相似者長慶云古人恁麼道闍黎又向這裏覓箇甚麼問寒暑到來如何回避師曰何不向無寒暑處去曰如何是無寒暑處師曰寒時寒殺闍黎熱時熱殺闍黎投子同云幾乎與麼去瑯琊覺云我即不然如何是無寒暑處僧堂裏去雲居舜云大小瑯琊作這箇去就山僧即不然如何是無寒暑處三冬向暖火九夏取涼風寶峯文云大眾若也會得不妨神通遊戲一切臨時寒暑不相干若也不會且向寒暑裏經冬過夏上封才云洞山一句可謂主賓交參正偏涉入諸人如今向甚處回避無事上山行一轉借問諸人會也無泐潭準云若為人時冰也暖不為人時火也寒師與泰首座冬節喫果子次乃問有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處泰曰過在動用中同安顯別云不知師喚侍者掇退果卓五祖戒別首座云朝來更獻楚王看瑯琊覺云若不是洞山老人焉能辨得雖然如是洞山猶欠一着在溈山云諸人還知洞山落處麼若也不知徃徃作是非得失會去山僧道這果子非但首座不得喫假使盡大地人來亦不得正眼覷着雲葢本云洞山雖有打破虗空鉗鎚而無補綴底針線待伊道過在動用中但道請首座喫果子泰首座若是箇衲僧喫了也須吐出南堂靜云洞山坐籌帷幄決勝千里泰首座通身是口有理難伸溈山果云洞山壓良為賤泰首座有理難伸山僧路見不平要為雪耻當時纔見與麼問只向道靈山授記未到如此待他擬議拈果子劈面便擲不唯塞斷咽喉免見後人妄生卜度淨慈昌云洞山雖然掇得果卓去要且塞泰首座口不得問雪峯從甚處來曰天台來師曰見智者否曰義存喫鐵棒有分有僧不安要見師師遂往僧曰和尚何不救取人家男女師曰你是甚麼人家男女曰某甲是大闡提人家男女師良久僧曰四山相逼時如何師曰老僧日前也向人家屋簷下過來曰回互不回互師曰不回互曰教某甲向甚處去師曰粟畬裏去僧噓一聲曰珍重便坐脫師以拄杖敲頭三下曰汝祇解與麼去不解與麼來昭覺勤云大凡行脚人正要透脫這一件事這僧既是大闡提人家男女直至四山相逼手脚忙亂若不是洞山具大慈悲放一線道與他平展爭解恁麼去所以古人道臨終之際若一毫頭聖凡情量未盡未免入驢胎馬腹裏去只如洞山道我也亦從人家簷下過粟畬裏去鼎鼎礙四山不礙四山到這裏須是桶底子脫始得且道洞山意作麼生還會麼金鷄啄破瑠璃殻玉兔挨開碧海門因夜參不點燈有僧出問話退後師令侍者點燈乃召適來問話僧出來其僧近前師曰將取三兩粉來與這箇上座其僧拂袖而退自此省發遂罄捨衣資設齋得三年後辭師師曰善為時雪峯侍立問曰祇如這僧辭去幾時却來師曰他祇知一去不解再來其僧歸堂就衣鉢下坐化雪峯上報師師曰雖然如此猶較老僧三生在雪峯上問訊師曰入門來須有語不得道早箇入了也雪峯曰某甲無口師曰無口且從還我眼來雪峯無語雲居膺別前語云待某甲有口即道長慶稜別云恁麼則某甲謹退雪峯搬柴次乃於師面前拋下一束師曰重多少雪峯曰盡大地人提不起師曰爭得到這裏雪峯無語問時時勤拂拭為甚麼不得他衣鉢未審甚麼人合得師曰不入門者曰祇如不入門者還得也無師曰雖然如此不得不與他却又曰直道本來無一物猶未合得他衣鉢汝道甚麼人合得這裏合下得一轉語且道下得甚麼語時有一僧下九十六轉語並不契末後一轉始愜師意師曰闍黎何不早恁麼道別有一僧密聽祇不聞末後一轉遂請益其僧僧不肯說如是三年相從終不為舉一日因疾其僧曰某三年請舉前話不蒙慈悲善取不得惡取去遂持刀白曰若不為某舉即殺上座去也其僧悚然曰闍黎且待我為你舉乃曰直饒將來亦無處著其僧禮謝雪竇顯云他既不受是眼將來必應是瞎還見祖師衣鉢麼若於此入門便乃兩手分付非但大庾嶺頭一箇提不起設使合國人來且欵欵將去翠巖芝云總不合得他衣鉢却與古佛同參且道參阿誰天童覺云長蘆則不然直須將來若不將來爭知不受將來底必應是眼不受底真箇是瞎還會麼照盡體無依通身合大道靈隱嶽舉翠巖語了云到江吳地盡隔岸越山多有菴主不安凡見僧便曰相救相救多下語不契師乃去訪之菴主亦曰相救師曰甚麼相救菴主曰莫是藥山之孫雲巖嫡子麼師曰不敢菴主合掌曰大家相送便遷化僧問亡僧遷化向甚麼處去師曰火後一莖茆師謂眾曰知有佛向上人方有語話分僧問如何是佛向上人師曰非佛保福展別云佛非雲門偃云名不得狀不得所以言非法眼益別云方便呼為佛師與密師伯過水乃問過水事作麼生密曰不濕脚師曰老老大大作這箇語話密曰你又作麼生師曰脚不濕僧問茱萸如何是沙門行茱萸曰行則不無有覺即乖別有僧舉似師師曰他何不道未審是甚麼行僧遂進此語茱萸曰佛行佛行僧回舉似師師曰幽州猶似可最苦是新羅東禪齊云此語還有疑訛也無若有且道甚麼處不得若無他又道最苦是新羅還點檢得出麼他道行則不無有覺即乖却令再問是甚麼行又道佛行那僧是會了問不會了問請斷看僧却問如何是沙門行師曰頭長三尺頸長二寸師令侍者持此語問三聖然和尚然於侍者手上掐一掐侍者回舉似師師肯之師見幽上座來遽起向禪牀後立幽曰和尚為甚麼回避學人師曰將謂闍黎不見老僧問三身之中阿那身不墮眾數師曰吾常於此切僧問曹山先師道吾常於此切意作麼生曹山云要頭便斫去又問雪峯雪峯以拄杖劈口打云我亦曾到洞山來承天宗云一轉語海晏河清一轉語風高月冷一轉語騎賊馬趂賊試請辨看忽有箇衲僧出來道總不與麼也許伊具一隻眼徑山杲云恁麼葛藤也未夢見三箇老漢在復云何不向膏肓穴上下一針會下有老宿去雲巖回師問汝去雲巖作甚麼老宿曰不會師代曰堆堆地師行脚時會一官人曰三祖信心銘弟子擬註師曰纔有是非紛然失心作麼生註法眼益代云恁麼則弟子不註也師看稻次見朗上座牽牛師曰這箇牛須好看恐傷人苗稼朗曰若是好牛應不傷人苗稼師作五位君臣頌曰正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌偏中正失曉老婆逢古鏡分明覿面別無真休更迷頭猶認影正中來無中有路隔塵埃但能不觸當今諱也勝前朝斷舌才兼中至兩刃交鋒不須避好手猶如火裏蓮宛然自有沖天志兼中到不落有無誰敢和人人盡欲出常流折合還歸炭裏坐師因曹山辭遂囑曰吾在雲巖先師處親印寶鏡三昧事窮的要今付於汝詞曰如是之法佛祖密付汝今得之宜善保護銀盌盛雪明月藏鷺類之弗齊混則知處意不在言來機亦赴動成窠臼差落顧佇背觸俱非如大火聚但形文彩即屬染汙夜半正明天曉不露為物作則用諸苦雖非有為不是無語如臨寶鏡形影相覩汝不是渠渠正是汝如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故重離六爻偏正回互疊而為三變盡成五如荎草味如金剛杵正中妙挾敲唱雙舉通宗通塗挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟因緣時節寂然昭著細入無間大絕方所毫忽之差不應律呂今有頓漸緣立宗趣宗趣分矣即是規矩宗通趣極真常流注外寂中搖係駒伏鼠先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之𮩴以有下劣寶几珍御以