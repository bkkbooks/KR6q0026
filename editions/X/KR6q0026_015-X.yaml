風無久滯此善宜護持遂書偈送曰須彌立太虗日月輔而轉羣峰漸倚他白雲方改變少林風起叢曹溪洞簾卷金鳳宿龍巢宸苔豈車碾令依圓通秀禪師師至彼無所參問唯嗜睡而已執事白通曰堂中有僧日睡當行規法通曰是誰曰青上座通曰未可待與按過通即曳杖入堂見師正睡乃擊牀呵曰我這裏無閑飯與上座喫了打眠師曰和尚教某何為通曰何不參禪去師曰美食不中飽人喫通曰爭奈大有人不肯上座師曰待肯堪作甚麼通曰上座曾見甚麼人來師曰浮山通曰怪得恁麼頑賴遂握手相笑歸方丈由是道聲籍甚興陽清剖禪師大陽玄法嗣郢州興陽清剖禪師在大陽作園頭種瓜次大陽問甜瓜何時得熟師曰即今熟爛了也曰揀甜底摘來師曰與甚麼人喫曰不入園者師曰未審不入園者還喫也無曰汝還識伊麼師曰雖然不識不得不與大陽笑而去鄭金部問和尚甚麼時開堂師曰不歷僧祇數日月未生前師臥疾次大陽問是身如泡幻泡幻中成辦若無箇泡幻大事無由辦若要大事辦識取箇泡幻作麼生師曰猶是這邊事大陽曰那邊事作麼生師曰匝地紅輪秀海底不栽花大陽笑曰乃爾惺惺邪師喝曰將謂我忘却竟爾趨寂福嚴審承禪師大陽玄法嗣南嶽福嚴審承禪師侍立大陽次大陽曰有一人徧身紅爛臥在荊棘林中周匝火圍若親近得此人大敞開若親近不得時中以何為據師曰六根不具七識不全大陽曰你教伊出來我要見伊師曰適來別無左右祇對和尚大陽曰官不容針師便禮拜師後至華嚴隆和尚處舉前話隆云冷如毛粟細如冰雪李相公特上山問如何是祖師西來意師指庭前栢樹公如是三問師如是三答公欣然乃有頌曰出沒雲閑滿太虗元來真相一塵無重重請問西來意唯指庭前栢一株羅浮顯如禪師大陽玄法嗣惠州羅浮山顯如禪師初到大陽大陽問汝是甚處人曰益州大陽曰此去幾里曰五千里大陽曰你與麼來還曾踏著麼曰不曾踏著大陽曰汝解騰空那曰不解騰空大陽曰爭得到這裏曰步步不迷方通身無辨處大陽曰汝得超方三昧邪曰聖心不可得三昧豈彰名大陽曰如是如是汝應信此即本體全彰理事不二善自護持白馬歸喜禪師大陽玄法嗣襄州白馬歸喜禪師初問大陽學人蒙昧乞指箇入路大陽曰得良久乃召師師應諾大陽曰與你箇入路師於言下有省青原下十一世芙蓉道楷禪師投子青法嗣東京天寧芙蓉道楷禪師沂州崔氏子自幼學辟穀隱伊陽山後遊京師籍名術臺寺試法華得度謁投子於海會乃問佛祖言句如家常茶飯離此之外別有為人處也無投子曰汝道寰中天子敕還假堯舜禹湯也無師欲進語投子以拂子𢷾師口曰汝發意來早有三十棒也師即開悟再拜便行投子曰且來闍黎師不顧投子曰汝到不疑之地邪師即以手掩耳後作典座投子曰廚務勾當不易師曰不敢投子曰煑粥邪蒸飯邪師曰人工淘米著火行者煑粥蒸飯投子曰汝作甚麼師曰和尚慈悲放他閑去一日侍投子遊菜園投子度拄杖與師師接得便隨行投子曰理合恁麼師曰與和尚提鞋挈杖也不為分外投子曰有同行在師曰那一人不受教投子休去至晚問師早來說話未盡師曰請和尚舉投子曰卯生日戌生月師即點燈來投子曰汝上來下去總不徒然師曰在和尚左右理合如此投子曰奴兒婢子誰家屋裏無師曰和尚年尊闕他不可投子曰得恁麼殷勤師曰報恩有分青原下十二世寶峯惟照禪師芙蓉楷法嗣洪州寶峯闡提惟照禪師簡州李氏子幼超邁而惡俗一日授書至性相近也習相遠也遽曰凡聖本一體以習故差別我知之矣即趨成都師鹿苑清泰年十九剃染登具泰令聽起信於大慈師輒歸臥泰詰之師曰既稱正信大乘豈言說所能了乃虗心游方謁芙蓉於大洪甞夜坐閣道適風雪震薄聞謦盜者傳呼過之隨有所得辤去大觀中芙蓉嬰難師自三吳欲趨沂水僕夫迷道師舉杖擊之忽大悟嘆曰是地非鼇山也邪比至沂芙蓉望而喜曰紹隆吾宗必子數輩矣因留躬耕湖上累年智證成就鹿門法燈禪師芙蓉楷法嗣襄州鹿門法燈禪師成都劉氏子依大慈寶範為僧俾聽華嚴得其要棄謁芙蓉芙蓉問曰如何是空劫已前自己師於言下心跡泯然從容進曰靈然一句超羣象逈出三乘不假修芙蓉撫而印之青原下十三世長蘆清了禪師丹霞淳法嗣真州長蘆真歇清了禪師左綿雍氏子襁褓入寺見佛喜動眉睫咸異之年十八試法華得度往成都大慈習經論領大意出蜀至沔漢扣丹霞之室丹霞問如何是空劫已前自己師擬對丹霞曰你鬧在且去一日登鉢盂峰豁然契悟徑歸侍立丹霞掌曰將謂你知有師欣然拜之翌日丹霞上堂曰日照孤峰翠月臨溪水寒祖師玄妙訣莫向寸心安便下座師直前曰今日陞座更瞞某不得也丹霞曰你試舉我今日陞座看師良久丹霞曰將謂你瞥地師便出天童正覺禪師丹霞淳法嗣明州天童宏智正覺禪師隰州李氏子十四具戒十八遊方訣其祖曰若不發明大事誓不歸矣及至汝州香山成枯木一見深所器重一日聞僧誦蓮經至父母所生眼悉見三千界瞥然有省即詣丈室陳所悟香山指臺上香合曰裏面是甚麼物師曰是甚麼心行香山曰汝悟處又作麼生師以手畵一圓相呈之復拋向後香山曰弄泥團漢有甚麼限師曰錯香山曰別見人始得師應喏喏即造丹霞丹霞問如何是空劫已前自己師曰井底蝦蟆吞却月三更不借夜明簾丹霞曰未在更道師擬議丹霞打一拂子曰又道不借師言下釋然遂作禮丹霞曰何不道取一句師曰某甲今日失錢遭罪丹霞曰未暇打得你且去圓通德止禪師寶峯照法嗣江州圓通青谷真際德止禪師金紫徐閎中之季子也世居歷陽師雙瞳紺碧神光射人弱冠夢異僧授四句偈已而有以南安巖主像遺之者即傍所載聰明偈自是持念不忘後五年隨金紫將漕西洛一夕忽大悟連作數偈每嘯歌自若眾莫測之乃力求出家父弗許欲以官授之師曰某方將脫世網不著三界豈復刺頭於利名中邪請移授從兄玨遂祝髮受具未數載名振京師宣和三年春徽宗皇帝賜號真際俾居圓通華藥智朋禪師寶峯照法嗣衡州華藥智朋禪師四明黃氏子依寶峰有年無省因為眾持鉢寶峰自題其像曰雨洗淡紅桃蕚嫰風搖淺碧柳絲輕白雲影裏怪石露綠水光中古木清噫你是何人至焦山枯木成禪師見之歎曰今日方知此老親見先師來師遂請益其贊成曰豈不見法眼拈夾山境話曰我二十年祇作境會師即契悟蘿湖野錄云成指以問師曰汝會麼師曰不會成曰汝記得法燈擬寒山否師遂誦至誰人知此意令我憶南泉於憶字處成遽以手掩師口曰住住師豁然有省乃曰元來恁麼地成曰汝作麼生會師曰春生夏長秋收冬藏成曰直須保任師應喏青原齊禪師石門易法嗣吉州青原齊禪師福州陳氏子從雲蓋智禪師出家執事首座首座一日秉拂罷師問曰某聞首座所說莫曉其義伏望慈悲指示首座諄諄誘之使究無著說這箇法踰兩日有省以偈呈曰說法無如這箇親十方剎海一微塵若能於此明真理大地何曾見一人首座駭然因語智得度徧扣諸方後至石門深蒙器可尼佛通禪師石門易法嗣遂寧府香山尼佛通禪師因誦蓮經有省往見石門乃曰成都喫不得也遂寧喫不得也石門拈拄杖打出通忽悟曰榮者自榮謝者自謝秋露春風好不著便石門拂袖歸方丈師亦不顧而出青原下十四世雪竇嗣宗禪師天童覺法嗣明州雪竇聞庵嗣宗禪師徽州陳氏子幼業經圓具依妙湛慧禪師詰問次釋然契悟慧以麈尾拂付之後謁宏智蒙印可其道愈尊善權法智禪師天童覺法嗣常州善權法智禪師陝府栢氏子壯於西京聖果寺祝髮習華嚴棄謁南陽謹次參大洪智踰十年無所證後於宏智言下豁然出居善權次遷金粟淨慈慧暉禪師天童覺法嗣杭州淨慈自得慧暉禪師會稽張氏子甫二十扣真歇於長蘆微有所證旋里謁宏智宏智舉當明中有暗不以暗相遇當暗中有明不以明相覩問之語不契初夜定回往聖僧前燒香而宏智適至師見之頓明前話次日入室宏智舉堪嗟去日顏如玉却歎回時𩯭似霜詰之師曰其入離其出微自爾問答無滯宏智許為室中真子紹興丁巳開法補陀徙萬壽及吉祥雪竇瑞巖法恭禪師天童覺法嗣明州瑞巖石法恭禪師郡之奉化林氏子往延慶講下一夕誦法華至父母所生眼悉見三千界時聞風刺椶櫚葉聲忽然有省棄依天童始明大旨吉祥元實禪師天衣聰法嗣無為軍吉祥元實禪師高郵人自到天衣𤼭夜精勤脇不至席一日偶失笑喧眾天衣擯之中夜宿田里覩星月粲然有省曉歸趨方丈天衣見乃問洞山五位君臣如何話會師曰我這裏一位也無天衣令參堂謂侍僧曰這漢却有箇見處奈不識宗旨何入室次天衣預令行者五人分序而立師至俱召實上座師於是密契奧旨述偈曰一位纔彰五位分君臣叶處紫雲屯夜明簾卷無私照金殿重重顯至尊天衣稱善投子道宣禪師天衣聰法嗣舒州投子道宣禪師久侍天衣無所契天衣叱之師忘寢食者月餘一夕聞巡更鈴聲忽猛省曰住住一聲直近青霄路寒潭月皎有誰知泥牛觸折珊瑚樹天衣聞命職藏司住後凡有所問以拂子作搖鈴勢青原下十五世雪竇智鑒禪師天童珏法嗣明州雪竇智鑒禪師滁州吳氏子兒時母與洗手痬因曰是甚麼對曰我手似佛手長失恃怙依真歇於長蘆大休首眾即器之後遯象山百怪不能惑深夜開悟求證於延壽然復見大休
