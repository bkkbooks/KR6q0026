body:
  text: 過去六佛毗婆尸佛毗婆尸佛過去莊嚴劫第九百九十八尊偈曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住尸棄佛尸棄佛莊嚴劫第九百九十九尊偈曰起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性毗舍浮佛毗舍浮佛莊嚴劫第一千尊偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅拘留孫佛拘留孫佛見在賢劫第一尊偈曰見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別拘那含牟尼佛拘那含牟尼佛賢劫第二尊偈曰佛不見身知是佛若實有知別無佛智者能知罪性空坦然不怖於生死迦葉佛迦葉佛賢劫第三尊偈曰一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福西天東土應化聖賢文殊菩薩文殊菩薩一日令善財採藥曰是藥者採將來善財徧觀大地無不是藥却來白曰無有不是藥者文殊曰是藥者採將來善財遂於地上拈一莖草度與文殊文殊接得呈起示眾曰此藥亦能殺人亦能活人五祖戒出善財語云慙愧首山念云文殊大似掩耳偷鈴瑯琊覺云文殊可謂誠實之言要且額頭汗出口裏膠生溈山云善財能採文殊善用非但寢疾毗耶直饒盡大地人抱必死之疾到文殊所教他箇箇脫體而去何故解用不須霜刃劒延齡何必九還丹梁山遠云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺藜之園文殊當時與麼舉揚若不是善財同聲相應同氣相求未免一場懡㦬還知二大老落處麼處處綠楊堪繫馬家家門首透長安天童華云大小文殊被善財換却眼睛元叟端云善財解採不解用文殊解用不解採以致盡大地人病在膏肓大眾且道誵訛在甚麼處猴愁摟搜頭狗走抖擻口萬峯蔚云善財拈起藥草家醜無端露盡文殊舉示諸方文殊漏逗不少嵩山不令人知且道有何玄妙千年松下茯苓得者自然微笑菴提遮女問文殊曰明知生是不生之理為甚麼却被生死之所流轉文殊曰其力未充天親菩薩天親菩薩從彌勒內宮而下無著菩薩問曰人間四百年彼天為一晝夜彌勒於一時中成就五百億天子證無生法忍未審說甚麼法天親曰祇說這箇法祇是梵音清雅令人樂聞薦福懷云彌勒已是錯說天親已是錯傳山僧今日將錯就錯與你諸人註破良久云諦聽諦聽向下文長付在來日維摩大士維摩會上三十二菩薩各說不二法門文殊曰我於一切法無言無說無示無識離諸問答是為菩薩入不二法門於是文殊又問維摩仁者當說何等是菩薩入不二法門維摩默然文殊讚曰乃至無有語言文字是菩薩真入不二法門保福展云文殊也似掩耳偷鈴力盡烏江維摩一默未出化門又云大小維摩被文殊一坐直至如今起不得雪竇顯云維摩道什麼復云勘破了也瑯琊覺云文殊與麼讚善也是杓卜聽虗聲維摩默然你等諸人不得鑽龜打瓦昭覺勤云這一轉語叢林話會不少有道默然有道良久有道據坐有道不對要且摸索不著直得其聲如雷普驚群動自古及今前聖後聖所說法門只向維摩片時之間一時顯現且道正當恁麼時作箇甚麼得見維摩溈山果云大眾居士門高可謂壁立萬仞水泄不通擬心則差動念則隔不擬不動落在無事界中諸人作麼生入良久云退後退後大溈智云不二法門是默然不是默然若是默然文殊則為剩語若不是默然維摩一場虗設畢竟如何具眼者辨金粟悟云不二與默然廣慧與諸人拈過一邊還見維摩做處麼當堂慵正坐全體本無餘善財童子善財參五十三員善知識末後到彌勒閣前見樓閣門閉瞻仰讚嘆見彌勒從別處來善財作禮曰願樓閣門開令我得入尋時彌勒至善財前彈指一聲樓閣門開善財入已閣門即閉見百千萬億樓閣一一樓閣內有一彌勒領諸眷屬并一善財而立其前善財因無著菩薩問曰我欲見文殊何者即是善財曰汝發一念心清淨即是無著曰我發一念心清淨為甚麼不見善財曰是真見文殊須菩提尊者須菩提尊者在巖中宴坐諸天雨華讚嘆尊者曰空中雨華讚嘆復是何人云何讚嘆天曰我是梵天敬重尊者善說般若尊者曰我於般若未甞說一字汝云何讚嘆天曰如是尊者無說我乃無聞無說無聞是真說般若雪竇顯云避喧求靜處世未有其方他在巖中宴坐也被這一隊漢塗糊伊更有這老漢把不住問空中雨華讚歎復是何人早見敗闕了也我重尊者善說般若惡水驀頭潑又云我於般若未曾說一字草裏走尊者無說我乃無聞識甚好惡總似這般底何處有今日復召大眾雪竇幸是無事人你來這裏覓箇什麼以拄杖一時趂下尊者一日說法次帝釋雨華尊者乃問此華從天得邪從地得邪從人得邪帝釋曰弗也尊者曰從何得邪帝釋乃舉手尊者曰如是如是雲門偃云帝釋舉手處作麼生與你四大五蘊釋迦老子是同是別舍利弗尊者舍利弗尊者因入城遙見月上女出城舍利弗心口思惟此姊見佛不知得忍不得忍否我當問之纔近便問大姊往甚麼處去女曰如舍利弗與麼去舍利弗曰我方入城汝方出城何言如我恁麼去女曰諸佛弟子當依何住舍利弗曰諸佛弟子依大涅槃而住女曰諸佛弟子既依大涅槃而住而我亦如舍利弗與麼去溈山云一人入城一人出城何言如舍利弗與麼去若人知得舍利弗月上女二人去處十二時中動轉施為無非住諸佛大涅槃若也未知業識茫茫無本可據東禪觀云舍利弗依大涅槃而住坐在解脫深坑月上女如舍利弗與麼去也是隨邪逐惡昭覺勤云住無所住行無所行見無所見用無所用各人脚跟下廓同太虗如十日並照觸處光輝苟知恁麼則與月上女同證無生得不退轉隨去來處無不皆在大解脫中三世諸佛鼻孔一時穿却說甚麼如舍利弗恁麼去佛慧泉頌云淡籠烟深霧鶖子寧知此條路直饒撞入涅槃城未免隨他與麼去月上女實堪悲愛將青黛畵蛾眉舍利弗問須菩提夢中說六波羅蜜與覺時同異須菩提曰此義深遠吾不能說會中有彌勒大士汝往彼問舍利弗問彌勒彌勒曰誰名彌勒誰是彌勒舍利弗問天女曰何以不轉女身天女曰我從十二年來求女人相了不可得當何所轉即時天女以神通力變舍利弗令如天女天女自化身如舍利弗乃問言何以不轉女身舍利弗以天女像而答言我今不知云何轉面而變為女身白雲端代云吾不如汝殃崛摩羅尊者殃崛摩羅尊者未出家時外道受教為嬌尸迦欲登王位用千人拇指為花冠已得九百九十九唯欠一指遂欲殺母取指時佛在靈山以天眼觀之乃作沙門在殃崛前殃崛遂釋母欲殺佛佛徐行殃崛急行追之不及乃喚曰瞿曇住住佛告曰我住久矣是汝不住殃崛聞之心忽開悟遂棄刃投佛出家賓頭盧尊者賓頭盧尊者因阿育王內宮齋三萬大阿羅漢躬自行香見第一座無人王問其故海意尊者曰此是賓頭盧位此人近見佛來王曰今在何處海意曰且待須臾言訖賓頭盧從空而下王請就座禮敬尊者不顧王乃問承聞尊者親見佛來是合尊者以手䇿起眉曰會麼王曰不會尊者曰阿耨達池龍王曾請佛齋吾是時亦預其數翠巖真云且道什麼處見直饒雪天漂渺湖光澹蕩且莫說夢保寧勇代王云希有希有溈山云無憂王飯三萬阿羅漢要且不識賓頭盧當時待他策起眉毛云會麼便與作禮非唯識賓頭盧亦乃同參古佛雲居元代王云當時驀面便唾虎丘隆云賓頭盧得大機顯大用不謾親見佛來雖然賴阿育王放過若不放過洎合打失眉毛放過則且置尊者策起眉毛又作麼生還會麼當臺一鑑明如日萬古晴空絕是非梁山遠云阿育王輕輕借問賓頭盧草草承當仔細檢點將來不勝漏逗且那裏是漏逗處國清才子貴家富小兒嬌薦福行云大王七寶隨身尊者天龍擁衛驀然狹路相逢彼此難為回避且道其中事作麼生閻浮接得真天子同踏毗盧頂上行障蔽魔王障蔽魔王領諸眷屬一千年隨金剛齊菩薩覔起處不得忽一日得見乃問曰汝當依何而住我一千年覔汝起處不得金剛齊曰我不依有住而住不依無住而住如是而住法眼益云障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼徑山杲云既覓起處不得一千年隨從底是甚麼金剛齊云我不依有住而住不依無住而住如是而住互相熱瞞法眼道障蔽魔王不見金剛齊即且從只如金剛齊還見障蔽魔王麼恁麼批判也是看孔著楔即今莫有知妙喜起處底麼喝云寐語作麼東禪嶽云富貴即易貧窮即難虗空無心墻壁有耳二老漢不得無過且道過在於何路從平處險人向靜中忙那叱太子那叱太子析肉還母析骨還父然後現本身運大神力為父母說法秦跋陁禪師秦跋陁禪師問生法師講何經論生曰大般若經師曰作麼生說色空義曰眾微聚曰色眾微無自性曰空師曰眾微未聚喚作甚麼生罔措師又問別講何經論曰大涅槃經師曰如何說涅槃之義曰涅而不生槃而不滅不生不滅故曰涅槃師曰這箇是如來涅槃那箇是法師涅槃寶誌禪師寶誌禪師初金陵東陽民朱氏之婦上巳日聞兒啼鷹巢中梯樹得之舉以為子七歲依鍾山大沙門僧儉出家專修禪觀宋太始二年髮而徒跣著錦袍往來皖山劒水之下以翦尺拂子拄杖頭負之而行天鑑二年梁武帝韶問弟子煩惑未除何以治之答曰十二帝問其旨如何答曰在書字時節刻漏中帝益不曉帝甞詔畫工張僧繇寫師像僧繇下筆輙不自定師遂以指面門分披出十二面觀音妙相殊麗或慈或威僧繇竟不能寫他日與帝臨江縱望有物泝流而上師以杖引之隨杖而至乃紫旃檀也即以屬供奉官俞紹令雕師像頃刻而成神采如生師垂語曰終日拈香擇火不知身是道場雪竇顯云一對無孔鐵鎚昭覺勤云終日拈香擇火不知拈香擇火又曰大道祇在目前要且目前難覩欲識大道真體不離聲色言語又曰京都鄴都浩浩還是菩提大道法眼益云京都鄴都浩浩不是菩提大道十二時歌平旦寅狂機內有道人身窮苦枉經無數劫不信常擎如意珍若捉物入迷津但有纖毫即是塵不住舊時無相貌外尋知識也非真日出卯出處不須生善巧縱使神光照有無舉意便遭魔境嬈若施功終不了曉夜被他人我拗不用安排祇麼從何曾心地生煩惱食時辰無明本是釋迦身坐臥不知元是道祇麼忙忙受苦辛認聲色覔疎親盡是他家染污人若擬痴心求作佛問取虗空始出塵禺中巳未了之人爭為計假饒特達祖師言莫向心頭安了義祇守玄沒文字認著依前還不是蹔時自肯不追尋永劫不遭魔境使日南午四大身中無價寶陽𦦨空華不肯拋作意脩行受辛苦不曾迷莫求悟任你朝陽幾回暮有相身中無相身無明路上無生路日昳未心地何曾安了義他家文字有踈親不用工夫求的意任縱橫絕忌諱長在人間不居世運用元來聲色中迷夫未識爭為計晡時申學道先須不厭塵有相本來權積聚無形不用更安真作淨潔却勞神莫認痴強作近隣言下不求無住處暫時喚作出家人日入酉虗幻聲香不長久禪悅珍羞尚不飡誰能更飲無明酒沒可把沒可守蕩蕩逍遙未曾有縱使多聞達古今也是痴狂外邊走黃昏戌狂子興功投暗室假使心通無量時歷劫何曾異今日擬思量却啾唧轉使心頭黑如漆晝夜舒光照有無痴人喚作波羅蜜人定亥勇猛精進成懈怠不起纖毫脩學心無相光中常自在超釋迦越祖代心有微塵還窒礙放蕩長如痴兀人他家自有通人愛半夜子心住無生即生死心法何曾屬有無用時便用勿文字佛祖言外邊事識取起時還不是作境搜求實總無生死魔來任相試鷄鳴丑一顆圓光明已久內外追尋覔總無境上施為渾大有不見頭也無手世界壞時渠不朽未了之人聽一言祇這如今誰動口善慧大士善慧大士者婺州義烏縣人也齊建武四平丁丑五月八日降于雙林鄉傅宣慈家本名翕年十六納劉氏女名妙光生普建普成二子二十四與里人稽亭浦漉魚獲已沈籠水中祝曰去者適止者留人或謂之愚會有天竺僧嵩頭陀曰我與汝毗婆尸佛所發誓今兜率宮衣鉢見在何日當還因命臨水觀影見圓光寶葢大士笑謂之曰鑪韛之所多鈍鐵良醫之門足病人度生為急何思彼樂乎嵩指松山頂曰此可棲矣大士躬耕而居之有人盜菽麥瓜果大士即與籃籠盛去日常營作夜則行道見釋迦金粟定光三如來放光襲其體大士乃曰我得首楞嚴定天嘉二年感七佛相隨釋迦引前維摩接後唯釋尊數顧共語為我補處也其山頂黃雲盤旋若葢因號雲黃山梁武帝請講金剛經大士纔陞座以尺揮案一下便下座帝愕然聖師曰陛下還會麼帝曰不會聖師曰大士講經竟汾陽昭云講得甚好白雲端云傅大士與誌公被武帝一狀領過本覺一云傅大士已是葛藤誌公重下註脚諸人如今樂聞麼良久云兩段不同老宿云大士不得誌公洎成虗棄又一日講經次帝至大眾皆起唯大士端坐不動近臣報曰聖駕在此何不起大士曰法地若動一切不安大士一日披衲頂冠靸履朝見帝問是僧邪大士以手指冠帝曰是道邪大士以手指靸履帝曰是俗邪大士以手指衲衣心王銘曰觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪嗔體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沉諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好自防慎剎那造作還復漂沉清淨心智如世黃金般若法藏並在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今有偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇這語聲是玄沙備云大小傅大士祇認得箇昭昭靈靈雪竇顯云天下衲僧跳不出直饒口挂壁上漢別有一竅勘過了打又云玄沙也是打草蛇驚九峯勤云大小傅大士奈一法中而有異九峯即不然夜夜困即眠朝朝覺即起洞山聰云九峯和尚是大力量人言不虗發洞山道困來即便眠覺來即便起只如你衲僧家白日還打睡麼雖然如是三十年後且莫和泥合水法昌遇云此是古佛垂慈不無方便爭奈善因而招惡果傅大士如張漫天網羅龍打鳳奈何鱗甲羽毛總在裏許逃生無路若是靈禽異獸決定別有生涯保寧勇云大眾傅大士此頌古今不墜一切人知向此瞥地者亦多錯會者不少玄沙云大小傅大士只認得箇昭昭靈靈洞山總云且道衲僧家日裏還曾睡也無此兩轉語誰言世上無仙客須信壺中別有天保寧亦有一頌要眠時即眠要起時即起水洗面皮光啜茶濕却觜大海紅塵飛平地波濤起阿呵阿呵呵囉哩哩囉哩千巖長云三尊宿大似徐六擔板傅大士又俗氣未除若論向上宗乘總欠悟在且道無明具甚麼眼目不見道直須揮劍若不揮劍漁父棲巢又曰空手把鋤頭步行騎水牛人從橋上過橋流水不流天奇瑞云爵祿可辭白刃可蹈此語難得也何故五更鷄唱兮花開上苑三秋葉落兮雲罩前溪又曰有物先天地無形本寂寥能為萬象主不逐四時凋南嶽慧思禪師南嶽慧思禪師武津李氏子因誌公令人傳語曰何不下山教化眾生目視雲漢作甚麼師曰三世諸佛被我一口吞盡何處更有眾生可化五祖戒云更說道理看報慈遂徵云且道山上語山下語雪竇顯云有什麼屎臭氣瑯瑘覺云驗人端的處雲居舜云思大和尚寶公未傳語時猶較些子翠巖芝云思大祇見錐頭利不見鑿頭方芭蕉徹云更進一步又云雖是入泥入水幾人搆得天聖泰云思大祇知開口寶公平地喫交保寧勇別思大云傳語法師合取狗口天台智者禪師天台山修禪寺智者禪師諱智顗荊州華容陳氏子在南嶽誦法華經至藥王品曰是真精進是名真法供養如來於是悟法華三昧獲旋陀羅尼見靈山一會儼然未散徑山杲云而今未獲旋陀羅尼者還見靈山一會否若見以何為證若不見是真精進是名真法供養如來只恁麼念過却成剩法矣泗州僧伽大聖泗州僧伽大聖或問師何姓師曰姓何曰何國人師曰何國人天台豐干禪師天台山豐干禪師因寒山問古鏡未磨時如何照燭師曰冰壺無影像猿猴探水月曰此是不照燭也更請道看師曰萬德不將來教我道甚麼寒山拾得俱作禮而退師欲遊五臺問寒山拾得曰汝共我去遊五臺便是我同流若不共我去遊五臺不是我同流寒山曰你去遊五臺作甚麼師曰禮文殊寒山曰你不是我同流翠巖芝云大似辯才見蕭翼師尋獨入五臺逢一老人便問莫是文殊麼曰豈可有二文殊師作禮未起忽然不見趙州諗代云文殊文殊天台寒山子天台山寒山子因眾僧炙茄次將茄串向一僧背上打一下僧回首寒山呈起茄串曰是甚麼僧曰這風顛漢寒山向傍僧曰你道這僧費却我多少鹽醋寶峯文云寒山打這僧實為費鹽醬多莫別有道理黃龍清云寒山子只知這僧費多少鹽醬不知自己拋撒更多且道什麼處是拋撒處良久云十方世界成狼藉一日收來五味全因趙州遊天台路次相逢寒山見牛跡問趙州曰上座還識牛麼趙州曰不識寒山指牛跡曰此是五百羅漢遊山趙州曰既是羅漢為甚麼却作牛去寒山曰蒼天蒼天趙州呵呵大笑寒山曰作甚麼趙州曰蒼天蒼天寒山曰這廝兒宛有大人之作天台拾得子天台山拾得子一日掃地寺主問汝名拾得因豐干拾得汝歸汝畢竟姓箇甚麼拾得放下掃帚叉手而立寺主再問拾得拈掃帚掃地而去寒山搥胸曰蒼天蒼天拾得曰作甚麼寒山曰不見道東家人死西家人助哀二人作舞笑哭而出國清寺半月念戒眾集拾得拍手曰聚頭作想那事如何維那叱之拾得曰大德且住無嗔即是戒心淨即出家我性與你合一切法無差明州布袋和尚明州奉化縣布袋和尚形裁腲脮蹙額皤腹出語無定寢臥隨處常以杖荷一布囊并破席凡供身之具盡貯囊中入肆聚落見物則乞或魚𦵔纔接入口分少許投囊中時號長汀子一日有僧在師前行師乃拊其背僧回首師曰乞我一文錢曰道得即與汝一文師放下布袋叉手而立白鹿和尚問如何是布袋師便放下布袋曰如何是布袋下事師負之而去先保福和尚問如何是佛法大意師放下布袋叉手保福曰為祇如此為更有向上事師負之而去師在街衢立有僧問和尚在這裏作甚麼師曰等箇人曰來也來也歸宗柔別云歸去來師曰汝不是這箇人曰如何是這箇人師曰乞我一文錢有偈曰吾有一軀佛世人皆不識不塑亦不裝不雕亦不刻無一滴灰泥無一點彩色人畫畫不成賊偷偷不得體相本自然清淨非拂拭雖然是一軀分身千百億又有偈曰一鉢千家飯孤身萬里遊青目覩人少問路白雲頭梁貞明三年丙子三月師將示滅於岳林寺東廊下端坐磐石而說偈曰彌勒真彌勒分身千百億時時示時人時人自不識偈畢安然而化其後復現于他州亦負布袋而行法華志言大士法華志言大士壽春許氏子留講肆久之一日讀雲門錄忽契悟未幾宿命遂通獨語笑口吻囁嚅日常不輟世傳誦法華因以名之丞相呂許公問佛法大意師曰本來無一物一味却成真集仙王質問如何是祖師西來意師曰青山影裏潑藍起寶塔高吟撼曉風又曰請法華燒香師曰未從齋戒覔不向佛邊求國子助教徐岳問祖師西來意師曰街頭東畔底徐曰某甲未會師曰三般人會不得僧問師凡邪聖邪遂舉手曰我不在此住扣冰澡先古佛扣冰澡先古佛建寧新豐翁氏子初以講說為眾所歸棄謁雪峯手携鳧茈一包醬一器獻之雪峯曰包中是何物師曰鳧茈雪峯曰何處得來師曰泥中得雪峯曰泥深多少師曰無丈數雪峯曰還更有麼曰轉有轉深又問器中何物曰醬雪峯曰何處得來曰自合得雪峯曰還熟也未曰不較多雪峯異之曰子異日必為王者師後自鵞湖歸溫嶺結庵今為永豐寺繼居將軍巖二虎侍側神人獻地為瑞巖院夏則衣楮冬則扣冰而浴故世人號為扣冰古佛後住靈曜上堂四眾雲臻教老僧說箇甚麼便下座有僧燒炭積成火龕曰請師入此修行曰真玉不隨流水化琉璃爭奪眾星明曰莫祇這便是麼曰且莫認奴作郎曰畢竟如何曰梅華臘月開天成戊子應閩主之召延居內堂敬拜曰謝師遠降賜茶次師提起橐子曰大王會麼曰不會曰人王法王各自照了留十日以疾辭至十二月二日沐浴陞堂告眾而逝千歲寶掌和尚千歲寶掌和尚中印度人也周威烈十二年丁卯降神受質左手握拳七歲祝髮乃展因名寶掌魏晉間東遊此土入蜀禮普賢留大慈常不食日誦般若等經千餘卷有詠之者曰勞勞玉齒寒似迸巖泉急有時中夜坐堦前神鬼泣一日謂眾曰吾有願住世千歲今年六百二十有六故以千歲稱之次遊五臺徙居祝融峯之華嚴黃梅之雙峯廬山之東林尋抵建鄴會達磨入梁師就扣其旨開悟武帝高其道臘延入內庭未幾如吳有偈曰梁城遇導師參禪了心地飄零二浙遊更盡佳山水順流東下由千頃至天竺往鄮峯登太白穿鴈蕩盤於翠峯七十二庵回赤城憩雲門法華諸暨漁浦赤符大巖等處返飛來棲止石竇有行盡支那四百州此中徧稱道人遊之句時貞觀十五年也後居浦江之寶嚴與朗禪師友善每通問遣白犬馳往朗亦以青猿為使令故題朗壁曰白犬銜書至青猿洗鉢回顯慶二年正旦手塑一像至九日像成問其徒慧雲曰此肖誰雲曰與和尚無異即澡浴易衣趺坐謂雲曰吾住世已一千七十二年今將謝世聽吾偈曰本來無生死今亦示生死我得去住心他生復來此頃時囑曰吾滅後六十年有僧來取吾骨勿拒言訖而逝入滅五十四年有刺浮長老自雲門至塔所禮曰冀塔洞開少選塔戶果啟其骨連環若黃金浮即持往秦望山建窣堵波奉藏以周威烈丁卯至唐高宗顯慶丁巳攷之實一千七十二年抵此土歲歷四百餘法順大師法順大師姓杜氏世傳文殊化身也降靈於雍州萬年縣神迹炳著不可勝紀甞作法身頌曰懷州牛喫禾益州馬腹脹天下覔醫人灸猪左膊上天奇瑞云金剛之堅未為堅如意之貴未為貴左右觀之風吹不入前後觀之雨洒不着所以法華云幽固深遠無人能到未詳法嗣實性大師實性大師因同參芙蓉訓禪師至上堂以右手拈拄杖倚放左邊良久曰此事若不是芙蓉師兄也大難委悉便下座茶陵郁山主茶陵郁山主不曾行脚因廬山有化士至論及宗門中事教令看僧問法燈百尺竿頭如何進步法燈曰噁凡三年一日乘驢度橋一踏橋板而墮忽然大悟遂有頌曰我有神珠一顆久被塵勞關鏁今朝塵盡光生照破山河萬朵因茲更不遊方師乃白雲端和尚得度師端有贊曰百尺竿頭曾進步溪橋一踏沒山河從茲不出茶川上吟嘯無非囉哩囉僧肇法師僧肇法師遭秦王難臨就刑說偈曰四大元無主五陰本來空將頭臨白刃猶似斬春風玄沙備云大小肇法師臨死猶寱語禪月貫休禪師禪月貫休禪師有詩曰禪客相逢祇彈指此心能有幾人知大隨和尚舉問曰如何是此心師無對歸宗柔代云能有幾人知先淨照禪師先淨照禪師問楞嚴大師經中道若能轉物即同如來若被物轉即名凡夫祇如昇元閣作麼生轉嚴無對汾陽昭代云彼此老大公期和尚公期和尚因往羅漢路逢一騎牛公子師問羅漢路向甚麼處去公拍牛曰道道師喝曰這畜生公曰羅漢路向甚麼處去師却拍牛曰道道公曰直饒恁麼猶少蹄角在師便打公拍牛便走唐朝因禪師唐朝因禪師微時甞運槌擊土次見一大塊戲槌猛擊之應碎豁然大悟後有老宿聞云盡山河大地被因禪師一擊百雜碎法海立禪師處州法海立禪師因朝廷有旨革本寺為神霄宮師陞座謂眾曰都緣未徹所以說是說非葢為不真便乃分彼分此我身尚且不有身外烏足道哉正眼觀來一場笑具今則聖君垂旨更僧寺作神霄佛頭上添箇冠兒算來有何不可山僧今日不免橫檐拄杖高挂鉢囊向無縫塔中安身立命於無根樹下嘯月吟風一任乘雲仙客駕鶴高人來此呪水書符叩牙作法他年成道白日上昇堪報不報之恩以助無為之化祇恐不是玉是玉也大奇然雖如是且道山僧轉身一句作麼生道還委悉麼擲下拂子竟爾趨寂樓子和尚樓子和尚不知何許人也遺其名氏一日偶經遊街市間於酒樓下整襪帶次聞樓上人唱曲云你既無心我也休忽然大悟因號樓子焉神照本如法師神照本如法師甞以經王請益四明尊者尊者震聲曰汝名本如師即領悟作偈曰處處逢歸路頭頭達故鄉本來成現事何必待思量上竺證悟法師臨安府上竺圓智證悟法師台州林氏子依白蓮僊法師問具變之道僊指行燈曰如此燈者離性絕非本自空寂理則具矣六凡四聖所見不同變則在焉師不契後因掃地誦法華經至知法常無性佛種從緣起始諭旨告僊僊然之師甞患學者囿於名相至以天台為文字之學南宗鄙之乃謁護國此庵元禪師夜語次師舉東坡宿東林偈且曰也不易到此田地元曰尚未見路徑何言到耶曰祇如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這箇消息元曰是門外漢耳曰和尚不吝可為說破元曰却祇從這裡猛著精彩捕看若捕得他破則亦知本命元辰落著處師通夕不寐及曉鍾鳴去其秘畜以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人特以告元元曰向汝道是門外漢師禮謝未幾有化馬祖殿瓦者求語發揚師書曰寄語江西老古錐從教日炙與風吹兒孫不是無料理要見冰消瓦解時此庵見之笑曰須是這闍黎始得淨居尼玄機溫州淨居尼玄機唐景雲中得度常習定於大日山石窟中一日忽念曰法性湛然本無去住厭喧趍寂豈為達邪乃往參雪峯雪峯問甚處來曰大日山來雪峯曰日出也未師曰若出則鎔却雪峯雪峯曰汝名甚麼師曰玄機雪峯曰日織多少師曰寸絲不挂遂禮拜退纔行三五步雪峯召曰袈裟角拖地也師回首雪峯曰大好寸絲不挂世傳玄機乃永嘉大師女弟甞同遊方以景雲歲日考之是矣第所見雪峯非真覺存也永嘉既到曹谿必嶺下雪峯也未詳法嗣故附於此亡名老宿二十六則昔有一老宿一夏不為師僧說話有僧歎曰我祇恁麼空過一夏不敢望和尚說佛法得聞正因兩字也得老宿聞乃曰闍黎莫𧬊速若論正因一字也無道了叩齒曰適來無端不合與麼道隣壁有一老宿聞曰好一釜羹被一顆鼠糞污却報慈遂徵云且道讚歎語不肯語若是讚歎為甚道鼠糞污却若不肯他有什麼過驗得麼雪竇顯云誰家釜衷無一兩顆黃龍清云二老宿只見錐頭利不見鑿頭方只如這僧道不敢望和尚說佛法得聞正因兩字也得是會不會參玄要具通方眼好向言中辨古今昔有一僧在經堂內不看經每日打坐藏主曰何不看經僧曰某甲不識字藏主曰何不問人僧近前叉手鞠躬曰這箇是甚麼字藏主無對大通本代云又道不識昔有一老宿住菴於門上書心字於牕上書心字於壁上書心字法眼益云門上但書門字牕上但書牕字壁上但書壁字報慈遂云門上不要書門字牕上不要書牕字壁上不要書壁字何故字義炳然昔有二庵主住庵旬日不相見忽相會上庵主問下庵主多時不相見向甚麼處去下庵主曰在庵中造箇無縫塔上庵主曰某甲也要造一箇就兄借取塔樣子下庵主曰何不早說恰被人借去了也法眼益云且道是借他樣不借他樣昔有一庵主見僧來豎起火筒曰會麼曰不會庵主曰三十年用不盡底僧却問三十年前用箇甚麼庵主無對歸宗柔代云也要知昔有一老宿因江南國主問予有一頭水牯牛萬里無寸草未審向甚麼處放老宿無對歸宗柔代云好處放昔有一老宿問僧甚麼處來僧曰牛頭山禮拜祖師來老宿曰還見祖師麼僧無對歸宗柔代云大似不相信昔有一老宿有偈曰五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人公有老宿云既不識他當初問甚麼人賃僧問老宿如何是密室中人老宿曰有客不答話玄沙備云何曾密歸宗柔別老宿云你因甚麼得見昔有一老宿因僧問魂兮歸去來食我家園葚如何是家園葚報慈遂代云是亦食不得法燈欽云污却你口昔有一老宿曰祖師九年面壁為訪知音若恁麼會得喫鐵棒有日在又一老宿曰祖師九年面壁何不慚惶若恁麼會得更買草鞋行脚三十年瑯琊覺云既不然且道祖師面壁意作麼生良久云欲得不招無間業莫謗如來正法輪天童傑舉瑯琊語了云二老宿敲甎打瓦瑯琊和尚畫虎成貍諸人要見祖師面壁底意旨麼窮坑難滿昔有一老宿因僧問師子捉兔亦全其力捉象亦全其力未審全箇甚麼力老宿曰不欺之力法眼益別云不會古人語昔有一老宿曰這一片田地分付來多時也我立地待汝搆去法眼益云山僧如今坐地待汝搆去還有道理也無那箇親那箇疎試裁斷看昔有老宿畜一童子竝不知軌則有一行脚僧到乃教童子禮儀晚間見老宿外歸遂去問訊老宿怪訝遂問童子曰阿誰教你童曰堂中某上座老宿喚其僧來問上座傍家行脚是甚麼心行這童子養來二三年了幸自可憐生誰教上座教壞伊快束裝起去黃昏雨淋淋地被趂出法眼益云古人恁麼顯露些子家風甚怪且道意在於何昔有僧到曹溪時守衣鉢僧提起衣曰此是大庾嶺頭提不起底僧曰為甚麼在上座手裏僧無對雲門偃云彼此不了又云將謂是師子兒昔有老宿問一座主疏鈔解義廣略如何座主曰鈔解疏疏解經老宿曰經解甚麼座主無對昔高麗國來錢塘刻觀音聖像及舁上船竟不能動因請入明州開元寺供養後有設問無剎不現身聖像為甚不去高麗國長慶稜云現身雖普覩相生偏法眼益別云識得觀音未泗州塔前一僧禮拜有人問上座日日禮拜還見大聖麼法眼益代云汝道禮拜是甚麼義泗州塔頭侍者及時鎻門有人問既是三界大師為甚麼被弟子鎻侍者無對法眼益代云弟子鎻大師鎻法燈欽代云還我鎻匙來又老宿代云吉州鎻䖍州鎻聖僧像被屋漏滴有人問僧既是聖僧為甚麼有漏僧無對韶國師代云無漏不是聖僧有人問僧點甚麼燈僧曰長明燈曰甚麼時點曰去年點曰長明何在僧無語長慶稜代云若不如此知公不受人謾法眼益別云利動君子有座主念彌陀名號次小師喚和尚及回顧小師不對如是數四和尚叱曰三度四度喚有甚麼事小師曰和尚幾年喚他即得某甲纔喚便發業法燈欽代云咄叱有僧與童子上經了令持經著函內童子曰某甲念底著向那裏法燈欽代云汝念甚麼經有僧入冥見地藏菩薩地藏問你平生修何業僧曰念法華經曰止止不須說我法妙難思為是說是不說僧無對歸宗柔代云此回歸去敢為流通鹽官會下有一主事僧忽見一鬼使來追僧告曰某甲身為主事未暇修行乞容七日得否使曰待為白王若許即七日後來不然須臾便至言訖不見至七日後復來覓其僧了不可得後有人舉問一僧若被覓著時如何抵擬他洞山价代云被他覓得也台州六通院僧欲渡船有人問既是六通為甚麼假船僧無對天台韶國師代云不欲驚眾亡名宰官七則洪州太守宋令公一日大寧寺僧陳乞請第二座開堂公曰何不請第一座眾無語法眼益代云不勞如此江南相馮延巳與數僧遊鍾山至一人泉問一人泉許多人爭得足一僧對曰不教欠少延巳不肯乃別曰誰人欠少法眼益別云誰是不足者官人問僧名甚麼曰無揀官人曰忽然將一椀沙與上座又作麼生曰謝官人供養法眼益別云此猶是揀底廣南有僧住庵國主出獵左右報庵主大王來請起庵主曰非但大王來佛來亦不起王問佛豈不是汝師庵主曰是王曰見師為甚麼不起法眼益代云未足酬恩福州洪塘橋上有僧列坐官人問此中還有佛麼僧無對法眼益代云汝是甚麼人昔有官人入鎮州天王院覩神像因問院主曰此是甚麼功德曰護國天王曰祇護此國徧護餘國曰在秦為秦在楚為楚曰臘月二十九日打破鎮州城天王向甚處去院主無對昔有官人作無鬼論中夜揮毫次忽見一鬼出云汝道無我聻五祖演云老僧當時若見但以手作鵓鳩觜向伊道谷呱呱亡名行者五則昔有道流在佛殿前背佛而坐僧曰道士莫背佛道流曰大德本教中道佛身充滿於法界向甚麼處坐得僧無對法眼益代云識得汝有一行者隨法師入佛殿行者向佛而唾師曰行者少去就何以唾佛行者曰將無佛處來與某甲唾師無對溈山祐云仁者却不仁者不仁者却仁者仰山寂代法師云但唾行者又云行者若有語即向伊道還我無行者處來死魚浮於水上有人問僧魚豈不是以水為命僧曰是曰為甚麼却向水中死僧無對杭州天龍機和尚代云是伊為甚麼不去岸上死子趂鴿子飛向佛殿欄干上顫有人問僧一切眾生在佛影中常安常樂鴿子見佛為甚麼却顫僧無對法燈欽代云怕佛昔有一僧去覆船路逢一賣鹽翁僧問覆船路向甚麼處去翁良久僧再問翁曰你患聾那僧曰你向我道甚麼翁曰向你道覆船路僧曰翁莫會禪麼翁曰莫道會禪佛法也會盡僧曰你試說看翁挑起鹽籃僧曰難翁曰你喚這箇作甚麼僧曰鹽翁曰有甚麼交涉僧曰你喚作甚麼曰不可更向你道是鹽亡名道婆五則昔有婆子供養一庵主經二十年常令一二八女子送飯給侍一日令女子抱定曰正恁麼時如何庵主曰枯木倚寒巖三冬無暖氣女子舉似婆婆曰我二十年祇供養得箇俗漢遂遣出燒却庵徑山信云冷地看來遮婆子也不唧𠺕何待遣出遮僧方燒却且道雙髻意落在甚麼處具眼者辨看昔有一僧參米胡路逢一婆住庵僧問婆有眷屬否曰有僧曰在甚麼處曰山河大地若草若木皆是我眷屬僧曰婆莫作師姑來否曰汝見我是甚麼僧曰俗人婆曰汝不可是僧僧曰婆莫混濫佛法好婆曰我不混濫佛法僧曰汝恁麼豈不是混濫佛法婆曰你是男子我是女人豈曾混濫龐行婆入鹿門寺設齋維那請意旨婆拈梳子插向髻後曰回向了也便出去溫州陳道婆甞徧扣諸方名宿後於長老山淨和尚語下發明有偈曰高坡平頂上盡是採樵翁人人盡懷刀斧意不見山花映水紅昔有施主婦人入院行眾僧隨年錢僧曰聖僧前著一分婦人曰聖僧年多少僧無對法眼益代云心明滿處即知宋世玉音宋太宗皇帝宋太宗皇帝一日幸相國寺見僧看經問曰是甚麼經僧曰仁王經帝曰既是寡人經因甚却在卿手裏僧無對雪竇顯代云皇天無親唯德是輔幸開寶塔問僧卿是甚人對曰塔主帝曰朕之塔為甚麼卿作主僧無對雪竇顯代云合國咸知一日因僧朝見帝問甚處來對曰廬山臥雲庵帝曰朕聞臥雲深處不朝天為甚到此僧無對雪竇顯代云難逃至化僧入對次奏曰陛下還記得麼帝曰甚處相見來奏曰靈山一別直至如今帝曰卿以何為驗僧無對雪竇顯代云貧道得得而來京寺回祿藏經悉為煨燼僧欲乞宣賜召問昔日摩騰不燒如今為甚却燒僧無對雪竇顯代云陛下不忘付囑帝甞夢神人報曰請陛下發菩提心因早朝宣問左右街菩提心作麼生發皆無對雪竇顯代云實謂今古罕聞智寂大師進三界圖帝問朕在那一界中智寂無對保寧勇代云陛下何處不稱尊一日朝罷帝擎鉢問丞相王隨曰既是大庾嶺頭提不起為甚麼却在朕手裏隨無對徽宗皇帝徽宗皇帝政和三年嘉州巡捕官奏本部路傍有大古樹因風摧折中有一僧禪定鬚髮被體指爪遶身帝降旨令肩輿入京命西天總持三藏以金磬出其定遂問何代僧曰我乃東林遠法師之弟名慧持因遊峨嵋入定於樹遠法師無恙否三藏曰遠法師晉人也化去七百年矣持不復語三藏問師既至此欲歸何所持曰陳留縣復入定帝製三偈令繪像頒行偈曰七百年來老古錐定中消息許誰知爭如隻履西歸去生死何勞木作皮藏山於澤亦藏身天下無藏道可親寄語莊周休擬議樹中不是負趍人有情身不是無情彼此人人定裏身會得菩提本無樹不須辛苦問盧能孝宗皇帝孝宗皇帝宣問靈隱佛照光禪師曰釋迦佛入山修道六年而成所成者何事請師明說對曰將謂陛下忘却
